Med Bull 1992;48:477."}], "relacionadas": [{"id": "nota-0213", "tipo": "complementa", "justificativa": "nota-0213 já registra a faixa geral de 10-20% de contribuição anaeróbia em eventos de 10-30min; esta tabela (Newsholme 1992, citada por McArdle) detalha a contribuição percentual específica por sistema energético (fosfocreatina, glicólise, aeróbio, glicose sanguínea, gordura) para uma escala completa de durações de evento, de 100m a 24h"}, {"id": "nota-0154", "tipo": "complementa", "justificativa": "aplica os três sistemas de ressíntese de ATP definidos na nota-0154 a uma tabela concreta de contribuição percentual por duração de prova"}], "confianca": 0.6, "status": "revisar", "body": "Tabela de referência (Newsholme et al. 1992, citada por McArdle, assume corredor de 70 kg) para a contribuição percentual de cada via energética à geração total de ATP, por duração de prova de corrida — usada aqui como referência geral de janelas de duração (o princípio se estende por analogia a esforços de ciclismo de duração equivalente, embora os números tenham sido derivados de corrida):\n\n| Evento | Fosfocreatina | Glicogênio (anaeróbio) | Glicogênio (aeróbio) | Glicose sanguínea | Triacilglicerol (gordura) |\n|---|---|---|---|---|---|\n| 100 m | 50% | 50% | — | — | — |\n| 200 m | 25% | 65% | 10% | — | — |\n| 400 m | 12,5% | 62,5% | 25% | — | — |\n| 800 m | 6% | 50% | 44% | — | — |\n| 1500 m | mínima | 25% | 75% | — | — |\n| 5000 m | mínima | 12,5% | 87,5% | — | — |\n| 10.000 m | mínima | 3% | 97% | — | — |\n| Maratona | — | — | 75% | 5% | 20% |\n| Ultramaratona (80 km) | — | — | 35% | 5% | 60% |\n| Prova de 24h | — | — | 10% | 2% | 88% |\n\nPadrão claro: quanto mais curto o evento, maior a dependência de fosfocreatina e glicólise anaeróbia; conforme a duração aumenta além de ~10-15 minutos, a contribuição aeróbia (glicogênio, depois progressivamente gordura) domina, com a gordura (triacilglicerol) tornando-se o combustível majoritário em provas de ultra-endurance (>6-8h).\n\nConfiança rebaixada (0,6) e status `revisar`: a tabela vem de uma única fonte primária (Newsholme et al. 1992) aplicada a corrida, extrapolada aqui por analogia a durações equivalentes de ciclismo — os percentuais exatos podem diferir por modalidade (a economia/eficiência do ciclismo difere da corrida) e não foram validados especificamente para pedal.\n\nAplicação ao feedback: fora do escopo de aplicação direta (não há sinal do Strava que meça fontes de combustível), mas útil como tabela de referência para explicar, em texto educativo, por que esforços de diferentes durações (ex.: um sprint de 15s vs. uma prova de 6h) dependem de sistemas energéticos tão diferentes — reforça, com números específicos, a lógica de especificidade de treino por duração-alvo já presente no cânone (nota-0042, nota-0043)."},{"id": "nota-0229", "titulo": "Déficit de oxigênio: no início do exercício, o consumo de O2 sobe exponencialmente até atingir o steady-rate em ~3-4min; atletas treinados atingem esse platô mais rápido, com déficit menor", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 164, "trecho": "The oxygen deficit quantitatively expresses the difference between the total oxygen consumption during activity and the total that would be consumed had steady-rate oxygen consumption been achieved at the onset. This oxygen deficit represents the immediate anaerobic energy transfer from the hydrolysis of intramuscular high-energy phosphates and rapid glycolysis until steady-rate energy transfer matches the energy requirements."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 165, "trecho": "The endurance-trained person achieves steady rate more rapidly, with a smaller oxygen deficit than sprint-power athletes, cardiac patients, older adults, or untrained individuals. Consequently, a faster aerobic kinetic response allows the trained person to consume a greater total amount of oxygen to steady-rate exercise and makes the anaerobic component of energy transfer proportionately smaller."}], "relacionadas": [{"id": "nota-0154", "tipo": "complementa", "justificativa": "detalha, com o conceito de déficit de oxigênio, a fase de transição entre os sistemas de ressíntese de ATP (fosfagênio/glicolítico) e o sistema oxidativo já descritos na nota-0154"}], "confianca": 0.7, "status": "auto-aprovado", "body": "Quando o exercício começa em intensidade constante (steady-rate), o consumo de oxigênio não sobe instantaneamente ao nível necessário — ele sobe exponencialmente (\"componente rápido\") e só atinge um platô estável entre o 3º e o 4º minuto. Esse atraso inicial é chamado de **déficit de oxigênio**: a diferença entre o oxigênio total consumido no início do exercício e o que teria sido consumido se o steady-rate tivesse sido atingido instantaneamente. Esse déficit é suprido pelos sistemas anaeróbios (fosfagênio + glicólise rápida) até que a produção aeróbia de energia alcance o requerimento energético do exercício. Fosfatos de alta energia se depletam substancialmente durante essa fase, gerando tipicamente um déficit de 3-4 L de oxigênio.\n\nDiferença por nível de treino: **atletas treinados em endurance atingem o steady-rate mais rapidamente e com um déficit de oxigênio menor** do que atletas de potência/sprint, cardiopatas, idosos ou indivíduos destreinados. Essa cinética aeróbia mais rápida permite ao atleta treinado consumir uma fração maior de oxigênio total já na fase inicial do esforço, tornando proporcionalmente menor a contribuição anaeróbia (e, portanto, o acúmulo de lactato/fadiga) para o mesmo esforço. Três adaptações de treino explicam essa resposta mais rápida: (1) aumento mais rápido da bioenergética muscular, (2) aumento do débito cardíaco, (3) fluxo sanguíneo regional desproporcionalmente maior para o músculo ativo, combinado a adaptações celulares.\n\nEste é o fundamento fisiológico de por que o **aquecimento gradual** (rampa de intensidade no início de uma sessão) reduz a dependência anaeróbia/acúmulo de lactato numa arrancada: um atleta mais aeróbio treinado \"liga\" o sistema oxidativo mais rápido mesmo em esforços de início abrupto.\n\nDepende de medição de laboratório (VO2 em tempo real, não disponível no Strava), portanto classificada como contexto — mas é uma base fisiológica útil para explicar por que arrancadas/começos fortes de prova pesam desproporcionalmente mais em atletas menos aeróbios."},{"id": "nota-0230", "titulo": "Fórmula da eficiência mecânica (% = trabalho externo ÷ gasto energético × 100): 20-25% em ciclismo estacionário, cai abaixo de 20% no ciclismo de estrada por causa do arrasto aerodinâmico", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 207, "trecho": "Mechanical efficiency reflects the percentage of total chemical energy expended that contributes to external work, with the remainder lost as heat. Mechanical efficiency (%) = External work accomplished ÷ Energy expenditure × 100"}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 208, "trecho": "Mechanical efficiency = 31.19 kcal ÷ 122.5 kcal × 100 = 25.5%... On average, mechanical efficiency ranges between 20 and 25% for walking, running, and stationary cycling... Efficiency falls below 20% for activities with substantial drag force that resists movement, as, for example, road cycling, cross-country skiing, ice skating, rowing, and swimming."}], "relacionadas": [{"id": "nota-0179", "tipo": "complementa", "justificativa": "fornece a fórmula quantitativa e um exemplo numérico completo para o conceito de economia/eficiência mecânica já definido qualitativamente na nota-0179"}], "confianca": 0.75, "status": "auto-aprovado", "body": "**Fórmula: Eficiência mecânica (%) = Trabalho externo realizado ÷ Gasto energético total × 100.** Representa a fração da energia química total gasta que efetivamente se converte em trabalho externo mensurável — o restante se perde como calor (atrito interno/externo).\n\nExemplo numérico do livro (15 min em bicicleta estacionária): trabalho realizado = 13.300 kg-m (equivalente a 31,19 kcal, usando 426,4 kg-m por kcal); oxigênio consumido = 25 L com RQ=0,88 (equivalente a 4,9 kcal/L de O2, logo 122,5 kcal de gasto energético total). Eficiência mecânica = 31,19 ÷ 122,5 × 100 = **25,5%**.\n\nFaixas de referência: em média, a eficiência mecânica fica entre **20-25%** para caminhada, corrida e ciclismo estacionário (sem resistência de arrasto). Ela **cai abaixo de 20%** em atividades com força de arrasto substancial contra o movimento — especificamente citado: **ciclismo de estrada**, esqui cross-country, patinação no gelo, remo e natação — porque parte da energia é gasta vencendo resistência aerodinâmica/hidrodinâmica em vez de ser convertida em trabalho útil mensurável no sentido clássico. Isso é consistente com o foco competitivo em aerodinâmica (posição, equipamento) no ciclismo de estrada e contrarrelógio, já registrado no cânone (nota-0003).\n\nAplicação ao feedback: não há sinal direto do Strava para calcular gasto energético total (requer VO2/calorimetria), então a fórmula em si não é executável automaticamente — mas fundamenta, de forma quantitativa, por que investimentos em aerodinâmica têm retorno desproporcional no ciclismo de estrada comparado a atividades sem arrasto significativo (nota-0003), e por que a \"eficiência\" de um ciclista não é fixa nem comparável 1:1 entre modalidades."},{"id": "nota-0231", "titulo": "Ciclistas que treinam mais tempo em/acima do limiar de lactato aumentam a eficiência bruta de pedalada ao longo de uma temporada competitiva (~1% em média, Hopker 2009)", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 206, "trecho": "Cyclists who spend the most time training at or above their lactate threshold (LT) increase gross efficiency cycling compared to preseason and postseason. The increase in gross efficiency averages a modest 1%, yet this can make a difference in winning or losing, and posting a rider's best times."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 206, "trecho": "Source: Hopker J, et al. Changes in cycling efficiency during a competitive season. Med Sci Sport Exer 2009;41:912."}], "relacionadas": [{"id": "nota-0215", "tipo": "complementa", "justificativa": "nota-0215 já registra que a eficiência de pedalada melhora ~8% ao longo de VÁRIOS ANOS de treino; este estudo (Hopker 2009) mostra uma mudança menor (~1%) e de prazo mais curto (dentro de UMA temporada), especificamente associada ao volume de treino em/acima do limiar de lactato"}], "confianca": 0.6, "status": "revisar", "body": "Um estudo (Hopker et al., 2009) encontrado em ciclistas ao longo de uma temporada competitiva mostrou que **quanto mais tempo um ciclista passa treinando em ou acima do limiar de lactato (LT), maior o aumento da eficiência bruta de pedalada** (gross efficiency) comparado à pré-temporada e pós-temporada. O aumento médio é modesto — cerca de **1%** — mas o próprio livro-texto observa que essa margem pode ser decisiva entre vencer ou perder e para bater recordes pessoais.\n\nIsso é uma escala de tempo e magnitude diferente da mudança de eficiência de pedalada de longo prazo já registrada no cânone (nota-0215: ~8% de melhora ao longo de vários ANOS de treino consistente) — aqui trata-se de uma flutuação menor (~1%) dentro de uma única temporada, especificamente ligada ao volume de treino perto do limiar de lactato (não ao volume total ou à quantidade de anos de treino).\n\nConfiança rebaixada (0,6) e status `revisar`: o achado vem de um único estudo (Hopker et al. 2009), sem indicação no texto-fonte de que seja uma revisão sistemática ou meta-análise, e depende de medição laboratorial de eficiência bruta (VO2/RQ) não disponível no Strava.\n\nAplicação ao feedback: fora do escopo de aplicação direta (não medível via Strava), mas relevante como hipótese de por que o volume de treino em zona limiar (Sweet Spot/Limiar, nota-0041) durante a temporada pode trazer ganhos de eficiência que não aparecem diretamente como aumento de FTP, mas se manifestam como melhor desempenho em provas na mesma potência."},{"id": "nota-0239", "titulo": "Deriva cardíaca quantificada: -13% de volume sistólico e +11% de FC entre 15-55min de ciclismo submáximo, mesmo em ambiente termoneutro (Fritzsche et al.)", "dominio": "fisiologia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 346, "trecho": "Cardiovascular Drift: Reduced Stroke Volume and Increased Heart Rate During Prolonged Physical Activity... A reduced stroke volume initiates a compensatory progressive heart rate increase to maintain a nearly constant cardiac output as activity progresses and body temperature increases. The term cardiovascular drift describes the gradual time-dependent downward 'drift' in several cardiovascular responses, most notably stroke volume with concomitant heart rate increase during prolonged steady-rate exercise, particularly during high ambient temperatures."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 347, "trecho": "From 15 to 55 min during the control trial, a 13% decrease in stroke volume accompanied an 11% heart rate increase, while cutaneous blood flow showed no increase from 20 to 60 min of cycling... These observations confirm that a decline in stroke volume during prolonged physical activity in a thermoneutral environment primarily results from increased heart rate and not increased cutaneous blood flow as body temperature rises."}], "relacionadas": [{"id": "nota-0182", "tipo": "complementa", "justificativa": "nota-0182 (Fonte 2) descreve o mecanismo de deriva cardíaca apenas qualitativamente; esta nota traz o dado mais quantificado do cânone (4 fontes) sobre o fenômeno, incluindo um experimento com bloqueio beta-1 que aponta a direção causal entre FC e volume sistólico."}], "confianca": 0.6, "status": "revisar", "body": "Estudo de laboratório (Fritzsche et al., 1999, citado no McArdle) mediu volume sistólico, frequência cardíaca (FC) e fluxo sanguíneo cutâneo durante 60 min de ciclismo submáximo contínuo em ambiente termoneutro, em 7 homens ativos. Resultado: entre os minutos 15 e 55, o volume sistólico caiu 13% enquanto a FC subiu 11%, mantendo o débito cardíaco praticamente estável (~16 L/min). O fluxo sanguíneo cutâneo não aumentou entre os minutos 20 e 60 — ou seja, a queda do volume sistólico não foi explicada pela hipótese clássica de redistribuição de sangue para a pele (termorregulação), já que o ambiente era termoneutro.\n\nO achado mais importante veio de um segundo braço experimental: quando os pesquisadores bloquearam farmacologicamente o aumento da FC (com atenolol, um beta-bloqueador beta-1, impedindo a \"deriva\" da FC), o volume sistólico NÃO caiu, apesar de fluxo sanguíneo cutâneo semelhante entre as condições. Isso sugere que, nesse experimento, o aumento da FC é causa (não apenas correlato) da queda do volume sistólico — provavelmente porque uma FC mais alta reduz o tempo disponível para enchimento diastólico do ventrículo a cada batimento.\n\nEsse é o único dado numérico sobre deriva cardíaca/decoupling em todo o cânone (as outras 3 fontes descrevem o mecanismo apenas qualitativamente). Ainda assim, isto NÃO é uma fórmula genérica de cálculo do Pw:Hr (não há uma equação do tipo \"razão potência/FC da 1ª metade vs. 2ª metade da prova\"). É um resultado de laboratório com N pequeno (7 homens), medição invasiva de volume sistólico (não disponível via Strava) e protocolo controlado (cicloergômetro, ambiente termoneutro, esforço submáximo constante) — condições que não necessariamente generalizam para o \"decoupling\" calculado a partir de potência e FC em atividades de campo, com variações de terreno, vento e intensidade. Por isso a nota permanece como `aplicacao: contexto`, não `direta`: confirma e quantifica o mecanismo fisiológico por trás do decoupling observado no Strava, mas não fornece um limiar ou fórmula operacional para gerar regras automáticas.\n\nAplicação ao feedback: útil apenas como explicação de fundo, caso o produto precise justificar didaticamente por que a FC tende a subir gradualmente em relação à potência ao longo de treinos longos e contínuos (>15 min), mesmo sem calor extremo — não deve ser usado para definir um percentual-alvo de decoupling aceitável."},{"id": "nota-0240", "titulo": "Tabela de características metabólicas e contráteis dos tipos de fibra (I, IIa, IIx, IIb) e distribuição em atletas de elite por esporte (90-95% tipo I em fundistas/esquiadores)", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 378, "trecho": "Table 18.2 Classification of Human Skeletal Muscle Fiber Types... Type I Fibers: Contraction time Slow; Maximum duration of use Hours; Force production Low; Mitochondrial density High. Type IIa Fibers: Moderately fast; <30 min; Medium; High. Type IIx Fibers: Fast; <5 min; High; Medium. Type IIb Fibers: Very fast; <1 min; Very high; Low."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 379, "trecho": "Athletic groups with the highest aerobic and endurance capacities (e.g., distance runners and cross-country skiers) possess the highest percentage of slow-twitch fibers, often 90 to 95% in the leg's gastrocnemius muscle. Weightlifters, ice hockey players, and sprinters have more fast-twitch fibers and relatively lower aerobic capacities... Men, women, and children on average possess 45 to 55% slow-twitch fibers in their arm and leg muscles."}], "relacionadas": [{"id": "nota-0074", "tipo": "complementa", "justificativa": "nota-0074 (Livro 1) estabelece que a FTP marca o início do recrutamento significativo de fibras rápidas; esta nota detalha as características metabólicas de cada subtipo de fibra (incluindo tempo máximo de uso sustentável) e a distribuição real observada em atletas de elite de endurance vs. potência."}, {"id": "nota-0068", "tipo": "complementa", "justificativa": "reforça, com dados populacionais, por que força/fibras rápidas raramente são o fator limitante no ciclismo de endurance"}], "confianca": 0.7, "status": "auto-aprovado", "body": "O McArdle apresenta uma tabela de referência (Tabela 18.2) que classifica 4 subtipos de fibra muscular esquelética humana por características metabólicas e contráteis:\n\n| Característica | Tipo I | Tipo IIa | Tipo IIx | Tipo IIb |\n|---|---|---|---|---|\n| Velocidade de contração | Lenta | Moderadamente rápida | Rápida | Muito rápida |\n| Resistência à fadiga | Alta | Razoavelmente alta | Intermediária | Baixa |\n| Atividade típica | Aeróbia | Anaeróbia de longa duração | Anaeróbia de curta duração | Anaeróbia de curta duração |\n| **Duração máxima de uso sustentável** | **Horas** | **<30 min** | **<5 min** | **<1 min** |\n| Produção de força | Baixa | Média | Alta | Muito alta |\n| Densidade mitocondrial | Alta | Alta | Intermediária | Baixa |\n| Densidade capilar | Alta | Intermediária | Baixa | Baixa |\n| Combustível principal | Triacilglicerol | Fosfocreatina, glicogênio | Fosfocreatina, glicogênio | Fosfocreatina, glicogênio |\n\nA coluna \"duração máxima de uso\" é o dado mais concretamente útil: fibras Tipo I sustentam esforço por horas, enquanto Tipo IIx e IIb se esgotam em minutos — o que explica fisiologicamente por que esforços de endurance (>30-60 min) dependem quase exclusivamente do pool de fibras Tipo I, e por que sprints/esforços supra-VO2máx recorrem cada vez mais a IIx/IIb à medida que a duração cai abaixo de alguns minutos.\n\nDado populacional complementar: pessoas em geral (homens, mulheres, crianças) têm em média 45-55% de fibras Tipo I nos membros. Atletas de elite de endurance (fundistas, esquiadores cross-country) chegam a 90-95% de fibras Tipo I no gastrocnêmio — a composição de fibra mais extrema associada a alto desempenho aeróbio registrada no cânone. Levantadores de peso, jogadores de hóquei no gelo e velocistas têm predominância de fibras rápidas e menor capacidade aeróbia relativa. Atletas de meio-fundo e provas de potência (arremesso, salto) tendem a ter proporção ~50/50. A composição de fibra é majoritariamente determinada geneticamente; o texto reconhece que \"treinamento específico pode produzir alguma modificação\", mas não quantifica conversão de tipo de fibra por treinamento.\n\nEsta é uma limitação relevante para o produto: composição de fibra não é mensurável via Strava (exigiria biópsia muscular) e a variação interindividual é grande mesmo dentro do mesmo grupo esportivo — por isso a nota permanece `aplicacao: contexto`, útil apenas para explicar o \"porquê\" fisiológico por trás de por que ciclistas de endurance têm um teto biológico para potência de sprint e por que a duração de um esforço muda o mix de fibras recrutado, sem gerar regra automática a partir de dados do Strava."},{"id": "nota-0241", "titulo": "Limiar de catecolaminas: norepinefrina sobe a partir de ~50% do VO2máx, epinefrina só a partir de ~75% do VO2máx", "dominio": "fisiologia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 422, "trecho": "Figure 20.10 illustrates the catecholamine response at various cycling intensities (expressed as %VO2max) in 10 male subjects. Norepinephrine increases markedly at intensities that exceed 50% VO2max, whereas epinephrine levels remain unchanged until cycling intensity exceeds the 75% level. At maximum effort, an approximate two- to sixfold increase in norepinephrine release takes place."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 422, "trecho": "The sympathoadrenal response to physical activity most closely relates to relative rather than absolute activity intensity."}], "relacionadas": [{"id": "nota-0145", "tipo": "complementa", "justificativa": "oferece um mecanismo hormonal quantificado que ajuda a explicar por que a intensidade em torno de 75% do VO2máx (próxima da faixa de limiar/FTP) marca uma transição fisiológica qualitativa, distinta do limiar de lactato em si"}], "confianca": 0.6, "status": "revisar", "body": "Estudo em cicloergômetro com 10 homens (McArdle, Fig. 20.10) mediu a resposta de catecolaminas plasmáticas (norepinefrina e epinefrina) em intensidades crescentes expressas em %VO2máx. Achados:\n\n- **Norepinefrina** começa a subir de forma acentuada a partir de intensidades que excedem **~50% do VO2máx**.\n- **Epinefrina** permanece praticamente inalterada até a intensidade ultrapassar **~75% do VO2máx** — só a partir daí sobe de forma perceptível.\n- No esforço máximo, a norepinefrina aumenta de 2 a 6 vezes o valor basal.\n\nA resposta simpatoadrenal ao exercício se relaciona mais com a intensidade **relativa** (percentual do VO2máx/capacidade individual) do que com a intensidade absoluta — ou seja, o mesmo percentual de esforço dispara resposta hormonal semelhante em pessoas treinadas e destreinadas, mesmo com potências absolutas muito diferentes.\n\nIsto é um dado de laboratório (N=10 homens, medição de catecolaminas plasmáticas — não disponível via Strava) que ajuda a explicar fisiologicamente por que esforços acima de ~75-80% do VO2máx (faixa que se aproxima do limiar/FTP e das zonas de alta intensidade) costumam ser percebidos como qualitativamente \"mais duros\" e mais estressantes do ponto de vista hormonal/simpático do que esforços moderados — não é apenas uma questão de acúmulo de lactato, mas também de uma resposta adrenérgica que só decola nessa faixa. Isso é consistente com (mas não prova) a ideia de que o limiar funcional de potência (FTP) marca uma transição fisiológica mais ampla do que apenas o balanço lactato produção/remoção.\n\nAplicação ao feedback: nota de contexto fisiológico — não gera regra automática porque não há medição de catecolaminas no Strava. Pode ser usada apenas para explicar didaticamente por que treinos acima de zona 4-5 (aprox. >75-80% do VO2máx) tendem a ser percebidos como desproporcionalmente mais estressantes que a diferença de potência sugeriria."},{"id": "nota-0254", "titulo": "Protocolo de aclimatização ao calor: maior parte do ganho na 1ª semana, exige apenas 2-4h/dia de exposição, e capacidade de sudorese quase dobra em 10 dias", "dominio": "fisiologia", "camada": ["semanal", "mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["temperatura", "tempo-movimento"], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 633, "trecho": "The major portion of acclimatization occurs during the first week of heat exposure, with full acclimatization thereafter. The process requires only 2 to 4 hr of daily heat exposure. The first several sessions in the heat should include 15 to 20 min of light-intensity physical activity. Exercise sessions then should increase in duration and intensity."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 633, "trecho": "Sweating capacity, the most significant factor for heat acclimatization, increases early and nearly doubles after 10 days of heat exposure; sweat also becomes more dilute (less salt lost) and distributes more evenly over the skin surface... The major benefits of acclimatization dissipate within 2 to 3 wk after returning to a more temperate environment."}], "relacionadas": [{"id": "nota-0227", "tipo": "complementa", "justificativa": "nota-0227 cobre o protocolo de reposição de fluido durante o exercício; esta nota cobre a adaptação fisiológica que reduz a necessidade de reposição ao longo dos dias de exposição ao calor"}], "confianca": 0.75, "status": "auto-aprovado", "body": "**Protocolo de aclimatização ao calor** (McArdle): a maior parte da adaptação ocorre já na **primeira semana** de exposição ao calor combinada com exercício, exigindo apenas **2 a 4 horas de exposição por dia** (não precisa ser contínua nem em alta intensidade). As primeiras sessões devem ser leves — **15 a 20 minutos de atividade de baixa intensidade** — com duração e intensidade aumentando progressivamente nas sessões seguintes. Aclimatização plena tipicamente demora cerca de **10 dias**.\n\nPrincipais ganhos fisiológicos mensuráveis com a aclimatização (Tabela 25.5 do livro):\n- **Capacidade de sudorese quase dobra após 10 dias** de exposição ao calor — este é o fator mais significativo da aclimatização.\n- Suor fica mais diluído (menor perda de sódio) e se distribui mais uniformemente pela pele.\n- Limiar para início da sudorese cai (sudorese começa mais cedo no exercício).\n- FC e temperaturas de pele/core mais baixas para o mesmo exercício submáximo.\n- Menor dependência de carboidrato como substrato durante o exercício (poupança de glicogênio).\n- Débito cardíaco melhor distribuído, com maior estabilidade de pressão arterial durante o esforço.\n\n**Os benefícios da aclimatização se dissipam em 2 a 3 semanas** após o retorno a um ambiente mais ameno — ou seja, é um estado transitório que precisa ser mantido por exposição repetida.\n\nAplicação ao feedback: se o histórico do atleta no Strava mostrar exposição repetida a `temperatura` elevada (múltiplas atividades em dias quentes) ao longo de ~10-14 dias, o sistema pode inferir que o atleta está total ou parcialmente aclimatizado ao calor e ajustar as expectativas de FC/decoupling para dias quentes subsequentes (menos penalização). Inversamente, se o atleta não treinou em calor nas últimas 2-3 semanas (gap de `tempo-movimento` em `temperatura` alta), o sistema deve tratá-lo como não aclimatizado e reforçar avisos de hidratação/ritmo mais conservador na primeira sessão quente após esse intervalo."},{"id": "nota-0256", "titulo": "Cada litro de desidratação por suor eleva a FC de exercício em ~8 bpm e reduz o débito cardíaco em ~1 L/min; 1% de perda de massa corporal já eleva a temperatura retal", "dominio": "fisiologia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["temperatura", "FC (média/máx)", "decoupling (Pw:Hr)"], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 629, "trecho": "A fluid loss equivalent to only 1% of body mass increases rectal temperature compared with the same exercise and normal hydration. For each liter of sweat-loss dehydration, exercise heart rate increases 8 b·min−1, with a corresponding 1.0 L·min−1 decrease in cardiac output."}], "relacionadas": [{"id": "nota-0182", "tipo": "complementa", "justificativa": "nota-0182 descreve o mecanismo qualitativo da deriva cardíaca (desidratação como um dos fatores); esta nota quantifica especificamente o efeito da desidratação por suor sobre FC e débito cardíaco, útil para separar a contribuição da desidratação de outras causas de decoupling"}, {"id": "nota-0239", "tipo": "complementa", "justificativa": "nota-0239 quantifica deriva cardíaca em ambiente termoneutro sem desidratação relevante; esta nota quantifica especificamente o efeito de desidratação/calor, mecanismo complementar de subida de FC ao longo do treino"}], "confianca": 0.65, "status": "auto-aprovado", "body": "Dado quantificado (McArdle) sobre o efeito da desidratação induzida por suor na resposta cardiovascular durante exercício: **para cada litro de perda de suor (desidratação), a FC de exercício sobe cerca de 8 batimentos/minuto**, acompanhada de uma **queda de aproximadamente 1,0 L/min no débito cardíaco**. Isso ocorre porque grande parte da água perdida por suor vem do volume plasmático, reduzindo progressivamente a capacidade circulatória.\n\nAlém disso, mesmo uma perda de fluido muito pequena — equivalente a apenas **1% da massa corporal** — já é suficiente para elevar a temperatura retal em comparação com o mesmo exercício em estado de hidratação normal.\n\nEsse mecanismo é uma segunda via (além do calor per se, nota-0239) pela qual a deriva cardíaca/decoupling (Pw:Hr) se manifesta em sessões longas: a combinação de perda de suor acumulada + calor ambiente eleva a FC para a mesma potência ao longo do tempo, mesmo sem fadiga muscular real.\n\nAplicação ao feedback: ao detectar decoupling elevado (FC subindo para a mesma potência) numa atividade longa, cruzar com `temperatura` e duração/`tempo-movimento` para estimar se desidratação é uma causa provável — sessões longas (>1,5-2h) em `temperatura` alta com decoupling acentuado sugerem hidratação insuficiente, não necessariamente perda de fitness ou fadiga muscular. Como regra grosseira de ordem de grandeza: se o decoupling observado for compatível com uma subida de FC de ~8 bpm ou mais ao longo da sessão em condições quentes, isso é consistente com desidratação de ~1L, reforçando a recomendação de hidratação mais agressiva em treinos futuros semelhantes."},{"id": "nota-0257", "titulo": "Desidratação de apenas 1,9% da massa corporal já reduz VO2max em 10% e resistência em 22%; 4,3% reduz VO2max em 22% e resistência em 48%", "dominio": "fisiologia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 630, "trecho": "In terms of performance, dehydration equal to 4.3% of body mass reduced walking endurance by 48%; concurrently, VO2max decreased by 22%. These same experiments showed decreased endurance performance (−22%) and VO2max (−10%) when dehydration averaged only 1.9% of body mass."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 628, "trecho": "Even a modest fluid loss of 2% body mass adversely affects exercise performance."}], "relacionadas": [{"id": "nota-0227", "tipo": "complementa", "justificativa": "nota-0227 descreve como monitorar a taxa de desidratação por variação de peso corporal; esta nota quantifica o impacto no desempenho de diferentes níveis de desidratação medidos da mesma forma"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Dados quantificados sobre o custo de desempenho da desidratação progressiva (McArdle, citando experimentos controlados):\n\n- **Desidratação de 1,9% da massa corporal**: VO2max cai ~10%, resistência/desempenho de endurance cai ~22%.\n- **Desidratação de 4,3% da massa corporal**: VO2max cai ~22%, resistência de caminhada cai ~48%.\n- De forma geral, **até uma perda de apenas 2% da massa corporal já prejudica adversamente o desempenho de exercício**.\n\nA relação não é linear: o salto de 1,9% para 4,3% de desidratação (pouco mais que o dobro) mais que dobra a queda de VO2max (10%→22%) e mais que dobra a queda de resistência (22%→48%), sugerindo um efeito acelerado (não proporcional) conforme a desidratação se agrava.\n\nAplicação ao feedback: como o Strava não registra peso corporal pré/pós-treino, este dado não pode ser aplicado automaticamente sem que o atleta forneça essa medição (ver nota-0227 sobre o protocolo de pesagem). Serve como base quantitativa para justificar, ao atleta, por que quedas de potência/pace em sessões longas e quentes (sem explicação por fadiga muscular ou intensidade) provavelmente refletem desidratação, e para dar peso à recomendação de monitorar peso corporal em sessões longas (>2h) especialmente quando `temperatura` está elevada e a queda de desempenho observada (potência, pace) é desproporcional à duração/intensidade planejada."},{"id": "nota-0268", "titulo": "Humanos têm muito menos capacidade de aclimatização ao frio do que ao calor — a adaptação principal é comportamental (evitar/isolar), não fisiológica", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 639, "trecho": "Humans possess much less capacity for adaptation to long-term cold exposure than to prolonged heat exposure. The basic response of Eskimos and Lapps involves avoiding the cold or minimizing its effects. Their clothing provides a near-tropical microclimate; the temperature inside an igloo typically averages 15.6°C (60°F) despite freezing outside temperatures."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 640, "trecho": "The following three responses give some indication of a mild acclimatization to chronic cold exposure: 1. Shivering occurs at a lower body temperature because more heat is generated without shivering. 2. Improved ability to sleep in the cold. 3. Change in peripheral blood flow distribution that either conserves heat in the core or warms the extremities to prevent cold injury."}], "relacionadas": [{"id": "nota-0254", "tipo": "complementa", "justificativa": "contraste direto: a aclimatização ao calor (nota-0254) é rápida, robusta e bem documentada (10-14 dias, ganhos grandes); a aclimatização ao frio é lenta, fraca e majoritariamente comportamental — assimetria fisiológica importante"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Ao contrário da aclimatização ao calor (rápida e robusta — ver nota-0254), **humanos têm capacidade muito limitada de adaptação fisiológica ao frio crônico**. A estratégia primária de populações adaptadas ao frio extremo (esquimós, lapões) é comportamental: evitar o frio ou minimizar seus efeitos via vestimenta e abrigo — por exemplo, o interior de um iglu mantém-se a ~15,6°C mesmo com temperaturas externas congelantes.\n\nOs únicos três indícios de aclimatização (fraca) ao frio crônico documentados:\n1. Tremores (shivering) começam em uma temperatura corporal mais baixa, porque mais calor passa a ser gerado sem tremor.\n2. Melhora na capacidade de dormir no frio.\n3. Mudança na distribuição de fluxo sanguíneo periférico — conservando calor no núcleo ou aquecendo extremidades para prevenir lesão por frio.\n\nUm exemplo isolado de adaptação mais robusta é o das Ama (mergulhadoras coreanas/japonesas), que mostram aumento de ~25% na taxa metabólica de repouso no inverno e um limiar de tremor mais alto — mas esse é um caso de exposição extrema e repetida ao longo da vida, não replicável por treino recreativo.\n\nAplicação ao feedback: diferente do calor (onde ~10-14 dias de exposição repetida trazem ganhos fisiológicos mensuráveis e acionáveis, nota-0254), não há uma \"aclimatização ao frio\" comparável a esperar ou recomendar para ciclistas que treinam em clima frio — a estratégia eficaz permanece comportamental (vestimenta em camadas, evitar roupa molhada — ver nota-0270) e não fisiológica. O sistema não deve inferir \"aclimatização ao frio\" a partir de exposição repetida a `temperatura` baixa da mesma forma que infere aclimatização ao calor."},{"id": "nota-0269", "titulo": "Atividade física gera calor metabólico suficiente para manter temperatura central estável em ar até -30°C, sem depender de vestimenta pesada", "dominio": "fisiologia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 618, "trecho": "Shivering generates metabolic heat, but physical activity provides the greatest contribution in defending against cold. Energy metabolism during movement sustains a constant core temperature in air as cold as −30°C (−22°F) without reliance on a heavy, restrictive clothing barrier. Internal temperature, not the body's heat production per se, mediates the thermoregulatory response to cold."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 617, "trecho": "the drive to maintain thermal balance remains so strong that it readily triggers... an oxygen consumption of 1200 mL·min−1 from shivering in severe cold."}], "relacionadas": [{"id": "nota-0268", "tipo": "complementa", "justificativa": "esta nota detalha o mecanismo pelo qual o exercício (não a aclimatização) é a principal defesa eficaz contra o frio durante atividade física"}], "confianca": 0.6, "status": "auto-aprovado", "body": "O calor metabólico gerado pela **atividade física em si** (não pelos tremores/shivering) é o principal mecanismo de defesa do corpo contra o frio durante o exercício. O metabolismo energético durante movimento sustenta uma temperatura central constante mesmo em ar de até **−30°C (−22°F)**, sem depender de uma barreira pesada e restritiva de roupas — desde que a intensidade do exercício seja suficiente para gerar esse calor.\n\nPonto importante: é a **temperatura interna** (não a produção de calor per se) que media a resposta termorreguladora ao frio — ou seja, se a intensidade do exercício cai (por exemplo, por fadiga) o suficiente para reduzir a geração de calor, o tremor pode reaparecer mesmo durante atividade vigorosa, se a temperatura central ainda estiver baixa.\n\nPara efeito de comparação de magnitude: o tremor por frio severo pode elevar o consumo de oxigênio a ~1200 mL/min, similar à demanda metabólica de exercício leve a moderado — ou seja, o corpo \"gasta\" energia significativa só para se manter aquecido em repouso no frio extremo, energia que o exercício ativo já supre como subproduto do movimento.\n\nAplicação ao feedback: para ciclistas treinando em `temperatura` baixa mas mantendo esforço/potência consistente, o risco de hipotermia central durante o pedal ativo é relativamente baixo (o próprio exercício gera calor suficiente) — o maior risco surge em **paradas prolongadas, descidas longas sem pedalar, ou quedas bruscas de intensidade** em clima frio, quando a geração de calor metabólico cai mas a exposição ao frio/vento continua. Isso pode informar alertas específicos para segmentos de baixa potência/parada em `temperatura` baixa, mais do que para o esforço sustentado em si."},{"id": "nota-0277", "titulo": "Manutenção da massa óssea exige carga mecânica/gravitacional: em microgravidade (desuso extremo), perda óssea chega a 1%/mês mesmo com treino de força — mecanismo relevante para esportes de baixo impacto como o ciclismo", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 693, "trecho": "NASA's greatest biomedical concern involves the 1% per month loss in weight-bearing bone mass during space missions... Bone mineral density (BMD) declined at all seven sites measured, with spine, neck of femur, trochanter, and pelvis decreasing more than 1% per month."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 693, "trecho": "Under normal gravity conditions, the small intestine absorbs approximately 250 to 500 mg of calcium for every 1000 mg consumed... With increased gravitational loading, calcium absorption by bone increases to spare overall calcium loss. In a microgravity environment, reduced calcium intestinal absorption exacerbates calcium fecal loss... Abnormal calcium excretion from bone resorption disrupts calcium homeostasis, which in turn decreases total body calcium and bone mass."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 694, "trecho": "Onboard, multimode exercise training and lower-limb exercise has not prevented BMD loss, despite United States and Soviet crewmembers' commitment to intense resistance-type daily workout regimens."}], "relacionadas": [{"id": "nota-0134", "tipo": "complementa", "justificativa": "outro dado de fisiologia ambiental (fora do escopo calor/frio) presente neste mesmo grupo de capítulos do McArdle, mecanismo de resposta óssea à carga gravitacional/mecânica"}], "confianca": 0.6, "status": "revisar", "body": "O McArdle, no capítulo sobre microgravidade (voo espacial), documenta com clareza o mecanismo pelo qual a massa óssea depende de **carga mecânica/gravitacional contínua** para se manter: em ambiente de microgravidade (ausência quase total de carga sobre os ossos de sustentação de peso), astronautas perdem massa óssea a uma taxa de **~1% ao mês** nos sítios de sustentação de peso (coluna, colo do fêmur, trocanter, pelve) — a maior preocupação biomédica da NASA para missões espaciais.\n\nO mecanismo bioquímico descrito: sob gravidade normal, a carga mecânica estimula a absorção de cálcio pelo osso, poupando a perda geral de cálcio do corpo. Em microgravidade, a ausência dessa carga reduz a absorção intestinal de cálcio, aumenta a perda fecal, e desregula a reabsorção óssea — resultando em balanço de cálcio negativo e perda progressiva de massa óssea.\n\n**Achado crítico para este canône**: o treinamento de força a bordo (exercício resistido, multimodal, incluindo membros inferiores) **não preveniu a perda de DMO**, apesar do compromisso de tripulações americanas e soviéticas com regimes intensos e diários de treino de resistência muscular. Isso indica que treino de força por si só, sem o componente específico de **impacto/carga axial gravitacional real**, é insuficiente para estimular a manutenção óssea nesse contexto de desuso extremo.\n\n**Relevância inferida para ciclismo** (extrapolação do mecanismo, não afirmação direta do texto sobre ciclismo): o ciclismo é uma atividade de sustentação parcial do peso corporal, sem impacto repetitivo (diferente de corrida, saltos ou esportes de contato), e realizada em posição sentada com boa parte do peso suportado pelo selim/pedais/guidão em vez dos ossos de sustentação. O mesmo princípio geral demonstrado no desuso extremo da microgravidade (mecânica de carga insuficiente → menor estímulo osteogênico → risco de menor densidade óssea) é consistente com a associação, bem descrita na literatura esportiva geral (fora deste texto-fonte), entre ciclismo de alto volume e menor densidade mineral óssea em comparação com esportes de impacto. Esta nota registra o **mecanismo fisiológico geral** (carga mecânica é necessária para manutenção óssea) com base direta na fonte; a extrapolação específica para ciclistas é uma aplicação analógica, não um dado direto do McArdle sobre ciclismo.\n\nAplicação ao feedback: como o Strava não mede densidade óssea, esta nota não gera regra automática — mas fundamenta uma recomendação educativa relevante: ciclistas de alto volume (`tempo-movimento`/`distância` semanal elevados) que fazem pouco ou nenhum treino complementar de impacto (corrida, saltos) ou musculação com carga axial (agachamento, levantamento terra) podem estar sob risco elevado de menor densidade óssea ao longo do tempo, e o produto pode sugerir a inclusão de treino complementar de impacto/força como medida preventiva — mesmo sabendo que o Strava não pode confirmar ou monitorar diretamente esse risco."},{"id": "nota-0284", "titulo": "Prova por etapas de 3 semanas (Giro d'Italia) eleva marcadores de reabsorção óssea em ciclistas profissionais — dado direto em ciclistas, não extrapolação", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 773, "trecho": "For nine professional cyclists who participated in the Giro d'Italia 3-wk stage race in Italy, markers of bone activity measured 1 day prerace, and 12 and 22 days during the race indicated resorption of bone brought on by the race."}], "relacionadas": [{"id": "nota-0277", "tipo": "complementa", "justificativa": "nota-0277 estabelece o mecanismo geral (carga mecânica insuficiente → menor estímulo osteogênico) via analogia com microgravidade; esta nota traz dado direto e específico de ciclistas profissionais em prova real, reforçando a mesma conclusão sem depender de extrapolação"}], "confianca": 0.6, "status": "revisar", "body": "Em um estudo com **nove ciclistas profissionais** que participaram do Giro d'Italia (prova por etapas de 3 semanas), marcadores bioquímicos de atividade óssea foram medidos 1 dia antes da prova, e novamente no 12º e 22º dias de competição. Os marcadores indicaram **reabsorção óssea líquida induzida pela prova** — ou seja, ao longo das 3 semanas de competição intensa, o balanço ósseo dos ciclistas pendeu para perda, não formação.\n\nEste é um dado **direto sobre ciclistas profissionais em competição real** (diferente da nota-0277, que estabelece o mesmo mecanismo geral — carga mecânica/gravitacional insuficiente prejudica a manutenção óssea — a partir de dados de astronautas em microgravidade e o aplica ao ciclismo por analogia). Aqui a fonte já traz o dado específico do esporte, reforçando de forma direta que o ciclismo de alto volume/intensidade, mesmo sem o componente de desuso extremo da microgravidade, ainda produz um ambiente hormonal/metabólico (possivelmente ligado a déficit energético agudo e alto volume de treino, mais do que apenas à ausência de impacto) desfavorável à manutenção óssea durante blocos de carga muito alta.\n\nNota de confiança: o estudo tem amostra pequena (n=9) e não detalha se a causa é o baixo impacto mecânico, o déficit energético agudo da prova, ou ambos — por isso fica marcada para revisão, mas o achado é consistente com a literatura mais ampla sobre menor densidade mineral óssea em ciclistas de alto volume.\n\nAplicação ao feedback: reforça, com dado específico do esporte, a recomendação de que ciclistas em blocos de treino/competição de volume muito alto e prolongado (ex.: semanas consecutivas de grande carga, sem descanso) considerem monitorar saúde óssea e complementar com treino de impacto/força axial fora da temporada mais intensa."},{"id": "nota-0290", "titulo": "Broncoespasmo induzido por exercício é mais prevalente em atletas de endurance que na população geral; mecanismo ligado ao ressecamento das vias aéreas por ar frio/seco em alta ventilação", "dominio": "fisiologia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 917, "trecho": "Studies of Finnish elite track and field athletes report physician-diagnosed asthma in 17% of long-distance runners, 8% of power athletes, and 3% of nonathletic controls, while 35% of figure skaters showed a significant increase in airway resistance following skating routines."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 916, "trecho": "For nearly 90% of persons with asthma and 30 to 50% of those suffering from allergic rhinitis and hay fever, physical activity provides a potent stimulus for bronchoconstriction, termed exercise-induced bronchospasm."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 917, "trecho": "As the incoming breath of air moves down the respiratory tract, heat and water move away from the airway lining as the air warms and humidifies. The conditioning of inspired air ultimately cools and dries the respiratory mucosa. Drying increases mucosal lining osmolality, with accompanying mast cell degranulation. This in turn releases powerful proinflammatory mediators that trigger bronchoconstriction."}], "relacionadas": [], "confianca": 0.7, "status": "auto-aprovado", "body": "O **broncoespasmo induzido por exercício (EIB)** é significativamente mais comum em atletas de endurance treinados do que na população sedentária — contraintuitivo, já que se poderia esperar que alta aptidão cardiorrespiratória protegesse contra isso. Dados de atletas de elite finlandeses de atletismo: **17% dos corredores de longa distância** têm asma diagnosticada por médico, contra **8% dos atletas de potência** e apenas **3% dos controles não-atletas**. Entre atletas olímpicos em geral (últimas 5 Olimpíadas), a prevalência de asma/hiper-responsividade das vias aéreas gira em torno de **8%**, tornando-a a condição crônica mais comum entre atletas olímpicos — possivelmente relacionada à própria natureza do treino intenso e prolongado.\n\n**Mecanismo:** durante exercício de alta ventilação, o ar inspirado é aquecido e umidificado à custa do revestimento da mucosa respiratória, que se resfria e resseca. Esse ressecamento aumenta a osmolalidade da mucosa, desencadeando degranulação de mastócitos e liberação de mediadores pró-inflamatórios (leucotrienos, histamina, prostaglandinas) que provocam broncoconstrição — geralmente com início 5-15 minutos pós-exercício e resolução espontânea em 30-90 minutos. O efeito é mais pronunciado em **ar frio e seco** (esportes de inverno como esqui cross-country, patinação de velocidade e biatlo mostram prevalência ainda maior), porque o gradiente de secagem das vias aéreas é maior.\n\nImportante: **treinamento físico não \"cura\" a asma**, mas aumenta a reserva de fluxo aéreo e reduz o trabalho respiratório durante a atividade — ou seja, o atleta asmático bem manejado pode treinar e competir em alto nível.\n\nAplicação ao feedback: episódios recorrentes de desconforto respiratório/tosse durante ou logo após treinos intensos — especialmente em clima frio e seco, ou em sessões de alta ventilação (limiar, intervalados longos) — podem indicar broncoespasmo induzido por exercício, mais comum em ciclistas de endurance do que se costuma supor; vale sugerir avaliação médica em vez de assumir apenas \"falta de condicionamento\"."},{"id": "nota-0018", "titulo": "Cinco métodos de hardware para medir potência e onde cada um mede a força", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 35, "trecho": "there are five distinct methods: (1) crank-based integrated systems, which include spider, crank arm, and chainring setups, (2) hub-based integrated systems, (3) bottom-bracket sensors, (4) systems that measure \"opposing forces,\" and (5) pedal-based force sensors."}], "relacionadas": [{"id": "nota-0010", "tipo": "complementa", "justificativa": "explica por que o local de medição (cubo vs. manivela/pedal) gera a diferença sistemática de 5-10 W descrita em nota-0010"}, {"id": "nota-0011", "tipo": "complementa", "justificativa": "explica por que medidores unilaterais (spider/crank-arm/bottom-bracket de um lado só) são vulneráveis ao viés de assimetria entre pernas de nota-0011"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Os medidores de potência para ciclismo usam cinco abordagens de hardware distintas: (1) sistemas integrados na manivela (spider/eixo, braço da manivela ou coroa) — medem torção no ponto de aplicação da força, mais próximo de onde a potência é gerada; (2) sistemas integrados no cubo traseiro — medem a potência que chega efetivamente à roda, após a transmissão; (3) sensores no eixo do movimento central (bottom bracket) — geralmente unilaterais (só o lado esquerdo torce de forma mensurável); (4) sistemas de \"forças opostas\" (ex.: PowerPod) — medem resistência do ar/inclinação/peso e inferem a potência aplicada em vez de medi-la diretamente; (5) sensores de força no pedal — medem no ponto exato de transferência entre pé e bicicleta, e são tipicamente bilaterais (esquerda/direita independentes).\n\nCada abordagem tem implicações práticas de precisão e comparabilidade (posição de medição afeta se o valor inclui ou não perdas de transmissão; medição unilateral vs. bilateral afeta a exposição ao viés de assimetria entre pernas) — ver notas específicas de cada implicação."},{"id": "nota-0064", "titulo": "Tabela de referência: TSS e IF típicos para diferentes tipos de prova (Tabela 7.4)", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["TSS", "IF", "tempo-decorrido"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 161, "trecho": "TABLE 7.4 Training Stress Score (TSS) and Intensity Factor (IF) for Different Rides — inclui exemplos como '40 km TT, male Cat. II rider — 0:53 — TSS 89 — IF 1.02' e '2018 US Elite National Championships, Cat. I — 5:22 — TSS 272 — IF 0.71'."}], "relacionadas": [{"id": "nota-0062", "tipo": "complementa", "justificativa": "exemplos reais de TSS calculado pela fórmula da nota-0062, para calibrar expectativa por tipo/duração de evento"}, {"id": "nota-0063", "tipo": "complementa", "justificativa": "esses valores de TSS podem ser cruzados com a escala de fadiga da nota-0063"}], "confianca": 0.85, "status": "auto-aprovado", "body": "Tabela 7.4 do livro — exemplos reais de TSS e IF por tipo/duração de evento, úteis como referência de calibração (seleção representativa; a tabela completa tem ~24 linhas):\n\n| Evento | Duração | TSS | IF |\n|---|---|---|---|\n| Recuperação fácil Nível 1, terreno plano, Cat. III masc. | 1:00 | 12 | 0,37 |\n| Recuperação fácil Nível 2, terreno ondulado, Cat. II masc. | 2:30 | 60 | 0,49 |\n| Prova de ciclocross, masters fem. 40–45 | 0:45 | 61 | 0,92 |\n| Criterium Pro 1/2 americano, divisão 1 | 1:00 | 73 | 0,86 |\n| Criterium feminino profissional | 0:45 | 80 | 1,06 |\n| CRI 40 km, Cat. II masc. | 0:53 | 89 | 1,02 |\n| Criterium nacional típico, Cat. III | 1:57 | 109 | 0,75 |\n| Criterium nacional típico, Pro 1/2 | 2:35 | 118 | 0,67 |\n| Mount Evans Hill Climb 2018, Cat. I | 2:02 | 126 | 0,79 |\n| Campeonato nacional masters de estrada 2018, 55–59 anos | 2:34 | 160 | 0,79 |\n| Prova de estrada muito montanhosa nacional 2018, Cat. I, grupo de perseguição pequeno | 4:55 | 266 | 0,74 |\n| Campeonato nacional elite dos EUA 2018, Cat. I | 5:22 | 272 | 0,71 |\n| Ironman Lake Placid 2018, top 3 fem. 40–45 (só o segmento de bike) | 5:40 | 278 | 0,70 |\n| Etapa 1 de prova nacional americana por etapas 2018 | 4:55 | 292 | 0,78 |\n| Vuelta a España 2018, etapa 12, fuga, top 10 | 4:22 | 323 | 0,86 |\n| Leadville 100 MTB 2018, vencedora fem. 35–40 | 9:18 | 354 | 0,62 |\n| Tour de France 2018, etapa de montanha 16, top 5 | 5:13 | 359 | 0,83 |\n| Prova de MTB de 24 horas, elite masters masc. | 24:00 | 1058 | 0,74 |\n| Brevet de 1.000 km em 3 dias, só 5h de sono total, fem. 40 anos | 42:00 | 1610 | 0,62 |\n\nPadrão geral visível na tabela: eventos mais curtos e intensos (criteriums, CRIs) tendem a IF mais alto (próximo ou acima de 1,0); eventos muito longos (ultraendurance, brevets, MTB de 24h) têm IF bem mais baixo (0,6–0,8) mas TSS acumulado extremamente alto, por causa da duração.\n\nAplicação ao feedback: esta tabela serve como calibração de \"senso comum\" — permite comparar o TSS/IF de uma atividade do atleta com eventos de referência de perfil semelhante, ajudando a comunicar de forma mais concreta o que aquele número de TSS representa."},{"id": "nota-0087", "titulo": "Ajuste da constante de tempo do ATL pela duração do evento-alvo (eventos curtos → constante maior; longos → menor)", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": [], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 226, "trecho": "power at shorter durations (e.g., at/near Pmax) seems to be especially dependent upon an individual's 'freshness,' whereas power at much longer durations (e.g., at/near FTP) seems to be much less so... may therefore benefit from using a longer ATL time constant (say, 10 or even 14 days instead of the default of 7 days)."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 226, "trecho": "athletes who are aiming for much longer races (e.g., a mountain-bike marathon) may benefit from using a shorter ATL time constant (say, 3–5 days instead of the default 7), which will require that they maintain their training until closer to their event to prevent TSB from going too positive."}], "relacionadas": [{"id": "nota-0084", "tipo": "pre-requisito", "justificativa": "ajusta a constante de tempo padrão do ATL definida na nota-0084"}, {"id": "nota-0086", "tipo": "complementa", "justificativa": "outro fator (idade) que também influencia a constante de tempo ideal do ATL"}], "confianca": 0.75, "status": "auto-aprovado", "body": "A potência em durações curtas (perto do Pmax) depende muito mais do \"frescor\" (freshness) do atleta do que a potência em durações longas (perto do FTP, que depende mais de fitness/CTL). Isso motiva ajustar a constante de tempo do ATL conforme a duração do evento-alvo:\n\n- **Provas curtas, onde potência neuromuscular/capacidade anaeróbia decide o resultado** (pista, BMX, subidas curtas): usar constante de ATL mais longa (10–14 dias em vez do padrão de 7) para garantir que o TSB realmente reflita a dissipação completa da fadiga antes do evento.\n- **Provas muito longas** (ex.: maratona de mountain bike): usar constante de ATL mais curta (3–5 dias em vez de 7), o que obriga o atleta a manter treino mais próximo do evento, evitando que o TSB fique positivo demais cedo demais.\n\nAplicação ao feedback: o \"tempo de antecedência\" recomendado para começar a reduzir carga (taper) antes de uma prova deve variar conforme o perfil de duração/intensidade do evento-alvo — provas curtas/explosivas pedem tapers mais longos; provas longas/aeróbias pedem tapers mais curtos."},{"id": "nota-0094", "titulo": "TSB não precisa ser positivo para gerar pico de performance — precisa estar subindo (recuperando)", "dominio": "metricas-de-potencia", "camada": ["semanal", "mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 239, "trecho": "Matt's third-best 20-minute wattage occurred at the end of March, immediately after another steep increase in CTL at a ramp rate of 12 TSS per day for 2 weeks. Although the TSB was still negative at this point, it was clearly climbing positively. It is important to recognize that TSB does not necessarily need to be a positive number in order to create a peak performance; it just needs to be climbing to a positive number."}], "relacionadas": [{"id": "nota-0085", "tipo": "complementa", "justificativa": "nuance importante sobre como interpretar o TSB definido na nota-0085"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Estudo de caso do livro: um atleta produziu sua 3ª melhor potência de 20 minutos da temporada logo após um aumento íngreme de CTL (ramp rate de 12 TSS/dia por 2 semanas) — nesse momento, o TSB ainda estava negativo, mas estava claramente subindo (recuperando) em direção ao positivo.\n\nConclusão prática dos autores: **o TSB não precisa necessariamente ser um número positivo para gerar um pico de performance — ele precisa estar subindo/recuperando**, mesmo que ainda negativo no momento do esforço. Isso é consistente com a observação (nota-0091) de que recordes pessoais em esforços mais longos ocorrem numa distribuição ampla de TSB, incluindo valores negativos.\n\nAplicação ao feedback: ao avaliar se um atleta está \"pronto\" para uma prova ou teste, não olhar apenas o valor absoluto do TSB no dia, mas também a tendência dos últimos dias — um TSB negativo mas em trajetória de subida pode ser tão favorável quanto um TSB já positivo, dependendo do tipo de evento."},{"id": "nota-0111", "titulo": "Fórmula do 'orçamento de TSS' para calcular a Potência Normalizada-alvo de uma prova longa (método Endurance Nation)", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["TSS", "IF", "NP", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 331, "trecho": "Rich Strauss and Patrick McCrann from Endurance Nation... give the triathlete a maximum 'budget' of 300 Training Stress Score (TSS) points for an Ironman-distance event... a 300-TSS Ironman is the maximum budget and puts you in the danger zone for not being able to run for the entire race. A more realistic TSS budget would be 280."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 331, "trecho": "1. Figure out your TSS per hour. Simply divide the total TSS by the number of hours you will be racing (in our example, 280 divided by 6, which is 46.7). 2. Solve for the Intensity Factor. The TSS per hour... is equal to the square of the Intensity Factor times 100."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 332, "trecho": "3. Calculate the average Normalized Power needed to maintain IF. Intensity Factor is equal to average Normalized Power divided by FTP: IF = Average NP ÷ FTP. Average NP is thus IF times FTP: Average NP = IF × FTP."}], "relacionadas": [{"id": "nota-0061", "tipo": "pre-requisito", "justificativa": "usa as definições de IF e TSS (nota-0061 e correlatas) como ponto de partida do cálculo reverso"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Método (Endurance Nation / Rich Strauss e Patrick McCrann) para calcular a Potência Normalizada-alvo de pacing numa prova longa (ex.: Ironman) a partir de um \"orçamento\" de TSS e do tempo-alvo de prova:\n\n1. **TSS por hora** = TSS orçado ÷ horas de prova planejadas.\n   Exemplo: 280 TSS ÷ 6h = 46,7 TSS/hora.\n2. **Intensity Factor (IF):** TSS/hora = IF² × 100, logo IF = raiz quadrada(TSS_por_hora ÷ 100).\n   Exemplo: IF² = 46,7 ÷ 100 = 0,47 → IF = √0,47 ≈ 0,68.\n3. **Potência Normalizada média-alvo:** NP_média = IF × FTP.\n   Exemplo: 0,68 × 275 W = 187 W.\n\nReferência de orçamento de TSS para prova de distância Ironman: **300 TSS é o teto máximo** (zona de risco de não conseguir correr até o fim); **280 TSS é um orçamento mais realista** para a maioria dos atletas amadores. Atletas de elite conseguem sustentar TSS bem mais altos (ex.: ~390 TSS a IF 0,83) e ainda correr bem, mas isso reflete volume de treino de 30+ horas/semana e vantagens genéticas — não é referência para o atleta amador.\n\nAplicação ao feedback: dado o FTP do atleta e a duração-alvo de uma prova longa, o sistema pode sugerir uma NP-alvo de pacing usando esta cadeia de fórmulas (TSS orçado → IF → NP-alvo), e depois comparar a execução real da prova (NP real, IF real, TSS real) contra esse orçamento para avaliar se o atleta pacing corretamente."},{"id": "nota-0114", "titulo": "rTSS e FTp (Functional Threshold Pace): TSS aplicado à corrida, com equivalência de carga bike-run (~45min corrida FTp ≈ 60min bike FTP)", "dominio": "metricas-de-potencia", "camada": ["diario", "semanal"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["TSS", "tempo-movimento"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 340, "trecho": "Dr. Stephen McGregor, co-author of this third edition... has developed the Running Training Stress Score (rTSS) to quantify the training stress from runs. Based on coauthor Andrew Coggan's work on TSS, rTSS has become a common method for measuring training stress in the running world. Instead of using the one-hour scale used in TSS for cycling, Stephen took the approach of trying to create a level playing field, so that 100 TSS points on the bike would be the same amount of training stress as 100 points on the run."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 340, "trecho": "Since running has the additional musculoskeletal-structural risk that comes from pounding your feet on the pavement... an hour at functional threshold pace (FTp)... on the run would be more training stress than an hour on the bicycle, and consequently more recovery time would be required."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 341, "trecho": "roughly 45 minutes of running at FTp, or a flat-out effort for 15 kilometers, would be equivalent to 1 hour at FTP on the bicycle."}], "relacionadas": [{"id": "nota-0062", "tipo": "complementa", "justificativa": "estende a metodologia de TSS (nota-0062) para a corrida, mantendo a escala 100 pontos = 1h no limiar como equivalência de carga entre esportes"}], "confianca": 0.75, "status": "auto-aprovado", "body": "**rTSS (Running Training Stress Score):** adaptação do TSS (Andrew Coggan) para a corrida, desenvolvida por Stephen McGregor. Usa **FTp (Functional Threshold Pace, \"p\" minúsculo)** — o ritmo de limiar funcional na corrida — como base, análogo à FTP no ciclismo.\n\n**Diferença-chave em relação ao TSS de bike:** por causa do estresse musculoesquelético adicional do impacto do pé no chão (carga estrutural/gravitacional ausente no ciclismo), **1 hora correndo no FTp gera mais estresse de treino do que 1 hora pedalando na FTP** — e por isso exige mais tempo de recuperação. Para manter os 100 pontos = mesma carga de treino entre os dois esportes, a escala de tempo do rTSS não é de 1h como no TSS de bike: **aproximadamente 45 minutos correndo no FTp (ou um esforço máximo de ~15 km) equivalem a 100 pontos de rTSS**, o mesmo que 1 hora de bike na FTP gera 100 TSS.\n\nAplicação ao feedback: essencial para qualquer produto que combine dados de bike e corrida do Strava (a maioria dos usuários multiesportivos) — ao somar carga de treino entre os dois esportes (para CTL/ATL/TSB combinado), usar rTSS para as corridas em vez de aplicar a fórmula de TSS de bike diretamente ao tempo de corrida, já que a escala temporal de referência é diferente (45min ≠ 60min para 100 pontos)."},{"id": "nota-0116", "titulo": "Para provas de ultraresistência (ex.: Ironman), o TSB no dia da prova é mais preditivo de desempenho do que picos de potência de curta duração; pico de forma sustentável por 6-8 semanas, mas não recomendado", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 345, "trecho": "You cannot determine an Ironman triathlete's effort on the day of the event based on the 1-minute, 20-minute, and 120-minute values... the important thing to understand is what the athlete's TSB was, is, or will be on race day. A high positive TSB would mean the athlete is too fresh and has lost fitness, and a negative TSB could mean the athlete will be too fatigued to perform well."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 345, "trecho": "Although it is possible to hold a peak for six to eight weeks, it's not advisable to attempt to do this; had she cranked out some big numbers two weeks before this event, we would be more confident that she would have hit her peak at just the right time."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 346, "trecho": "Nearly all of her bests happened right after her normal rest weeks during a hard week of training."}], "relacionadas": [{"id": "nota-0085", "tipo": "pre-requisito", "justificativa": "usa o TSB (nota-0085) como métrica primária de prontidão para provas longas, em vez dos picos de MMP por duração"}, {"id": "nota-0094", "tipo": "complementa", "justificativa": "reforça, num contexto de prova de ultraresistência, que o timing/trajetória do TSB importa mais que o valor absoluto de picos de potência"}], "confianca": 0.65, "status": "revisar", "body": "Para eventos de ultraresistência (ex.: Ironman), picos de potência de curta duração (1min, 20min, 120min) **não predizem** o desempenho no dia da prova — o evento é dominado pela resistência/endurance, não pela potência máxima. O indicador mais relevante para prontidão nesse tipo de prova é o **TSB no dia da prova**: TSB muito positivo indica excesso de frescor com perda de fitness; TSB muito negativo indica fadiga excessiva.\n\nObservação adicional (estudo de caso, uma atleta ao longo de 6 temporadas): seus melhores resultados individuais (picos de potência/pace) ocorreram consistentemente **logo após semanas de recuperação** dentro de fases de treino pesado — reforça o padrão de que picos de performance seguem semanas de descarga (nota-0094, nota-0098). Também: é fisicamente possível manter um \"pico de forma\" (CTL alto/TSB favorável) por 6-8 semanas, mas os autores **não recomendam tentar isso deliberadamente** — preferem visar o pico próximo à prova-alvo, já que segurar o pico por tempo excessivo aumenta o risco de errar o timing.\n\n**Motivo da revisão:** conclusão baseada num único estudo de caso (uma atleta, 6 temporadas de dados observacionais), não um estudo controlado — tratar como heurística qualitativa, não regra numérica validada.\n\nAplicação ao feedback: para provas de longa duração (>3-4h), priorizar o TSB (trajetória e valor no dia da prova) sobre picos de MMP recentes ao avaliar prontidão do atleta. Não usar \"melhor 20min da temporada\" como proxy de prontidão para provas de ultraresistência."},{"id": "nota-0128", "titulo": "Decomposição das fontes de resistência numa perseguição de pista: aerodinâmica ~85%, inércia ~8%, rolamento ~5%, transmissão/rolamentos ~2%", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 367, "trecho": "approximately 85 percent of a pursuiter's power output is used to overcome wind resistance... (The other sources of resistance—inertia, rolling resistance, and drivetrain and bearing friction—account for approximately 8 percent, 5 percent, and 2 percent, respectively.)"}], "relacionadas": [], "confianca": 0.6, "status": "auto-aprovado", "body": "Para uma perseguição individual de pista (velódromo, 3-4 km), a decomposição aproximada de onde vai a potência produzida pelo atleta é: **~85% para vencer a resistência do ar (aerodinâmica)**, ~8% para vencer a inércia (aceleração), ~5% para resistência ao rolamento, e ~2% para atrito de transmissão/rolamentos.\n\nAplicação ao feedback: contexto de referência para explicar por que otimização aerodinâmica (posição, equipamento) tem impacto desproporcionalmente maior que outras fontes de resistência em provas de velocidade constante em pista/contrarrelógio — não diretamente aplicável a dados de atividades do Strava, mas útil como justificativa ao recomendar foco em aerodinâmica para esse tipo de prova."},{"id": "nota-0132", "titulo": "Limitações de NP e TSS em provas de pista curtas/não-pedaladas: NP pouco interpretável em esforços muito curtos; recortar trechos sem pedalada antes de calcular TSS", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["NP", "TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 382, "trecho": "even on an indoor track, the environmental conditions... most races on the track are too short for Normalized Power data to be readily interpretable."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 384, "trecho": "The general concepts behind Training Stress Score, however, remain valid, and the Performance Manager approach can still be effectively used to monitor a rider's overall training load... However, care must be taken when analyzing track workouts to delete any significant portions of the file where the rider was not actively pedaling; otherwise the TSS score may be artificially inflated."}], "relacionadas": [{"id": "nota-0059", "tipo": "pre-requisito", "justificativa": "limitação de aplicabilidade da NP (nota-0059) em esforços muito curtos e não-pedalados típicos de provas de pista"}], "confianca": 0.65, "status": "auto-aprovado", "body": "Duas ressalvas importantes ao aplicar métricas padrão a dados de ciclismo de pista:\n\n1. **Normalized Power (NP) pouco interpretável em provas muito curtas:** a maioria das provas de pista tem duração curta demais (segundos a poucos minutos) para que o algoritmo de suavização de 30s da NP (ver notas do Cap.7) produza um valor significativo — a NP foi desenhada para esforços mais longos e variáveis.\n2. **TSS pode ser artificialmente inflado por trechos sem pedalada:** ao analisar um arquivo de treino/prova de pista, é necessário **remover (recortar) os trechos em que o atleta não estava pedalando ativamente** antes de calcular o TSS — caso contrário, o TSS calculado sobre a duração total (incluindo tempo parado/rolando) pode superestimar a carga real de treino.\n\nAplicação ao feedback: para atividades classificadas como pista (ou qualquer atividade curta e intermitente com muitos trechos parados), o sistema deveria (a) evitar apresentar NP como métrica principal para esforços muito curtos, preferindo potência média/pico; (b) usar apenas o tempo efetivamente pedalado (não o tempo decorrido total) no denominador do cálculo de TSS, para evitar subestimar a intensidade real do esforço."},{"id": "nota-0001", "titulo": "Potência como sinal mais confiável que FC para detectar fadiga acumulada", "dominio": "metricas-de-potencia", "camada": ["diario", "semanal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["FC (média/máx)", "potência-série-temporal", "decoupling (Pw:Hr)"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 22, "trecho": "A heart rate monitor does not tell you how much you are improving on your bicycle; it just tells you how fast your heart is pumping."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 23, "trecho": "If your heart rate is normally 165 beats per minute (bpm) when you are riding at 280 watts, then after seven days of hard training it may only be 158 bpm at 280 watts because of your fatigue."}], "relacionadas": [], "confianca": 0.85, "status": "auto-aprovado", "body": "A frequência cardíaca (FC) é uma resposta fisiológica indireta ao esforço, influenciada por hidratação, temperatura ambiente, sono, estresse e nível de fadiga acumulada — não apenas pela intensidade do exercício. A potência, por outro lado, mede diretamente o trabalho mecânico produzido (watts), sendo um sinal mais objetivo do estímulo real de treino.\n\nConsequência prática: quando a FC está mais baixa que o habitual para uma dada potência (ex.: um ciclista que normalmente atinge 165 bpm a 280 W passa a marcar 158 bpm a 280 W), isso não deve ser lido como sinal de que o esforço está \"fácil\" ou que o atleta pode/deve reduzir a intensidade — é mais provável que indique fadiga acumulada de dias anteriores de treino intenso, já que a capacidade de gerar potência costuma se manter praticamente intacta mesmo quando a FC está suprimida pela fadiga. Nesses casos, a potência (não a FC) deve orientar a decisão sobre necessidade de descanso.\n\nAplicação ao feedback: ao comparar a série temporal de FC e potência de uma atividade contra sessões anteriores em trechos/potências semelhantes (decoupling Pw:Hr), uma FC mais baixa que o habitual para a mesma potência não deve ser lida como \"sessão fácil\" — cruzar com a carga acumulada recente (TSS/CTL/ATL) antes de recomendar redução de intensidade."},{"id": "nota-0008", "titulo": "Fórmula fundamental: Potência = Força × Velocidade", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["potência-série-temporal"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 42, "trecho": "Power = Force × Speed"}], "relacionadas": [], "confianca": 0.9, "status": "auto-aprovado", "body": "Definição física básica que fundamenta todo medidor de potência: potência (watts) é o produto da força aplicada pelo ciclista nos pedais pela velocidade angular/linear resultante. Ciclistas aplicam força para vencer as forças de resistência que se opõem ao movimento (subida, resistência do ar, resistência de rolamento, aceleração). A maioria dos medidores de potência mede diretamente a força aplicada (torção/deflexão em manivela, cubo, eixo de movimento central ou pedal); o PowerPod (Velocomp) é uma exceção que mede as forças opostas (resistência do ar via tubo de Pitot, peso, coeficiente aerodinâmico e de rolamento) e infere a potência aplicada usando a 3ª Lei de Newton (força de reação = força aplicada).\n\nNota: é a equação-base que os capítulos seguintes do livro (NP, IF, TSS, modelo potência-duração) desenvolvem — por isso `aplicacao: contexto` aqui, e não uma regra de interpretação em si."},{"id": "nota-0009", "titulo": "Coroas não circulares (ovais) inflam a potência registrada em até 10–20 W", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 44, "trecho": "these noncircular chainrings will show an increase in calculated power output for any power meter measuring angular velocity at the crank or pedals."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 45, "trecho": "This does in fact speed up the crank within a single rpm and because of this increase in speed within the single rpm, causes the power output to be inflated by up to 10–20 watts on average, depending on how oval the chainrings are."}], "relacionadas": [], "confianca": 0.85, "status": "auto-aprovado", "body": "Medidores de potência que calculam watts a partir da velocidade angular da manivela/pedal (assumindo velocidade angular constante ao longo da volta) sofrem um viés sistemático de superestimação quando o ciclista usa coroas não circulares (ovais). O desenho da coroa oval acelera o trecho \"morto\" do pedal (topo/base do curso) para o ciclista retornar mais rápido ao trecho de força (0–180°), o que inflaciona artificialmente a potência calculada em até 10–20 W, dependendo do grau de ovalização.\n\nAplicação ao feedback: ao interpretar potência/NP/TSS de um atleta que usa coroas não circulares, considerar que os valores registrados podem estar superestimados em ~10–20 W frente ao valor real — medidores que calculam potência no cubo ou no pedal (em vez de por velocidade angular na manivela) não sofrem esse viés."},{"id": "nota-0010", "titulo": "Medidor de potência no cubo (hub) lê 5–10 W a menos que manivela/pedal, por perda de transmissão", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 40, "trecho": "One of the advantages of a hub-based system is that it measures
