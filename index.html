ste, por que um protocolo de aquecimento estruturado (moderado a alto, cerca de alguns minutos antes de esforços intensos como contrarrelógios curtos ou sprints) tende a produzir melhora mensurável de desempenho (2-4% em esforços curtos e intensos), e por que pular o aquecimento antes de testes de FTP/VO2máx pode subestimar a capacidade real do atleta."},{"id": "nota-0004", "titulo": "Filosofia \"treino é teste, teste é treino\": testes periódicos para rastrear sistemas fisiológicos", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 30, "trecho": "Andrew says it best: Training is testing; testing is training. Treat every training session as an opportunity to build toward a peak performance."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 30, "trecho": "A power meter allows you to test your fitness on a periodic basis, such as every month, so you can quantitatively see where you have made improvements and where you still need work."}], "relacionadas": [], "confianca": 0.75, "status": "auto-aprovado", "body": "Os autores propõem tratar praticamente qualquer sessão de treino monitorada por potência como uma oportunidade de teste, e todo teste como uma forma de treino (\"training is testing; testing is training\"). A ideia central é usar avaliações periódicas (o texto sugere uma cadência mensal como exemplo) para verificar quantitativamente quais sistemas fisiológicos estão melhorando e quais ainda precisam de foco, permitindo tanto ajustar o plano de treino quanto evitar overtraining ao acompanhar a evolução real da forma física ao longo do tempo.\n\nNota: esta é uma orientação filosófica/metodológica geral do livro, não um protocolo de teste específico (protocolos concretos de teste de campo/laboratório são tratados em capítulos posteriores) — por isso `aplicacao: contexto`."},{"id": "nota-0051", "titulo": "Estimar a FC de limiar (FTHR) pelo degrau no gráfico de distribuição de frequência cardíaca", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["FC"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 124, "trecho": "if you look at a large enough dataset that includes time spent at and above FTP, you can see where the heart rate threshold would be. Set the data range set to three to five heartbeats per minute to more easily see where the step-down occurs."}], "relacionadas": [{"id": "nota-0025", "tipo": "complementa", "justificativa": "é o análogo, para FC, do método de distribuição de frequência de potência para estimar FTP (nota-0025)"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Assim como é possível estimar o FTP pelo \"degrau\" no gráfico de distribuição de tempo por faixa de potência (nota-0025), é possível estimar a FC de limiar funcional (FTHR) de forma análoga: analisar um conjunto de dados grande o suficiente que inclua tempo gasto em e acima do FTP, configurar o gráfico de distribuição de FC em faixas (bins) de 3 a 5 batimentos por minuto, e procurar o ponto de queda brusca na quantidade de tempo — esse é o valor aproximado da FTHR.\n\nAplicação ao feedback: quando não houver teste de FC de limiar dedicado, mas houver histórico suficiente de FC durante esforços de intensidade alta, esse método permite estimar a FTHR sem teste formal, complementando a estimativa de FTP."},{"id": "nota-0017", "titulo": "Marcar início/fim de cada intervalo (lap/interval button) para obter a média de potência precisa por trecho", "dominio": "avaliacao-e-testes", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-por-lap", "tempo-decorrido"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 49, "trecho": "Make it a habit to use the lap button on your power-meter head unit. Simply touch the lap button just before you begin the interval, and then again when you stop the interval."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 49, "trecho": "When doing intervals such as micro-bursts or crisscross efforts... you will want to mark only the beginning and end of the larger interval."}], "relacionadas": [], "confianca": 0.8, "status": "auto-aprovado", "body": "Protocolo de registro: marcar o botão de volta/intervalo (lap) exatamente no início e no fim de cada intervalo de treino permite calcular a potência média (e outras métricas) daquele trecho específico com precisão, isolando-o do restante da atividade (aquecimento, recuperação entre séries, etc.). Para intervalos com sub-estrutura interna (ex.: microbursts, esforços crisscross), marcar apenas o início e o fim do intervalo maior, não cada sub-mudança de intensidade dentro dele — isso preserva a média do esforço completo para fins de comparação entre sessões.\n\nAplicação ao feedback: quando os dados de uma atividade têm marcações de lap, usar essas marcações para calcular e comparar a potência média de cada intervalo prescrito, em vez de médias sobre a atividade inteira ou sobre janelas de tempo arbitrárias."},{"id": "nota-0025", "titulo": "Cinco métodos alternativos para estimar FTP sem um teste formal dedicado", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-média", "NP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 54, "trecho": "Power Frequency Distribution Charts. A good estimate of FTP can often be obtained by simply uploading all of your training data into your power-meter software and then examining the power frequency distribution chart... there will often be a rather noticeable drop-off above this point."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 55, "trecho": "Routine Steady Power... look for places where your power is quasi-constant for some minutes at a time."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 56, "trecho": "Normalized Power... examine your Normalized Power... during hard mass-start races of approximately one hour."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 56, "trecho": "One-Hour Time Trial. Since, by definition, the best measure of performance is performance itself, the most direct estimate of your FTP will be obtained by simply doing a one-hour time trial."}], "relacionadas": [{"id": "nota-0020", "tipo": "alternativa-a", "justificativa": "métodos alternativos ao teste de campo de 20 minutos (nota-0020) para chegar numa estimativa de FTP"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Além do teste de campo de 20 minutos (nota-0020), o livro lista métodos de estimar o FTP sem um teste formal, em ordem crescente de complexidade:\n\n1. **Gráfico de distribuição de frequência de potência**: analisar todo o histórico de treino no software do medidor de potência; costuma haver uma queda perceptível na frequência de tempo passado acima de um certo valor de potência — esse ponto de queda aproxima o FTP. Funciona melhor com \"bins\" de potência estreitos (5–10 W) e quando o período analisado inclui treino/corrida de alta intensidade.\n2. **Potência estável de rotina**: observar a potência que o atleta consegue sustentar de forma quase constante por vários minutos em treinos habituais (intervalos longos, subidas longas), usando uma linha de grade horizontal sobreposta ao gráfico de potência para \"caçar\" o patamar constante.\n3. **Potência Normalizada (NP) em corrida**: analisar a NP (conceito detalhado no Capítulo 7) durante provas de pelotão (mass-start) de aproximadamente 1 hora de duração e alta intensidade — como muitos softwares calculam NP automaticamente, isso pode ser a forma mais rápida de estimar o FTP sem nenhum teste dedicado.\n4. **Contrarrelógio de 1 hora**: por definição, o melhor indicador de performance é a própria performance — um TT de 60 minutos bem pacejado dá a estimativa mais direta do FTP (a potência média já É, por definição, próxima do FTP). Se o atleta começar forte demais e cair no fim, a potência média subestima o FTP real.\n5. **Modelagem matemática (Potência Crítica / modelo Potência-Duração)**: ver nota específica sobre Potência Crítica.\n6. **Modelagem computacional (mFTP)**: ver nota específica sobre FTP modelado por software.\n\nAplicação ao feedback: quando não houver um teste de FTP formal recente, esses métodos indiretos (especialmente NP de corridas duras de ~1h e distribuição de frequência de potência do histórico) permitem uma estimativa razoável de FTP a partir dos dados já disponíveis no Strava, sem exigir que o atleta faça um teste dedicado."},{"id": "nota-0031", "titulo": "Power Profile (Tabela 4.1): faixas de W/kg por categoria de nível, para 5 s / 1 min / 5 min / FTP, homens e mulheres", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["potência-máx", "relação-P/peso", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 69, "trecho": "TABLE 4.1 Power Profile Chart — Maximal Power Output (in W/kg) — 5 s | 1 min | 5 min | FT — Men and Women, categorias: World class, Exceptional, Excellent, Very good, Good, Moderate, Fair, Novice 2, Novice 1"}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 71, "trecho": "a world-class match sprinter can produce over 23 watts per kilogram (W/kg) in a 5-second sprint, whereas a novice might produce only 10 to 12.5 W/kg."}], "relacionadas": [{"id": "nota-0032", "tipo": "pre-requisito", "justificativa": "usa as 4 durações-índice (5s, 1min, 5min, FTP) definidas na nota-0032"}, {"id": "nota-0033", "tipo": "pre-requisito", "justificativa": "os valores da tabela são normalizados por peso (W/kg), conceito da nota-0033"}], "confianca": 0.9, "status": "auto-aprovado", "body": "Tabela 4.1 do livro classifica o nível de um ciclista comparando a potência máxima (em W/kg) que ele produz em 4 durações-índice (5 segundos, 1 minuto, 5 minutos e no FTP) contra 9 faixas de categoria, de Novice 1 (mais baixa) a World Class (mais alta). Cada categoria tem uma faixa de valores (não um valor único); abaixo estão o teto (melhor linha) e o piso (pior linha) de cada categoria, em W/kg:\n\n**Homens** (5 s / 1 min / 5 min / FTP):\n- World class: 25,18/11,50/7,60/6,60 (topo) até 23,06/10,68/6,86/5,93 (piso)\n- Exceptional: 22,76/10,56/6,75/5,84 até 21,25/9,97/6,23/5,36\n- Excellent: 20,94/9,86/6,12/5,27 até 19,43/9,27/5,59/4,79\n- Very good: 19,13/9,15/5,49/4,70 até 17,61/8,57/4,96/4,22\n- Good: 17,31/8,45/4,85/4,12 até 15,80/7,86/4,32/3,65\n- Moderate: 15,50/7,74/4,22/3,55 até 13,98/7,16/3,69/3,08\n- Fair: 13,68/7,04/3,59/2,98 até 12,17/6,45/3,06/2,51\n- Novice 2: 11,87/6,33/2,95/2,41 até 10,35/5,75/2,42/1,93\n- Novice 1: 10,05/5,63/2,32/1,84 até 8,23/4,93/1,68/1,27\n\n**Mulheres** (5 s / 1 min / 5 min / FTP):\n- World class: 19,42/9,29/6,74/5,74 até 17,88/8,64/6,06/5,15\n- Exceptional: 17,66/8,55/5,96/5,06 até 16,56/8,09/5,47/4,64\n- Excellent: 16,34/7,99/5,38/4,55 até 15,24/7,53/4,89/4,13\n- Very good: 15,02/7,44/4,79/4,04 até 13,91/6,97/4,31/3,62\n- Good: 13,69/6,88/4,21/3,53 até 12,59/6,42/3,72/3,11\n- Moderate: 12,37/6,33/3,62/3,02 até 11,27/5,86/3,14/2,60\n- Fair: 11,05/5,77/3,04/2,51 até 9,95/5,31/2,55/2,09\n- Novice 2: 9,73/5,22/2,45/2,00 até 8,63/4,75/1,97/1,58\n- Novice 1: 8,41/4,66/1,87/1,49 até 7,09/4,10/1,29/0,98\n\nMetodologia: os extremos das faixas foram \"ancorados\" no desempenho conhecido de campeões mundiais (extremo superior) e ciclistas novatos (extremo inferior) — ex.: um sprinter mundial produz >23 W/kg em sprint de 5 s, um novato produz 10–12,5 W/kg — com as 7 divisões intermediárias (exceptional, excellent, very good, good, moderate, fair, novice) distribuídas entre esses extremos e confirmadas com dados reais dos autores. A tabela não tem correção por idade (ver nota sobre limitações) nem chart separado para masters — os autores decidiram aplicá-la igual para todas as idades.\n\nAplicação ao feedback: para classificar o \"fenótipo\"/nível do atleta, calcular seus melhores W/kg nas 4 durações-índice (a partir do histórico de picos de potência do Strava) e localizar em que faixa de categoria cada valor cai — ver nota-0035 sobre como interpretar o formato resultante do perfil."},{"id": "nota-0032", "titulo": "As quatro durações-índice do Power Profile e a capacidade fisiológica que cada uma reflete", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 71, "trecho": "The Power Profile indexes efforts of 5 seconds, 1 minute, and 5 minutes and a fourth measure at functional threshold power in an attempt to best reflect neuromuscular power, anaerobic capacity, maximal oxygen uptake (VO2max), and lactate threshold (LT), respectively."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 71, "trecho": "roughly 40–45 percent of the energy expended during such exercise [1-min all-out] is derived aerobically... [anaerobic capacity] generally requires 1.5–2.5 minutes to deplete... most athletes can sustain a power that would elicit 105–110 percent of their VO2max for [5 minutes]."}], "relacionadas": [], "confianca": 0.85, "status": "auto-aprovado", "body": "O Power Profile usa 4 durações de esforço máximo como proxy (índice) de 4 capacidades fisiológicas diferentes:\n\n- **5 segundos** → potência neuromuscular\n- **1 minuto** → capacidade anaeróbia (embora não seja um esforço puramente anaeróbio: ~40–45% da energia gasta nesse esforço vem de fontes aeróbias, e a capacidade anaeróbia geralmente requer 1,5–2,5 min para se esgotar completamente)\n- **5 minutos** → VO2máx (embora não seja exatamente 100% do VO2máx: a maioria dos atletas consegue sustentar por 5 min uma potência que exigiria 105–110% do seu VO2máx)\n- **potência no FTP** → limiar de lactato (LT)\n\nEssas durações foram escolhidas por correlacionarem bem com medições mais diretas dessas capacidades, além de serem práticas e reprodutíveis para coleta de dados de campo (sem precisar de laboratório).\n\nAplicação ao feedback: ao interpretar os picos de potência de 5 s, 1 min e 5 min de uma atividade ou de um histórico, mapear cada duração para a capacidade fisiológica correspondente listada acima antes de tirar conclusões sobre pontos fortes/fracos do atleta."},{"id": "nota-0034", "titulo": "Protocolo de teste de campo para o Power Profile (5 s, 1 min, 5 min all-out)", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 73, "trecho": "The majority of your warm-up should be in Levels 2 and 3... Complete at least 10 minutes of easy pedaling before the first effort. For the test efforts, do not worry about cadence, heart rate, or anything else—all that matters is the clock, so drive hard to the end of each timed effort."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 73, "trecho": "Finish with a short cooldown to get in at least another 300–500 kilojoules of Level 2 riding."}], "relacionadas": [{"id": "nota-0020", "tipo": "complementa", "justificativa": "junto com o teste de FTP de 20 minutos, completa o perfil de potência do atleta nas 4 durações-índice"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Protocolo de teste de campo para preencher o Power Profile (junto com o resultado do teste de FTP do Capítulo 3): realizar em um trecho de estrada sem interrupções (sinais, cruzamentos) que possa ser reutilizado em retestes futuros, em condições semelhantes (vento, clima, fase de treino) e de preferência logo após uma semana de descarga (fresco e relativamente em forma).\n\nAquecimento: mesma rotina sempre, majoritariamente em Nível 2/3 (Endurance/Tempo), com pelo menos 10 minutos de pedalada leve antes do primeiro esforço. Esforços de teste: sem se preocupar com cadência, FC ou qualquer outro dado — o único objetivo é produzir o máximo de watts possível durante cada intervalo cronometrado (registrar cada esforço como um \"intervalo\" marcado no medidor de potência). Volta à calma: pelo menos 300–500 kJ de trabalho em Nível 2.\n\nDepois de baixar os dados, extrair a melhor potência média para cada uma das durações testadas (5 s, 1 min, 5 min) e localizar os valores na Tabela 4.1 (Power Profile, nota-0031) junto com o FTP (do teste do Capítulo 3).\n\nAplicação ao feedback: ao identificar no arquivo do Strava os melhores picos de potência de 5 s, 1 min e 5 min de uma sessão de teste dedicada (marcada como tal pelo atleta ou inferida por contexto), usar esses valores para atualizar o Power Profile do atleta — não confundir esforços de teste com picos incidentais de uma sessão de treino/prova comum."},{"id": "nota-0038", "titulo": "Revisar o Power Profile a cada 4–6 semanas", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 83, "trecho": "Be sure to revise your chart every four to six weeks and note changes from the previous training block. This is an excellent way to make sure all your hard work is going in the right places."}], "relacionadas": [{"id": "nota-0021", "tipo": "complementa", "justificativa": "cadência de reavaliação semelhante (mas não idêntica) à recomendação de reteste de FTP a cada 6-8 semanas"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Os autores recomendam revisar o Power Profile (Tabela 4.1) a cada 4–6 semanas, comparando com o bloco de treino anterior, para verificar se o treino está de fato produzindo mudanças nas áreas pretendidas. Cadência um pouco mais frequente do que a recomendação de reteste de FTP isolado (6–8 semanas, nota-0021), já que o Power Profile cobre 4 durações diferentes e pode capturar progresso mais cedo em capacidades específicas (ex.: neuromuscular, anaeróbia) mesmo antes de uma mudança perceptível de FTP.\n\nAplicação ao feedback: ao gerar feedback mensal, verificar se já se passaram 4–6 semanas desde a última atualização do Power Profile do atleta e, se sim, sinalizar a necessidade de retestá-lo (ou recalculá-lo a partir dos melhores picos recentes de 5s/1min/5min/FTP) para capturar progresso específico por capacidade."},{"id": "nota-0072", "titulo": "Protocolo de teste de assimetria de pedalada em subida (4 dias, GPR/GPA)", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-por-lap", "cadência"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 187, "trecho": "on four different days you will complete three 5-minute intervals at your Level 5 (VO2max) power (roughly 113–115 percent of your FTP). For the first interval, stand up on the pedals the entire time, for the second interval stay seated the entire time, and for the third interval alternate standing and sitting."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 187, "trecho": "Day 1: Complete the test with no emphasis on either leg... Day 2: Emphasize the leg that releases less power... Day 3: Emphasize the left leg only... Day 4: Emphasize the right leg only."}], "relacionadas": [{"id": "nota-0071", "tipo": "pre-requisito", "justificativa": "o teste é analisado usando as métricas GPR/GPA definidas na nota-0071"}, {"id": "nota-0011", "tipo": "complementa", "justificativa": "investiga a mesma assimetria entre pernas discutida na nota-0011, mas de forma diagnóstica/comportamental (técnica) em vez de apenas um viés de medição"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Protocolo para diagnosticar se uma assimetria de potência entre pernas é real (força muscular) ou é um problema de técnica/posição na bike: em uma mesma rota repetível (subida), realizar em 4 dias diferentes 3 intervalos de 5 minutos cada, à potência de Nível 5/VO2máx (~113–115% do FTP) — um intervalo em pé o tempo todo, um sentado o tempo todo, e um alternando entre as duas posições livremente.\n\n- **Dia 1**: executar naturalmente, sem enfatizar nenhuma perna — serve de linha de base para identificar qual perna libera menos potência (GPR mais baixo).\n- **Dia 2**: enfatizar conscientemente (empurrar bem mais forte) a perna identificada como mais fraca no Dia 1, tanto em pé quanto sentado, para ver se o balanço de GPR melhora.\n- **Dia 3**: enfatizar apenas a perna esquerda em todos os esforços.\n- **Dia 4**: enfatizar apenas a perna direita em todos os esforços.\n\nInterpretação: se o desequilíbrio se corrige ao enfatizar conscientemente a perna mais fraca em pé, mas mudança de posição/movimento corporal pode ser a explicação (não necessariamente força muscular); se o desequilíbrio se corrige da mesma forma estando sentado (onde mudanças posturais têm menos influência), é mais provável que haja de fato uma discrepância de força muscular real entre os lados (ex.: glúteos, bíceps femoral). Também é possível descobrir, como no exemplo do livro, que um pequeno ajuste de padrão de movimento (ex.: deslocar o peso do corpo de forma diferente ao empurrar com cada perna) resolve boa parte da assimetria, gerando ganho direto de potência (10–20 W no caso do atleta-exemplo).\n\nAplicação ao feedback: ao revisar um teste de assimetria de pedalada marcado em 4 sessões, comparar o GPR de cada perna entre os intervalos em pé/sentado/alternado e entre os 4 dias para diferenciar se a assimetria é de força muscular real (persiste sentado) ou de padrão de movimento/ajuste de bike (melhora ao enfatizar conscientemente ou muda com a posição)."},{"id": "nota-0075", "titulo": "Limitação do Power Profile: janelas de duração fixas podem subestimar capacidades reais do atleta", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 197, "trecho": "if you compete in criteriums and often go for primes, you may perform a personal best effort for 50 seconds... the mean maximal power for 1 minute will be low and not truly indicative of your anaerobic capacity power as stipulated by the Power Profile chart."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 198, "trecho": "FTP represents an intensity that can be sustained for between perhaps 30 and 70 minutes... a 40 km TT may last approximately 60 minutes for most individuals, it will almost never last exactly 60 minutes."}], "relacionadas": [{"id": "nota-0031", "tipo": "contradiz", "justificativa": "expõe uma limitação metodológica do próprio Power Profile de 4 durações fixas (nota-0031), motivando o modelo Potência-Duração como alternativa mais robusta"}], "confianca": 0.8, "status": "auto-aprovado", "body": "O Power Profile (Tabela 4.1, nota-0031) usa 4 durações fixas (5s, 1min, 5min, FTP), mas dados de campo \"ecologicamente válidos\" (corridas, treinos não estruturados) raramente batem exatamente com essas janelas — um esforço máximo de 50s numa disputa de prêmio (prime) de criterium é quase tão informativo sobre capacidade anaeróbia quanto um de 60s, mas não conta corretamente para o critério de \"1 minuto\" do Power Profile, subestimando artificialmente essa capacidade.\n\nO mesmo problema afeta o próprio FTP: fisiologicamente, o FTP é uma intensidade sustentável por algo entre ~30 e ~70 minutos (atletas mais treinados tendendo à parte superior dessa faixa), não exatamente 60 minutos. Exemplo do livro: um contrarrelojista que produz 300 W em teste de 60 min numa configuração, ao correr um CRI de 40 km numa configuração mais aerodinâmica termina em 55 min a 310 W, mas \"desliga\" nos últimos minutos — sua potência média cai para 284 W se forçada a uma janela de 60 min, mas isso não significa que o FTP real caiu; é um artefato de usar uma janela de duração fixa que não coincidiu com o esforço real feito.\n\nEsse problema motivou o desenvolvimento do modelo Potência-Duração (Power Duration Model, ver notas seguintes), que ajusta uma curva contínua aos dados em vez de depender de janelas de duração discretas e fixas."},{"id": "nota-0101", "titulo": "Teste combinado 5min + 20min: esgotar a FRC antes do teste de 20min para refinar a estimativa de FTP e medir potência de VO2max", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-média", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 276, "trecho": "The testing on Day 3 on the bike will be tough; he'll test both his 5-minute VO2max power and his 20-minute effort. He'll take 5 percent off his 20-minute average power and use that as his FTP for the rest of the plan. The 5-minute test is critical because it helps to exhaust his FRC"}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 277, "trecho": "and therefore make his 20-minute test (less 5 percent) more accurate as an estimation of FTP. At the same time this is a great measure of his VO2max power, which could be higher than the Coggan Classic levels of 106–120 percent of FTP. If Joe does a great 5-minute test and cranks out 150 percent of his FTP, then he'll want to use the iLevels as the basis for his training."}], "relacionadas": [{"id": "nota-0021", "tipo": "complementa", "justificativa": "refina o protocolo padrão do teste de 20 minutos (menos 5%) já registrado, combinando-o com um teste de 5 minutos no mesmo dia"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Variação do teste padrão de FTP (20 minutos, subtraindo 5% da potência média — já registrado em nota anterior): no mesmo dia de teste, fazer primeiro um esforço máximo de **5 minutos** e, depois de recuperação, o teste de **20 minutos**.\n\nRacional dos autores: o esforço de 5 minutos esgota parcialmente a Capacidade de Reserva Funcional (FRC) do atleta antes do teste de 20 minutos, o que — segundo os autores — torna a estimativa de FTP resultante (20min × 0,95) **mais precisa** (por reduzir a contribuição anaeróbia residual no teste de 20 minutos).\n\nUso adicional do resultado do teste de 5 minutos: serve como medida da potência de VO2max do atleta. Se esse valor for muito superior à faixa padrão dos Coggan Classic Levels para VO2max (106–120% da FTP) — por exemplo, 150% da FTP — é um indício de que o atleta deveria usar as **iLevels** (zonas individualizadas, já registradas em notas do Cap.3) em vez das zonas clássicas de Coggan como base do treino.\n\nAplicação ao feedback: ao processar uma sessão de teste que contenha dois esforços máximos estruturados (5min seguido de 20min), o sistema pode aplicar este protocolo combinado em vez do teste de 20min isolado, e usar a razão P5min/FTP resultante como sinal para recomendar zonas clássicas (Coggan) vs. individualizadas (iLevels)."},{"id": "nota-0127", "titulo": "Métodos de teste de campo para CdA (área frontal efetiva) usando medidor de potência: velocidade/potência constante, regressão e elevação virtual", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "protocolo", "sinais": ["potência-média", "velocidade"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 372, "trecho": "it is possible to measure your effective frontal area, or CdA (i.e., the product of the dimensionless coefficient of drag, Cd, and frontal area, A, measured in square meters)... three different approaches may be used: the constant speed (or constant power) method, the regression method, or the virtual elevation method."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 373, "trecho": "the relationship is well described by a curvilinear equation of the form: Y = aX + bX3, where 'a' is a constant representing the rolling resistance (in newtons, N) and 'b' is proportional to one-half times the air density... times CdA."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 375, "trecho": "Dr. Robert Chung developed this approach... the rider simply collects speed and power data while repeatedly riding over the same stretch of road... These data are then used along with the total mass and other factors to solve for the apparent, or virtual, elevation profile."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 375, "trecho": "under ideal conditions it is possible to quantify CdA via such field-testing with a coefficient of variation (i.e., reproducibility) of less than 2 percent."}], "relacionadas": [], "confianca": 0.55, "status": "revisar", "body": "Três métodos de teste de campo (sem túnel de vento) para medir o CdA (área frontal efetiva de arrasto) de um ciclista usando apenas o medidor de potência:\n\n1. **Velocidade/potência constante:** passadas em ambas as direções de um trecho sem vento, a velocidade constante (medindo potência) ou potência constante (medindo velocidade), corrigindo para energia cinética/potencial residual. Método mais simples, mas exige assumir um valor de coeficiente de resistência ao rolamento (Crr).\n2. **Regressão:** múltiplas passadas (6-9) em velocidades variadas; ajustar `Potência = a·Velocidade + b·Velocidade³`, onde `a` é proporcional à resistência ao rolamento e `b` é proporcional a ½ × densidade do ar × CdA. Permite separar CdA de Crr e é mais preciso por usar múltiplas medições.\n3. **Elevação virtual (Dr. Robert Chung):** o ciclista pedala repetidamente o mesmo trecho de estrada sem restrição de velocidade/potência; os dados de potência e velocidade são usados para resolver o \"perfil de elevação aparente\", ajustando CdA e Crr até que o perfil calculado fique nivelado (consistente) nas repetições. Não exige percurso perfeitamente plano nem trecho controlado — funciona melhor num curto trajeto \"meia-pipa\" (subidas moderadas em cada ponta, evitando frenagem).\n\nPrecisão: em condições ideais (sem vento significativo, testes de manhã cedo), a reprodutibilidade do CdA medido por esses métodos é **inferior a 2%** — comparável a um túnel de vento.\n\n**Motivo da revisão:** é um protocolo de teste específico do atleta (posição/equipamento), não uma regra de interpretação de dados de treino do Strava — não diretamente aplicável a um produto de feedback baseado em atividades registradas, a menos que o produto ofereça uma funcionalidade dedicada de teste de aerodinâmica.\n\nAplicação ao feedback: mantido como cânone/contexto; não aplicável à análise retrospectiva de atividades Strava sem uma funcionalidade dedicada de teste de CdA (que exigiria protocolo de coleta específico, não apenas dados históricos)."},{"id": "nota-0133", "titulo": "Cadência ótima (140-160 rpm) para potência máxima em sprint de pista; velocistas devem treinar resistência à fadiga nessa faixa de cadência", "dominio": "avaliacao-e-testes", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": ["cadência", "potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 384, "trecho": "Dr. Jim Martin of the University of Utah... has shown that world-class match sprinters tend to initiate their jump during a flying 200-meter time trial essentially right at the cadence that results in maximal power output—beyond this point, power declines continuously because of increases in cadence beyond this optimum as well as fatigue... it is important for such riders to train not only to increase their peak power, but also to be as fatigue-resistant as possible at very high cadences (for example, 140–160 rpm)."}], "relacionadas": [], "confianca": 0.6, "status": "auto-aprovado", "body": "Pesquisa citada (Dr. Jim Martin, Universidade de Utah, em colaboração com o Instituto Australiano do Esporte): velocistas de pista de elite iniciam o \"jump\" (arrancada) num contrarrelógio voador de 200m exatamente na cadência que produz a potência máxima — além desse ponto, a potência cai continuamente com o aumento de cadência (por causa da relação força-velocidade muscular e da fadiga). Essa cadência ótima de potência máxima em sprint fica tipicamente na faixa de **140-160 rpm**.\n\nImplicação de treino: velocistas devem treinar não só o pico de potência absoluto, mas também a **resistência à fadiga especificamente nessa faixa de cadência muito alta** (140-160 rpm). Uma tática de prova sugerida pela pesquisa: usar marchas maiores nas rodadas classificatórias (vs. rodadas eliminatórias de sprint direto) para permanecer mais tempo próximo da cadência ótima durante o esforço.\n\nAplicação ao feedback: referência de contexto para caracterizar/avaliar sessões de sprint de pista — cadências de pico na faixa 140-160 rpm em esforços máximos curtos são esperadas/desejáveis para velocistas; cadências de pico muito abaixo dessa faixa em um sprint máximo podem indicar uso de marcha excessivamente grande ou déficit de capacidade neuromuscular em alta cadência."},{"id": "nota-0134", "titulo": "Ajuste por altitude/pressão atmosférica para comparar objetivamente desempenhos do mesmo atleta em pistas diferentes", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["potência-média", "tempo-decorrido"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 386, "trecho": "the results of two 3 km pursuits performed by the same rider are compared. The race at sea level took place on a 333.3-meter concrete track, and the race at altitude took place on a very similar track. The rider went nearly 6 seconds faster at altitude. But when the data are adjusted for the effects of the reduced atmospheric pressure on both aerodynamic drag and aerobic power output, the predicted power—and hence time—are identical to what was achieved at sea level."}], "relacionadas": [{"id": "nota-0113", "tipo": "complementa", "justificativa": "outro exemplo de fator externo (altitude, além do perfil de elevação) que distorce a relação simples entre potência e tempo/velocidade"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Exemplo: um mesmo atleta completou um contrarrelógio de perseguição de 3 km quase 6 segundos mais rápido numa pista em altitude do que ao nível do mar. Ao ajustar os dados pelos efeitos da pressão atmosférica reduzida (que afeta tanto o arrasto aerodinâmico — menor em altitude — quanto a potência aeróbia máxima disponível — menor em altitude), a potência e o tempo previstos ficaram **idênticos** entre as duas provas — ou seja, o desempenho fisiológico real foi equivalente, apesar da diferença de tempo bruto.\n\nAplicação ao feedback: ao comparar recordes pessoais/tempos do mesmo atleta em locais/altitudes diferentes (informação de localização/elevação já presente no Strava), não comparar tempos brutos diretamente como indicador de mudança de forma física — a altitude local do percurso pode explicar boa parte da diferença. Nota de contexto: o ajuste completo exige modelagem física (densidade do ar, CdA, potência aeróbia vs. altitude) não trivial de implementar sem dados adicionais; mantido como princípio conceitual, não fórmula pronta."},{"id": "nota-0144", "titulo": "Aliasing: distorção nos dados do medidor de potência quando a frequência de amostragem é baixa demais", "dominio": "avaliacao-e-testes", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["potência-série-temporal"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 468, "trecho": "Aliasing Distortion or artifact in data (such as from a power meter) that occurs when an analog signal is sampled at too low of frequency."}], "relacionadas": [], "confianca": 0.5, "status": "auto-aprovado", "body": "\"Aliasing\" é a distorção/artefato que aparece nos dados de um medidor de potência quando o sinal analógico é amostrado numa frequência baixa demais, produzindo valores registrados que não refletem fielmente o esforço real (picos podem ser suavizados/perdidos ou distorcidos entre amostras).\n\nAplicação ao feedback: nota de contexto sobre qualidade de dado — relevante para explicar por que dados de potência de dispositivos com taxa de amostragem baixa (ex.: 1 amostra/segundo vs. medidores de alta frequência) podem subestimar picos reais de potência de curtíssima duração (sprints, microbursts), o que pode afetar a precisão de métricas derivadas de pico (Pmax, picos de 1-5s). Não há fórmula de correção fornecida no livro; é apenas uma ressalva de limitação de dado."},{"id": "nota-0020", "titulo": "Protocolo de teste de campo de FTP (20 minutos) com fator de correção de 5%", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-média", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 58, "trecho": "Be sure to do the same warm-up... The warm-up and recovery intervals throughout the test should be at about 65 percent of your functional threshold power... When you begin the 5-minute all-out effort, punch it and hold it!"}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 59, "trecho": "figure out what your average power was for the entire 20-minute effort. Take this number and subtract 5 percent from it as a general rule... if you average 305 watts for the 20-minute time trial, you would calculate that 305 × 0.05 = 15.25, and 305 – 15.25 = 290. Thus, your functional threshold power is estimated to be 290 watts."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 59, "trecho": "Some riders with a higher anaerobic capacity might have to subtract 7 or more percent, while riders that are purely aerobic might need to only subtract 2–3 percent."}], "relacionadas": [{"id": "nota-0019", "tipo": "pre-requisito", "justificativa": "o protocolo estima o FTP definido na nota-0019"}], "confianca": 0.9, "status": "auto-aprovado", "body": "Protocolo (desenvolvido por Hunter Allen) para estimar FTP sem precisar de um teste de 60 minutos:\n\n1. Aquecimento padronizado — sempre o mesmo, terminando com intervalos de pedalada rápida.\n2. Aquecimento/recuperação a ~65% do FTP (ritmo Endurance).\n3. Esforço máximo de 5 minutos (\"all-out\", mas guardando um pouco de reserva) — abre as pernas, recruta a potência de VO2máx (Nível 5) e reduz a influência da capacidade aeróbia no teste seguinte.\n4. Contrarrelógio (time trial) de 20 minutos em ritmo forte e constante, evitando começar rápido demais; idealmente em subida constante ou contra vento leve para forçar esforço máximo sustentado.\n5. **Fórmula: FTP estimado = potência média dos 20 minutos × 0,95** (ou seja, subtrai-se 5% da potência média). Exemplo do livro: 305 W médios no TT de 20 min → 305 × 0,05 = 15,25 → 305 − 15,25 = 290 W de FTP estimado.\n\nO fator de correção de 5% existe porque 20 minutos é mais curto que a \"janela\" real de ~60 min do FTP, incorporando mais capacidade anaeróbia e superestimando a potência de limiar em ~5% em média. Esse fator não é fixo: atletas com maior capacidade anaeróbia podem precisar subtrair 7% ou mais; atletas predominantemente aeróbios podem precisar subtrair só 2–3%. Deve ser feito sempre no mesmo trecho de estrada (ou rolo), horário do dia e condições climáticas semelhantes, minimizando influências externas (estresse, sono) para permitir comparação válida entre testes.\n\nAplicação ao feedback: ao identificar no Strava uma atividade compatível com este protocolo (aquecimento padronizado + esforço de 5min + contrarrelógio de 20min), calcular o FTP estimado automaticamente a partir da potência média dos 20 minutos menos 5%, e usar esse valor para atualizar as zonas de treino do atleta."},{"id": "nota-0024", "titulo": "Escala de esforço percebido Borg CR10 (0–10) usada nas zonas de potência", "dominio": "avaliacao-e-testes", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 62, "trecho": "The values used in Table 3.1 for perceived exertion are from Gunnar Borg's 10-point category ratio scale (see Table 3.3), not the original 20-point scale that is more commonly used."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 63, "trecho": "TABLE 3.3 Perceived Exertion Scale — 0 Nothing at all, 0.5 Extremely weak, 1 Very weak, 2 Weak (light), 3 Moderate, 4 Somewhat strong, 5 Strong (heavy), 6-7 Very strong, 8-10 Extremely strong, • Maximal"}], "relacionadas": [{"id": "nota-0022", "tipo": "complementa", "justificativa": "é a escala usada na coluna RPE da Tabela 3.1 (nota-0022)"}], "confianca": 0.85, "status": "auto-aprovado", "body": "Escala de esforço percebido (RPE) usada pelos autores para a coluna RPE da Tabela 3.1 (níveis de potência) é a escala de categoria-razão de 10 pontos de Gunnar Borg (CR10), não a escala tradicional de 20 pontos (6-20) mais comum. Valores: 0 = nada, 0,5 = extremamente fraco, 1 = muito fraco, 2 = fraco (leve), 3 = moderado, 4 = um tanto forte, 5 = forte (pesado), 6–7 = muito forte, 8–10 = extremamente forte, • (marcador especial) = máximo.\n\nJustificativa dos autores para usar a CR10 em vez da escala de 20 pontos: ela reconhece explicitamente a resposta não linear de várias variáveis fisiológicas (ex.: lactato sanguíneo e muscular), servindo como melhor indicador do esforço geral. Como a percepção de esforço aumenta com o tempo mesmo em intensidade (potência) constante, os valores/faixas sugeridos na Tabela 3.1 referem-se ao esforço percebido no início de uma sessão ou série de intervalos, não ao final.\n\nNota: RPE é um dado subjetivo relatado pelo atleta, não um sinal automático do Strava — por isso não tem `sinais` do glossário associados; é usado como referência cruzada para interpretar a intensidade quando o atleta relata a sensação de esforço.\n\nAplicação ao feedback: como RPE não é um sinal automático do Strava, só usar a escala CR10 quando o atleta relatar esforço percebido explicitamente (ex.: em texto livre da atividade ou input do produto) — não inferir RPE a partir apenas de dados de potência/FC."},{"id": "nota-0021", "titulo": "Frequência recomendada de reteste de FTP: a cada 6–8 semanas (6–8 vezes por ano)", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 52, "trecho": "It would be a good idea to repeat this threshold test every six to eight weeks in order to assess your fitness, track performance changes, and decide whether to make changes to your training program based on the results."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 60, "trecho": "In general, assessing FTP six to eight times a year... is probably sufficient."}], "relacionadas": [], "confianca": 0.85, "status": "auto-aprovado", "body": "Recomendação dos autores: reavaliar o FTP a cada 6–8 semanas, o que equivale a cerca de 6–8 vezes ao ano. Momentos sugeridos: no meio do treino de inverno, no início do treino sério ao ar livre (linha de base), no meio do período pré-competitivo, algumas vezes durante a temporada de competição (para determinar o pico de forma) e depois do pico, para medir o quanto a forma \"caiu\".\n\nNuance de aplicação: iniciantes ou atletas retornando de pausa longa tendem a mostrar mudanças de FTP grandes e rápidas; atletas experientes ou que mantêm condicionamento alto o ano todo tendem a mostrar variação bem menor entre testes — a expectativa de quanto o FTP deve mudar entre reavaliações deve ser calibrada pelo histórico de treino do atleta.\n\nAplicação ao feedback: verificar a data do último teste de FTP do atleta (ou da última reestimativa via IF/NP de prova) e, se já passaram mais de 6-8 semanas, sinalizar a recomendação de um novo teste antes de basear zonas/TSS em um FTP potencialmente desatualizado."},{"id": "nota-0058", "titulo": "Checklist de análise pós-treino e pós-prova (kJ vs. reabastecimento, Quadrant Analysis, ponto de queda, matches, ponto de quebra)", "dominio": "avaliacao-e-testes", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["trabalho-kJ", "potência-série-temporal", "potência-por-lap", "cadência"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 150, "trecho": "See how many kilojoules of energy you used during your ride and determine whether you refueled enough... View your Quadrant Analysis... Determine when your wattage began to decrease during the ride. How many kilojoules of energy had you expended up to this point?"}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 150, "trecho": "View the matches burned in a race... Look for your peaks and determine where they are in the file... If you got dropped, see what types of efforts you had to do, the number of watts for these efforts, and where the breaking point was."}], "relacionadas": [{"id": "nota-0002", "tipo": "complementa", "justificativa": "usa a conversão kJ→kcal (nota-0002) para checar se o reabastecimento foi suficiente"}, {"id": "nota-0055", "tipo": "complementa", "justificativa": "usa o conceito de matches (nota-0055) para entender a demanda da prova"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Lista de verificações práticas sugeridas pelos autores para revisar um arquivo de potência:\n\n**Em arquivos de treino:**\n- kJ totais gastos vs. reabastecimento (o atleta comeu/bebeu o suficiente para repor a energia gasta? ver nota-0002)\n- Quadrant Analysis da sessão, comparada com a Quadrant Analysis de provas (para checar se o treino é específico o bastante — ver Capítulo 7)\n- Ponto em que a potência começou a cair na sessão, e quantos kJ já haviam sido gastos até ali (indício de fadiga/depleção energética)\n- Comparação de intervalos entre si (overlay): quantas repetições até uma queda relevante de potência? O número de intervalos feito foi adequado (nem de menos, nem de mais)?\n\n**Em arquivos de prova:**\n- Matches queimados (nota-0055) — entender a real demanda de esforços decisivos daquele tipo de prova, para depois desenhar treinos específicos que repliquem essa demanda\n- Localização dos picos de potência no arquivo — em que momento da prova ocorreram os esforços mais decisivos\n- Se o atleta foi \"descolado\" do pelotão: que tipo de esforço precisou fazer antes disso, com quantos watts, e onde exatamente ocorreu o \"ponto de quebra\" — usar essa informação para direcionar o treino seguinte\n\nAplicação ao feedback: esta lista funciona como um roteiro de perguntas-padrão a percorrer ao gerar o feedback diário/pós-prova de uma atividade, cobrindo energia, estrutura do esforço e pontos de falha/sucesso."},{"id": "nota-0163", "titulo": "Tabela de referência de VO2máx por nível: sedentário 25-40, amador 50-65, elite nacional 65-75, elite internacional 75-85, excepcional >85 mL·kg⁻¹·min⁻¹", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 68, "trecho": "Sedentários 25–40 | Ativos 40–55 | Ciclistas amadores 50–65 | Elite nacional 65–75 | Elite internacional 75–85 | Valores excepcionais >85 (mL·kg⁻¹·min⁻¹)... esses intervalos representam apenas referências gerais. O desempenho competitivo nunca deve ser previsto exclusivamente a partir do VO₂máx."}], "relacionadas": [{"id": "nota-0161", "tipo": "pre-requisito", "justificativa": "os valores da tabela são expressos em VO2 relativo (mL·kg⁻¹·min⁻¹), conforme definido na nota-0161"}], "confianca": 0.5, "status": "auto-aprovado", "body": "Tabela de valores de referência de VO2máx (mL·kg⁻¹·min⁻¹) por nível de ciclista: Sedentários 25-40; Ativos 40-55; Ciclistas amadores 50-65; Elite nacional 65-75; Elite internacional 75-85; Valores excepcionais >85. O próprio Manual adverte que são apenas referências gerais e que o desempenho competitivo nunca deve ser previsto exclusivamente a partir do VO2máx (ver nota-0164).\n\nAplicação ao feedback: só é utilizável se o produto receber um valor de VO2máx do usuário (medido em laboratório ou estimado por wearable) — não é um dado nativo do Strava. Política de ativação: por depender de dado não derivável diretamente do Strava (teste laboratorial ou estimativa proprietária de dispositivo), mantém-se aplicacao: contexto — não deve gerar regra de interpretação automática (aplicacao: direta) a menos que o produto explicitamente colete esse dado como input do atleta."},{"id": "nota-0183", "titulo": "Métodos propostos para medir durabilidade: comparar testes antes/depois de exercício prolongado, queda da Potência Crítica, alteração de limiares, curva potência-duração pré/pós fadiga — sem método universal consolidado", "dominio": "avaliacao-e-testes", "camada": ["semanal", "mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 102, "trecho": "Ainda não existe um método universal. Entretanto, diferentes abordagens vêm sendo utilizadas: comparação de testes antes e após exercício prolongado; queda da Potência Crítica; alteração dos limiares; redução do VO₂ correspondente a determinadas intensidades; análise da curva potência-duração antes e depois de esforços prolongados."}], "relacionadas": [{"id": "nota-0177", "tipo": "pre-requisito", "justificativa": "um dos métodos propostos usa a queda da Potência Crítica (nota-0177) medida antes/depois de exercício prolongado"}, {"id": "nota-0080", "tipo": "complementa", "justificativa": "a comparação da curva potência-duração antes/depois de fadiga é conceitualmente equivalente à métrica TTE já operacionalizada na nota-0080 do Livro 1"}], "confianca": 0.5, "status": "auto-aprovado", "body": "O Manual reconhece explicitamente que não existe ainda um método universal consolidado para medir durabilidade, mas cita abordagens em uso: (1) comparar testes fisiológicos (ex.: teste de FTP/CP) antes e depois de um exercício prolongado; (2) medir a queda percentual da Potência Crítica pós-fadiga; (3) observar alteração dos limiares fisiológicos; (4) medir redução do VO2 correspondente a uma intensidade fixa; (5) comparar a curva potência-duração (MMP) antes e depois de esforços prolongados. Menciona que medidores de potência tornaram possível acompanhar essas alterações diretamente em treinos/competições — abrindo uma área de pesquisa nova.\n\nAplicação ao feedback: confirma que a abordagem já usada no cânone (comparar a curva de potência-duração/MMP em diferentes momentos de uma sessão longa, e a métrica de Stamina/TTE do Livro 1, nota-0080/nota-0081) está alinhada com o estado da arte descrito no Manual — não há um método mais avançado ou uma fórmula fechada de \"índice de durabilidade\" a adotar no lugar do que já está implementado."},{"id": "nota-0206", "titulo": "VO2máx estimado por wearable (Garmin/WHOOP) é pouco confiável — algoritmo proprietário, opinião do autor; útil apenas como tendência (subindo/descendo), não como valor absoluto", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 10, "trecho": "If you own a fitness watch, it likely estimates your VO2 max using one of several different algorithms. I've voiced my opinions on the limitations of wearable-estimated VO2 max before, and I don't think you should put much stock into what your Garmin/WHOOP says about your VO2 max... you can get a very rough estimate of your aerobic fitness, and whether it's trending upward or downward, based on information from these devices."}], "relacionadas": [], "confianca": 0.4, "status": "revisar", "body": "**Política de ativação aplicada:** afirmação é a opinião pessoal do autor (\"I've voiced my opinions... I don't think you should put much stock\"), sobre algoritmos proprietários de terceiros (Garmin/WHOOP) cujos detalhes não são descritos — downgrade para `aplicacao: contexto`, confiança rebaixada (0.4) e `status: revisar` por ser opinião não fundamentada em dado quantitativo dentro do próprio livro. O autor reconhece utilidade limitada: a tendência (subindo/descendo) pode ser informativa, mesmo que o valor absoluto não seja confiável.\n\nAplicação ao feedback: relevante apenas se o produto algum dia incorporar VO2máx estimado por wearable como sinal de entrada — reforça que esse dado, se usado, deveria ser tratado como tendência direcional (comparação relativa ao longo do tempo), nunca como valor absoluto preciso. Não é um sinal do Strava/medidor de potência, então não gera regra operacional hoje."},{"id": "nota-0209", "titulo": "Platô de VO2 não aparece em ~50% das pessoas mesmo em esforço máximo real — critérios alternativos: RER >1,15, lactato sanguíneo elevado, PSE máxima", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 20, "trecho": "approximately 50% of people do not demonstrate a plateau when pushed to maximal effort. However, the absence of a plateau doesn't necessarily indicate a failure to reach the true VO2 max, and other criteria such as respiratory exchange ratio above 1.15 (indicating that nearly 100% of energy is being derived from carbohydrate or anaerobic pathways) and blood lactate levels are recommended to verify maximal effort, as well as someone's rating of perceived exertion (which should be maximal at the end of the test if done properly)."}], "relacionadas": [{"id": "nota-0166", "tipo": "complementa", "justificativa": "detalha, com um número específico (~50% das pessoas), a mesma ressalva sobre a ausência de platô de VO2 já mencionada de forma mais genérica no Cap.9 do Manual (Fonte 2)"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Confirma e quantifica um ponto já mencionado de forma mais genérica na Fonte 2 (Manual, Cap.9): o platô de VO2 (critério clássico de confirmação de esforço máximo em teste incremental) não aparece em aproximadamente metade das pessoas testadas, mesmo quando o esforço máximo real foi atingido. Critérios alternativos recomendados para confirmar que o esforço foi de fato máximo: razão de troca respiratória (RER) acima de 1,15 (quase 100% da energia vindo de carboidrato/vias anaeróbias), lactato sanguíneo elevado, e percepção subjetiva de esforço máxima ao final do teste.\n\nAplicação ao feedback: nota de referência sobre protocolo laboratorial — não gera regra de interpretação de dado do Strava (RER e lactato não são dados do Strava), mas é relevante caso o usuário relate resultados de um teste de VO2máx externo; reforça que a ausência de um \"platô\" no relatório do teste não invalida o resultado."},{"id": "nota-0218", "titulo": "Protocolo do teste submáximo de Astrand (bike): FC-alvo pela fórmula de Karvonen, 6 min em carga constante, fórmula de VO2máx por sexo a partir de watts e FC estável, com fator de correção por idade", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-média", "FC (média/máx)"], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 40, "trecho": "Target heart rate = (Maximal HR [220 – age in years] – resting heart rate)... Start pedaling at an intensity (Wattage) that will produce your target heart rate at a cadence of 50–80 rpm... men start at 150 W and women start at 100 W... reach a steady-state heart rate close to your target within the first two minutes... continue cycling for an additional 4 minutes (6 minutes total)."}, {"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 41, "trecho": "Women: VO2 max (L/min) = (0.00193 x workload + 0.326) / (0.769 x steady-state heart rate - 56.1) x 100. Men: VO2 max (L/min) = (0.00212 x workload + 0.299) / (0.769 x steady-state heart rate - 48.5) x 100. In this equation, workload needs to be in kg-m/min. Multiply your workload in Watts by 6.12 to get your workload in kg-m/min. Based on your age, multiply your VO2 max by the correction factor below."}], "relacionadas": [], "confianca": 0.55, "status": "auto-aprovado", "body": "Protocolo clássico de teste submáximo (Astrand-Ryhming) para estimar VO2máx usando bike estacionária com medidor de potência e monitor de FC — não exige esforço máximo:\n\n1. Calcular FC-alvo pela fórmula de Karvonen: FC-alvo = FC máxima (220 − idade) − FC de repouso.\n2. Pedalar a uma potência (watts) que produza a FC-alvo, com cadência de 50-80 rpm (ponto de partida sugerido: homens ~150W, mulheres ~100W, ajustável ao nível de condicionamento).\n3. Buscar FC estável próxima do alvo nos primeiros 2 minutos; continuar por mais 4 minutos (6 min total); registrar FC a cada minuto.\n4. Se a FC do último minuto não estiver dentro de 5 bpm do alvo (ou ainda estiver subindo), ajustar a carga e repetir por mais 6 minutos.\n5. Calcular carga em kg-m/min: watts × 6,12.\n6. Aplicar a fórmula (VO2máx absoluto em L/min): Mulheres = (0,00193×carga + 0,326) / (0,769×FC_estável − 56,1) × 100; Homens = (0,00212×carga + 0,299) / (0,769×FC_estável − 48,5) × 100.\n7. Aplicar fator de correção por idade (tabela citada na fonte, mas não extraída em formato de texto do PDF — apenas imagem/gráfico).\n8. Para VO2máx relativo (mL/kg/min): dividir o resultado do passo 6 pelo peso corporal (kg) e multiplicar por 1000.\n\nAplicação ao feedback: protocolo executável usando dados que o Strava já capta (potência média, FC média) de um trecho estruturado de 6 minutos em carga constante — se o produto quisesse oferecer uma estimativa de VO2máx sem exigir teste de laboratório, este protocolo é aplicável diretamente a uma sessão gravada com esse padrão específico (carga constante, FC estabilizada). Requer, porém, que o atleta siga deliberadamente o protocolo (não é derivável de uma sessão de treino arbitrária) e que o produto colete idade/peso/FC de repouso como dados de perfil. O fator de correção por idade citado na fonte não pôde ser extraído em texto (aparece apenas como tabela/imagem no PDF) — lacuna a resolver se o protocolo for implementado."},{"id": "nota-0219", "titulo": "Equações de teste de campo de corrida para estimar VO2máx: Cooper 12min, 1 milha e 1,5 milha — não aplicáveis ao ciclismo, registradas como contexto", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 40, "trecho": "VO2 max = (distance covered (in meters) – 504.9) / 44.73 [Cooper 12-minute run test]. VO2 max = 75.056 – (3.879 x mile time (in minutes)) [1-mile run]. 76.775 – (2.543 x 1.5 mile time (in minutes)) [1.5-mile run]."}], "relacionadas": [], "confianca": 0.5, "status": "auto-aprovado", "body": "Três equações de predição de VO2máx (mL/kg/min) baseadas em testes de campo de corrida: (1) Cooper 12 minutos — correr a maior distância possível em 12 min; VO2máx = (distância em metros − 504,9) / 44,73; (2) 1 milha — correr 1 milha o mais rápido possível; VO2máx = 75,056 − (3,879 × tempo em minutos); (3) 1,5 milha — mesma lógica; VO2máx = 76,775 − (2,543 × tempo em minutos).\n\nAplicação ao feedback: **não aplicável ao produto** (que interpreta dados de ciclismo via Strava) — protocolos e equações são específicos de corrida a pé, sem equivalente direto no ciclismo apresentado nesta fonte. Registrado por completude/não-descarte, mas sem uso previsto a menos que o produto expanda escopo para multiesporte (nesse caso, ver também nota-0114 do Livro 1 sobre equivalência de carga bike-corrida)."},{"id": "nota-0234", "titulo": "VO2max medido em cicloergômetro é tipicamente 6,4-11,2% menor que o mesmo indivíduo em esteira; ciclistas competitivos são exceção e igualam o valor da esteira", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 238, "trecho": "Only an 8-mL difference in VO2max occurred between the continuous and discontinuous bicycle tests, but VO2max during cycling averaged 6.4 to 11.2% below treadmill values. The largest difference among the three treadmill running tests equaled only 1.2%."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 239, "trecho": "When competitive cyclists pedal at the rapid frequencies of competition, they too achieve VO2max values equivalent to treadmill VO2max scores."}], "relacionadas": [{"id": "nota-0161", "tipo": "complementa", "justificativa": "qualifica a medição de VO2 absoluto/relativo (nota-0161) com o efeito de modalidade de teste: o mesmo indivíduo obtém valores de VO2max diferentes dependendo se o teste é feito em esteira ou cicloergômetro"}], "confianca": 0.65, "status": "revisar", "body": "Comparação clássica (McArdle et al. 1973, N=15 estudantes universitários) entre protocolos de VO2max em esteira e em cicloergômetro: o VO2max medido em **cicloergômetro é, em média, 6,4-11,2% menor** do que o mesmo indivíduo obtém em esteira rolante. Em contraste, a diferença entre os três protocolos de corrida em esteira testados foi de apenas 1,2%.\n\nA explicação provável é a quantidade de massa muscular ativada: o teste em esteira envolve mais massa muscular total (incluindo estabilização de tronco/membros superiores) do que o ciclismo, que isola predominantemente os membros inferiores contra a resistência do pedal — o VO2max tende a ser maior quanto maior a massa muscular ativa envolvida no teste.\n\n**Exceção importante**: ciclistas competitivos que pedalam nas cadências rápidas típicas de competição atingem valores de VO2max no cicloergômetro **equivalentes** aos valores em esteira — ou seja, a especificidade do treino/modalidade elimina essa diferença para atletas bem treinados especificamente em ciclismo (mesmo padrão de especificidade documentado para nadadores e race-walkers).\n\nConfiança rebaixada (0,65) e status `revisar`: valor específico (6,4-11,2%) vem de um único estudo com amostra pequena (N=15, \"McArdle WD, et al. Comparison of continuous and discontinuous treadmill and bicycle tests for max VO2. Med Sci Sports 1973;5:156\"), embora citado como comparação clássica/consolidada no próprio livro-texto.\n\nAplicação ao feedback: relevante apenas como contexto para interpretação de testes de VO2max de laboratório (não medível via Strava) — se um ciclista comparar seu VO2max medido em cicloergômetro contra normativas populacionais baseadas em esteira, deve esperar um valor menor por padrão, a menos que seja um ciclista competitivo bem adaptado à modalidade."},{"id": "nota-0235", "titulo": "Protocolo do teste de Wingate (30s all-out em cicloergômetro): fórmulas de potência pico, potência relativa e fadiga anaeróbia, com exemplo numérico completo e tabela de percentis", "dominio": "avaliacao-e-testes", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-máx", "potência-média"], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 234, "trecho": "The Wingate cycle ergometer test represents the most popular test to assess anaerobic capacity... After warming up (3 to 5 min), the subject begins pedaling as fast as possible, without resistance. Within 3 s, a fixed resistance is applied to the flywheel; the subject continues to pedal 'all out' for 30 s... Flywheel resistance equals 0.075 kilogram per kg body mass... Resistance often increases to 0.10 kg per kilogram body mass or higher (up to 0.12 kg) when testing power- and sprint-type athletes."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 234, "trecho": "A male weighing 73.3 kg performs the Wingate test... PP = Force × Distance ÷ Time = (5.5 kp × 9.8 m·s−2) × (12 rev × 6 m/rev) ÷ 5 s = 776.8 W. RPP = PP ÷ Body mass = 776.8 W ÷ 73.3 kg = 10.6 W·kg−1. AF = (Highest PP − Lowest PP) ÷ Highest PP × 100 = (776.8 W − 323.7 W) ÷ 776.8 W × 100 = 58.3%. AW = Force × Total Distance (in 30 s) = 15,523 joules, or 15.5 kJ."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 232, "trecho": "Table 11.2 Wingate Percentile Norms for Average Power and Peak Power for Physically Active Young Adult Men and Women — 50th percentile: Male Avg Power 565 W (7.44 W/kg), Peak Power 689 W (9.22 W/kg); Female Avg Power 381 W (6.39 W/kg), Peak Power 449 W (7.65 W/kg)."}], "relacionadas": [{"id": "nota-0043", "tipo": "complementa", "justificativa": "o teste de Wingate mede diretamente a capacidade anaeróbia (intensidade supra-VO2max) já descrita conceitualmente na nota-0043, fornecendo um protocolo padronizado e quantitativo para avaliá-la"}, {"id": "nota-0154", "tipo": "pre-requisito", "justificativa": "interpreta a potência pico (sistema fosfagênio) e a fadiga anaeróbia (sistema glicolítico) usando os três sistemas de ressíntese de ATP definidos na nota-0154"}], "confianca": 0.8, "status": "auto-aprovado", "body": "O **teste de Wingate** é o protocolo padrão-ouro para avaliar potência e capacidade anaeróbia em cicloergômetro — diretamente aplicável a ciclistas por usar a própria bicicleta estacionária como instrumento.\n\n**Protocolo:**\n1. Aquecimento de 3-5 minutos.\n2. O atleta começa a pedalar o mais rápido possível, sem resistência.\n3. Em até 3 segundos, aplica-se uma resistência fixa no volante: **0,075 kg por kg de massa corporal** (ex.: atleta de 70 kg → 5,25 kg de resistência); para atletas de potência/sprint, a resistência pode subir para 0,10-0,12 kg/kg.\n4. O atleta pedala \"all-out\" (esforço máximo) por **30 segundos contínuos**, com as revoluções do volante registradas em intervalos de 5 segundos.\n\n**Métricas calculadas (exemplo: homem de 73,3 kg, resistência 5,5 kg, revoluções por intervalo de 5s: 12,10,8,7,6,5):**\n\n- **Potência Pico (PP)** = Força × Distância ÷ Tempo, medida no intervalo de 5s mais alto (tipicamente o primeiro). No exemplo: PP = 776,8 W. Reflete a capacidade do sistema fosfagênio (ATP-PCr).\n- **Potência Pico Relativa (RPP)** = PP ÷ massa corporal. No exemplo: 776,8 ÷ 73,3 = **10,6 W/kg**.\n- **Fadiga Anaeróbia (AF)** = (PP mais alta − PP mais baixa) ÷ PP mais alta × 100. No exemplo: (776,8 − 323,7) ÷ 776,8 × 100 = **58,3%** de queda de potência ao longo dos 30s — reflete a capacidade glicolítica/resistência à fadiga anaeróbia.\n- **Trabalho Anaeróbio (AW)** = Força × distância total percorrida nos 30s. No exemplo: **15,5 kJ** — trabalho total acumulado.\n\n**Tabela de percentis de referência (adultos jovens fisicamente ativos, Maud & Schultz 1989):**\n\n| Percentil | Potência Média (H) | Potência Média (M) | Potência Pico (H) | Potência Pico (M) |\n|---|---|---|---|---|\n| 90 | 8,24 W/kg | 7,31 W/kg | 10,89 W/kg | 9,02 W/kg |\n| 50 | 7,44 W/kg | 6,39 W/kg | 9,22 W/kg | 7,65 W/kg |\n| 10 | 5,98 W/kg | 5,25 W/kg | 7,06 W/kg | 5,98 W/kg |\n\nAplicação ao feedback: se o atleta realizar um esforço \"all-out\" de ~30 segundos em terreno plano/trainer registrado no Strava, o produto pode extrair potência-máx (proxy de PP, idealmente a média dos primeiros 5s do esforço, não o pico instantâneo de 1s) e potência-média dos 30s completos (proxy de capacidade glicolítica) e calcular a Potência Pico Relativa (W/kg) e a Fadiga Anaeróbia (queda percentual de potência entre o início e o fim do esforço) para posicionar o atleta contra as normas de percentil acima — uma medida complementar ao FTP/Curva de Potência que foca especificamente em capacidade anaeróbia pura, útil para ciclistas de pista, BMX, ou provas com arrancadas decisivas."},{"id": "nota-0245", "titulo": "FCmáx prevista por idade (três fórmulas: 220−idade; Tanaka 208−0,7×idade; Gellish 206,9−0,67×idade) e dois métodos para calcular zona de treino por FC (Percentage Method vs. Karvonen/HRR)", "dominio": "avaliacao-e-testes", "camada": ["diario", "semanal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["FC (média/máx)"], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 479, "trecho": "Maximum heart rate has commonly been estimated as 220 minus age in years, with values independent of race or gender in children and adults. HR max = 220 − Age (y)"}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 479, "trecho": "HR max = 206.9 − 0.67 × Age (y)... This prediction equation, with a standard deviation of ±5 to ±8 beats per minute, independent of sex, BMI, and resting heart rate... For example, the above equation can estimate maximum heart rate for a 30-year-old man or woman: HR max = 206.9 − (0.67 × 30) = 187 b·min−1"}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 480, "trecho": "Method 2: Karvonen Method (Heart Rate Reserve)... HRmax = 208 − (0.7 × Age, y)... LL THR = (HRmax − HRrest) × 0.50 + HRrest... UL THR = (HRmax − HRrest) × 0.85 + HRrest. Example: Data: Male, age 55 years; HRrest = 60 b·min−1... LLTHR = 115 b·min−1... ULTHR = 154 b·min−1"}], "relacionadas": [{"id": "nota-0158", "tipo": "complementa", "justificativa": "fornece as fórmulas de FCmáx prevista e cálculo de zona que complementam a advertência de nota-0158 sobre interpretar FC em contexto"}], "confianca": 0.7, "status": "auto-aprovado", "body": "McArdle apresenta três fórmulas concorrentes para estimar a FCmáx prevista por idade, cada uma com desvio-padrão significativo (o erro individual de ±10 b·min⁻¹ é citado como pouco relevante para prescrição de treino em pessoas saudáveis, mas relevante para interpretação individual):\n\n1. **Clássica (220 − idade):** a mais usada popularmente, mas com viés documentado — superestima FCmáx em pessoas <40 anos e subestima em pessoas >40 anos.\n2. **Gellish et al. 2007 (206,9 − 0,67 × idade):** ajuste longitudinal que corrige o viés da fórmula clássica; desvio-padrão de ±5 a ±8 b·min⁻¹, independente de sexo, IMC e FC de repouso. Exemplo: para 30 anos, FCmáx = 206,9 − (0,67×30) = 187 b·min⁻¹.\n3. **Tanaka et al. 2001 (208 − 0,7 × idade):** usada como base do método de Karvonen no texto (ver abaixo).\n\nPara calcular a **zona de treino (training-sensitive zone)** a partir da FCmáx, o livro descreve dois métodos:\n\n**Método 1 — Percentage Method (percentual direto de FCmáx):** limite inferior (LLTHR) = FCmáx × 70% (60% para >60 anos); limite superior (ULTHR) = FCmáx × 90% (80% para >60 anos). Exemplo (homem, 55 anos, FCmáx=170): LLTHR = 170×0,70 = 119 b·min⁻¹; ULTHR = 170×0,90 = 153 b·min⁻¹.\n\n**Método 2 — Karvonen / Frequência Cardíaca de Reserva (HRR):** usa a diferença entre FCmáx e FC de repouso (FCR). LLTHR = (FCmáx − FCrepouso) × 0,50 + FCrepouso; ULTHR = (FCmáx − FCrepouso) × 0,85 + FCrepouso. O método de Karvonen produz valores de zona **mais altos** que o Percentage Method para a mesma pessoa. Exemplo (homem, 55 anos, FCrepouso=60, FCmáx=170 via Tanaka): LLTHR = (170−60)×0,50+60 = 115 b·min⁻¹; ULTHR = (170−60)×0,85+60 = 154 b·min⁻¹.\n\nNota de ajuste para natação/atividades de membros superiores: FCmáx nessas modalidades é, em média, ~13 b·min⁻¹ menor que em corrida/ciclismo (não aplicável a ciclismo, mas registrado para diferenciação de contexto).\n\nAplicação ao feedback: como o produto tem acesso direto a FC média/máx via Strava e (potencialmente) idade/FC de repouso do perfil do atleta, essas fórmulas permitem calcular zonas de treino por FC automaticamente. Prioridade sugerida: usar Gellish (206,9−0,67×idade) em vez da fórmula clássica (220−idade) por menor viés sistemático, e preferir o método de Karvonen (HRR) sobre o Percentage Method quando a FC de repouso do atleta estiver disponível, pois produz zonas mais individualizadas. Diferença notável: a mesma pessoa terá LLTHR/ULTHR mais altos pelo método de Karvonen do que pelo Percentage Method — o produto não deve misturar os dois métodos ao comparar zonas ao longo do tempo."},{"id": "nota-0272", "titulo": "VO2max cai 7-9% a cada 1000m de altitude acima de ~590m (não-linear acima de 6300m); mesmo aclimatizado, permanece ~2% menor a cada 300m acima de 1500m", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 608, "trecho": "Small declines in VO2max become noticeable at an altitude of 589 m (1932 ft). Thereafter, arterial desaturation decreases VO2max by 7 to 9% per 1000-m (3280-ft) altitude increase to 6300 m (20,700 ft), where aerobic capacity declines at a more rapid, nonlinear rate... For example, aerobic capacity at 4000 m (13,123 ft) averages 75% of the sea-level value. At 7000 m (22,965 ft), VO2max averages one half that at sea level."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 613, "trecho": "Even with acclimatization, VO2max decreases about 2% for every 300 m (984 ft) above 1500 m (4921 ft). A decrement in endurance-related performance parallels reduced aerobic capacity."}], "relacionadas": [{"id": "nota-0134", "tipo": "complementa", "justificativa": "nota-0134 tratava o ajuste por altitude apenas como princípio conceitual sem fórmula pronta; esta nota fornece a fórmula quantitativa de queda de VO2max por altitude que faltava"}], "confianca": 0.65, "status": "auto-aprovado", "body": "Fórmula/curva quantitativa de queda de VO2max por altitude (McArdle, baseada em regressão de 146 pontos de dados de 67 estudos civis e militares — Figura 24.9A), que preenche a lacuna deixada pela nota-0134 (que descrevia apenas o princípio conceitual sem fórmula):\n\n- Quedas mensuráveis de VO2max começam a ~589 m (1932 ft) de altitude.\n- Daí em diante, a dessaturação arterial reduz o VO2max em **7 a 9% a cada 1000 m** de altitude adicional, até ~6300 m.\n- Acima de 6300 m, a queda se torna **não-linear** (mais acentuada por metro adicional).\n- Exemplos de referência: a 4000 m, VO2max médio ≈ 75% do valor ao nível do mar; a 7000 m, ≈ 50% do valor ao nível do mar.\n- **Mesmo com aclimatização completa**, o VO2max não retorna ao valor de nível do mar: permanece **~2% menor a cada 300 m acima de 1500 m** de altitude residente — a aclimatização reduz o impacto agudo, mas não o elimina, porque a queda no débito cardíaco máximo (FC máxima e volume sistólico reduzidos) compensa apenas parcialmente o ganho hematológico.\n\nAplicação ao feedback: se o produto tiver acesso à altitude/elevação do local de uma atividade (dado de localização já presente no Strava, como mencionado na nota-0134), esta fórmula permite estimar quanto do VO2max/potência esperada de um atleta deve ser descontado para atividades feitas significativamente acima de ~600m, evitando interpretar uma queda de potência/NP em uma saída de montanha como perda de fitness. Mantido como `aplicacao: contexto` porque a fórmula é uma média de população heterogênea (estudos civis/militares, não ciclistas especificamente) e o Strava não fornece altitude de forma padronizada e limpa por atividade."},{"id": "nota-0273", "titulo": "Tempo de aclimatização à altitude: ~2 semanas até 2300m, +1 semana adicional a cada 610m de ganho, até 4600m; benefícios se dissipam em 2-3 semanas ao retornar", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "protocolo", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 608, "trecho": "As a broad guideline, it takes about 2 wk to adapt to altitudes up to 2300 m (7545 ft). Thereafter, each 610-m (2000-ft) altitude increase requires an additional week to fully acclimatize up to 4600 m (15,091ft)."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 600, "trecho": "Acclimatization adaptations dissipate within 2 or 3 wk after returning to sea level."}], "relacionadas": [{"id": "nota-0134", "tipo": "complementa", "justificativa": "fornece o cronograma temporal de aclimatização que faltava à nota-0134, que tratava altitude apenas como fator de ajuste de desempenho pontual"}, {"id": "nota-0272", "tipo": "complementa", "justificativa": "esta nota trata do tempo necessário para reduzir o impacto quantificado na nota-0272"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Cronograma de referência (McArdle) para o tempo necessário de aclimatização à altitude, como diretriz ampla (grande variabilidade individual existe):\n\n- **~2 semanas** para adaptar-se a altitudes de até 2300 m (7545 ft).\n- Daí em diante, **cada 610 m (2000 ft) adicionais de altitude exige mais 1 semana** de aclimatização, até 4600 m (15.091 ft).\n- Isso significa, por exemplo, que aclimatizar plenamente a ~3700 m (2300m + ~2×610m) levaria aproximadamente 4 semanas.\n- Aclimatização a altitudes muito altas (>4600m) requer 4 a 6 semanas segundo o resumo do capítulo.\n- **Os benefícios da aclimatização se dissipam em 2 a 3 semanas** após o retorno a uma altitude mais baixa/nível do mar — ou seja, é um investimento perecível, não permanente.\n- Atletas que desejam competir em altitude devem iniciar treino intenso imediatamente durante a aclimatização, para minimizar o destreinamento induzido pela tendência natural de reduzir atividade física nos primeiros dias em altitude.\n\nAplicação ao feedback: útil como conteúdo de planejamento de viagem/camp de treinamento para atletas que vão treinar ou competir em altitude significativa (>2000m) — não é executável a partir de uma única atividade do Strava, mas pode orientar recomendações de cronograma (quantos dias chegar antes de uma prova em altitude) quando o produto tiver informação da localização/altitude do evento-alvo do atleta."},{"id": "nota-0276", "titulo": "O limiar de altitude que já prejudica desempenho depende da duração do esforço: sem efeito abaixo de 2min, ~1600m para provas de 2-5min, apenas ~600-700m para provas de 20min+", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 609, "trecho": "Altitude exerts no adverse effect on events lasting less than 2 min. For longer-duration events, poorer performance occurs at higher elevations than at sea level. The threshold for decrements appears at about 1600 m (5250 ft) for events of 2 to 5 min, while only a 600- to 700-m (1970 to 2300 ft) altitude induces poorer performance in events longer than 20 min."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 611, "trecho": "At 4000 m (13,123 ft), the runners could train only at the intensity equivalent to 39% of sea-level VO2max compared with an intensity of 78% when training at sea level."}], "relacionadas": [{"id": "nota-0272", "tipo": "complementa", "justificativa": "nota-0272 quantifica a queda de VO2max por altitude; esta nota especifica em que duração de esforço essa queda começa a se manifestar como perda de desempenho"}], "confianca": 0.55, "status": "auto-aprovado", "body": "O impacto da altitude no desempenho depende fortemente da **duração do esforço**, porque eventos curtos dependem de vias energéticas anaeróbias (não afetadas por menor disponibilidade de oxigênio):\n\n- **Esforços < 2 minutos**: nenhum efeito adverso da altitude (energia vem de fosfatos de alta energia e glicólise, sistemas que não dependem de O2 disponível). Esportes de potência/sprint podem até melhorar ligeiramente em altitude moderada por menor densidade do ar (menor resistência aerodinâmica).\n- **Esforços de 2 a 5 minutos**: o limiar de altitude onde o desempenho começa a piorar é de **~1600 m**.\n- **Esforços acima de 20 minutos** (a maioria dos esforços relevantes em ciclismo de endurance): o limiar cai para apenas **~600-700 m** de altitude — ou seja, mesmo altitudes moderadas (comuns em muitas regiões de treino/prova) já prejudicam mensuravelmente o desempenho de endura
