senta a maior potência teoricamente sustentável sem perda contínua da homeostase metabólica. Diversos estudos sugerem que a Potência Crítica apresenta forte relação com o domínio severo do exercício. Embora frequentemente próxima ao MLSS, trata-se de um conceito matemático derivado da relação potência-tempo."}], "relacionadas": [{"id": "nota-0026", "tipo": "complementa", "justificativa": "reforça e recontextualiza fisiologicamente o modelo de Potência Crítica já registrado na nota-0026 do Livro 1, situando-o em relação ao MLSS/LT2 (nota-0172, nota-0174)"}], "confianca": 0.55, "status": "auto-aprovado", "body": "A Potência Crítica (CP) é definida no Manual como a maior potência teoricamente sustentável sem perda contínua de homeostase — um conceito matemático derivado da relação potência-tempo (já detalhado operacionalmente na nota-0026 do Livro 1), com forte relação com o domínio \"severo\" de intensidade (ver nota-0178). Está frequentemente próxima do MLSS, mas não é idêntica: um é um modelo matemático ajustado a dados de potência-duração, o outro é uma medida fisiológica direta (lactato estável).\n\nAplicação ao feedback: reforça, sem alterar, o uso já estabelecido da Potência Crítica no cânone (nota-0026) — a diferença conceitual entre CP/MLSS/FTP não muda a aplicação prática (todas aproximam a mesma \"zona\" de intensidade máxima sustentável), mas justifica por que pequenas discrepâncias entre esses três valores para o mesmo atleta são esperadas e não indicam erro de medição."},{"id": "nota-0022", "titulo": "Os sete níveis clássicos de treino por potência de Coggan (% FTP, % FTHR, RPE, durações típicas)", "dominio": "metricas-de-potencia", "camada": ["diario", "semanal", "mensal"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["potência-média", "FTP", "FC (média/máx)", "tempo-em-zona"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 61, "trecho": "TABLE 3.1 Power-Based Training Levels — Level | Description | % of FTP | % of FTHR | RPE | Typical Duration of Continuous Ride | Typical Duration of Interval Effort"}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 62, "trecho": "Seven levels was the minimum number needed to represent the full range of physiological responses and to adequately describe the different types of training required and used to meet the demands of competitive cycling."}, {"arquivo": "Manual treinamento.pdf", "pagina": 109, "trecho": "O sistema proposto por Andrew Coggan tornou-se um dos mais utilizados no ciclismo. Divide o treinamento em sete zonas: Zona 1 Recuperação ativa... Zona 7 Potência neuromuscular. Sprints máximos. Esse modelo tornou-se extremamente popular por sua simplicidade e aplicabilidade prática."}], "relacionadas": [{"id": "nota-0019", "tipo": "pre-requisito", "justificativa": "as zonas são definidas como percentual do FTP, definido na nota-0019"}, {"id": "nota-0024", "tipo": "complementa", "justificativa": "a coluna RPE da Tabela 3.1 usa a escala Borg CR10 detalhada na nota-0024"}, {"id": "nota-0178", "tipo": "alternativa-a", "justificativa": "o Manual treinamento.pdf (Fonte 2) propõe um modelo alternativo de 4 domínios fisiológicos (Moderado/Pesado/Severo/Extremo) baseado em LT1/LT2, descrevendo a mesma faixa de intensidades com granularidade e critério de corte diferentes"}], "confianca": 0.95, "status": "auto-aprovado", "body": "Tabela 3.1 do livro (Coggan's Classic Training Levels) — sete níveis de treino definidos como percentual do FTP (Functional Threshold Power) e do FTHR (frequência cardíaca no limiar funcional), com RPE (escala Borg CR10, 0–10) e durações típicas:\n\n| Nível | Descrição | % FTP | % FTHR | RPE | Duração contínua típica | Duração típica de intervalo |\n|---|---|---|---|---|---|---|\n| 1 | Active Recovery (recuperação ativa) | <55 | <68 | <2 | 30–90 min | N/A |\n| 2 | Endurance | 56–75 | 69–83 | 2–3 | 60–300 min | N/A |\n| 3 | Tempo | 76–90 | 84–94 | 3–4 | 60–180 min | N/A |\n| 4 | Lactate Threshold (limiar) | 91–105 | 95–105 | 4–5 | N/A | 8–30 min |\n| 5 | VO2max | 106–120 | >106 | 6–7 | N/A | 3–8 min |\n| 6 | Anaerobic Capacity | 121–150 | N/A | >7 | N/A | 30 s–3 min |\n| 7 | Neuromuscular Power | N/A | Maximal | Maximal | N/A | <30 s |\n\nNotas do próprio livro sobre a tabela: os percentuais de FTP/FTHR referem-se à potência/FC médias no limiar funcional; acima do Nível 4 a FC deixa de ser um guia confiável (esforços curtos demais para a FC estabilizar), por isso as colunas de %FTHR ficam \"N/A\" nos níveis 6 e 7.\n\nExemplo de cálculo (Tabela 3.4 do livro) para um atleta com FTP = 290 W: Nível 1 = 1–160 W, Nível 2 = 161–218 W, Nível 3 = 219–261 W, Nível 4 = 262–305 W, Nível 5 = 306–348 W, Nível 6 = 349–435 W, Nível 7 = sem teto definido (esforço máximo). Fórmula geral: limite do nível = FTP × percentual (ex.: 290 × 0,55 = 159,5 ≈ 160 W).\n\nAplicação ao feedback: dado o FTP do atleta e o tempo-em-zona/potência média de uma sessão, classificar a sessão (ou trechos dela) no nível correspondente permite interpretar o tipo de estímulo fisiológico predominante (ver nota-0023 sobre adaptações esperadas por nível)."},{"id": "nota-0185", "titulo": "Potência informa a carga externa (trabalho produzido); FC informa parte da carga interna (esforço fisiológico); RPE informa a resposta global — devem ser interpretadas de forma complementar, não substituindo uma à outra", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-média", "FC (média/máx)", "esforço-relativo (Relative Effort)"], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 111, "trecho": "Potência informa a carga externa. Frequência cardíaca informa parte da carga interna. Percepção subjetiva informa a resposta global do organismo. Cada variável fornece informações diferentes. O treinador moderno integra todas elas."}, {"arquivo": "Manual treinamento.pdf", "pagina": 108, "trecho": "potência também possui limitações. Ela informa quanto trabalho está sendo produzido. Não informa quanto esforço fisiológico foi necessário para produzi-lo. Por isso, potência e frequência cardíaca devem ser interpretadas de forma complementar."}], "relacionadas": [{"id": "nota-0158", "tipo": "complementa", "justificativa": "reforça, com uma distinção conceitual mais ampla (carga externa vs. interna), a cautela já registrada na nota-0158 sobre interpretar FC em contexto"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Distinção conceitual central para interpretação de dados de treino: potência mede a carga externa (trabalho mecânico objetivamente produzido, independente do estado fisiológico do atleta); FC mede parte da carga interna (resposta fisiológica ao esforço, influenciada por múltiplos fatores de contexto — ver nota-0158); percepção subjetiva de esforço (RPE) mede a resposta global e integrada do organismo (fadiga, dor, temperatura, estado psicológico, disponibilidade energética, motivação). Nenhuma substitui a outra — cada uma responde a uma pergunta diferente sobre a sessão.\n\nAplicação ao feedback: ao interpretar uma sessão, o produto deveria idealmente cruzar as três fontes de sinal disponíveis (potência = quanto trabalho foi feito; FC = quanto custou fisiologicamente, sujeito a confundidores; esforço-relativo do Strava = proxy de RPE integrado) em vez de usar apenas potência isoladamente — especialmente relevante para diferenciar uma sessão \"fácil na potência mas fisiologicamente cara\" (ex.: calor, desidratação, fadiga) de uma sessão genuinamente leve. Reforça a lógica já usada no Livro 1 para decoupling Pw:Hr (nota-0001) e VI (variabilidade de potência vs. FC)."},{"id": "nota-0191", "titulo": "Carga externa (trabalho prescrito/mensurável: potência, distância, kJ) vs. carga interna (resposta fisiológica: FC, lactato, RPE) — a adaptação segue uma curva dose-resposta com faixa ótima entre insuficiência e excesso", "dominio": "metricas-de-potencia", "camada": ["diario", "semanal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 141, "trecho": "Carga externa: representa o trabalho realizado (potência, velocidade, distância, tempo, desnível, repetições). Carga interna: representa a resposta do organismo ao trabalho realizado (FC, lactato, RPE, VFC, respostas hormonais)... Treinadores prescrevem carga externa. O organismo adapta-se à carga interna."}, {"arquivo": "Manual treinamento.pdf", "pagina": 143, "trecho": "A adaptação ao treinamento segue uma lógica semelhante à de um medicamento... Quando a carga é insuficiente, a adaptação tende a ser pequena. Quando é excessiva, aumenta o risco de fadiga crônica. Entre esses extremos existe uma faixa ótima de estímulo. Essa relação é conhecida como curva dose-resposta."}], "relacionadas": [{"id": "nota-0185", "tipo": "complementa", "justificativa": "formaliza, sob os termos 'carga externa/interna', a mesma distinção já registrada na nota-0185 (potência = carga externa, FC = carga interna)"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Carga de treinamento tem dois componentes: carga externa (trabalho objetivamente mensurável — potência, velocidade, distância, tempo, desnível, kJ) e carga interna (resposta fisiológica do organismo a esse trabalho — FC, lactato, RPE, VFC, hormônios). O treinador prescreve carga externa, mas é a carga interna que efetivamente determina a adaptação — por isso dois atletas na mesma potência podem ter respostas fisiológicas muito diferentes (fadiga acumulada, temperatura, hidratação, glicogênio, sono, estresse). A relação entre dose de treino e resposta adaptativa segue uma \"curva dose-resposta\": carga insuficiente gera pouca adaptação, carga excessiva aumenta risco de fadiga crônica — existe uma faixa ótima entre os dois extremos.\n\nAplicação ao feedback: reforça, com vocabulário formal, a lógica que já orienta o cruzamento potência/FC no cânone (nota-0185) e a lógica de CTL/ATL/TSB do Livro 1 (a \"faixa ótima de CTL\", nota-0088, e a \"taxa segura de ramp rate\", nota-0090, são operacionalizações práticas dessa curva dose-resposta)."},{"id": "nota-0194", "titulo": "TSS mede carga mecânica (externa) ponderada por intensidade — não mede fadiga, recuperação nem adaptação diretamente", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["TSS"], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 145, "trecho": "O TSS mede carga mecânica. Não mede fadiga. Nem recuperação. Muito menos adaptação. Ele representa apenas uma estimativa da carga externa ponderada pela intensidade."}], "relacionadas": [{"id": "nota-0062", "tipo": "complementa", "justificativa": "acrescenta uma ressalva importante de interpretação à definição operacional de TSS já registrada na nota-0062 do Livro 1"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Ressalva explícita: o TSS (Training Stress Score) quantifica apenas a carga externa (trabalho mecânico ponderado pela intensidade relativa ao FTP) — não é uma medida direta de fadiga, recuperação ou adaptação fisiológica real. Dois atletas podem acumular o mesmo TSS numa semana e ter respostas de fadiga/recuperação completamente diferentes, dependendo de fatores de carga interna (sono, nutrição, estresse, histórico).\n\nAplicação ao feedback: reforça uma cautela importante para o produto — TSS/CTL/ATL/TSB (já operacionalizados no Livro 1) descrevem a carga mecânica prescrita/realizada, não o estado fisiológico real do atleta. O feedback não deveria afirmar \"você está fadigado\" apenas com base em TSS acumulado alto; deveria idealmente cruzar com sinais de carga interna disponíveis (FC, esforço-relativo do Strava) antes de emitir alertas de fadiga, consistente com a lógica de decoupling e \"potência vs. FC\" já registrada nas notas 0158/0185/0191."},{"id": "nota-0212", "titulo": "'Performance VO2': taxa de consumo de O2 durante a prova real (a uma dada velocidade/potência), distinta do VO2máx — reflete a interação dinâmica entre metabolismo aeróbio e anaeróbio durante a competição", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 27, "trecho": "Performance VO2 refers to the rate of oxygen consumption during an endurance performance bout and is used as a practical estimation of actual metabolic energy production and ATP turnover. In other words, rather than your maximal VO2, performance VO2 is your rate of oxygen consumption during a competition, whilst you're running at various speeds or producing a certain power output."}], "relacionadas": [{"id": "nota-0164", "tipo": "complementa", "justificativa": "formaliza, com um nome próprio ('Performance VO2'), a distinção já reforçada na nota-0164 entre potencial aeróbio máximo (VO2máx) e a fração dele realmente utilizada durante a competição"}], "confianca": 0.5, "status": "auto-aprovado", "body": "\"Performance VO2\" é um conceito (não uma métrica padronizada com fórmula fixa) que descreve a taxa real de consumo de oxigênio durante uma prova/esforço competitivo — em contraste com o VO2máx (teto absoluto medido em teste). Reflete a interação dinâmica entre metabolismo aeróbio e anaeróbio ao longo da prova, servindo como estimativa prática da produção metabólica de energia real durante o desempenho, não do potencial máximo.\n\nAplicação ao feedback: não é diretamente mensurável a partir do Strava (exige medição de gases), mas é conceitualmente equivalente ao que a Potência Normalizada/IF já capturam de forma prática no cânone via potência (NP como proxy do \"custo metabólico real\" de uma sessão, já nota-0059/0061 do Livro 1) — reforça que a métrica prática relevante para o produto é a intensidade real sustentada (potência), não o teto teórico (VO2máx/FTP)."},{"id": "nota-0047", "titulo": "Os níveis de treino são um contínuo fisiológico, sem fronteira rígida entre eles", "dominio": "metodologia-e-periodizacao", "camada": ["diario", "semanal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 109, "trecho": "all the training levels are continuous: There is no definitive starting or stopping point for any of them... The physiological systems in the human body that you are training meld into one another; if you are training in Level 3, you are using a larger percentage of that particular system than you are using for other systems at that intensity, but that does not mean the other systems are unaffected."}], "relacionadas": [{"id": "nota-0022", "tipo": "complementa", "justificativa": "lembra que os cortes numéricos da Tabela 3.1 (nota-0022) são simplificações práticas de um contínuo fisiológico real"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Apesar dos 7 níveis de treino terem fronteiras percentuais bem definidas na Tabela 3.1 (nota-0022), os autores alertam que essa é uma simplificação prática — fisiologicamente, os sistemas de energia se misturam em um contínuo, sem um ponto exato onde um sistema \"liga\" e outro \"desliga\". Treinar no Nível 3, por exemplo, recruta predominantemente o sistema associado a esse nível, mas não deixa os demais sistemas completamente intocados.\n\nAplicação ao feedback: evitar linguagem excessivamente categórica ao classificar uma sessão em um único nível (\"isso foi 100% um treino de VO2máx e não treinou mais nada\") — é mais preciso falar em estímulo predominante daquele nível, reconhecendo sobreposição com sistemas vizinhos."},{"id": "nota-0088", "titulo": "Faixa \"ótima\" de CTL: 100-150 TSS/dia; limite superior observado em elite ~150-180", "dominio": "metodologia-e-periodizacao", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 228, "trecho": "the 'optimal' training load seems to lie at a CTL between 100 and 150 TSS per day... few, if any, athletes seem to be able to sustain a long-term average of more than 150 TSS per day."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 229, "trecho": "the hardest stages of such races [Tour de France] typically generate a TSS of 200-300... the highest continual CTL loads we have seen have been in riders at the Tour de France who can maintain a CTL between 150 and 160 for most of the year. After the Tour, they have a CTL of 170 to 180... a hypothetical genetic limit on CTL could be somewhere between 180 and 200."}], "relacionadas": [{"id": "nota-0083", "tipo": "pre-requisito", "justificativa": "usa o CTL definido na nota-0083"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Com base em observação de uma ampla variedade de atletas (ciclistas de pista amadores de elite, mountain bikers masters, profissionais de estrada), os autores relatam que a carga de treino \"ótima\" tende a ficar numa faixa de **CTL entre 100 e 150 TSS/dia**. Atletas com CTL abaixo de 100 costumam sentir que estão subtreinando (embora isso não garanta que treinar mais melhoraria a performance); poucos atletas conseguem sustentar uma média de longo prazo acima de 150 TSS/dia.\n\nReferência de topo de escala (elite mundial): ciclistas do Tour de France sustentam CTL de 150–160 durante boa parte do ano, chegando a 170–180 logo após o Tour; etapas mais difíceis do Tour geram TSS de 200–300 num único dia. Os autores especulam um \"limite genético hipotético\" de CTL em torno de 180–200.\n\nAplicação ao feedback: usar essa faixa (100-150) como referência de calibração ao avaliar se a carga crônica de um atleta está numa zona típica de treino sério, está baixa (subtreino) ou está excepcionalmente alta (nível próximo de elite mundial profissional)."},{"id": "nota-0089", "titulo": "Platô de CTL por 4-6 semanas (sem mudança de foco/performance) indica estagnação de treino", "dominio": "metodologia-e-periodizacao", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 229, "trecho": "a four- to six-week plateau in CTL during a time when the focus of training has not changed and performance is constant is generally evidence of training stagnation. Athletes in this situation might feel they are training well by being very consistent... but in fact this is not training at all. It is simply maintaining, because the overload principle is not being applied."}], "relacionadas": [{"id": "nota-0083", "tipo": "pre-requisito", "justificativa": "usa o CTL definido na nota-0083"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Um platô de CTL sustentado por 4 a 6 semanas — enquanto o foco do treino permanece o mesmo e a performance também não muda — costuma indicar estagnação do treino, não progresso. O atleta pode se sentir \"consistente\" repetindo os mesmos treinos, mas na prática está apenas mantendo a fitness atual, não desenvolvendo-a, porque o princípio de sobrecarga progressiva não está sendo aplicado.\n\nAplicação ao feedback: ao detectar CTL estável por várias semanas sem evolução correspondente de performance (ex.: FTP, Power Profile), sinalizar possível estagnação e sugerir progressão de carga (aumento de volume/intensidade) em vez de simplesmente repetir o padrão de treino atual."},{"id": "nota-0093", "titulo": "Modelo de impulso-resposta de Banister: origem teórica do CTL/ATL/TSB e por que os autores o simplificaram", "dominio": "metodologia-e-periodizacao", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 214, "trecho": "the vast majority has employed what is typically referred to as the 'impulse-response model,' first proposed by Dr. Eric Banister in 1975... Training is said to exert two opposing effects: (1) positive adaptations... (chronic), and (2) negative consequences of recent exercise bouts... (acute)."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 217, "trecho": "the impulse-response model assumes that there is no upper limit to performance... In reality, plateaus happen."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 218, "trecho": "performance would have to be directly measured between 20 and 200 times in total... Banister himself suggested revisiting the fit of the model to the data every 60 to 90 days, which would mean directly measuring an athlete's maximal performance ability at least every fourth day... obviously unrealistic."}], "relacionadas": [{"id": "nota-0083", "tipo": "pre-requisito", "justificativa": "o CTL/ATL/TSB (nota-0083, 0084, 0085) foram derivados como simplificação prática deste modelo"}], "confianca": 0.75, "status": "auto-aprovado", "body": "O CTL/ATL/TSB do Performance Manager Chart tem origem no modelo de impulso-resposta proposto por Eric Banister em 1975, amplamente usado em pesquisa esportiva (levantamento de peso, atletismo, natação, ciclismo, triatlo). O modelo trata o treino como uma função de transferência: doses diárias de treino (input) geram dois efeitos opostos — adaptação positiva (efeito crônico, de decaimento lento) e fadiga negativa (efeito agudo, de decaimento rápido) — cuja soma prevê a performance (output) a qualquer momento. O modelo original usa 4 parâmetros ajustáveis (ka, kf = fatores de ganho; τa, τf = constantes de tempo) e consegue explicar >70% (frequentemente >90%) da variação dia a dia de desempenho em vários esportes.\n\nLimitações que motivaram a criação do CTL/ATL/TSB simplificado: (1) o modelo é uma \"caixa-preta\" matemática, sem ligação clara a mecanismos fisiológicos específicos; (2) assume que não há teto para a performance (na prática, platôs acontecem); (3) exigiria entre 20 e 200 medições diretas de performance máxima para ajustar os 4 parâmetros com confiança estatística — Banister sugeriu reajustar o modelo a cada 60-90 dias, o que implicaria medir a performance máxima do atleta a cada 4 dias ou mais — inviável na prática fora de laboratório; (4) os fatores de ganho (ka, kf) variam muito entre estudos/indivíduos e são difíceis de estimar de forma confiável.\n\nOs autores resolveram esses problemas eliminando os fatores de ganho (ka, kf) do modelo e substituindo os termos integrais complexos por médias móveis exponenciais simples — dando origem ao CTL (nota-0083), ATL (nota-0084) e TSB (nota-0085). O preço dessa simplificação é que CTL/ATL/TSB são indicadores *relativos*, não preditores absolutos e precisos de performance como o modelo original pretendia ser."},{"id": "nota-0095", "titulo": "Protocolo Plano A/B/C: como ajustar a semana de treino conforme o dia da prova (sábado, domingo ou sem prova)", "dominio": "metodologia-e-periodizacao", "camada": ["semanal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["tempo-em-zona"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 267, "trecho": "Plan A is the plan Jill will follow if her race is on Saturday, while Plan B is the one she will use if the race is on Sunday. If she is just training through the weekend, she will follow Plan C."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 268, "trecho": "If you are racing on Saturday/Plan A: Thursday should be an easy ride to give yourself a rest two days before your race. Friday will be a tune-up workout to prep your legs for the hard effort on race day. If you are racing on Sunday/Plan B: Thursday will be an Endurance ride. Don't overdo it, but include some short bursts to keep your legs sharp. Friday will be an Active Recovery day and Saturday is the tune-up day to get your legs prepped for the race. If you are not racing/Plan C: Thursday will be an Endurance ride, with some short bursts to keep the legs sharp. Friday is for Active Recovery riding and Saturday is a solid Tempo ride with some shorter efforts."}], "relacionadas": [{"id": "nota-0048", "tipo": "complementa", "justificativa": "aplica os conceitos de zonas/tipos de treino já definidos, organizando-os na estrutura semanal conforme o calendário de provas"}], "confianca": 0.85, "status": "auto-aprovado", "body": "Os autores descrevem um protocolo de 3 variantes (\"Plan A\", \"Plan B\", \"Plan C\") para ajustar a estrutura da última parte da semana de treino conforme a agenda de provas do atleta:\n\n- **Plan A (prova no sábado):** quinta-feira é dia fácil (folga/recuperação, 2 dias antes da prova); sexta-feira é treino \"tune-up\" (ativação leve, específico) para preparar as pernas para o esforço da prova.\n- **Plan B (prova no domingo):** quinta-feira é ride de Endurance moderado, com alguns tiros curtos para manter as pernas \"afiadas\"; sexta-feira é Recuperação Ativa; sábado é o dia de \"tune-up\".\n- **Plan C (sem prova no fim de semana, treino normal):** quinta-feira é Endurance com tiros curtos; sexta-feira é Recuperação Ativa; sábado é Tempo sólido com esforços mais curtos; domingo é o \"long ride\" de Tempo da semana.\n\nAplicação ao feedback: este é um padrão útil para interpretar (ou recomendar) a estrutura dos últimos 2-3 dias antes de uma prova conhecida no calendário do atleta. Ao gerar feedback semanal, se houver uma prova marcada, o sistema pode comparar a sessão real da quinta/sexta-feira contra o padrão esperado do Plano A/B/C correspondente e sinalizar desvios (ex.: treino pesado demais 2 dias antes de uma prova de sábado)."},{"id": "nota-0098", "titulo": "Flexibilidade no momento da semana de recuperação: adiantar se muito fatigado, adiar se não; mas nunca pular", "dominio": "metodologia-e-periodizacao", "camada": ["semanal", "mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["TSS", "esforço-relativo (Relative Effort)"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 289, "trecho": "If you begin to feel that you are overly tired at the end of a hard week of training, it might be advantageous to move up a rest week. On the other side of the coin, it's okay to push back a scheduled rest week if you are not tired."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 290, "trecho": "Many times athletes do not push themselves hard enough; as soon as they get a little tired, they assume they are overtraining. Push through these periods to avoid limiting your performance potential... Do be sure to take the rest week in the week after it was scheduled."}], "relacionadas": [{"id": "nota-0090", "tipo": "complementa", "justificativa": "fornece a lógica qualitativa de ajuste de calendário que complementa os limites quantitativos de ramp rate de CTL (nota-0090) e o estado de overreaching (nota-0092)"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Regra prática dos autores para decidir o momento exato de uma semana de recuperação programada: se o atleta terminar uma semana dura sentindo-se **excessivamente fatigado**, é válido **adiantar** a semana de recuperação. Por outro lado, se o atleta chegar ao ponto programado **sem estar realmente cansado**, é válido **adiar** a semana de recuperação por mais alguns dias/semana — os autores alertam que atletas frequentemente confundem fadiga normal e leve com overtraining e param de se desafiar cedo demais.\n\nRestrição importante: se a semana de recuperação for adiada, ela **deve** ser cumprida na semana seguinte à originalmente programada — não pode simplesmente ser descartada.\n\nAplicação ao feedback: ao avaliar se um atleta \"pulou\" ou atrasou demais uma semana de recuperação planejada, este é o critério qualitativo dos autores — não é uma falha automática adiar por fadiga baixa, mas é um problema se a semana de recuperação nunca ocorre. Combinar com sinais objetivos de fadiga (TSB muito negativo por tempo prolongado, nota-0092) para diferenciar \"fadiga normal a ser superada\" de \"sinal real de overreaching\"."},{"id": "nota-0099", "titulo": "Evitar 'stacking' de treinos perdidos; critério para decidir se um treino perdido deve ser reposto", "dominio": "metodologia-e-periodizacao", "camada": ["semanal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["TSS", "tempo-em-zona"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 289, "trecho": "Another common trap is the temptation to force the plan. Some athletes do this by 'stacking' workouts to make up for missed sessions... Stacking Level 4 work, a long group ride and hills, and sprints all in the same day is a recipe for disaster... Packing all or most of the work into a few days will lead to illness or injury. If you miss a day, it's generally better to move on to the next workout. One caveat: If the workout you missed was highly specific, and you see that you will not be performing that workout again for at least two weeks, then you should try to make up the workout as soon as possible."}], "relacionadas": [{"id": "nota-0092", "tipo": "causal", "justificativa": "empilhar treinos perdidos é uma via direta para o estado de overreaching não funcional descrito na nota-0092"}], "confianca": 0.8, "status": "auto-aprovado", "body": "\"Stacking\" (termo cunhado pela treinadora Gale Bernhardt) é o padrão de comportamento em que o atleta, após perder treinos no meio da semana (geralmente por trabalho/vida pessoal), tenta compensar empilhando múltiplos treinos difíceis no mesmo dia ou em dias consecutivos no fim de semana. Os autores classificam isso como uma armadilha perigosa — \"receita para desastre\" — que aumenta risco de doença ou lesão pela concentração excessiva de carga em poucos dias.\n\nRegra de decisão recomendada quando um treino é perdido:\n1. **Regra geral:** simplesmente seguir para o próximo treino do plano (não tentar recuperar o que foi perdido).\n2. **Exceção:** se o treino perdido era altamente específico e não vai se repetir por pelo menos 2 semanas, vale a pena tentar repô-lo o quanto antes (mas não empilhado com outro treino difícil no mesmo dia).\n\nAplicação ao feedback: ao detectar múltiplos treinos de alta intensidade/TSS elevado concentrados em 1-2 dias após um período de baixa atividade na semana, isso é um padrão de risco (stacking) a ser sinalizado — especialmente se for um comportamento recorrente do atleta. Também serve para não penalizar automaticamente a ausência de reposição de um treino perdido: é o comportamento esperado/recomendado, exceto no caso da exceção acima."},{"id": "nota-0106", "titulo": "Assinatura de distribuição de tempo em zona por fase da temporada (base → construção → pico/corridas)", "dominio": "metodologia-e-periodizacao", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["tempo-em-zona"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 306, "trecho": "You may notice that the areas you train in shift throughout the season. In the off-season, you might spend more time in Level 2 (Endurance), for example, and as spring approaches, you might spend more time in Levels 3 (Tempo) and 4 (Lactate Threshold)."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 307, "trecho": "In this example, the rider spent the majority of his time in Levels 1, 2, and 3 (Active Recovery, Endurance, and Tempo), just building a base of fitness... the rider is now spending more time at Level 3 (Tempo) and also in Level 5 (VO2max) and Level 6 (Anaerobic Capacity)."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 310, "trecho": "By June, the amount of time he spends in Level 6 (Anaerobic Capacity) is really increasing... Also note the drastic increase in the amount of time that he spends in Level 1 (Active Recovery)... The chart for July shows how much racing influences the amount of time spent at or near FTP. The big step-down after Level 4 (Lactate Threshold) is clearly evident now."}], "relacionadas": [{"id": "nota-0048", "tipo": "pre-requisito", "justificativa": "usa as 7 zonas clássicas de Coggan (nota-0048 e correlatas) como base do cálculo de tempo-em-zona"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Padrão típico de evolução da distribuição de tempo-em-zona ao longo de uma temporada de treino (exemplo de caso real do livro):\n\n- **Base (inverno/entressafra):** predomínio de Níveis 1-3 (Recuperação Ativa, Endurance, Tempo) — construção de base aeróbia.\n- **Construção (primavera):** aumento de tempo em Nível 3 (Tempo), Nível 5 (VO2max) e Nível 6 (Capacidade Anaeróbia) à medida que a temporada de corridas se aproxima.\n- **Pré-competição intensa (ex.: junho no caso do livro):** forte aumento de Nível 6 (Capacidade Anaeróbia, relacionado a critériuns/corridas curtas) **e simultaneamente** de Nível 1 (Recuperação Ativa) — os dois sobem juntos porque mais intensidade exige mais recuperação entre esforços.\n- **Temporada de corridas (julho):** predomínio de tempo perto da FTP (Nível 4), com queda acentuada logo acima desse nível — mesmo um aumento de poucos pontos percentuais em Nível 4 pode representar carga crônica de treino significativa (ver ressalva do Cap.6 sobre \"tempo em zona\").\n\nAplicação ao feedback: comparar a distribuição real de tempo-em-zona do atleta num período contra esta assinatura esperada para a fase da temporada em que ele diz estar (base/construção/pico) pode servir como verificação de consistência — um atleta \"em fase de base\" com tempo desproporcional em Níveis 5-6, ou um atleta \"em pico de temporada\" ainda predominantemente em Nível 2, são desvios dignos de nota no feedback."},{"id": "nota-0115", "titulo": "Multiesporte: construir 3 Performance Manager Charts separados (bike, corrida, combinado) para entender contribuição de carga por esporte", "dominio": "metodologia-e-periodizacao", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 341, "trecho": "As a triathlete, you will need to make three Performance Manager Charts inside the TrainingPeaks WKO Software: a PMC just for cycling, a PMC just for running, and then a combination PMC to include both running and cycling. This will allow you to get a better understanding of which workouts in which sports give you the best results in peak fitness... and finally, which sport contributes the most to the overall picture for you as a percentage of training stress."}], "relacionadas": [{"id": "nota-0083", "tipo": "pre-requisito", "justificativa": "aplica o conceito de PMC/CTL-ATL-TSB (Cap.9) separadamente por esporte e de forma combinada"}, {"id": "nota-0114", "tipo": "pre-requisito", "justificativa": "requer rTSS (nota-0114) para computar a carga de treino da corrida na mesma escala do TSS de bike"}], "confianca": 0.7, "status": "auto-aprovado", "body": "Para atletas multiesportivos (ex.: triatletas), os autores recomendam construir **três** Performance Manager Charts (CTL/ATL/TSB) separados: um apenas com dados de ciclismo, um apenas com dados de corrida (usando rTSS, nota-0114), e um combinando os dois esportes. Comparar os três permite identificar: (a) quais treinos/esportes geram os melhores resultados de pico de forma; (b) em que esporte o atleta atinge maior carga de treino aguda; (c) em que fase do ano a carga de treino é maior; (d) qual esporte contribui mais, percentualmente, para a carga total de treino do atleta.\n\nAplicação ao feedback: para atletas com dados de múltiplos esportes no Strava, calcular CTL/ATL/TSB separadamente por esporte além do combinado. Isso evita que a carga de um esporte \"mascare\" a análise de fadiga/forma do outro — por exemplo, um TSB combinado neutro pode esconder um TSB de corrida muito negativo compensado por TSB de bike positivo."},{"id": "nota-0143", "titulo": "Síntese do Epílogo: os 8 passos do livro e a cadência de reteste de FTP a cada 6-8 semanas", "dominio": "metodologia-e-periodizacao", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 400, "trecho": "Step 1: Collect Data and Determine Your Threshold Power... Remember to repeat this test every six to eight weeks, or whenever you think your fitness has changed."}], "relacionadas": [{"id": "nota-0021", "tipo": "complementa", "justificativa": "reforça, no fechamento do livro, a cadência recomendada de reteste de FTP (nota-0021) como parte do ciclo geral de uso do medidor de potência"}], "confianca": 0.7, "status": "auto-aprovado", "body": "O Epílogo (p. 400-402) resume o livro em 8 passos, todos já cobertos em detalhe pelas notas dos capítulos anteriores (determinar FTP → definir zonas de treino → identificar pontos fortes/fracos via Power Profile/PDC → criar treinos → interpretar dados → usar ferramentas avançadas de análise → correr com o medidor de potência → fazer ajustes). Não introduz conceitos técnicos novos, mas reafirma explicitamente a recomendação de **retestar a FTP a cada 6-8 semanas, ou sempre que a forma física parecer ter mudado** — consistente com a cadência já registrada na nota-0021.\n\nAplicação ao feedback: reforça, como referência de fechamento do cânone deste livro, a regra de que o produto deveria sugerir reteste de FTP num intervalo de 6-8 semanas (ou com base em sinais de mudança de forma, como os identificados nas notas de TTE/PMC), e não confiar indefinidamente num valor de FTP antigo."},{"id": "nota-0023", "titulo": "Adaptações fisiológicas e de performance esperadas por nível de treino (Tabela 3.2)", "dominio": "metodologia-e-periodizacao", "camada": ["semanal", "mensal"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["potência-média", "tempo-em-zona"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 61, "trecho": "TABLE 3.2 Expected Physiological and Performance Adaptations for Levels 1–7... Note: The plus signs represent the magnitude of adaptation for a given \"dose\" of training. The more plus signs, the greater the adaptation."}], "relacionadas": [{"id": "nota-0022", "tipo": "pre-requisito", "justificativa": "usa a mesma definição de níveis 1-7 da Tabela 3.1 (nota-0022)"}], "confianca": 0.9, "status": "auto-aprovado", "body": "Tabela 3.2 do livro relaciona cada nível de treino (1–7, definidos na nota-0022) com a magnitude esperada de cada adaptação fisiológica (escala qualitativa de + a ++++, quanto mais sinais, maior a adaptação para uma dada \"dose\" de treino):\n\n- **Aumento do volume plasmático**: pico em Nível 4 (++++), forte em Nível 3 e 5 (++/+++)\n- **Aumento de enzimas mitocondriais musculares**: pico em Nível 4 (++++)\n- **Aumento do limiar de lactato**: pico em Nível 4 (++++)\n- **Aumento do estoque de glicogênio muscular**: pico em Nível 3 (++++)\n- **Hipertrofia de fibras de contração lenta**: pico em Nível 5 (+++)\n- **Aumento da capilarização muscular**: pico em Nível 5 (+++)\n- **Interconversão de fibras rápidas (Tipo IIx → Tipo IIa)**: pico em Nível 3 (+++)\n- **Aumento do volume sistólico/débito cardíaco máximo**: pico em Nível 5 (++++)\n- **Aumento do VO2máx**: pico em Nível 5 (++++)\n- **Aumento de estoques de fosfato de alta energia muscular (ATP/PCr)**: só em Níveis 6–7, pico no 7 (++)\n- **Aumento da capacidade anaeróbia (\"tolerância a lactato\")**: pico em Nível 6 (+++)\n- **Hipertrofia de fibras rápidas**: só em Níveis 6–7, pico no 7 (++)\n- **Aumento da potência neuromuscular**: só em Níveis 6–7, pico no 7 (+++)\n\nPadrão geral: Níveis 2–5 dominam as adaptações aeróbias/metabólicas (plasma, mitocôndria, limiar, glicogênio, VO2máx), com pico de intensidade de adaptação por volta do Nível 4 (limiar) e 5 (VO2máx); Níveis 6–7 dominam adaptações anaeróbias/neuromusculares (fosfatos de alta energia, fibras rápidas, potência neuromuscular).\n\nAplicação ao feedback: ao identificar uma lacuna de fitness do atleta (ex.: baixo VO2máx, baixa capacidade anaeróbia), esta tabela justifica em qual nível/zona concentrar o treino prescrito para gerar a adaptação-alvo específica."},{"id": "nota-0100", "titulo": "Protocolo dos 10 passos para implementar um plano de treino baseado em potência", "dominio": "metodologia-e-periodizacao", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-média", "FTP", "TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 290, "trecho": "HOW TO SUCCESSFULLY IMPLEMENT A POWER-BASED TRAINING PLAN: 1. Find your functional threshold power... 2. Use your FTP to establish your training levels. 3. Try out sample workouts and collect data on your power meter. 4. Understand your data and what the charts/graphs are telling you. 5. Use your Power Profile, Power Duration Curve, and Quadrant Analysis to pinpoint your strengths and weaknesses. 6. Assess your time constraints. 7. Develop a power-based training plan that targets the improvements you need to reach your goal. 8. Review your power data regularly for feedback on your training. 9. Adjust your FTP and training levels as your fitness progresses. 10. Refine your plan as needed to get additional rest or adaptation."}], "relacionadas": [{"id": "nota-0001", "tipo": "complementa", "justificativa": "consolida em sequência os conceitos centrais (FTP, zonas, Power Profile, PDC, Quadrant Analysis) já detalhados individualmente em notas anteriores"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Síntese dos autores, ao final do capítulo sobre planos de treino, do fluxo de trabalho completo para um atleta implementar treino baseado em potência:\n\n1. Determinar a FTP (teste, ver protocolos já registrados).\n2. Usar a FTP para estabelecer as zonas/níveis de treino.\n3. Experimentar treinos-modelo e coletar dados no medidor de potência.\n4. Entender os dados e o que os gráficos estão mostrando.\n5. Usar Power Profile, Curva de Duração de Potência (PDC) e Quadrant Analysis para identificar pontos fortes e fracos.\n6. Avaliar as restrições de tempo disponível do atleta.\n7. Desenvolver um plano de treino baseado em potência voltado às melhorias necessárias para o objetivo.\n8. Revisar os dados de potência regularmente como feedback do treino.\n9. Ajustar a FTP e as zonas de treino conforme a forma física evolui.\n10. Refinar o plano conforme necessário para obter descanso ou adaptação adicional.\n\nAplicação ao feedback: este é essencialmente o \"loop\" macro que o produto de IA deveria espelhar em nível de produto — não é uma regra de interpretação de um treino isolado, mas o ciclo geral (testar → definir zonas → coletar dados → identificar pontos fortes/fracos → planejar → revisar → reajustar). Útil como referência estrutural para o desenho do fluxo de feedback do produto, especialmente os passos 8-10 (revisão contínua e reajuste de FTP/zonas), que mapeiam diretamente para a cadência de recálculo de FTP já coberta em notas anteriores."},{"id": "nota-0129", "titulo": "Receita genérica de 4 passos para usar o medidor de potência em qualquer modalidade de ciclismo", "dominio": "metodologia-e-periodizacao", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-média"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 377, "trecho": "In any sport, a great recipe for properly utilizing a power meter is to: 1. Determine the demands of the event by recording the power data and the effort that it takes to complete the event successfully. 2. Understand your strengths and weaknesses relative to the demands of the event. 3. Train for both the demands of the event and your weaknesses... 4. Review the results of those training sessions and compare them with data collected in races."}], "relacionadas": [{"id": "nota-0100", "tipo": "complementa", "justificativa": "versão mais genérica e enxuta do protocolo de 10 passos (nota-0100), aplicável a qualquer modalidade (não só estrada)"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Fórmula geral, aplicável a qualquer modalidade de ciclismo (estrada, ciclocross, pista, MTB ultraresistência), para usar o medidor de potência de forma eficaz:\n\n1. **Determinar as demandas do evento** — registrar dados de potência do próprio evento/prova-alvo para entender exatamente o esforço necessário para completá-lo com sucesso.\n2. **Entender pontos fortes e fracos** em relação a essas demandas específicas.\n3. **Treinar tanto as demandas do evento quanto os pontos fracos** (desde que esses pontos fracos possam de fato impactar o desempenho no evento).\n4. **Revisar os resultados** dos treinos e compará-los com os dados coletados em provas reais.\n\nAplicação ao feedback: este é o framework mínimo que qualquer módulo de análise por modalidade do produto deveria seguir — antes de recomendar treinos, primeiro caracterizar as demandas reais da prova-alvo do atleta (via histórico de provas anteriores, se disponível) em vez de aplicar recomendações genéricas de ciclismo de estrada a modalidades com demandas muito diferentes (ciclocross, pista, MTB ultraresistência)."},{"id": "nota-0149", "titulo": "As quatro perguntas do treinador: framework de decisão para toda prescrição de treino", "dominio": "metodologia-e-periodizacao", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 11, "trecho": "praticamente todas as decisões de treinamento podem ser resumidas a quatro perguntas: 1. O que limita a performance deste atleta? 2. Como essa limitação pode ser medida? 3. Qual adaptação fisiológica deve ser desenvolvida? 4. Qual estratégia de treinamento apresenta maior probabilidade de produzir essa adaptação?"}], "relacionadas": [], "confianca": 0.6, "status": "auto-aprovado", "body": "O Manual propõe que toda decisão de treinamento pode ser reduzida a uma sequência de 4 perguntas: (1) o que limita a performance deste atleta especificamente; (2) como essa limitação pode ser medida; (3) qual adaptação fisiológica precisa ser desenvolvida para superá-la; (4) qual estratégia de treino tem maior probabilidade de produzir essa adaptação. O capítulo também enfatiza uma visão sistêmica da performance: nenhum determinante (fisiológico, biomecânico, psicológico, técnico-tático, ambiental, equipamento) atua isoladamente, e otimizar uma variável isoladamente pode prejudicar outra (ex.: reduzir massa corporal favorece relação potência/peso mas pode comprometer recuperação se excessivo).\n\nAplicação ao feedback: nota de contexto/framework, não gera regra de interpretação direta de dados Strava. Serve como lente organizadora para o produto — ao identificar uma limitação (ex.: via detectores de fadiga, TSB, distribuição de zonas), o feedback deveria idealmente seguir essa cadeia lógica (limitação → métrica → adaptação-alvo → recomendação), em vez de dar dicas desconectadas do diagnóstico."},{"id": "nota-0178", "titulo": "Modelo de quatro domínios de intensidade fisiológica (Moderado / Pesado / Severo / Extremo), delimitados por LT1 e LT2 — modelo alternativo aos sete níveis de Coggan do Livro 1", "dominio": "metodologia-e-periodizacao", "camada": ["diario", "semanal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 86, "trecho": "Domínio Moderado: Abaixo do LT1. Homeostase mantida. Grande utilização de gordura. Baixa fadiga. Domínio Pesado: Entre LT1 e LT2... Domínio Severo: Acima do LT2. Não existe estado estável. VO₂ continua aumentando. Fadiga inevitável. Domínio Extremo: Intensidades máximas. Predomínio dos sistemas anaeróbios. Tempo de sustentação muito reduzido."}], "relacionadas": [{"id": "nota-0022", "tipo": "alternativa-a", "justificativa": "modelo fisiológico de 4 domínios (baseado em LT1/LT2) descreve a mesma faixa de intensidades que os 7 níveis práticos de Coggan (%FTP) do Livro 1, mas com granularidade e critério de corte diferentes — ambos válidos, não conflitantes, mas não diretamente intercambiáveis"}], "confianca": 0.55, "status": "auto-aprovado", "body": "O Manual propõe um modelo fisiológico de 4 domínios de intensidade, delimitados pelos limiares LT1 e LT2 (nota-0171, nota-0172): Moderado (abaixo do LT1 — homeostase mantida, predomínio de gordura, baixa fadiga, sustentável por horas); Pesado (entre LT1 e LT2 — estado relativamente estável, maior uso de carboidrato, sustentável por longo período); Severo (acima do LT2 — sem estado estável, VO2 continua subindo, fadiga inevitável em minutos); Extremo (intensidades máximas — predomínio anaeróbio, sustentação muito curta). Esse modelo de 4 domínios é academicamente mais simples e fisiologicamente mais direto que os 7 níveis práticos de Coggan (%FTP/%FTHR) usados no Livro 1 (nota-0022) — ambos descrevem a mesma realidade fisiológica contínua, mas com número de categorias e critérios de corte diferentes (limiares de lactato vs. percentual de FTP). Não são contraditórios, mas não há um mapeamento 1:1 exato entre eles (ex.: o domínio \"Pesado\" do Manual abrange aproximadamente os Níveis 2-3-parte do 4 de Coggan).\n\nAplicação ao feedback: registrar como referência conceitual complementar — o produto deve manter os 7 níveis de Coggan (nota-0022) como sistema operacional primário (por ser diretamente calculável a partir de %FTP, já derivável do Strava), mas pode usar a linguagem dos domínios fisiológicos (moderado/pesado/severo/extremo) em explicações educativas para o usuário, já que é mais intuitiva. Par de modelos concorrentes registrado em `_revisao/modelos-concorrentes/` para decisão consciente de qual usar como padrão operacional."},{"id": "nota-0184", "titulo": "Modelo de três zonas de Seiler (base do treinamento polarizado): Zona 1 <LT1, Zona 2 entre LT1-LT2, Zona 3 >LT2 — usado na maioria das pesquisas sobre distribuição polarizada de intensidade", "dominio": "metodologia-e-periodizacao", "camada": ["semanal", "mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 110, "trecho": "Stephen Seiler propôs uma abordagem diferente. Em vez de sete zonas, utiliza apenas três grandes domínios fisiológicos. Zona 1: Abaixo do LT1. Zona 2: Entre LT1 e LT2. Zona 3: Acima do LT2. Essa divisão simplifica o treinamento e possui forte relação com a fisiologia dos limiares. Grande parte das pesquisas sobre treinamento polarizado utiliza esse modelo."}], "relacionadas": [{"id": "nota-0022", "tipo": "alternativa-a", "justificativa": "modelo simplificado de 3 zonas (Seiler), usado na literatura de treinamento polarizado, versus os 7 níveis práticos de Coggan (%FTP) do Livro 1 — ambos válidos, granularidades diferentes"}, {"id": "nota-0178", "tipo": "complementa", "justificativa": "o modelo de 3 zonas de Seiler é essencialmente os domínios Moderado/Pesado/Severo (nota-0178), sem o domínio Extremo separado"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Stephen Seiler propôs um modelo simplificado de apenas 3 zonas, base da maior parte das pesquisas sobre distribuição polarizada de intensidade: Zona 1 (abaixo do LT1), Zona 2 (entre LT1 e LT2), Zona 3 (acima do LT2). É essencialmente equivalente aos domínios Moderado/Pesado/Severo já registrados na nota-0178 (sem o domínio Extremo separado). O Manual também confirma explicitamente que o modelo de Coggan usado no Livro 1 (nota-0022) é \"um dos mais utilizados no ciclismo\" — ou seja, não há conflito entre as fontes quanto ao modelo de 7 zonas, apenas a adição deste modelo alternativo mais simples usado especificamente na literatura de polarização.\n\nAplicação ao feedback: se o produto algum dia implementar lógica de \"distribuição polarizada de intensidade\" (ex.: razão 80/20 entre volume em baixa e alta intensidade), o modelo de 3 zonas de Seiler é a referência padrão da literatura para essa classificação — mapeável a partir de %FTP usando aproximadamente Zona 1 = Níveis 1-2 de Coggan, Zona 2 = Níveis 3-4, Zona 3 = Níveis 5-7 (aproximação, sem correspondência exata publicada)."},{"id": "nota-0186", "titulo": "Cinco princípios da adaptação ao treinamento: sobrecarga, especificidade, progressão, reversibilidade, individualidade", "dominio": "metodologia-e-periodizacao", "camada": ["semanal", "mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 116, "trecho": "Sobrecarga: o estímulo precisa ser suficiente para perturbar a homeostase... Especificidade: o organismo adapta-se exatamente ao estímulo recebido... Progressão: à medida que o atleta adapta-se, novos estímulos tornam-se necessários... Reversibilidade: adaptações fisiológicas diminuem quando o treinamento é interrompido... Individualidade: dois atletas submetidos ao mesmo treinamento dificilmente apresentarão exatamente a mesma resposta."}], "relacionadas": [], "confianca": 0.55, "status": "auto-aprovado", "body": "Cinco princípios fisiológicos que regem qualquer método de treinamento: (1) Sobrecarga — o estímulo precisa perturbar a homeostase o suficiente para gerar adaptação, mas excesso aumenta risco de overreaching; (2) Especificidade — o organismo se adapta exatamente ao estímulo recebido (treino de potência máxima ≠ treino de endurance); (3) Progressão — estímulos precisam aumentar (volume, intensidade, frequência ou complexidade) à medida que o atleta se adapta; (4) Reversibilidade — adaptações regridem quando o treino é interrompido, em velocidades diferentes por capacidade; (5) Individualidade — a mesma sessão produz respostas diferentes em atletas diferentes.\n\nAplicação ao feedback: framework de referência geral (SAID/FITT) — não gera regra de interpretação direta de um dado isolado do Strava, mas justifica por que o feedback do produto deveria considerar histórico/progressão do atleta (não comparar sessões isoladas sem contexto) e por que perda de forma após períodos sem treino (detectável via queda de CTL/TSB, já no cânone do Livro 1) é esperada e não anômala."},{"id": "nota-0188", "titulo": "Hierarquia da periodização: Macrociclo (temporada/plurianual) > Mesociclo (3-6 semanas, objetivo específico) > Microciclo (~1 semana, unidade prática de planejamento)", "dominio": "metodologia-e-periodizacao", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 125, "trecho": "Macrociclo: representa o planejamento de longo prazo... Mesociclo: conjunto de semanas com um objetivo específico... Normalmente possui duração entre três e seis semanas. Microciclo: corresponde à organização semanal do treinamento... É a unidade prática do planejamento."}], "relacionadas": [], "confianca": 0.55, "status": "auto-aprovado", "body": "Terminologia hierárquica padrão da periodização esportiva: Macrociclo (temporada completa, podendo abranger ciclos plurianuais) → Mesociclo (bloco de 3-6 semanas com objetivo fisiológico específico, ex.: desenvolvimento aeróbio, aumento de VO2máx, preparação competitiva) → Microciclo (organização semanal prática, onde se distribuem sessões intensas, regenerativas, força, técnica e descanso).\n\nAplicação ao feedback: fornece vocabulário/estrutura temporal de referência para qualquer feedback de \"camada mensal\" do produto (ex.: análise de fase da temporada, já prevista na taxonomia como camada `mensal`) — não gera regra de interpretação de dado isolado, mas organiza a escala temporal em que outras notas (CTL/ATL/TSB, distribuição de zonas por fase) se aplicam."},{"id": "nota-0189", "titulo": "Periodização clássica de Matveyev (Preparatório → Competitivo → Transição) vs. Periodização em blocos (Verkhoshansky/Issurin: blocos especializados sequenciais) — modelos alternativos, escolha depende do calendário/nível do atleta", "dominio": "metodologia-e-periodizacao", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 126, "trecho": "A periodização clássica foi proposta por Lev Matveyev, na década de 1960. Seu modelo divide a temporada em três grandes fases: Período Preparatório (construção da base)... Período Competitivo (transformar capacidades em desempenho)... Período de Transição (recuperação física e psicológica)."}, {"arquivo": "Manual treinamento.pdf", "pagina": 127, "trecho": "Desenvolvida principalmente por Yuri Verkhoshansky e posteriormente expandida por Vladimir Issurin, a periodização em blocos propõe concentrar estímulos semelhantes em períodos relativamente curtos. Em vez de desenvolver todas as capacidades simultaneamente, trabalha-se com blocos especializados: bloco de força; bloco aeróbio; bloco de VO₂máx; bloco competitivo."}], "relacionadas": [], "confianca": 0.55, "status": "auto-aprovado", "body": "Dois modelos clássicos de periodização, ambos válidos e não mutuamente exclusivos (muitos treinadores usam modelos híbridos): (1) Periodização clássica (Matveyev, anos 1960) — divide a temporada em 3 fases sequenciais: Preparatório (grande volume, baixa intensidade relativa, desenvolvimento geral da base), Competitivo (redução de volume, aumento de especificidade, manutenção de adaptações), Transição (recuperação física/psicológica, redução significativa de carga); (2) Periodização em blocos (Verkhoshansky, expandida por Issurin) — concentra estímulos semelhantes em blocos curtos especializados sequenciais (bloco de força → bloco aeróbio → bloco de VO2máx → bloco competitivo), em vez de desenvolver todas as capacidades simultaneamente; mais usada em atletas de alto rendimento. A escolha entre os modelos depende do calendário competitivo, nível do atleta, tempo disponível e modalidade.\n\nAplicação ao feedback: nomeia e formaliza modelos que provavelmente já influenciam implicitamente a lógica de fases de temporada do produto (via distribuição de zonas por fase, já no Livro 1 nota-0106) — útil como vocabulário de referência caso o feedback do produto precise identificar/nomear em que fase/modelo de periodização o plano do atleta se encaixa. Não gera regra de interpretação direta de dado do Strava."},{"id": "nota-0190", "titulo": "Sequenciamento de estímulos no microciclo: sessões complexas/intensas quando o atleta está descansado; evitar sobreposição de estímulos semelhantes em dias consecutivos", "dominio": "metodologia-e-periodizacao", "camada": ["semanal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["tempo-em-zona", "tempo-decorrido"], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 135, "trecho": "Treinos de VO₂máx realizados após longa sessão extenuante tendem a apresentar menor qualidade... Entre os princípios mais utilizados destacam-se: qualidade antes da quantidade; maior complexidade quando o atleta está descansado; recuperação ativa após sessões muito exigentes; evitar sobreposição excessiva de estímulos semelhantes."}], "relacionadas": [], "confianca": 0.5, "status": "auto-aprovado", "body": "Princípios de sequenciamento de sessões dentro da semana: sessões de maior complexidade/intensidade (ex.: VO2max, força) devem ser realizadas quando o atleta está descansado, não após sessões longas/extenuantes; priorizar qualidade sobre quantidade; inserir recuperação ativa após sessões muito exigentes; evitar empilhar estímulos semelhantes (ex.: dois treinos de VO2max) em dias consecutivos.\n\nAplicação ao feedback: o produto pode usar esse princípio para sinalizar padrões subótimos no histórico do atleta — ex.: um intervalado de alta intensidade agendado/realizado no dia seguinte a uma sessão muito longa ou outro intervalado intenso pode ser sinalizado como sequenciamento potencialmente subótimo (risco de qualidade reduzida do estímulo), desde que o produto tenha acesso ao histórico de sessões consecutivas via Strava."},{"id": "nota-0192", "titulo": "TRIMP (Training Impulse, Banister): quantifica carga interna combinando duração e intensidade baseada em FC — útil quando não há medidor de potência", "dominio": "metodologia-e-periodizacao", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 144, "trecho": "Um dos primeiros métodos amplamente utilizados para quantificar carga interna foi o TRIMP (Training Impulse), proposto por Eric Banister. O método combina: duração; intensidade baseada na frequência cardíaca. Quanto maior o tempo e maior a intensidade, maior será o TRIMP da sessão. Apesar de suas limitações, permanece uma ferramenta útil quando medidores de potência não estão disponíveis."}], "relacionadas": [{"id": "nota-0062", "tipo": "alternativa-a", "justificativa": "TRIMP (baseado em FC/duração) é um método concorrente/antecessor histórico do TSS (baseado em potência/FTP, nota-0062 do Livro 1) para quantificar carga de treino — mesmo objetivo, entradas diferentes"}], "confianca": 0.5, "status": "auto-aprovado", "body": "TRIMP (Training Impulse), proposto por Eric Banister, foi um dos primeiros métodos amplamente usados para quantificar carga interna de treino, combinando duração da sessão e intensidade baseada em FC (não em potência). O Manual não fornece a fórmula matemática exata de Banister (apenas descreve o princípio: maior tempo e maior intensidade → maior TRIMP), citando-o como precursor histórico do TSS, útil especificamente quando o atleta não possui medidor de potência (só FC).\n\nAplicação ao feedback: relevante apenas como fallback conceitual para usuários do Strava sem medidor de potência (que só têm dados de FC/tempo) — hoje o produto usa TSS (via potência/FTP, nota-0062) como padrão; o TRIMP poderia servir de método alternativo de quantificação de carga para sessões sem dados de potência, mas o cânone não fornece a fórmula exata de Banister, então não deve ser implementado sem essa fórmula ser localizada em fonte adicional."},{"id": "nota-0247", "titulo": "Protocolo de polimento (taper): redução exponencial de volume de 40-60% por 1-3 semanas mantendo a intensidade produz ganho de desempenho de 0,5 a 6,0%", "dominio": "metodologia-e-periodizacao", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["TSS", "tempo-movimento", "IF"], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 486, "trecho": "A 1- to 3-wk taper that exponentially reduces training volume by 40 to 60%, while maintaining training intensity, provides the most efficient strategy to maximize performance gains. A 4- to 7-day taper should provide sufficient time for maximum muscle and liver glycogen replenishment, optimal nutritional support and restoration, alleviation of residual muscle soreness, and healing of minor injuries."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 486, "trecho": "An optimal taper should include progressive reductions in training volume while maintaining training intensity at a moderate-to-high level. With proper tapering, expected performance improvement usually ranges between 0.5 and 6.0%. Tapering does not associate with substantial changes in exercise-induced oxidative stress."}], "relacionadas": [{"id": "nota-0090", "tipo": "complementa", "justificativa": "nota-0090 trata do ramp rate de aumento seguro de CTL; esta nota trata do lado oposto do ciclo — a redução deliberada de volume (taper) antes de competição"}], "confianca": 0.65, "status": "revisar", "body": "McArdle resume evidência sobre o período de polimento (taper) pré-competitivo: um taper de **1 a 3 semanas** que reduz o volume de treino de forma **exponencial em 40 a 60%**, mantendo a **intensidade** em nível moderado a alto, representa a estratégia mais eficiente para maximizar ganhos de desempenho. Um taper de **4 a 7 dias** já é suficiente para permitir reposição máxima de glicogênio muscular e hepático, suporte nutricional ótimo, alívio de dor muscular residual e cicatrização de pequenas lesões.\n\nResultado esperado: melhora de desempenho de **0,5 a 6,0%** com polimento adequado. O taper não está associado a mudanças substanciais no estresse oxidativo induzido pelo exercício.\n\nAchado complementar (mesma seção, mesmo estudo com corredores): comparando repouso total, corrida de baixa intensidade (60% VO2máx) e corrida de alta intensidade com volume reduzido durante o taper, a condição de **alta intensidade com volume reduzido** produziu os melhores resultados (maior volume plasmático, massa de hemácias, conteúdo de glicogênio muscular, atividade mitocondrial e desempenho em prova de 1500m) — reforçando que **reduzir volume enquanto mantém intensidade** supera reduzir ambos ou apenas descansar.\n\nPouca melhora ocorre nos sistemas aeróbios durante a temporada competitiva propriamente dita; o objetivo do treino nessa fase é evitar deterioração fisiológica e de desempenho, não gerar novos ganhos — o taper é a ferramenta para \"colher\" as adaptações já acumuladas.\n\nAplicação ao feedback: regra acionável na camada mensal ao se aproximar de uma competição-alvo — verificar se o TSS/volume (tempo-movimento) semanal está sendo reduzido em 40-60% na semana(s) final(is) antes do evento, enquanto o IF médio das sessões remanescentes permanece moderado a alto (não caindo junto com o volume). Se o atleta mantém volume alto até poucos dias antes da prova, ou reduz intensidade junto com volume, o feedback pode sinalizar que o padrão de taper não corresponde ao protocolo com melhor evidência de ganho de desempenho (0,5-6,0%)."},{"id": "nota-0249", "titulo": "Treino concorrente: sessão de endurance intensa inibe o desempenho de força na sessão subsequente — recomenda-se 20-30 min de recuperação entre componentes aeróbio e de força", "dominio": "metodologia-e-periodizacao", "camada": ["diario", "semanal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 515, "trecho": "Debate concerns whether concurrent resistance and aerobic training yields less muscular strength and power improvement than training for strength only. [...] A short-term bout of intense endurance activity also inhibits performance in subsequent muscular strength activities. Further research must determine whether this acute effect on maximal force output limits ability to overload skeletal muscle optimally to a degree that impairs strength development with concurrent strength and endurance training. If it does, then a 20- to 30-min recovery between aerobic and strength-training components might enhance the quality of the subsequent strength workout."}], "relacionadas": [{"id": "nota-0187", "tipo": "complementa", "justificativa": "nota-0187 recomenda treino de força para ciclistas focado em capacidade neuromuscular; esta nota adiciona uma ressalva prática sobre como sequenciar/espaçar essa sessão de força em relação ao treino de bike no mesmo dia"}], "confianca": 0.5, "status": "revisar", "body": "Existe debate na literatura sobre se o treino concorrente (resistência + aeróbio) produz menor ganho de força e potência muscular do que treinar apenas força. Parte da evidência aponta para mecanismos moleculares antagônicos entre os dois modos de exercício em nível de sinalização intracelular, que poderiam prejudicar a resposta adaptativa do músculo ao treino de força; o treino de endurance também pode inibir a sinalização para a maquinaria de síntese proteica muscular.\n\nMais diretamente relevante: um **bout agudo de atividade de endurance intensa inibe o desempenho em atividades de força subsequentes na mesma sessão**. Como ainda não está definido se esse efeito agudo sobre a produção máxima de força limita a capacidade de sobrecarregar o músculo de forma ótima a ponto de prejudicar o desenvolvimento de força a longo prazo, os autores sugerem como precaução prática: **20 a 30 minutos de recuperação entre os componentes aeróbio e de força** de uma sessão combinada, o que pode melhorar a qualidade do treino de força subsequente.\n\nNota (achado em direção oposta, mesmo capítulo): outro estudo mostrou que resistance exercise realizado *após* exercício de endurance (1h de ciclismo a ~65% VO2máx seguido de 6 séries de leg press a 70-80% 1RM) na verdade **amplificou** a sinalização adaptativa de biogênese mitocondrial em comparação com endurance isolado — sugerindo que treino concorrente pode beneficiar a adaptação oxidativa muscular. Ou seja, a direção do efeito de interferência (negativo para força vs. potencialmente positivo para adaptação aeróbia) parece depender do desfecho medido, reforçando cautela contra generalizações simples sobre \"treino concorrente é sempre prejudicial\".\n\nAplicação ao feedback: nota de contexto — não gera regra de interpretação de sinal isolado do Strava (o app não distingue automaticamente sessões de força), mas é relevante caso o produto amplie o escopo para orientar o sequenciamento de sessões combinadas de bike + academia no mesmo dia: se o objetivo prioritário do dia é ganho de força, recomenda-se não fazer a sessão de força imediatamente após um treino de bike intenso sem pelo menos 20-30 min de intervalo (ou preferencialmente em dias/períodos separados)."},{"id": "nota-0264", "titulo": "Pré-resfriamento corporal (imersão em água ~23,5°C por até 60min ou resfriamento da pele em 5-6°C) antes de exercício no calor aumenta a resistência subsequente", "dominio": "metodologia-e-periodizacao", "camada": ["semanal"], "aplicacao": "contexto", "tipo_nota": "protocolo", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 632, "trecho": "Whole-body precooling (core temperature decrease of 0.7°C [1.26°F]) with up to 60 min immersion in water at 23.5°C (74°F)... increases subsequent endurance in a hot, humid environment. Time to exhaustion inversely related to initial body temperature (lowered via precooling) and directly related to the rate of heat storage."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 632, "trecho": "whole-body precooling of the skin by 5 to 6°C (9–10.8°F) without reduction in core temperature reduced thermal strain and increased distance cycled in 30 min under warm, humid conditions."}], "relacionadas": [], "confianca": 0.55, "status": "auto-aprovado", "body": "Estratégia de pré-resfriamento corporal antes de exercício em calor, com dois protocolos distintos citados no McArdle:\n\n1. **Imersão em água fria (pré-resfriamento de core)**: até 60 minutos de imersão em água a 23,5°C (74°F) antes do exercício reduz a temperatura central em ~0,7°C, o que aumenta o tempo até exaustão subsequente em ambiente quente e úmido. O tempo até exaustão se relaciona inversamente com a temperatura corporal inicial (quanto mais baixa ao início, mais tempo até exaustão) e diretamente com a taxa de acúmulo de calor durante o exercício.\n\n2. **Resfriamento apenas da pele (sem reduzir o core)**: resfriar a pele em 5-6°C (sem alterar a temperatura central) também reduziu o estresse térmico e **aumentou a distância percorrida em 30 minutos de ciclismo** em condições quentes e úmidas — resultado específico de ciclismo.\n\nRessalva importante: nem toda forma de pré-resfriamento funciona — aplicar toalhas frias/chuveiro frio na testa e abdômen durante o exercício melhorou a transferência de calor apenas ligeiramente; e o pré-resfriamento não mostrou benefício em um triathlon simulado nem em protocolo de atividades específicas de futebol em condições ambientais normais (não quentes). Ou seja, o benefício parece específico a ambientes de calor significativo, não universal.\n\nAplicação ao feedback: como o Strava não permite verificar se o atleta fez pré-resfriamento antes da atividade, este protocolo não pode ser detectado automaticamente — mas é conteúdo educativo válido a sugerir como estratégia pré-prova para eventos de ciclismo em calor (`temperatura` prevista alta), especialmente contrarrelógios ou provas de intensidade sustentada onde ganhos de poucos minutos importam."},{"id": "nota-0275", "titulo": "Treinar em altitude não melhora o desempenho subsequente em nível do mar — só o protocolo 'live high, train low' mostra benefício consistente", "dominio": "metodologia-e-periodizacao", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 610, "trecho": "Endurance training at altitude does not improve subsequent sea-level exercise performance... Sea-level exercise performance does not improve after living at altitude when VO2max serves as the improvement criterion."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 612, "trecho": "Athletes who lived at 2500 m but returned regularly to lower altitudes (1000 to 1250 m; 3280 to 4100 ft) to train at near–sea-level intensity (i.e., live high–train low) showed greater average increases in VO2max and 5000-m run performance than athletes who lived and trained only at 2500 m or those who lived and trained only at sea level."}], "relacionadas": [{"id": "nota-0134", "tipo": "complementa", "justificativa": "esclarece um ponto que a nota-0134 não abordava: o efeito do treino EM altitude (não apenas a comparação de desempenho medido em altitude) sobre o desempenho subsequente ao nível do mar"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Achado experimental consistente (McArdle, múltiplos estudos citados, incluindo comparação cruzada com corredores de meia-distância): **treinar em altitude moderada (ex. 2300m) não produz nenhuma vantagem sobre treinar equivalentemente ao nível do mar**, quando o critério é o desempenho subsequente ao nível do mar. Um estudo cruzado (6 corredores treinando 3 semanas em cada local, depois trocando) mostrou que, ao retornar ao nível do mar, o VO2max ficou **2,8% abaixo** do valor pré-altitude — ou seja, nenhum efeito sinérgico surgiu de combinar treino aeróbio com hipóxia moderada.\n\nA **única exceção bem documentada** é o protocolo **\"live high, train low\"** (morar em altitude moderada, mas treinar em altitude baixa/nível do mar para manter a intensidade absoluta de treino): atletas que viveram a 2500m mas desceram regularmente para treinar a 1000-1250m mostraram ganhos médios maiores de VO2max e desempenho de 5000m do que atletas que viveram/treinaram só em altitude OU só ao nível do mar.\n\nPor que a diferença? Treinar diretamente em altitude força o atleta a reduzir a intensidade absoluta do treino (a mesma % de VO2max relativa corresponde a um ritmo/potência muito menor — ver Tabela 24.3: 78% do VO2max ao nível do mar cai para apenas 39% de intensidade equivalente a 4000m), o que compromete a qualidade do estímulo de treino de alta intensidade — mesmo que o corpo ganhe benefícios hematológicos (mais hemoglobina/hematócrito) da exposição à altitude. O \"live high, train low\" resolve esse conflito: ganha os benefícios da exposição hipóxica (síntese de EPO, mais glóbulos vermelhos) SEM perder a capacidade de treinar em alta intensidade absoluta.\n\nTrês pré-requisitos citados para o protocolo funcionar: (1) a altitude de moradia deve ser alta o suficiente para elevar EPO e aumentar volume de hemácias/VO2max; (2) o atleta precisa responder positivamente com aumento de EPO (existem \"não-respondedores\"); (3) o treino deve ocorrer em altitude baixa o suficiente para manter intensidade/consumo de oxigênio próximos do nível do mar.\n\nAplicação ao feedback: se um atleta relatar/planejar um \"training camp\" em altitude visando melhorar desempenho de provas ao nível do mar, a recomendação baseada nesta evidência é que simplesmente treinar E dormir em altitude não trará vantagem sobre treinar normalmente ao nível do mar — só compensa se o protocolo específico de \"dormir alto, treinar baixo\" for viável logisticamente. Não é executável a partir de dados do Strava isoladamente, mas relevante para orientação de planejamento de temporada."},{"id": "nota-0140", "titulo": "Estrutura do catálogo de treinos do Apêndice: níveis, códigos e convenção de RI (intervalo de descanso)", "dominio": "tipos-de-treino", "camada": ["semanal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 404, "trecho": "Refer back to Table 3.1 (p. 32) for additional detail on power-based training levels. In the workout tables that follow, RI describes the rest interval between efforts."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 423, "trecho": "LEVEL 4: LACTATE THRESHOLD (91–105% OF FTP)"}], "relacionadas": [{"id": "nota-0048", "tipo": "pre-requisito", "justificativa": "o catálogo de treinos é inteiramente organizado pelos Níveis/Zonas de Coggan (nota-0048) já documentados"}], "confianca": 0.6, "status": "auto-aprovado", "body": "O Apêndice do livro (páginas 404-467) contém um catálogo extenso de treinos prontos (~85+ treinos), organizados por nível de intensidade e identificados por código: `AR-Wn` (Nível 1, Recuperação Ativa), `END-Wn` (Nível 2, Endurance), `TEMP-Wn` (Nível 3, Tempo), `SubLT-Wn` (Níveis 3-4, Sweet Spot 88-93% FTP), Nível 4 (Limiar de Lactato, códigos próprios), `VO2-Wn` (Nível 5), `AC-Wn` (Nível 6, Capacidade Anaeróbia), `NP-Wn` (Nível 7, Potência Neuromuscular), além de categorias especiais `WATTS-Wn` (\"Kitchen Sink\", multissistema) e `P-Wn` (Pirâmides), mais catálogos de treinos de natação (`SWIM-Wn`) e corrida (`RUN-Wn`, usando zonas de ritmo 1-4) para os planos de triathlon do Cap.10. Convenção: \"RI\" = intervalo de descanso entre esforços.\n\n**Decisão de escopo (registrada em `cobertura.md`):** dado que cada treino individual é essencialmente uma combinação/variação dos parâmetros já capturados nas notas de Zonas de Coggan (nota-0048), Sweet Spot, iLevels e nos protocolos específicos já extraídos (ex.: 30-30-30, calibração de potência), **não foram criadas notas atômicas para cada um dos ~85 treinos individuais** — isso replicaria a mesma fórmula básica (X minutos a Y% da FTP, cadência Z) dezenas de vezes sem agregar conceito novo, indo contra a prioridade de manter a base focada em métodos/fórmulas realmente distintos. Duas estruturas de treino genuinamente distintas do catálogo foram capturadas separadamente: \"Kitchen Sink\" (nota-0141) e \"Pirâmide\" (nota-0142).\n\nAplicação ao feedback: esta nota serve como índice/mapa do catálogo original para referência futura, caso seja necessário consultar um treino específico por código (ex.: quando outras notas do livro referenciam \"TEMP-W8\" ou \"VO2-W1\")."},{"id": "nota-0141", "titulo": "Formato de treino 'Kitchen Sink': combina múltiplos sistemas energéticos numa única sessão longa, com ênfase variável", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["tempo-em-zona", "TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 450, "trecho": "ALL LEVELS: KITCHEN SINK. Many of the rides work multiple energy systems at once, yet there is typically emphasis on one system. The rides that follow throw in 'everything but the kitchen sink.' They are challenging workouts and a good test of overall fatigue resistance."}], "relacionadas": [{"id": "nota-0079", "tipo": "complementa", "justificativa": "formato de treino desenhado especificamente para testar a Stamina/resistência à fadiga (nota-0079) através do acúmulo de múltiplos sistemas na mesma sessão"}], "confianca": 0.65, "status": "auto-aprovado", "body": "\"Kitchen Sink\" é o nome dado pelos autores a um formato de treino longo (3-5+ horas) que combina deliberadamente blocos de **múltiplos sistemas energéticos/níveis de intensidade** na mesma sessão (ex.: sprints, esforços de Capacidade Anaeróbia, blocos de FTP, Sweet Spot, tudo dentro do mesmo ride de Endurance longo) — literalmente \"tudo menos a pia da cozinha\". Apesar de c
