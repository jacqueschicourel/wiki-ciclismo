e potência (curva MMP) sugere sobre suas forças/fraquezas relativas (\"seu perfil se assemelha mais a um escalador\", etc.), desde que a classificação subjacente continue baseada nos dados quantitativos já derivados do Strava (curva potência-duração, relação potência/peso)."},{"id": "nota-0207", "titulo": "VO2máx aumenta até ~30 anos e depois declina de forma aproximadamente linear, mesmo em atletas treinados/ativos — quanto maior o baseline construído na juventude, maior a 'vantagem' ao longo do declínio", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 12, "trecho": "Up until about age 30, VO2 max can increase a fair amount, assuming you're physically active and not a couch potato. But around age 30 to 40, we begin to see a somewhat linear decline in our aerobic capacity. The importance here may be that the more you increase your VO2 max while you're young, the higher 'baseline' you'll have once aerobic capacity inevitably begins to decline."}, {"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 13, "trecho": "Data show that even among exercise-trained or physically-active older adults, VO2 max still declines... there is a consistently observed and linear decline in VO2 max throughout life no matter how active you are."}], "relacionadas": [{"id": "nota-0036", "tipo": "complementa", "justificativa": "fornece o mecanismo fisiológico (declínio linear de VO2máx pós-30/40 anos) por trás da limitação do Power Profile por idade já registrada na nota-0036 do Livro 1"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Segundo a fonte, VO2máx pode aumentar consideravelmente até ~30 anos (em pessoas fisicamente ativas), depois entra em declínio aproximadamente linear a partir dos 30-40 anos — declínio esse observado mesmo em adultos que continuam treinados/ativos (não é exclusivo de sedentários). O ponto prático: quanto maior o VO2máx construído durante a juventude, maior o \"baseline\" a partir do qual o declínio começa, dando uma vantagem relativa ao longo da vida (ver gráfico comparativo endurance-trained vs. sedentary, mostrando maior aptidão aeróbia em qualquer idade para o grupo treinado).\n\nAplicação ao feedback: complementa a nota-0036 do Livro 1 (limitações do Power Profile por idade) — reforça que quedas de FTP/potência relacionadas à idade não são necessariamente sinal de destreinamento, mas parte de um processo fisiológico esperado; o produto deveria calibrar expectativas de progresso/retenção de forma por faixa etária, especialmente para atletas master."},{"id": "nota-0208", "titulo": "FC máxima declina cerca de 1bpm por ano; mecanismos de declínio cardiovascular com idade", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 15, "trecho": "Our maximal heart rate declines with age, about 1 beat per year. This, in turn, influences how hard we can exercise and the maximal capacity of our heart to distribute blood to our working muscles."}, {"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 16, "trecho": "There are several reasons why max heart rate falls with age. These include a decline in the responsiveness of our autonomic nervous system, a failure of the heart to respond to autonomic input... and structural changes to the heart like stiffening of the walls and a weakening of our cardiac muscle... the heart becomes weaker as a pump with age."}, {"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 17, "trecho": "With age, mitochondrial number and quality decline, capillaries become less dense, and we lose some of the capacity to deliver and utilize oxygen at the cellular level."}], "relacionadas": [{"id": "nota-0157", "tipo": "complementa", "justificativa": "detalha os mecanismos de declínio, com a idade, dos componentes do débito cardíaco (FC e volume sistólico) já definidos na nota-0157"}, {"id": "nota-0036", "tipo": "complementa", "justificativa": "fornece mecanismo fisiológico adicional (queda de FC máxima ~1bpm/ano) para a limitação por idade já registrada na nota-0036"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Detalha os mecanismos fisiológicos por trás do declínio de VO2máx com a idade, organizados pela Equação de Fick (já definida na nota-0162): (1) débito cardíaco cai por queda de FC máxima (~1 batimento/ano, por menor responsividade do sistema nervoso autônomo e rigidez estrutural do coração) e de volume sistólico (coração mais rígido/fraco ejeta e enche menos sangue por batimento); (2) diferença arteriovenosa de O2 cai por menor densidade capilar e menor quantidade/qualidade mitocondrial, reduzindo a extração muscular de oxigênio; soma-se a perda de massa muscular esquelética relacionada à idade.\n\nAplicação ao feedback: referência de contexto fisiológico para calibrar expectativas de FC máxima/FTP em atletas mais velhos — se o produto usar uma estimativa de FC máxima por idade (ex.: 220-idade ou similar), esta nota fundamenta por que ela declina de forma relativamente previsível (~1bpm/ano); não gera regra de interpretação direta de sessão, mas é relevante para normalizar comparações de desempenho entre atletas de idades diferentes."},{"id": "nota-0216", "titulo": "'Não respondedores' a treino de VO2máx desaparecem com mais volume, frequência e intensidade", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 33, "trecho": "Approximately 10%–20% of participants in a study known as the HERITAGE study showed limited trainability, suggesting that the effectiveness of a standard training program may vary among individuals."}, {"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 34, "trecho": "when intense cycle training is performed 4 or 5 days a week, all subjects show an increase in VO2 max. On the other hand, subjects who train only 1, 2, or 3 days a week exhibit limited trainability, but when additional training sessions are added, they become trainable... In short. If you're not responding to training, you just might not be training with enough volume, intensity, or both."}], "relacionadas": [], "confianca": 0.5, "status": "auto-aprovado", "body": "**Política de ativação aplicada:** a estatística central (10-20% de \"não-respondedores\" a VO2máx) vem de um único estudo, ainda que landmark e amplamente citado na área (HERITAGE Family Study) — mantido como `aplicacao: contexto` por depender de medição de VO2máx em laboratório (não derivável do Strava) e por se basear em um sistema de estudo único. Achado descrito: em programas de treino padrão (guidelines de saúde pública), 10-20% dos participantes não mostram ganho de VO2máx; porém, quando o treino intervalado intenso é feito 4-5x/semana, virtualmente todos os participantes respondem — sugerindo que \"não resposta\" é frequentemente um problema de dose insuficiente (volume/frequência/intensidade), não de \"não-treinabilidade\" genética real.\n\nAplicação ao feedback: o **princípio geral é transferível** mesmo sendo baseado em estudo único de VO2máx laboratorial — se o produto detectar estagnação prolongada de FTP/CTL apesar de treino consistente (já coberto por nota-0089 do Livro 1, \"platô de CTL\"), esta nota sugere que a causa mais provável não é uma limitação biológica fixa, mas volume/frequência/intensidade insuficientes — reforça, sem contradizer, a recomendação de progressão de carga já presente no cânone, mas não deve ser citada como \"a maioria das pessoas não responde a treino padrão\" sem essa ressalva de estudo único."},{"id": "nota-0217", "titulo": "Genética explica 47% da resposta de treino; não existe gene único do VO2máx", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 36, "trecho": "The HERITAGE study, in particular, showed that approximately 47% of the increase in VO2 max due to training is heritable... it is important to note that not all genetic variants identified in these studies are directly linked to the physiological determinants of VO2 max."}, {"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 37, "trecho": "common gene variants in EPO-related signaling pathways have not emerged in studies of large numbers of elite endurance athletes... In other words, there's likely not a 'VO2 max gene.'"}], "relacionadas": [{"id": "nota-0216", "tipo": "complementa", "justificativa": "fornece a explicação genética (herdabilidade de ~47% da resposta ao treino) para a variabilidade de 'não-respondedores' descrita na nota-0216"}], "confianca": 0.5, "status": "auto-aprovado", "body": "**Política de ativação aplicada:** estatística e conclusão vêm de um único sistema de estudo (HERITAGE Family Study e revisões relacionadas de Joyner/Lundby) — mantido como `aplicacao: contexto`. Aproximadamente 47% da variação na resposta de VO2máx ao treino é atribuível a fatores hereditários/genéticos (estudos com gêmeos e famílias). Apesar disso, não foi identificado um \"gene do VO2máx\" único e consistente — painéis genéticos de até 21 variantes têm poder preditivo parcial, mas nem todas as variantes se ligam diretamente aos determinantes fisiológicos conhecidos (débito cardíaco, volume sistólico, volume sanguíneo, massa de hemácias). Variantes raras ligadas à via da eritropoetina (EPO) foram encontradas em casos isolados de atletas de elite (ex.: um campeão olímpico de esqui), mas não emergem consistentemente em estudos com grandes populações de atletas de endurance de elite.\n\nAplicação ao feedback: puramente conceitual/contexto — não gera nenhuma regra de interpretação de dado do Strava. Relevante apenas se o produto precisar comunicar, de forma educativa e responsável, que a resposta ao treino tem um componente genético significativo (evitando culpar o atleta por progresso mais lento) sem alegar que existe um teste genético definitivo capaz de prever potencial de VO2máx."},{"id": "nota-0251", "titulo": "Fórmula WBGT: índice de estresse térmico ambiental", "dominio": "contexto-atleta", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 622, "trecho": "WB − GT = 0.1 × DBT + 0.7 × WBT + 0.2 × GT, where DBT represents the dry-bulb temperature (air temperature) recorded by an ordinary mercury thermometer, and WBT equals the wet-bulb temperature recorded by a similar thermometer except that a wet wick surrounds the mercury bulb... GT represents the globe temperature recorded by a thermometer with a black metal sphere enclosing its bulb."}], "relacionadas": [{"id": "nota-0134", "tipo": "complementa", "justificativa": "nota-0134 trata de altitude/pressão atmosférica como fator ambiental que distorce desempenho; esta nota traz outro índice ambiental (calor) usado pelo mesmo tipo de raciocínio de correção contextual"}], "confianca": 0.6, "status": "auto-aprovado", "body": "O índice WBGT (wet bulb-globe temperature), desenvolvido pelo exército americano e adotado pela NCAA para estabelecer limiares de risco de lesão por calor, combina três leituras de temperatura em uma fórmula ponderada:\n\n**WBGT = 0,1 × DBT + 0,7 × WBT + 0,2 × GT**\n\nOnde: DBT = temperatura de bulbo seco (termômetro de mercúrio comum, mede temperatura do ar); WBT = temperatura de bulbo úmido (termômetro com um pavio molhado ao redor do bulbo — quanto menor a diferença entre DBT e WBT, maior a umidade relativa, pois pouca evaporação ocorre do bulbo molhado); GT = temperatura de globo (termômetro com esfera metálica preta que absorve energia radiante do ambiente, captando a carga de calor radiante/solar).\n\nO peso de 0,7 dado ao bulbo úmido reflete que a umidade relativa é o fator mais importante para determinar a eficácia da perda de calor evaporativa (ver nota correlata sobre taxa de sudorese e umidade).\n\nAplicação ao feedback: o Strava só fornece temperatura do ar (equivalente ao DBT), não umidade relativa nem carga radiante — portanto o WBGT completo não pode ser calculado automaticamente a partir dos dados de atividade. Ainda assim, a fórmula serve de referência conceitual para explicar por que a temperatura do ar sozinha subestima o estresse térmico real em dias úmidos ou de sol forte, e justifica tratar a `temperatura` do Strava como um proxy imperfeito (subestima o risco em dias úmidos/ensolarados) ao gerar alertas de calor."},{"id": "nota-0252", "titulo": "Tabela ACSM de risco por WBGT para corrida e ciclismo de endurance", "dominio": "contexto-atleta", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 623, "trecho": "WB–GT RECOMMENDATIONS FOR CONTINUOUS ACTIVITIES SUCH AS ENDURANCE RUNNING AND CYCLING — Very high risk: Above 28°C (82°F)—Postpone race. High risk: 23 to 28°C (73–82°F)—Heat-sensitive individuals (e.g., obese, low physical fitness, unacclimatized, dehydrated, previous history of heat injury) should not compete. Moderate risk: 18 to 23°C (65–73°F). Low risk: Below 18°C (65°F)."}], "relacionadas": [{"id": "nota-0251", "tipo": "pre-requisito", "justificativa": "usa o índice WBGT definido na nota-0251 como base da classificação de risco"}], "confianca": 0.65, "status": "auto-aprovado", "body": "O American College of Sports Medicine (ACSM) recomenda faixas de risco de lesão por calor especificamente para \"atividades contínuas como corrida de endurance e ciclismo\", baseadas no índice WBGT (nota-0251):\n\n| Risco | WBGT | Recomendação |\n|---|---|---|\n| Muito alto | Acima de 28°C (82°F) | Adiar a prova |\n| Alto | 23–28°C (73–82°F) | Indivíduos sensíveis ao calor (obesos, baixo condicionamento, não aclimatados, desidratados, histórico prévio de lesão por calor) não devem competir |\n| Moderado | 18–23°C (65–73°F) | — |\n| Baixo | Abaixo de 18°C (65°F) | — |\n\nImportante: o WBGT não é a temperatura do ar simples — ele pondera fortemente a umidade relativa (peso 0,7) e a carga radiante (peso 0,2), então um dia de 24°C com alta umidade e sol forte pode ter WBGT classificado como \"alto risco\" mesmo parecendo ameno pela temperatura do ar isolada.\n\nAplicação ao feedback: o Strava fornece apenas temperatura do ar, não o WBGT completo (falta umidade e radiação solar) — portanto esta tabela não pode ser aplicada com precisão sem dados adicionais de clima. Como aproximação conservadora e explicitamente imprecisa, a `temperatura` do Strava cruzando os mesmos limiares em °C (18°C, 23°C, 28°C) pode disparar um alerta educativo de risco de calor \"estimado\" (sabendo que o WBGT real tende a ser igual ou maior que a temperatura do ar em dias úmidos/ensolarados, nunca menor) — mas não deve ser apresentado como o WBGT real. Reforça a recomendação de reduzir intensidade/pace-alvo ou adiar treinos-chave em dias com temperatura registrada acima de ~28°C."},{"id": "nota-0253", "titulo": "Índice de estresse por calor (temperatura e umidade relativa)", "dominio": "contexto-atleta", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 623, "trecho": "Without the WBT, but knowing relative humidity (local meteorologic stations or media reports), the heat-stress index (Fig. 2) evaluates the relative heat stress... 90°—105°F Possibility of heat cramps; 105°—130°F Heat cramps or heat exhaustion likely, heat stroke possible; 130°+ Heat stroke a definite risk."}], "relacionadas": [{"id": "nota-0261", "tipo": "complementa", "justificativa": "esta nota fornece o índice de triagem ambiental (temperatura+umidade) que antecede os quadros clínicos de cãibra/exaustão/golpe de calor descritos na nota-0261"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Alternativa mais simples ao WBGT (nota-0251) quando não se tem a temperatura de bulbo úmido medida: o \"heat-stress index\" combina apenas temperatura do ar e umidade relativa (ambas facilmente obtidas de estações meteorológicas) numa tabela que produz uma \"sensação térmica\" (°F) equivalente. A tabela mostra, por exemplo, que 80°F (26,7°C) a 0% de umidade tem sensação de 64°F, mas a 100% de umidade a mesma temperatura do ar tem sensação de 72°F — e a 90°F (32,2°C) com 50% de umidade a sensação sobe a 96°F.\n\nA partir da sensação térmica resultante, três faixas de risco são definidas:\n- **90–105°F (32–41°C) de sensação térmica**: possibilidade de cãibras por calor\n- **105–130°F (41–54°C)**: cãibras ou exaustão por calor prováveis, golpe de calor possível\n- **Acima de 130°F (54°C)**: golpe de calor é risco definitivo\n\nAplicação ao feedback: o Strava fornece temperatura do ar mas tipicamente não umidade relativa consistente por atividade, então este índice completo não é calculável automaticamente. Ainda assim, fundamenta por que dias de temperatura moderada (ex. 30-32°C) combinados com umidade alta podem ser tão perigosos quanto dias mais quentes e secos — útil como texto educativo ao lado de qualquer alerta de calor baseado apenas em `temperatura`, e para explicar por que o mesmo valor de temperatura do Strava pode representar riscos muito diferentes dependendo da umidade local (não capturada)."},{"id": "nota-0258", "titulo": "Queda progressiva de desempenho de endurance conforme a temperatura sobe de 10 a 25°C", "dominio": "contexto-atleta", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["temperatura", "tempo-decorrido"], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 630, "trecho": "A progressive slowing of marathon running performance of men and women as the wet bulb–globe temperature (WB-GT) increased from 10 to 25°C (50 to 77°F) with performance more negatively affected for slower runners. (Adapted with permission from Ely MR, et al. Impact of weather on marathon-running performance. Med Sci Sports Exerc 2007;39:487.)"}], "relacionadas": [{"id": "nota-0252", "tipo": "complementa", "justificativa": "nota-0252 traz os limiares de risco por WBGT; esta nota traz o efeito gradual (não binário) de degradação de desempenho conforme a temperatura sobe dentro e além dessas faixas"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Estudo (Ely et al., 2007, citado no McArdle) com dados de corrida de maratona mostra uma **relação progressiva e não-binária** entre WBGT e desempenho: conforme o WBGT sobe de 10°C para 25°C (50°F a 77°F), o tempo de prova piora de forma gradual e consistente — não existe um \"limiar mágico\" abaixo do qual não há efeito nenhum.\n\nAchado importante: **o efeito negativo é maior para os atletas mais lentos** (menor performance relativa/fitness) do que para os atletas de elite/mais rápidos, no mesmo nível de calor. Isso é consistente com o princípio geral de que atletas mais bem condicionados toleram maiores níveis de hipertermia e se aclimatizam mais eficientemente (ver nota-0254).\n\nOriginalmente um dado de corrida (maratona), mas o princípio — desempenho de endurance degrada progressivamente com o calor, de forma mais acentuada em atletas de menor nível de condicionamento — é transferível ao ciclismo de endurance, já que o mecanismo subjacente (competição entre fluxo sanguíneo muscular e cutâneo, desidratação progressiva, elevação de temperatura central) não é específico da corrida.\n\nAplicação ao feedback: ao comparar desempenho (potência/pace, `tempo-decorrido`) do mesmo atleta em diferentes atividades, esperar uma degradação gradual (não um corte abrupto) conforme a `temperatura` registrada sobe de ~10°C para ~25°C+ — e não penalizar/alarmar apenas atletas mais lentos/menos condicionados como \"underperformando\" quando a causa provável é a maior sensibilidade ao calor desse perfil de atleta comparado a atletas de elite nas mesmas condições."},{"id": "nota-0261", "titulo": "Continuum de doença por calor: cãibras, exaustão e golpe de calor — sinais e limiares", "dominio": "contexto-atleta", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["temperatura", "tempo-movimento", "FC (média/máx)"], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 636, "trecho": "Heat cramps—severe involuntary, sustained, and spreading muscle spasms—occur during or after intense physical activity... Core temperature often remains within normal range. Crampers tend to have high sweat rates and/or high sweat sodium concentrations."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 636, "trecho": "Heat exhaustion can develop in unacclimatized persons during the first summer heat wave or with the first hard training session on a hot day... Characteristics of heat exhaustion include a weak and rapid pulse, low blood pressure in the upright position, headache, dizziness, and general weakness... core temperature does not rise to dangerous levels of 40°C (104°F) or higher."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 636, "trecho": "The classic form of heat stroke—core temperature exceeds 40.5°C (105°F), altered mental status, absence of sweating—usually occurs during heat waves... Exertional heat stroke is a state of extreme hyperthermia... body temperature rises to 41.5°C (106.7°F) and above."}], "relacionadas": [{"id": "nota-0253", "tipo": "complementa", "justificativa": "nota-0253 traz o índice de triagem ambiental que precede e contextualiza o risco destes quadros clínicos"}, {"id": "nota-0254", "tipo": "complementa", "justificativa": "atletas não aclimatados (nota-0254) apresentam maior risco de exaustão por calor, especialmente na primeira sessão intensa em dia quente"}], "confianca": 0.6, "status": "auto-aprovado", "body": "As três doenças por calor, em ordem crescente de gravidade (McArdle), com sinais distintivos:\n\n1. **Cãibras por calor**: espasmos musculares involuntários, sustentados e que se espalham, durante ou após atividade intensa. A temperatura central geralmente **permanece normal** — não é hipertermia. Associada a atletas com alta taxa de sudorese e/ou alta concentração de sódio no suor. Prevenção: hidratação com sal e aumento da ingestão diária de sal nos dias anteriores à exposição ao calor.\n\n2. **Exaustão por calor**: ocorre tipicamente em pessoas não aclimatadas na primeira onda de calor do verão ou no primeiro treino intenso de um dia quente. Sinais: pulso fraco e rápido, pressão arterial baixa em pé, dor de cabeça, tontura, fraqueza generalizada. A temperatura central **não** atinge níveis perigosos (permanece abaixo de 40°C/104°F). Tratamento: parar a atividade, mover para ambiente mais fresco, reidratação.\n\n3. **Golpe de calor (heat stroke)** — emergência médica, forma mais grave: temperatura central **excede 40,5°C (105°F)** na forma clássica, com alteração do estado mental e ausência de sudorese; na forma por exercício (exertional heat stroke), a temperatura sobe a **41,5°C (106,7°F) ou mais**. Fatores predisponentes: baixo condicionamento, obesidade, aclimatização inadequada, disfunção das glândulas sudoríparas, desidratação. Sem tratamento imediato (resfriamento agressivo — imersão em água fria/gelada é o \"padrão-ouro\"), evolui para colapso circulatório e dano a múltiplos órgãos. Um em cada três sobreviventes de golpe de calor quase-fatal fica com disfunção orgânica permanente.\n\nAplicação ao feedback: nenhum desses limiares (temperatura retal, sinais clínicos) é medido pelo Strava — mas a combinação de `temperatura` ambiente alta + `tempo-movimento` prolongado + esforço intenso (FC elevada sustentada) é um proxy indireto de risco crescente ao longo desse continuum, especialmente em atletas sem histórico recente de treino em calor (não aclimatados, ver nota-0254) ou com sobrepeso/baixo condicionamento (ver nota-0262). O sistema pode usar essa combinação para emitir um alerta educativo (não diagnóstico) recomendando pausar/reduzir intensidade e buscar sombra/hidratação diante de qualquer mal-estar, sem tentar inferir diretamente qual estágio o atleta atingiu."},{"id": "nota-0262", "titulo": "Obesidade triplica risco de golpe de calor fatal; gordura corporal reduz tolerância ao calor", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 634, "trecho": "Excess body fat and body weight directly adds to the metabolic cost of weight-bearing activities. A hot, humid environment places the overly fat person at a distinct disadvantage for temperature regulation and physical performance. Additional compounding factors include the added weight of sports equipment... Fatal heat stroke occurs 3.5 times more frequently in excessively overweight young adults than in individuals of average body size."}], "relacionadas": [{"id": "nota-0261", "tipo": "complementa", "justificativa": "gordura corporal excessiva é um dos fatores predisponentes ao golpe de calor descrito na nota-0261"}], "confianca": 0.6, "status": "auto-aprovado", "body": "O excesso de gordura corporal representa uma desvantagem termorregulatória mensurável em ambiente quente, por três mecanismos combinados:\n\n1. **Isolamento térmico indesejado**: o calor específico da gordura é maior que o do músculo, então mais tecido adiposo retarda a condução de calor do núcleo para a periferia (o oposto do que se quer em ambiente quente).\n2. **Menor razão superfície corporal/massa**: pessoas maiores e mais gordas têm proporcionalmente menos área de pele disponível para evaporação de suor por unidade de massa a resfriar.\n3. **Maior custo metabólico** de atividades com sustentação de peso — mais massa para movimentar gera mais calor metabólico a dissipar.\n\nResultado prático citado no McArdle: **golpe de calor fatal ocorre 3,5 vezes mais frequentemente em jovens adultos com sobrepeso excessivo** do que em pessoas de tamanho corporal médio. O exemplo do livro é o jogador de futebol americano Korey Stringer, que morreu de golpe de calor com IMC de 40,8.\n\nAplicação ao feedback: como o Strava não fornece composição corporal (apenas peso, se o atleta preencher o perfil), este dado não gera regra automática — mas justifica que, ao calcular alertas de risco de calor (nota-0253, nota-0261), atletas com IMC elevado ou histórico de sobrepeso no perfil devem receber um limiar de alerta mais conservador (temperatura mais baixa) do que atletas magros, dado o risco elevado e bem documentado."},{"id": "nota-0263", "titulo": "Capacete de ciclismo moderno não prejudica dissipação de calor", "dominio": "contexto-atleta", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 625, "trecho": "For cyclists, wearing a commercially available helmet provides vital protection against possible head trauma, but does the cycling helmet impede thermoregulatory processes in a hot–dry or hot–humid environment?... 10 male and 4 female competitive cyclists pedaled for 90 min at 60% of VO2peak in both hot–dry (35°C [95°F], 20% relative humidity) and hot–humid (35°C [95°F], 70% relative humidity) environments, with and without a protective helmet."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 626, "trecho": "Wearing the helmet, however, did not increase the riders' heat strain or perceived heat sensation from the head or body."}], "relacionadas": [], "confianca": 0.6, "status": "auto-aprovado", "body": "Estudo específico de ciclismo (McArdle, Capítulo 25): 14 ciclistas competitivos (10 homens, 4 mulheres) pedalaram por 90 minutos a 60% do VO2pico em duas condições de calor — quente-seco (35°C, 20% umidade relativa) e quente-úmido (35°C, 70% umidade relativa) — com e sem capacete protetor. Foram medidos consumo de oxigênio, FC, temperatura central, de pele e da cabeça, percepção de esforço e sensação térmica percebida.\n\nResultado principal: **usar o capacete NÃO aumentou o estresse térmico nem a sensação térmica percebida** (nem da cabeça, nem do corpo como um todo), apesar da crença comum entre ciclistas competitivos de que andar sem capacete reduziria o desconforto térmico. Isso é atribuído ao design do capacete comercial moderno, que mantém características aerodinâmicas e leves com portas de ventilação para resfriamento convectivo e evaporativo.\n\nComo esperado, o ambiente quente-úmido produziu maior estresse térmico geral do que o quente-seco (independente do uso de capacete) — a umidade relativa segue sendo o fator ambiental dominante (ver nota-0251, nota-0253), não o equipamento.\n\nAplicação ao feedback: como o Strava não registra uso de capacete, este achado não gera regra automática — mas é conteúdo educativo útil para desmistificar, junto a ciclistas, a crença de que remover o capacete ajuda na regulação térmica em dias quentes; a recomendação de segurança (sempre usar capacete) não compromete a termorregulação segundo este estudo controlado."},{"id": "nota-0265", "titulo": "Idade e gênero modificam tolerância ao calor mas não a capacidade de regular temperatura central", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 634, "trecho": "Research shows little or no age-related decrements in thermoregulatory capacity or heat-stress acclimatization with appropriate controls for body size and composition, aerobic fitness, hydration, degree of acclimatization, and chronological age."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 635, "trecho": "In essence, women tolerate the thermal stress of physical activity at least as well as do men of comparable aerobic fitness and level of acclimatization; both genders also acclimatize to the same degree... Women probably use circulatory mechanisms for heat dissipation, whereas men make greater use of evaporative cooling."}], "relacionadas": [{"id": "nota-0254", "tipo": "complementa", "justificativa": "esta nota detalha como idade e gênero modulam a resposta de aclimatização ao calor descrita na nota-0254"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Dois achados sobre variação individual na tolerância ao calor que **não** devem ser confundidos com menor capacidade física:\n\n**Idade**: quando controlado por tamanho corporal, composição, condicionamento aeróbio, hidratação e grau de aclimatização, **não há diferença relevante relacionada à idade** na capacidade termorregulatória durante exercício ou na aclimatização ao calor. Corredores de meia-idade bem treinados não mostram déficit termorregulatório na maratona comparados a corredores mais jovens. O que existe é um atraso no início da sudorese em idosos (por sensibilidade reduzida dos termorreceptores, menor output das glândulas sudoríparas, ou desidratação crônica por sede reduzida) — mas isso reflete menor condicionamento/aclimatização típica dessa faixa etária, não um limite fisiológico inerente à idade.\n\n**Gênero**: mulheres toleram o estresse térmico do exercício **pelo menos tão bem quanto** homens de condicionamento aeróbio e aclimatização equivalentes — comparações antigas que mostravam pior tolerância feminina tinham a falha metodológica de testar mulheres numa % maior do VO2max do que homens. Mulheres suam menos que homens (mesmo tendo mais glândulas sudoríparas ativas por área de pele) mas compensam usando mais os mecanismos circulatórios de dissipação de calor, enquanto homens dependem mais de resfriamento evaporativo — dois caminhos fisiológicos diferentes chegando a tolerância térmica equivalente.\n\nAplicação ao feedback: ao interpretar quedas de desempenho em calor, não usar idade ou gênero como justificativa automática de menor tolerância — a variável relevante é o nível de condicionamento aeróbio e o grau de aclimatização recente (ver nota-0254) daquele atleta específico, não sua categoria demográfica."},{"id": "nota-0266", "titulo": "Índice de sensação térmica (wind-chill): fórmula e limiares de tempo para geladura", "dominio": "contexto-atleta", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 641, "trecho": "Wind Chill (ºF) = 35.74 + 0.6215 T - 35.75 (V0.16) + 0.4275 T (V0.16), Where, T = Air Temperature (ºF); V = Wind Speed (mph)... Frostbite Times: 30 minutes, 10 minutes, 5 minutes."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 640, "trecho": "If a person runs, skis, or skates into the wind, the effective cooling increases directly with forward velocity. Running at 8 mph into a 12-mph headwind creates the equivalent of a 20-mph wind speed. Conversely, running at 8 mph with a 12-mph wind at one's back creates a relative wind speed of only 4 mph."}], "relacionadas": [], "confianca": 0.55, "status": "auto-aprovado", "body": "Fórmula oficial do National Weather Service (revisão de 2001) para o índice de sensação térmica (wind-chill), que combina temperatura do ar e velocidade do vento:\n\n**Wind Chill (°F) = 35,74 + 0,6215×T − 35,75×(V^0,16) + 0,4275×T×(V^0,16)**\n\nOnde T = temperatura do ar em °F, V = velocidade do vento em mph.\n\nA tabela derivada da fórmula mostra, por exemplo, que com temperatura de −1°C (30°F) e vento de 25 mph, a sensação térmica equivale a −12,7°C (9°F); a mesma velocidade de vento a 12,2°C (10°F) produz sensação de −23,8°C (−11°F). A tabela também fornece **tempos estimados até geladura de pele exposta**: zonas de risco marcam limiares de 30, 10 e 5 minutos até congelamento da pele exposta, dependendo da combinação temperatura/vento.\n\nImportante para quem se desloca contra o vento (ex.: ciclista pedalando contra o vento): **a velocidade relativa do vento soma-se à velocidade de deslocamento**. Exemplo do livro: correr a 8 mph contra um vento de 12 mph cria o equivalente a um vento de 20 mph (soma); correr a 8 mph com o vento de 12 mph nas costas cria um vento relativo de apenas 4 mph (subtração). O mesmo princípio se aplica à velocidade de um ciclista.\n\nAplicação ao feedback: o Strava fornece `temperatura` mas não velocidade do vento, então o wind-chill completo não é calculável automaticamente a partir dos dados de atividade — porém, para ciclistas, o próprio deslocamento a alta velocidade já produz um \"vento relativo\" significativo mesmo em dia calmo (ex.: pedalar a 30 km/h já gera sensação de vento de ~30 km/h contra o corpo), o que deveria ser considerado ao interpretar `temperatura` baixa combinada com alta `velocidade` em rotas de descida ou contrarrelógio — o risco de frio é maior do que a temperatura ambiente isolada sugere."},{"id": "nota-0267", "titulo": "Tabela de estágios de hipotermia por temperatura central", "dominio": "contexto-atleta", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 638, "trecho": "Mild hypothermia 35.0°C: Maximal shivering, increased blood pressure. 34.0°C: Amnesia; dysarthria; poor judgment; behavior change. Moderate hypothermia 32.0°C: Stupor. 30.0°C: Cardiac arrhythmias; decreased cardiac output. Severe hypothermia 28.0°C: Ventricular fibrillation likely; hypoventilation... 13.7°C: Lowest adult survival from accidental hypothermia."}], "relacionadas": [{"id": "nota-0261", "tipo": "complementa", "justificativa": "nota-0261 traz o continuum equivalente para doenças por calor; esta nota traz o continuum análogo para o extremo oposto (frio)"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Tabela de referência (McArdle, adaptada do ACSM Position Stand, Tabela 25.7) com os estágios de hipotermia por temperatura central (retal), com efeitos fisiológicos observados a cada nível — normal é 37,0°C:\n\n| Estágio | Temp. central | Efeito fisiológico |\n|---|---|---|\n| Normotermia | 37,0°C | Sem efeito perceptível |\n| Hipotermia leve | 35,0°C | Tremores máximos, pressão arterial aumentada |\n| | 34,0°C | Amnésia, disartria, julgamento prejudicado |\n| | 33,0°C | Ataxia, apatia |\n| Hipotermia moderada | 32,0°C | Estupor |\n| | 31,0°C | Tremores cessam, pupilas dilatam |\n| | 30,0°C | Arritmias cardíacas, queda do débito cardíaco |\n| | 29,0°C | Inconsciência |\n| Hipotermia severa | 28,0°C | Fibrilação ventricular provável, hipoventilação |\n| | 27,0°C | Perda de reflexos e movimento voluntário |\n| | 25,0°C | Fluxo sanguíneo cerebral reduzido |\n| | 18,0°C | Assistolia |\n| — | 13,7°C | Menor temperatura de sobrevivência registrada em adulto (hipotermia acidental) |\n\nPonto crítico: **os tremores (shivering), o mecanismo primário de geração de calor no frio, cessam em torno de 31°C** — abaixo disso a pessoa perde a principal defesa ativa contra a queda adicional de temperatura, acelerando a progressão.\n\nAplicação ao feedback: o Strava não mede temperatura central, então esta tabela não gera regra automática — mas serve como referência de gravidade para conteúdo educativo de segurança em treinos de frio extremo (ex.: descidas longas após subidas suadas, onde o risco de hipotermia é maior por combinação de roupa molhada + vento + baixa temperatura, ver nota-0270)."},{"id": "nota-0270", "titulo": "Roupa molhada perde 90% do isolamento térmico; água conduz calor 25x mais rápido que ar", "dominio": "contexto-atleta", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["temperatura"], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 623, "trecho": "When clothing becomes wet, through either external moisture or condensation from sweating, it loses almost 90% of its insulating properties. This facilitates heat loss from the body because water conducts heat 25 times faster than air."}], "relacionadas": [{"id": "nota-0267", "tipo": "complementa", "justificativa": "roupa molhada é um fator de risco direto para a progressão de hipotermia descrita na tabela de estágios da nota-0267"}, {"id": "nota-0269", "tipo": "complementa", "justificativa": "contrasta com a nota-0269: mesmo com geração de calor metabólico ativa, roupa molhada acelera muito a perda de calor e pode superar a produção metabólica"}], "confianca": 0.65, "status": "auto-aprovado", "body": "Dado quantificado e de alto impacto prático: quando a roupa fica molhada — seja por chuva/umidade externa ou por condensação do próprio suor — ela **perde quase 90% de sua capacidade isolante**. Isso ocorre porque a água conduz calor **25 vezes mais rápido** que o ar. Uma vez molhada, a camada de roupa deixa de reter a \"zona de ar aquecido\" que normalmente isola o corpo do ambiente, e passa a acelerar a perda de calor em vez de retardá-la.\n\nIsso é especialmente relevante em cenários combinados comuns no ciclismo: (a) suor acumulado em roupa de treino intenso seguido de queda de intensidade ou parada, (b) chuva durante o percurso, (c) descidas longas após subidas suadas, onde a combinação de vento relativo (nota-0266) + roupa molhada + queda de geração de calor metabólico (nota-0269) cria a condição de maior risco de hipotermia, mesmo em temperaturas moderadas (não necessariamente congelantes).\n\nAplicação ao feedback: quando o sistema observa `temperatura` baixa a moderada (ex. <15°C) combinada com sinais de esforço intenso e prolongado (sudorese esperada) seguido de queda de potência/velocidade (ex. início de descida ou parada), pode sinalizar risco elevado de resfriamento por roupa molhada e recomendar preventivamente troca de camada ou vestimenta impermeável/corta-vento antes de descidas longas em dias frios — mesmo quando a temperatura isolada não pareceria extrema."},{"id": "nota-0271", "titulo": "Gordura corporal como isolante no frio e variabilidade individual de temperatura ótima", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 638, "trecho": "Successful ocean swimmers possess a larger amount of subcutaneous fat than highly trained non–ocean swimmers. The additional fat increases the effective insulation in cold water when peripheral blood diverts from the body's shell to the core."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 638, "trecho": "A person with excess body fat who rests comfortably immersed to the neck in 26°C (78.8°F) water may sweat about the forehead during vigorous physical activity. For this person, 18°C (64.4°F) provides a more favorable water temperature for high-intensity effort. For a lean person, water at 18°C (64.4°F) proves debilitating during rest and activity."}], "relacionadas": [{"id": "nota-0262", "tipo": "complementa", "justificativa": "contraste direto: a mesma gordura corporal que prejudica a tolerância ao calor (nota-0262) beneficia a tolerância ao frio — efeito oposto dependendo do ambiente"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Ao contrário do calor (onde gordura corporal excessiva é uma desvantagem termorreguladora, ver nota-0262), a gordura subcutânea funciona como **isolante eficaz no frio**: quando o fluxo sanguíneo periférico é desviado da \"casca\" corporal para o núcleo (vasoconstrição no frio), a camada de gordura retém o calor central de forma mais eficaz em pessoas com mais tecido adiposo. Isso é bem documentado em nadadores de águas abertas, que tipicamente têm mais gordura subcutânea que nadadores de piscina de elite equivalentes.\n\nConsequência prática: **existe uma temperatura ambiente \"ótima\" individual**, que varia com a composição corporal e a intensidade do esforço. Exemplo do livro: uma pessoa com excesso de gordura em repouso a 26°C na água já pode suar durante esforço vigoroso — para essa pessoa, água mais fria (18°C) é mais favorável para esforço de alta intensidade. Já para uma pessoa magra, 18°C já é debilitante tanto em repouso quanto em atividade.\n\nAplicação ao feedback: a tolerância ao frio (assim como ao calor) não é uma constante universal — atletas mais magros sentirão o mesmo `temperatura` registrado no Strava como mais desafiador no frio do que atletas com mais gordura corporal, e o inverso se aplica ao calor. Isso reforça a necessidade de personalizar limiares de alerta de frio/calor por perfil corporal do atleta (peso/composição, se disponível), em vez de aplicar o mesmo limiar de `temperatura` a todos os usuários."},{"id": "nota-0274", "titulo": "Protocolo de ascensão em estágios para prevenir mal agudo da montanha", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "protocolo", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 604, "trecho": "Climbers should spend several nights at 2500 to 3000 m (8200 to 9800 ft) before going higher, and an extra night should be added for each additional 600 to 900 m (1968 to 2952 ft) climbed. Abrupt increases of more than 600 m in the altitude for sleeping should be avoided at 2500 m (8202 ft) or above (\"climb high–sleep low\")."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 605, "trecho": "Prevention 1. Slow ascent for susceptible individuals (average increase in sleeping altitude of 300 to 350 m·d−1 (984 to 1148 ft·d−1) above 2500 m (8200 ft))."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 604, "trecho": "Rapid ascent to 4200 m almost guarantees some form of AMS."}], "relacionadas": [{"id": "nota-0134", "tipo": "complementa", "justificativa": "protocolo prático de segurança para exposição a altitude, ausente na nota-0134"}, {"id": "nota-0273", "tipo": "complementa", "justificativa": "esta nota é o protocolo de segurança específico contra mal agudo da montanha, dentro do cronograma geral de aclimatização da nota-0273"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Protocolo prático de \"ascensão em estágios\" (staged ascent) para prevenir o mal agudo da montanha (AMS — dor de cabeça, náusea, tontura, fadiga, geralmente aparecendo acima de 2500m):\n\n- Acima de 2500 m, a **altitude de sono não deve subir mais de 300-350 m por dia** em média (para indivíduos suscetíveis).\n- Alpinistas devem passar várias noites entre 2500-3000 m antes de subir mais.\n- **Adicionar uma noite extra a cada 600-900 m** adicionais de subida.\n- Regra prática conhecida como **\"suba alto, durma baixo\"** (climb high–sleep low): evitar aumentos abruptos de mais de 600 m na altitude de sono quando já acima de 2500 m — é aceitável subir mais durante o dia (ex. escalada) desde que se desça para dormir em altitude menor.\n- **A ascensão rápida a 4200 m praticamente garante alguma forma de AMS.**\n- Se os sintomas de AMS não melhorarem após um dia de repouso, a recomendação é descer; um descenso de ~300 m geralmente alivia os sintomas.\n- HAPE (edema pulmonar de altitude) afeta ~2% dos que sobem acima de 3000m; HACE (edema cerebral de altitude) afeta ~1% acima de 2700m — ambos potencialmente fatais e exigem descida imediata.\n\nAplicação ao feedback: relevante para ciclistas planejando provas ou passeios de múltiplos dias em grande altitude (granfondos de montanha, cicloturismo em cordilheiras) — não é executável a partir de uma atividade isolada do Strava, mas pode fundamentar um alerta/recomendação de planejamento quando o produto identificar que o atleta está se deslocando para eventos em altitude significativamente maior que sua altitude habitual de treino."},{"id": "nota-0281", "titulo": "Fórmula de peso-meta a partir do percentual de gordura desejado", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "protocolo", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 762, "trecho": "The following equation computes a goal body weight based on a desired percentage body fat level: Goal body weight = Fat-free body mass ÷ (1.00 - desired %fat)"}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 763, "trecho": "Suppose a 91-kg (200-lb) man, currently with 20% body fat, wants to know how much fat weight to lose to attain a body fat composition of 10%... Goal body weight = 72.8 kg ÷ (1.00 - 0.10) = 80.9 kg (178 lb). Goal fat loss = 91 kg - 80.9 kg = 10.1 kg (22.2 lb)."}], "relacionadas": [{"id": "nota-0033", "tipo": "complementa", "justificativa": "fornece um método para estimar um peso-meta específico a partir de %gordura desejado, complementando a discussão de razão potência/peso da nota-0033"}], "confianca": 0.85, "status": "auto-aprovado", "body": "Fórmula para calcular o **peso corporal-meta** de um atleta a partir de sua massa livre de gordura (FFM) atual e de um percentual de gordura desejado, assumindo que a FFM permanece constante durante o processo (premissa que só se sustenta se a perda for de fato majoritariamente gordura, não músculo):\n\n**Peso-meta = FFM atual ÷ (1,00 − %gordura desejado, em fração decimal)**\n\nPasso a passo, com exemplo do livro (homem de 91 kg, 20% de gordura, que quer chegar a 10%):\n1. Massa de gordura atual = 91 kg × 0,20 = 18,2 kg\n2. FFM atual = 91 − 18,2 = 72,8 kg\n3. Peso-meta = 72,8 ÷ (1,00 − 0,10) = 72,8 ÷ 0,90 = **80,9 kg**\n4. Perda de gordura necessária = 91 − 80,9 = **10,1 kg**\n\nEssa fórmula é mais adequada para definir metas de composição corporal do que simplesmente \"perder X kg\", porque ancora a meta num %gordura-alvo realista em vez de um peso-tabela genérico — relevante em ciclismo, onde o objetivo raramente é \"pesar menos\" isoladamente, mas sim otimizar a razão potência/peso (nota-0033) sem sacrificar massa muscular/potência.\n\nLimitação importante: o cálculo assume que toda a perda de peso vem de gordura e a FFM não muda — na prática, déficits calóricos agressivos ou mal planejados também reduzem FFM (ver notas sobre déficit calórico moderado e sobre perda de peso via exercício vs. restrição calórica), o que faz o peso real necessário para atingir o %gordura-alvo ser diferente do calculado."},{"id": "nota-0282", "titulo": "IMC mal classifica atletas musculosos e ciclistas de elite têm IMC baixo e homogêneo", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 735, "trecho": "The possibility of misclassifying someone as overweight (or obese) by applying BMI standards pertains particularly to large-size field athletes, bodybuilders, weightlifters, heavier wrestlers, and most professional American football players."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 736, "trecho": "racing cyclists who participated in the Tour de France—had remarkably low BMIs. In the 1997 race, the BMI for 170 competitors averaged 21.5 (1.79 m stature (70.5 in.), 68.7 kg (151.1 lb) body mass)... The results were almost identical in 2005 for the 189 riders... On average, the variation in stature and body weight among cycling teams remains remarkably small."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 736, "trecho": "The homogeneity in body size variables among these top-level performers makes it unlikely that body composition variables per se determine individual differences in cycling performance."}], "relacionadas": [{"id": "nota-0033", "tipo": "complementa", "justificativa": "dado histórico de IMC de ciclistas profissionais de elite complementa a discussão de razão potência/peso"}, {"id": "nota-0164", "tipo": "complementa", "justificativa": "mesma lógica de nota-0164 (uma métrica fisiológica isolada não determina desempenho): aqui aplicada a composição corporal/IMC entre ciclistas de elite homogêneos"}], "confianca": 0.72, "status": "auto-aprovado", "body": "O **Índice de Massa Corporal (IMC = massa corporal em kg ÷ estatura² em m)** classifica mal atletas com grande massa muscular: por não distinguir massa magra de massa gorda, um atleta muito musculoso pode ser classificado como \"sobrepeso\" ou \"obeso\" por padrões de IMC populacionais mesmo com baixo percentual de gordura — problema documentado em jogadores de futebol americano, halterofilistas, lutadores pesados e atletas de arremesso.\n\nNo polo oposto, ciclistas de estrada de elite apresentam **IMC consistentemente baixo e extremamente homogêneo**, estável ao longo de décadas de competição no Tour de France:\n- 1997: 170 competidores, IMC médio 21,5 (estatura 1,79 m, massa 68,7 kg)\n- 2000: 162 competidores, IMC médio 21,5 (mesma estatura, massa 69,1 kg)\n- 2005: 189 competidores, IMC 21,5 (mesma estatura, massa 71 kg)\n- 2012 (vencedor Bradley Wiggins): mais alto que a média dos ciclistas (1,90 m) mas com massa proporcionalmente equivalente (69,0 kg)\n\nA conclusão do texto-fonte: **a homogeneidade de composição corporal entre os ciclistas de elite torna improvável que variáveis de composição corporal, por si só, expliquem diferenças individuais de desempenho em ciclismo** dentro desse grupo já pré-selecionado por nível competitivo — reforçando que, uma vez que o atleta já está numa faixa de IMC/composição corporal compatível com o esporte, otimizar ainda mais o peso tem retorno decrescente, e outros fatores (potência absoluta, capacidade aeróbia, tática) pesam mais para diferenciar desempenho entre pares.\n\nAplicação: útil como contraponto educativo quando um ciclista se compara a padrões de IMC de saúde pública geral (pensados para população sedentária, não para atletas) — o IMC isoladamente não deve orientar decisões de peso de um ciclista treinado; e mesmo entre ciclistas de elite já magros, buscar composição corporal ainda mais extrema tem baixo retorno esperado de desempenho."},{"id": "nota-0283", "titulo": "Composição corporal de referência de ciclistas de estrada profissionais", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 769, "trecho": "Figure 29.1 • Comparison of the lean-fat ratio among male and female competitors in diverse sports. Values are based on the average body mass and percentage body fat for each sport from various studies in the literature... Road cyclists, pro — Mass, kg 71.3; % Fat 11.6; FFM, kg 63.0"}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 769, "trecho": "Marathon runners — Mass, kg 59.4; % Fat 3.3; FFM, kg 57.4 ... Distance runners — Mass, kg 67.2; % Fat 11.8; FFM, kg 59.3"}], "relacionadas": [{"id": "nota-0033", "tipo": "complementa", "justificativa": "dado de referência de composição corporal de ciclistas profissionais, útil como benchmark para razão potência/peso"}, {"id": "nota-0282", "tipo": "complementa", "justificativa": "mesmo grupo de dados de composição corporal de ciclistas de elite (Capítulo 29 do McArdle), aqui com %gordura e FFM em vez de IMC"}], "confianca": 0.72, "status": "auto-aprovado", "body": "Compilação da literatura científica (múltiplos estudos, valor médio) sobre composição corporal de **ciclistas de estrada profissionais do sexo masculino**: massa corporal média de **71,3 kg**, **11,6% de gordura corporal**, massa livre de gordura (FFM) de **63,0 kg**.\n\nPara contextualizar dentro do espectro de esportes de endurance masculinos (mesma fonte, mesma tabela): corredores de maratona são o extremo mais magro (59,4 kg, 3,3% gordura, FFM 57,4 kg), seguidos de ginastas (4,6%) e nadadores (6,8%); corredores de fundo/meio-fundo têm 11,8% de gordura (67,2 kg) — muito próximo do valor de ciclistas profissionais. Ciclistas de elite, portanto, não são o grupo mais magro do endurance, mas ficam na faixa baixa-moderada, consistentes com a necessidade de gerar potência absoluta maior que corredores de longa distância.\n\nNão há tabela equivalente com dados de ciclistas profissionais do sexo feminino nesta fonte.\n\nAplicação: serve como ponto de referência de \"normalidade\" para %gordura de ciclistas de alto nível ao interpretar dados de composição corporal de um atleta — útil para contextualizar se um valor medido está dentro, acima ou abaixo do observado em ciclistas de elite, sem tratar esse valor como meta obrigatória (ver nota-0282 sobre retorno decrescente de otimizar ainda mais a composição corporal)."},{"id": "nota-0289", "titulo": "Treino de endurance em idosos produz ganhos de VO2máx comparáveis a jovens; mecanismo difere por sexo", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 858, "trecho": "Nine to 12 mo of endurance training increased VO2max by 19% in men and 22% in women (Table 31.1). These values represent the high end of improvement typically observed for younger adults."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 858, "trecho": "For men, improved aerobic power was associated with a 15% larger maximum stroke volume (corresponding cardiac output increase represented two thirds of the VO2max increase) and 7% greater maximum a-vO2 difference... For the women, the a-vO2 difference explained the total VO2max increase, with no change in left-ventricular performance at maximal exercise."}], "relacionadas": [{"id": "nota-0207", "tipo": "complementa", "justificativa": "nota-0207 trata do declínio linear do VO2máx com a idade; esta nota mostra que, apesar do declínio de base, idosos ainda respondem fortemente ao treino de endurance"}, {"id": "nota-0216", "tipo": "complementa", "justificativa": "reforça, com dado específico de idosos, que a capacidade de resposta ao treino de VO2máx não desaparece com a idade quando o estímulo é adequado"}], "confianca": 0.65, "status": "revisar", "body": "Um estudo (Spina et al., 1993) com 15 homens (63±3 anos) e 16 mulheres (64±3 anos) submetidos a **9-12 meses de treino de endurance** mostrou ganhos de VO2máx de **19% nos homens e 22% nas mulheres** — magnitude que representa a **extremidade superior** dos ganhos tipicamente observados em adultos jovens no mesmo período de treino. Ou seja, o envelhecimento não reduz necessariamente a capacidade de resposta ao treino de VO2máx (treinabilidade), mesmo já havendo declínio de base relacionado à idade (ver nota-0207).\n\nO mecanismo do ganho, porém, **difere por sexo**:\n- **Homens:** o ganho de VO2máx veio de aumento de 15% no volume sistólico máximo (explicando dois terços do ganho, via débito cardíaco — mecanismo central) mais 7% de aumento na diferença arteriovenosa de O2 (mecanismo periférico).\n- **Mulheres:** o ganho de VO2máx foi explicado **inteiramente** pelo aumento da diferença arteriovenosa de O2 (extração periférica de oxigênio pelo músculo treinado), **sem nenhum aumento** de volume sistólico ou desempenho ventricular esquerdo máximo.\n\nHipóteses para a ausência de resposta cardíaca central em mulheres idosas: menor expansão do volume plasmático com o treino, menor sensibilidade do barorreflexo cardiopulmonar, e maior rigidez vascular relacionada à deficiência de estrogênio pós-menopausa.\n\nNota de confiança: resultado de um único estudo com amostra pequena (n=31 no total) — a magnitude exata dos percentuais não deve ser generalizada, mas o padrão qualitativo (idosos ainda respondem bem ao treino; diferença de mecanismo por sexo) é biologicamente plausível e consistente com outras notas do cânone sobre não-respondedores (nota-0216).\n\nAplicação ao feedback: reforça que recomendar/manter treino de endurance estruturado em ciclistas mais velhos (60+) é justificado por ganhos de VO2máx potencialmente tão grandes quanto em atletas jovens — a idade avançada não deveria, por si só, reduzir a ambição de metas de melhoria de capacidade aeróbia no feedback dado ao atleta."}]</script>
