e **capacidade** (quantidade fixa de energia), não de taxa. É análoga à Capacidade Anaeróbia do Power Profile clássico, mas reconhece que a fronteira entre sistemas aeróbio/anaeróbio não é discreta.\n\nAnalogia usada pelo livro: FRC funciona como a bateria de um carro híbrido — o motor a gasolina (sistema aeróbio/FTP) fornece a maior parte da energia continuamente, e a bateria (FRC) complementa quando necessário, mas descarrega rápido; com repouso (ou esforço abaixo do FTP), a \"bateria\" recarrega, mas não instantaneamente — recarrega mais devagar se o descanso for logo abaixo do FTP, e mais rápido se for descanso completo.\n\n**Fórmula prática: potência sustentável acima do FTP = FRC (J) ÷ duração do esforço (s).** Potência total sustentável = FTP + (FRC ÷ duração).\n\nExemplo numérico completo do livro (FTP = 300 W, FRC = 20.000 J):\n- Esforço de 30 s: 20.000 ÷ 30 = 666,7 W acima do FTP → sustenta 300 + 667 ≈ 967 W\n- Esforço de 120 s: 20.000 ÷ 120 = 166,7 W acima do FTP → sustenta 300 + 167 = 467 W\n- Esforço de 180 s: 20.000 ÷ 180 = 111 W acima do FTP → sustenta 300 + 111 = 411 W\n- Esforço de 30 min: 20.000 ÷ 1800 ≈ 11 W acima do FTP → sustenta apenas 300 + 11 = 311 W\n\nConclusão prática direta do exemplo: quanto mais longa a duração do esforço, menor a contribuição relativa da FRC — para esforços de mais de poucos minutos, treinar para aumentar o FTP compensa muito mais do que treinar para aumentar a FRC.\n\nAplicação ao feedback: usar a FRC (quando modelada) para estimar quanto de potência acima do FTP um atleta ainda consegue sustentar para uma duração-alvo específica (ex.: planejar quantos watts acima do FTP são viáveis num ataque de 30s vs. 3min) — mais preciso do que assumir uma queda percentual fixa para todas as durações."},{"id": "nota-0079", "titulo": "mFTP (no modelo Potência-Duração): o ponto onde a curva se achata — não necessariamente aos 60 minutos exatos", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["potência-máx", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 205, "trecho": "mFTP is the power level on the Power Duration Curve at which the curve flattens horizontally."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 206, "trecho": "The flat point on this curve identified as the mFTP might correspond to a maximal 45-minute effort, or a 60-minute effort, or a 75-minute effort, depending on the individual and his or her fitness. That being said, on average, the mFTP will still be around one hour for most individuals."}], "relacionadas": [{"id": "nota-0027", "tipo": "complementa", "justificativa": "outra definição de mFTP (Capítulo 3, nota-0027, focada na janela móvel de 90 dias do WKO4); esta nota (Capítulo 8) define mFTP a partir do ponto de achatamento da curva Potência-Duração"}], "confianca": 0.8, "status": "auto-aprovado", "body": "No modelo Potência-Duração, o **mFTP (modeled FTP)** é definido como o nível de potência no qual a curva ajustada se achata horizontalmente (o \"platô\" da curva) — não é definido por uma janela de tempo fixa de exatamente 60 minutos. Esse ponto de achatamento pode corresponder, dependendo do atleta e de sua fitness, a um esforço máximo de ~45, ~60 ou até ~75 minutos — mas, em média, para a maioria dos atletas, ainda fica em torno de 1 hora.\n\nContexto histórico sobre por que a convenção de 60 minutos existiu: antes do Power Profile e do modelo Potência-Duração, \"limiar\" era um termo vago com mais de 30 definições cientificamente validadas na literatura (limiar de lactato, limiar anaeróbio, limiar ventilatório, etc.), o que gerava confusão. Fixar o FTP como \"a potência sustentável por ~1 hora\" resolveu 3 problemas práticos: eliminou a necessidade de teste laboratorial, padronizou a definição de limiar entre praticantes, e tornou o \"limiar\" uma métrica de desempenho prática e mensurável. A Potência Crítica (CP, ver nota-0026) é um método alternativo relacionado, com valor de potência próximo ao FTP mas tipicamente sustentável por 40–75 minutos.\n\nAplicação ao feedback: se o mFTP de um atleta (ponto de achatamento real da curva) corresponde a uma duração bem diferente de 60 minutos, isso é uma característica individualizante válida (não um erro) — pode ser usado, junto com outras métricas do modelo Potência-Duração, para descrever o perfil único daquele atleta (ver nota-0080 sobre Time to Exhaustion)."},{"id": "nota-0080", "titulo": "TTE (Time to Exhaustion): quanto tempo o atleta sustenta o próprio mFTP — dois atletas com mFTP igual podem ter TTE muito diferente", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["potência-média", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 207, "trecho": "Time to exhaustion (TTE)... the duration that the mFTP power level can be maintained."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 207, "trecho": "These two riders have almost exactly the same Pmax (~1,300 watts) and mFTP (~320 watts). The top rider has a TTE of 34:23 while the bottom rider has a TTE of 52:40."}], "relacionadas": [{"id": "nota-0079", "tipo": "pre-requisito", "justificativa": "TTE mede a duração de sustentação do mFTP definido na nota-0079"}], "confianca": 0.8, "status": "auto-aprovado", "body": "TTE (Time to Exhaustion) é a duração que o atleta consegue de fato sustentar seu próprio mFTP antes de fadigar completamente. É uma métrica complementar ao mFTP: dois atletas podem ter Pmax e mFTP praticamente idênticos, mas TTEs bem diferentes — exemplo do livro: dois ciclistas com Pmax ~1.300 W e mFTP ~320 W, um com TTE de 34:23 e o outro de 52:40. O primeiro tem uma curva Potência-Duração que cai mais rápido e mais cedo depois do platô do mFTP; o segundo sustenta o mesmo nível de potência por bem mais tempo.\n\nAplicação ao feedback: dois atletas com o \"mesmo FTP\" (no sentido tradicional) podem ter capacidades de resistência à fadiga muito diferentes em provas longas — TTE captura essa diferença que o FTP sozinho não revela, sendo relevante para prever/explicar performance em eventos de duração próxima ou superior ao mFTP do atleta."},{"id": "nota-0081", "titulo": "Stamina: % de resistência à fadiga em esforços sub-FTP prolongados; maioria dos atletas fica entre 75-85%", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["potência-média", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 208, "trecho": "stamina... is defined as a measure of resistance to fatigue during prolonged-duration, moderate-intensity exercise... it refers to the time an athlete can ride at a sub-FTP level before fatiguing. A stamina score of 100 percent would indicate that a rider would never fatigue, while a score below 50 percent would indicate that the rider fatigues quickly."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 208, "trecho": "Most riders will exhibit values in the 75 to 85 percent range, and it is useful to observe stamina over time in order to track increasing or decreasing ability to stave off fatigue at sub-FTP power levels."}], "relacionadas": [{"id": "nota-0079", "tipo": "complementa", "justificativa": "refere-se à parte da curva Potência-Duração além do mFTP definido na nota-0079 (cauda longa, esforços sub-FTP)"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Stamina, no modelo Potência-Duração, é uma métrica de resistência à fadiga em exercício prolongado de intensidade moderada (abaixo do FTP) — corresponde à \"cauda\" da Curva de Potência-Duração além do ponto de mFTP, onde a curva se achata uma segunda vez. Expressa como percentual: 100% indicaria (teoricamente) que o atleta nunca fadigaria em intensidade sub-FTP; um score abaixo de 50% indica fadiga rápida mesmo em intensidade sub-limiar. A maioria dos ciclistas fica na faixa de **75–85%**.\n\nAplicação ao feedback: acompanhar o Stamina ao longo do tempo serve para monitorar se a capacidade do atleta de manter esforços sub-FTP prolongados (relevante para provas longas, fundo, ultraendurance) está melhorando ou piorando — é uma métrica distinta de FTP/mFTP/TTE, focada especificamente na cauda longa da curva de duração."},{"id": "nota-0102", "titulo": "WAC Score (Williams, Allen, Coggan): pontuação de desempenho ajustada por idade vs. melhores do mundo", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 282, "trecho": "The WAC (Williams, Allen, Coggan) score chart is a tool that assigns the rider a score for all time durations against the world's best and then adjusts the score to account for age. It's essentially a variation on the Power Profile chart that captures how a rider compares against the world's best both in the pro ranks and in their age category. Bill's peak WAC score is a 74 against his peers at 22:48, which means he performs at 74 percent of the world champion's best wattage for that same time duration."}], "relacionadas": [{"id": "nota-0032", "tipo": "alternativa-a", "justificativa": "variação do Power Profile (nota-0032) que usa como referência os melhores do mundo ajustados por idade, em vez das categorias fixas do Power Profile clássico"}], "confianca": 0.55, "status": "revisar", "body": "O WAC Score é uma ferramenta citada pelos autores (Peaks Coaching Group) que atribui, para cada duração de esforço, uma pontuação percentual comparando a potência do atleta contra a melhor marca mundial (pro) naquela duração, com ajuste por idade/categoria do atleta. Exemplo do livro: um WAC de 74 aos 22:48 minutos significa que o atleta produziu 74% da potência do melhor do mundo nessa duração.\n\n**Motivo da baixa confiança/revisão:** o livro não fornece a tabela de referência completa (valores mundiais por duração) nem a fórmula exata de ajuste por idade — é uma ferramenta proprietária do Peaks Coaching Group (mesmo grupo dos autores), citada apenas conceitualmente. Não é possível reproduzir o cálculo do WAC Score sem acesso à tabela/software original, e não está claro se a ferramenta continua disponível/atualizada.\n\nAplicação ao feedback: manter como contexto — é conceitualmente semelhante ao Power Profile (nota-0032) mas usando referência absoluta mundial ajustada por idade em vez de categorias fixas por W/kg. Não implementável diretamente no produto sem a tabela de referência original; não usar para gerar recomendações até validação."},{"id": "nota-0103", "titulo": "Mean Maximal Power (MMP) Curve vs. Power Duration Curve (PDC): dados reais vs. modelo ajustado", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 299, "trecho": "The MMP Curve is a plot of all your bests—your best 39 seconds, your best 56 seconds, your best 1:38, your best 5:42, your best 1:15:32, and so on... It is worth noting the differences between the Mean Maximal Power Curve and the Power Duration Curve (PDC). The Power Duration Curve is simply the line that best fits your MMP curve, and is used to help derive many of the metrics we have already discussed: FRC, Pmax, Stamina, and modeled FTP."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 300, "trecho": "It is important to review both when considering fitness changes, but ultimately, your real-world power data in the MMP curve offers the best glimpse of your fitness, strengths, and weaknesses."}], "relacionadas": [{"id": "nota-0037", "tipo": "pre-requisito", "justificativa": "a PDC (nota-0037, conceito introdutório, e correlatas de Pmax/FRC/mFTP nota-0077/0078/0079) é o modelo ajustado derivado da MMP Curve descrita aqui"}], "confianca": 0.85, "status": "auto-aprovado", "body": "Distinção técnica importante entre duas curvas relacionadas mas diferentes:\n\n- **MMP Curve (Mean Maximal Power Curve):** plotagem de todos os \"melhores esforços\" reais do atleta, para cada incremento de duração (melhor 39s, melhor 56s, melhor 1:38, etc.), extraídos diretamente dos dados brutos de potência coletados. É dado real, não modelado.\n- **PDC (Power Duration Curve):** a linha de melhor ajuste (curva matemática) sobre a MMP Curve — é o **modelo** usado para derivar métricas como FRC, Pmax, Stamina e FTP modelada (mFTP).\n\nOs autores recomendam revisar as duas: a PDC (modelo) é útil para extrair os parâmetros padronizados, mas a **MMP Curve real oferece o retrato mais fiel** da forma física, pontos fortes e fracos do atleta, já que é dado bruto e não uma aproximação matemática.\n\nAplicação ao feedback: ao calcular métricas derivadas (FRC, Pmax, mFTP) a partir de um ajuste de curva sobre os dados de potência do atleta, é importante não tratar esses valores modelados como substitutos completos dos picos reais de potência — o sistema deveria expor ambos (picos reais por duração E os parâmetros modelados) para evitar decisões baseadas apenas no ajuste matemático, que pode ter erro de fit em certas faixas de duração."},{"id": "nota-0104", "titulo": "Como interpretar mudanças de inclinação e 'vales' na MMP Curve sem confundir com limite fisiológico", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 302, "trecho": "note that at 1 minute 25 seconds, the slope dramatically changes, and the new slope continues until about 7:25, at which point it flattens out even more. It could be that this slope shows the athlete moving from the anaerobic capacity system into the VO2max system and then transitioning into the lactate threshold system around that 7:25 mark."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 303, "trecho": "Does this mean that you cannot do, say, 350 watts for 1:24, but you can do this same wattage for 1:45? No—that would not make sense... Remember: This is a curve of the best watts you produced for every 2- to 3-second increment over a long period of time. It's highly possible that you did a hard hill interval for 1:45 at about 350 watts but then did not do any maximal efforts for 1:24. Therefore, it's possible that your chart could show a higher wattage for that longer time period."}], "relacionadas": [{"id": "nota-0103", "tipo": "pre-requisito", "justificativa": "aplica-se sobre a MMP Curve definida na nota-0103"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Duas regras de leitura da MMP Curve (curva de melhores potências por duração, dados reais):\n\n1. **Pontos de mudança de inclinação (breakpoints)** ao longo da curva costumam corresponder a transições entre sistemas energéticos predominantes (ex.: de capacidade anaeróbia para VO2max, e deste para limiar de lactato). A posição exata desses breakpoints é individual.\n\n2. **\"Vales\" ou inversões locais na curva (potência maior numa duração mais longa que numa mais curta)** não representam impossibilidade fisiológica — são artefato da coleta de dados reais: o atleta pode simplesmente não ter feito um esforço máximo justamente naquela duração mais curta, enquanto fez um esforço quase-máximo por acaso numa duração mais longa (ex.: um hill repeat de 1:45). A MMP Curve reflete os melhores dados *disponíveis*, não o teto fisiológico teórico em cada ponto.\n\nAplicação ao feedback: ao gerar interpretações automáticas a partir da curva de potência do atleta, (a) usar mudanças de inclinação como candidatos a limites entre sistemas energéticos para direcionar recomendações de treino específicas; (b) não sinalizar como \"anomalia\" ou erro de dado uma inversão local da curva — isso é esperado e normal em dados reais esparsos, não indica problema de medição."},{"id": "nota-0105", "titulo": "Além de ~1 hora, a Potência Normalizada (NP) é medida mais fiel da capacidade real do que a potência média bruta (MMP)", "dominio": "metricas-de-potencia", "camada": ["diario", "mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-máx", "NP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 304, "trecho": "at longer durations, your average power will tend to be lower than the maximum wattage you can produce, in part because of the time you spend not pedaling. Thus, beyond about 1 hour (or beyond the longest, generally flat time trial that you have done), Normalized Power will be a more accurate measure of your true ability. In Figure 11.10, the upper line shows mean maximal power, while the lower line is the mean maximal Normalized Power. At about 7:25, they switch places and the Normalized Power becomes the upper line."}], "relacionadas": [{"id": "nota-0059", "tipo": "pre-requisito", "justificativa": "usa a definição de NP (nota-0059) e compara sua trajetória contra a potência média bruta (MMP) ao longo da duração do esforço"}], "confianca": 0.7, "status": "auto-aprovado", "body": "Ao comparar a curva de Potência Média Máxima (MMP, dados brutos) com a curva de NP Média Máxima ao longo de diferentes durações, as duas linhas se cruzam por volta de **7:25 (minutos:segundos)**: abaixo dessa duração, a potência média bruta é maior que a NP; acima dela, a NP passa a ser maior que a potência média bruta.\n\nExplicação: em esforços mais longos, a potência média bruta tende a subestimar a capacidade real do atleta, em parte por causa do tempo sem pedalar (freewheeling, curvas, semáforos etc.), que puxa a média para baixo. Por isso, **além de ~1 hora** (ou além do contrarrelógio mais longo e \"plano\" já realizado pelo atleta), a **NP é a métrica mais confiável** da capacidade real.\n\nAplicação ao feedback: ao comparar recordes pessoais/picos de potência do atleta por duração, usar potência média bruta para esforços curtos (até a faixa de ~7-8 minutos) mas priorizar a NP para avaliar esforços longos (>1h), especialmente em provas ou treinos com muitas paradas/variações de terreno."},{"id": "nota-0107", "titulo": "Efeito 'gangorra' entre FRC/Pmax e FTP modelada (mFTP): retestar só os esforços curtos após semana de descanso pode fazer a FTP modelada parecer cair sem ter caído de verdade", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-máx", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 318, "trecho": "It is important to note that the FRC, Pmax, and mFTP can have a 'teeter-totter' relationship. Remember that you are tracking all of the area under your Power Duration Curve, and if you test your 1 minute and 5 minute power after a rest week and raise the FRC portion of the curve without also testing your 20- or 60-minute FTP power, then you will raise the left side of the curve up and the right side (durations longer than 5 minutes) will appear to drop by comparison. This is the reason you might see a drop in your modeled FTP after a new best for your FRC. It's not likely that your FTP actually dropped; rather it's a result of how the PDC is affected by your MMP Curve."}], "relacionadas": [{"id": "nota-0103", "tipo": "pre-requisito", "justificativa": "explica um artefato de modelagem da PDC (nota-0103), que é ajustada sobre a MMP Curve"}, {"id": "nota-0082", "tipo": "complementa", "justificativa": "afeta diretamente a leitura de FRC, Pmax e mFTP consolidados no Mapa Fenotípico (nota-0082) e nas notas do Cap.8"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Artefato importante de modelagem da PDC (Curva de Duração de Potência): FRC, Pmax e FTP modelada (mFTP) são todos derivados do mesmo ajuste de curva sobre a área sob a MMP Curve. Se o atleta faz um novo recorde de potência de curta duração (1-5 minutos, elevando o FRC/Pmax) mas **não** retesta simultaneamente as durações longas (20-60 minutos), o ajuste da curva pode fazer a **FTP modelada parecer cair** — não porque a FTP real caiu, mas porque elevar o lado esquerdo da curva (curta duração) sem atualizar o lado direito (longa duração) distorce o formato ajustado da PDC.\n\nAplicação ao feedback: antes de sinalizar uma \"queda de FTP\" com base em recálculo automático da PDC, verificar se houve reteste recente e completo dos dois lados da curva (esforços curtos E longos). Se apenas esforços curtos foram atualizados recentemente, tratar uma aparente queda de mFTP como possível artefato de modelagem, não como perda real de fitness — sinalizar como baixa confiança até haver um teste direto de 20-60 minutos mais recente."},{"id": "nota-0108", "titulo": "TTE (Time to Exhaustion) como indicador antecedente de melhora iminente da FTP; reseta após o aumento", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-média", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 318, "trecho": "Interestingly, the TTE (time to exhaustion) can be a preceding indicator to an FTP improvement. A TTE that moves closer and closer to or even exceeds 1 hour can be an indicator that the rider's FTP may increase very soon. Once the FTP improves, the TTE resets back to a lower time frame until the athlete can prove that he can maintain that power for the full hour again."}], "relacionadas": [{"id": "nota-0079", "tipo": "complementa", "justificativa": "acrescenta um papel preditivo ao conceito de TTE já definido nas notas do Cap.8 (tempo até exaustão na FTP)"}], "confianca": 0.7, "status": "auto-aprovado", "body": "O TTE (tempo que o atleta consegue sustentar a potência da FTP até a exaustão) não é só uma métrica descritiva — pode funcionar como **indicador antecedente** de uma melhora iminente de FTP: quando o TTE do atleta vai se aproximando de 1 hora (ou até ultrapassando), é sinal de que a FTP provavelmente vai subir em breve. Uma vez que a FTP é de fato elevada (por reteste ou remodelagem), o TTE **reseta** para um valor mais baixo, até que o atleta comprove de novo que consegue sustentar a nova potência por uma hora inteira.\n\nAplicação ao feedback: monitorar a tendência do TTE modelado do atleta ao longo do tempo — um TTE em trajetória de alta aproximando-se de 60 minutos é um sinal para o sistema sugerir um novo teste de FTP em breve (a FTP atual provavelmente está subestimada). Um TTE que caiu bruscamente após um aumento recente de FTP é esperado e não deve ser lido como perda de fitness."},{"id": "nota-0113", "titulo": "Assimetria subida/descida: potência acima da FTP em subida não é necessariamente erro de pacing; recuperação ocorre naturalmente na descida", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 336, "trecho": "When riding uphill, in almost every situation, you can afford to produce more watts than you can in other parts of a triathlon or time trial. This is because you have more resistance to push against, and on the downhills, there isn't a big enough gear to allow you to produce the same level of force, no matter how hard you try."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 337, "trecho": "your FTP is 215 watts, and on the longer uphills you ride right at your FTP, or above it on the shorter ones (106 percent, or 230 watts); on the downhills, you might be lucky to be able to produce 120 watts. That would be roughly 55 percent of your FTP, which is Level 1, or Active Recovery pace."}], "relacionadas": [{"id": "nota-0112", "tipo": "complementa", "justificativa": "explica fisicamente por que as diretrizes de +5%/+10% em subidas (nota-0112) são sustentáveis apesar de excederem a potência-alvo"}], "confianca": 0.7, "status": "auto-aprovado", "body": "Princípio físico: em subidas, o atleta consegue sustentar potências mais altas (na FTP ou até ~106% dela em subidas curtas) porque há mais resistência para empurrar contra; em descidas, mesmo pedalando ao máximo esforço, a marcha disponível na bicicleta não permite gerar a mesma força — a potência cai naturalmente para algo como 55% da FTP (faixa de Nível 1/Recuperação Ativa), funcionando como recuperação embutida no percurso.\n\nAplicação ao feedback: ao analisar um percurso com muitos desníveis (comum em ciclismo de estrada ou bike leg de triathlon hilly), picos de potência acima da FTP em trechos de subida **não devem ser automaticamente sinalizados como erro de pacing** — isso é esperado e compensado pela recuperação natural nas descidas subsequentes. O foco da análise de pacing deveria estar no IF/NP médio da prova inteira e no Variability Index, não em picos isolados correlacionados com o perfil de elevação do percurso."},{"id": "nota-0119", "titulo": "Vento de frente amplifica a vantagem de quem tem FTP mais alta; vento de cauda nivela as diferenças entre atletas", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["potência-média", "FTP", "velocidade"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 356, "trecho": "someone with an FTP of 340 watts can maybe put out 320 watts and rides at a speed of 32.5 mph in the tailwind, and a cyclist with an FTP of 320 watts can only put out about 300 watts in the tailwind and rides at an average speed of 32.1 mph. In a 40 km TT, this small speed difference for 20 km will result in the faster rider gaining only 17 seconds over the slower rider."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 356, "trecho": "On the headwind section of the course, the rider with 340 watts can ride at 22 mph for the entire 20 km, and the rider with 320 watts averages only 20.5 mph for the same section. This gives the rider with 340 watts at FTP a 194-second advantage on that portion of the course."}], "relacionadas": [{"id": "nota-0021", "tipo": "pre-requisito", "justificativa": "quantifica como o vento distorce a relação entre FTP (nota-0021) e velocidade/desempenho de prova"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Exemplo quantitativo comparando dois ciclistas (FTP 340W vs. 320W) num contrarrelógio de 40 km dividido em metade com vento de cauda e metade com vento de frente:\n\n- **Trecho com vento de cauda (20 km):** a diferença de potência sustentável entre os dois se reduz (320W vs. 300W efetivos), e a diferença de velocidade também (32,5 mph vs. 32,1 mph) — resultando em apenas **17 segundos** de vantagem para o atleta de FTP mais alta nesse trecho.\n- **Trecho com vento de frente (20 km):** a mesma diferença de FTP se traduz em vantagem de velocidade muito maior (22 mph vs. 20,5 mph) — resultando em **194 segundos** de vantagem para o atleta de FTP mais alta nesse trecho.\n\nConclusão dos autores: o vento de cauda tende a nivelar as diferenças de aptidão entre atletas, enquanto o vento de frente as amplifica — \"a prova pode ser vencida no trecho contra o vento.\"\n\nAplicação ao feedback: ao interpretar o desempenho de um atleta num contrarrelógio ou segmento com vento variável, não esperar que a mesma diferença relativa de potência produza a mesma diferença relativa de tempo/velocidade em todos os trechos — trechos contra o vento amplificam o efeito de diferenças de FTP/potência muito mais que trechos a favor do vento. Nota de contexto: exemplo numérico único do livro, não uma fórmula física derivável sem dados adicionais (área frontal, CdA, densidade do ar)."},{"id": "nota-0122", "titulo": "Comparar Quadrant Analysis de um treino contra a prova-alvo para verificar se o treino é neuromuscularmente específico", "dominio": "metricas-de-potencia", "camada": ["semanal", "mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal", "cadência"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 361, "trecho": "Now let's compare the same two power files using Quadrant Analysis and see if the athlete is training in the correct quadrants to specifically address the neuromuscular system... the majority of his time pedaling fell into Quadrants III and IV... this training ride accomplished the goal of stressing his metabolic fitness, [but] it did not place much emphasis on the use of his Type II, or fast-twitch, muscle fibers."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 363, "trecho": "It is apparent that the race put a much larger demand on multiple neuromuscular capabilities than the training ride did... although the majority of the ride was in Quadrant III, it also contained quite a lot of effort in Quadrant II."}], "relacionadas": [{"id": "nota-0067", "tipo": "pre-requisito", "justificativa": "aplica o conceito de Quadrant Analysis (nota-0067) para comparar treino contra a demanda real da prova-alvo"}, {"id": "nota-0110", "tipo": "complementa", "justificativa": "generaliza para qualquer modalidade (aqui, MTB/estrada) o mesmo princípio de checagem de especificidade já aplicado ao triathlon na nota-0110"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Método geral para verificar se o treino de um atleta é especificamente adequado às demandas neuromusculares da sua prova-alvo: comparar a distribuição por Quadrante (Quadrant Analysis) de um arquivo de **treino típico** contra a distribuição de um arquivo de **prova/corrida real** de duração semelhante.\n\nExemplo do livro (mountain bike): um treino de \"subthreshold\" ficou concentrado nos Quadrantes III e IV (baixa força), estressando bem o sistema metabólico mas pouco as fibras de contração rápida (Tipo II). A prova real do mesmo atleta mostrou distribuição muito mais dispersa (\"shotgun blast\"), com presença significativa em Quadrante II (alta força/baixa cadência) — evidenciando uma lacuna: o treino não estava replicando a demanda neuromuscular real da prova.\n\nAplicação ao feedback: quando o atleta tiver histórico de provas anteriores do mesmo tipo/percurso, comparar periodicamente a distribuição por quadrante dos treinos recentes contra a distribuição típica das provas-alvo. Uma discrepância sistemática (ex.: treino sempre em Q3/Q4, prova historicamente com bastante Q2) é uma lacuna de especificidade a ser sinalizada como recomendação de treino (ex.: sugerir mais trabalho em alta força/baixa cadência)."},{"id": "nota-0124", "titulo": "Gráfico de resistência à fadiga: comparar potência de pico fresco vs. após um limiar de kJ de trabalho (e degradação percentual do sprint)", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 364, "trecho": "You can pinpoint the areas in which you could improve your fatigue resistance... by reviewing your Power Duration Curve and comparing it to your best power when you're fresh versus after a certain amount of work has been done. You may be able to knock out 300 watts for 20 minutes when you are fresh, but what can you do after you have completed 2,000 kJs of work?"}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 365, "trecho": "Bill Masters's fatigue resistance chart shows a dramatic difference between his best 5-minute and 20-minute power when he is fresh at the beginning of a ride as compared to after 2,000 kJs of work. His 5-minute power drops from 261 watts to 202 watts, and his 20-minute power drops from 241 watts to 187 watts."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 366, "trecho": "he clearly has a very high fatigue resistance for a longer, 15-second sprint, which starts at 1,274 watts and drops only 20 percent after 15 seconds. Extend it out to a 41 percent degradation at 35 seconds into his sprint... he's still producing over 800 watts!"}], "relacionadas": [{"id": "nota-0079", "tipo": "complementa", "justificativa": "método alternativo/complementar ao conceito de Stamina (nota-0079) para quantificar degradação de potência com o acúmulo de trabalho"}], "confianca": 0.7, "status": "auto-aprovado", "body": "Metodologia para quantificar a resistência à fadiga de um atleta, útil para provas longas (>3h) ou para caracterizar o tipo de velocista:\n\n**Resistência à fadiga de médio/longo prazo:** comparar a melhor potência de 5 e 20 minutos do atleta quando **fresco** (início de um passeio/prova) contra a melhor potência para as mesmas durações **após um limiar de trabalho acumulado** (ex.: após 2.000 kJ). Exemplo do livro: um atleta teve queda de 261W→202W nos 5min e de 241W→187W nos 20min após 2.000 kJ de trabalho prévio — quantificando exatamente o quanto a fadiga acumulada corrói a capacidade de gerar potência.\n\n**Resistência à fadiga do sprint:** plotar a degradação percentual de potência a partir do pico máximo ao longo dos primeiros ~35 segundos de um esforço máximo. Exemplo: um velocista com queda de apenas 20% aos 15s (de 1.274W) e 41% aos 35s (ainda acima de 800W) tem alta resistência à fadiga de sprint — mais adequado a esperar/lançar o sprint de mais longe (~300-600m) do que a competir num sprint curtíssimo.\n\nAplicação ao feedback: para atletas com dados de provas longas (>3h) recorrentes, calcular a queda percentual de potência de pico (5min/20min) entre o início e o total acumulado de kJ da atividade — um percentual de queda muito maior que o histórico do próprio atleta é um sinal de baixa resistência à fadiga no dia, relevante para explicar um \"final fraco\" de prova. Para sprints, a curva de degradação percentual pode informar recomendações táticas (lançar sprint de mais longe vs. mais perto da linha)."},{"id": "nota-0125", "titulo": "O 'quase-platô' de potência após 1,5-2,5 minutos de um esforço bem pacing aproxima a potência real de VO2max, sem precisar de teste de laboratório", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 371, "trecho": "you could just as easily use the quasi-plateau in power that occurs after the 1.5- to 2.5-minute mark of a well-paced pursuit... this is essentially the rider's power at VO2max, as would be expected, since anaerobic capacity (as measured by maximal accumulated oxygen deficit) is generally completely used up after that period of time. So from that point, further exercise can only be performed on a 'pay as you go' basis (i.e., 100 percent aerobically)."}], "relacionadas": [{"id": "nota-0082", "tipo": "complementa", "justificativa": "oferece um método de campo (sem laboratório) para estimar a potência de VO2max, complementando os métodos de Power Profile/PDC/Mapa Fenotípico (nota-0082, Cap.8) e o teste 5min+20min (nota-0101)"}], "confianca": 0.65, "status": "auto-aprovado", "body": "Ao analisar a curva de potência de um esforço máximo bem-pacing (ex.: perseguição de 3-5 minutos), a potência tende a formar um **\"quase-platô\"** a partir de aproximadamente **1,5 a 2,5 minutos** do início do esforço. A partir desse ponto, a capacidade anaeróbia (déficit máximo acumulado de oxigênio) já está essencialmente esgotada, e o esforço remanescente passa a ser sustentado quase inteiramente por via aeróbia (\"pay as you go\"). Esse patamar de potência, portanto, é uma boa aproximação de campo da **potência real do atleta em VO2max**, sem necessidade de teste de laboratório com analisador de gases.\n\nAplicação ao feedback: em esforços máximos de 3+ minutos bem executados (constantes, sem variação abrupta), identificar o ponto onde a potência estabiliza (deixa de cair rapidamente) entre 1,5-2,5min como estimativa de campo da potência de VO2max do atleta — útil como validação cruzada para o valor de VO2max power já usado nas iLevels/Coggan Classic Levels (Cap.3)."},{"id": "nota-0130", "titulo": "Interpretar arquivo de potência de ciclocross: média 20-40W abaixo da FTP é normal (não indica esforço baixo); 'matches' partem de uma base já alta", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-média", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 378, "trecho": "Power-meter files from cyclocross races typically show an average of 20 to 40 watts below the actual FTP of the athlete. One reason for this is that there is so much downtime, spent coasting down a technical hill or running with the bike. The other reason is that many of the courses lack good traction..."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 379, "trecho": "One thing that is important to identify in a cyclocross power file is the number of watts above FTP and the length of each of these efforts... A cyclocross match is a little different from a match in a road race or a criterium, however, because most likely the racer is already at his or her FTP when the need to do a hard effort arises. In this case, the matches are more like bursts of flames coming up from an already raging fire!"}], "relacionadas": [{"id": "nota-0065", "tipo": "complementa", "justificativa": "redefine o conceito de 'matches' (esforços acima da FTP, já registrado nas notas do Cap.7) para o contexto específico do ciclocross, onde a base já está perto da FTP"}], "confianca": 0.7, "status": "auto-aprovado", "body": "Ao analisar um arquivo de potência de uma prova de ciclocross, a **potência média típica fica 20-40W abaixo da FTP real do atleta** — isso **não indica baixo esforço**. As causas são estruturais ao esporte: muito tempo sem pedalar (descidas técnicas em roda livre, corrida carregando a bicicleta) e perda de tração em barro/areia que reduz a potência transmitida ao solo mesmo com esforço máximo do atleta.\n\nAlém disso, o conceito de \"match\" (esforço acima da FTP, ver notas do Cap.7) tem significado diferente no ciclocross: como o atleta já está tipicamente pedalando perto da própria FTP na maior parte da prova, os \"matches\" são mais como \"labaredas subindo de uma fogueira que já está queimando forte\" — ou seja, picos relativamente menores em cima de uma base já alta, e não picos isolados vindos de um ritmo mais baixo (como costuma ocorrer em estrada).\n\nAplicação ao feedback: ao processar atividades classificadas como ciclocross, não usar o mesmo limiar de \"potência média baixa = esforço fraco\" aplicado a outras modalidades — potência média 20-40W abaixo da FTP pode representar uma prova de esforço máximo em ciclocross. Ao contar \"matches\" (picos acima da FTP), considerar que a base de referência já está próxima da FTP, então mesmo picos menores em amplitude podem representar esforços significativos."},{"id": "nota-0135", "titulo": "Economia de potência ao pedalar no rastro (draft) em perseguição por equipes: 64-71% da potência do líder", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": ["potência-média"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 388, "trecho": "Jeff and his colleagues measured the power that team pursuit riders produced in various positions in the paceline as well as their power during exchanges. They observed that riders in the second, third, or fourth position required only 64–71 percent of the power required for the lead rider."}], "relacionadas": [], "confianca": 0.55, "status": "auto-aprovado", "body": "Dados de pesquisa (Projeto 96, USA Cycling, preparação para as Olimpíadas de Atlanta 1996): em perseguição por equipes de pista, ciclistas nas posições 2ª, 3ª ou 4ª da fila (no rastro/draft) precisam de apenas **64-71% da potência** exigida do líder na ponta.\n\nAplicação ao feedback: referência de contexto para explicar a economia de energia proporcionada pelo draft em pelotão/echelon — pode ser usada como ordem de grandeza aproximada ao interpretar diferenças de potência entre \"puxar\" e \"descansar na roda\" em atividades de grupo, embora o valor exato varie com velocidade, vento e proximidade real do rastro (medido em condições controladas de pista, não necessariamente generalizável a estrada)."},{"id": "nota-0139", "titulo": "Benchmark de Quadrant Analysis em MTB de ultraresistência: ~21% em Quadrante II associado a sucesso; ~75% em Quadrantes III+IV indica boa conservação de energia", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["potência-série-temporal", "cadência"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 397, "trecho": "A Quadrant Analysis of Jeremiah's race shows that 21 percent of his ride was spent in Quadrant II, which represents slower cadence and higher force, and therefore we know that fatigue resistance of Type II fibers was a determining factor in his success... we can examine the amount of data in Quadrants III and IV, which represent nearly 75 percent of his ride. This confirms that Jeremiah did a very good job of pacing himself over the entire ride."}], "relacionadas": [{"id": "nota-0122", "tipo": "complementa", "justificativa": "fornece um benchmark numérico específico para MTB ultraresistência, complementando o método geral de comparação treino-vs-prova (nota-0122)"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Estudo de caso (vitória recorde de Jeremiah Bishop no Shenandoah 100, ~6h51min, TSS 356, NP 274W, FTP 390W): a distribuição por Quadrante de sua prova mostrou **21% do tempo em Quadrante II** (força alta, cadência baixa — típico de MTB em terreno técnico/subidas), o que os autores associam à resistência à fadiga de fibras Tipo II como fator determinante do sucesso; e **quase 75% do tempo em Quadrantes III+IV** (baixa força), confirmando uma boa estratégia geral de conservação de energia ao longo da prova. Nos últimos 36 minutos da prova (esforço final para descolar do 2º colocado), a proporção de tempo em Quadrante II se manteve elevada (~21%), refletindo o esforço de força necessário no ataque final.\n\nAplicação ao feedback: para atividades de MTB de ultraresistência (>4-5h), esses percentuais (~20% Q2, ~75% Q3+Q4) podem servir como referência aproximada de uma distribuição bem equilibrada entre desenvolvimento de força/resistência a fadiga (Q2) e conservação de energia (Q3/Q4). Nota de contexto: benchmark derivado de um único atleta de elite numa única prova — usar como ordem de grandeza, não como alvo numérico rígido para todos os atletas/perfis de percurso."},{"id": "nota-0146", "titulo": "Fórmulas de Pedaling Smoothness (Pavg/Ppeak) e Torque Efficiency (100×(P+−P−)/P+) — métricas bilaterais de pedalada", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["potência-série-temporal", "cadência"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 472, "trecho": "Pedaling smoothness Commonly used for bilateral power-meter metrics. The mean power averaged across one crank cycle divided by the peak power applied during that cycle—e.g., Pavg/Ppeak=Pedal Smoothness... For example: Pavg=200W, Ppeak=1500, so PS=13 percent... A smoother pedal stroke would be: Pavg=350W, Ppeak=700W, so PS=50 percent."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 473, "trecho": "Torque efficiency A metric commonly used for bilateral power meters in the Garmin ANT+ metrics. The sum of the positive power and the negative power over a single stroke divided by the positive power. For example: P+=150W, P-=30W. TE=100x(150+-30)/150= 100(120/150)=80% torque efficiency."}], "relacionadas": [{"id": "nota-0068", "tipo": "complementa", "justificativa": "métricas bilaterais adicionais de qualidade de pedalada, complementares ao GPR/GPA/Kurtotic Index já registrados nas notas do Cap.7"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Duas métricas de pedalada reportadas por medidores de potência bilaterais (comuns em unidades Garmin ANT+):\n\n- **Pedaling Smoothness (PS):** `PS = Potência_média_no_ciclo ÷ Potência_de_pico_no_ciclo`. Um número mais baixo indica um pico de potência muito maior que a média (pedalada \"batida\"/pouco suave); um número mais alto indica potência mais constante ao longo do ciclo (pedalada mais suave). Exemplo: Pavg=200W, Ppeak=1500W → PS=13%; pedalada mais suave: Pavg=350W, Ppeak=700W → PS=50%.\n- **Torque Efficiency (TE):** `TE = 100 × (P+ − P−) / P+`, onde P+ é a potência positiva (fase de propulsão) e P− é a potência negativa (resistência/frenagem, ex.: na fase de subida do pedal) num único ciclo de pedalada. Exemplo: P+=150W, P−=30W → TE = 100×(150−30)/150 = 80%.\n\nAplicação ao feedback: para atletas com medidor de potência bilateral que reporte essas métricas, o sistema pode usar PS e TE como indicadores complementares de qualidade/eficiência de pedalada, ao lado do GPR/GPA/Kurtotic Index já registrados — útil para recomendações de técnica de pedalada (ex.: baixa TE ou PS pode indicar oportunidade de trabalho técnico específico)."},{"id": "nota-0147", "titulo": "Cuidado: 'Pmax' exibido em unidades Garmin/ANT+ é na verdade Ppeak (pico de um único ciclo de pedalada), diferente do Pmax do modelo PDC do livro", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 472, "trecho": "Ppeak The peak power applied during a single pedal cycle. This is misnamed 'Pmax' in the ANT+ pedaling metrics and is seen in Garmin head units as Pmax. See Pmax for the correct definition of Pmax."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 472, "trecho": "Pmax The maximal power that can be generated for a very short period of time over at least a full pedal revolution with both legs. Units are W or W/kg."}], "relacionadas": [{"id": "nota-0077", "tipo": "contradiz", "justificativa": "alerta de nomenclatura: o 'Pmax' do modelo PDC (nota-0077, potência máxima sobre uma revolução completa de pedalada com as duas pernas) é um valor diferente do campo 'Pmax' que aparece em unidades Garmin/ANT+ (que na verdade é Ppeak, pico instantâneo de um único ciclo de pedalada)"}], "confianca": 0.7, "status": "revisar", "body": "**Alerta crítico de nomenclatura para integração de dados:** o campo rotulado \"Pmax\" que aparece em unidades Garmin e em métricas ANT+ de pedalada **não é o mesmo Pmax** definido no modelo de Power Duration Curve deste livro (nota-0077, a potência máxima sustentável por pelo menos uma revolução completa de pedal com as duas pernas, derivada do ajuste da PDC). O valor exibido como \"Pmax\" pelo Garmin é, na definição correta dos autores, o **Ppeak** — o pico de potência aplicado durante um único ciclo de pedalada (pode ser dominado por uma única perna/instante, não uma revolução completa).\n\nAplicação ao feedback: **este é um risco real de erro de interpretação de dados** se o produto ingerir campos rotulados \"Pmax\" diretamente de arquivos/APIs do Strava ou Garmin sem verificar a definição real por trás do campo. Antes de usar qualquer valor rotulado \"Pmax\" vindo de dados brutos de dispositivo, confirmar se ele corresponde ao Pmax modelado da PDC (nota-0077, tipicamente calculado por software de análise como TrainingPeaks WKO) ou ao Ppeak instantâneo do dispositivo (Garmin/ANT+) — são grandezas diferentes e não devem ser comparadas diretamente ou usadas de forma intercambiável nas notas/regras que referenciam \"Pmax\".\n\n**Motivo da revisão:** aplicar esta distinção corretamente depende de como o Strava/API expõe esse campo especificamente, o que não foi verificado nesta etapa de extração — fica como item de atenção técnica para a fase de implementação."},{"id": "nota-0056", "titulo": "Xert MPA (Maximal Power Available): modelo de fadiga em tempo real com 3 parâmetros (PP, HIE, TP)", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["potência-série-temporal", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 147, "trecho": "Maximal Power Available (MPA)... reveals in real time how much power a rider can generate at any point during a ride by integrating sophisticated fatigue modeling with a rider's unique three-parameter Fitness Signature, comprised of Peak Power (PP), High Intensity Energy (HIE), and Threshold Power (TP)."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 148, "trecho": "As you fatigue it gets harder and harder to maintain a specific wattage above your Threshold Power... the amount of power you have, your MPA, declines as an effort or interval continues and you fatigue, and it is restored when your effort eases."}], "relacionadas": [{"id": "nota-0045", "tipo": "alternativa-a", "justificativa": "modelo concorrente/complementar ao FRC do Power Duration Model dos próprios autores — mesmo objetivo (quantificar reserva de trabalho acima do FTP), abordagem de terceiros (software Xert)"}], "confianca": 0.7, "status": "revisar", "body": "Xert (ferramenta de terceiros, não desenvolvida pelos autores do livro) introduz o conceito de Maximal Power Available (MPA): quanto de potência o ciclista ainda consegue gerar em um dado instante da atividade, calculado em tempo real a partir de um modelo de fadiga que integra a \"Assinatura de Fitness\" de 3 parâmetros do atleta: Peak Power (PP — pico de potência de 1 segundo), High Intensity Energy (HIE — aproximadamente a capacidade anaeróbia) e Threshold Power (TP — equivalente ao FTP).\n\nNo início de uma atividade, MPA = PP. A cada segundo, o MPA é recalculado com base na potência atual, no trabalho já realizado acima do TP e no trabalho realizado abaixo do TP — funciona como um \"medidor de bateria\" em tempo real: quanto mais o atleta trabalha acima do limiar, mais o MPA cai (fica mais difícil sustentar potências altas); com esforço mais leve, o MPA se recupera.\n\nAplicação: permite desenhar intervalos que miram um nível constante de *estresse/fadiga* (não um valor fixo de watts) — por exemplo, num treino de microbursts (nota-0044), os primeiros esforços de um bloco podem começar mais fortes (ex.: 439→363 W) e os últimos mais fracos em valor absoluto (ex.: 340→304 W), mas representando o mesmo nível de estresse fisiológico, porque o MPA já está mais baixo devido à fadiga acumulada.\n\nNota de confiança: este é um modelo proprietário de terceiros (Xert), citado pelos autores como exemplo de \"análise preditiva de potência\", não parte do arcabouço central Power Profile/PDC/FRC desenvolvido pelos próprios autores — por isso `aplicacao: contexto` e confiança mais baixa/marcada para revisão, já que a base não teve acesso à documentação completa do modelo Xert, apenas à descrição resumida feita neste livro."},{"id": "nota-0026", "titulo": "Modelo de Potência Crítica (CP): protocolo básico e relação com o FTP", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 56, "trecho": "this approach consists of plotting the total work performed (in joules) during a series of relatively short (i.e., between 3 and 30 minutes), all-out efforts against their duration (in seconds), then fitting a straight line to the data points. The slope of this line is critical power."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 57, "trecho": "Provided that you adhere to these guidelines... the value you obtain for CP will be essentially equal to FTP. On the other hand, if you calculate CP based on tests that are too short in duration, CP will be higher than FTP, and in fact will overestimate the true maximal metabolic steady-state intensity."}], "relacionadas": [{"id": "nota-0019", "tipo": "alternativa-a", "justificativa": "CP calculada corretamente é essencialmente igual ao FTP, mas é um modelo matemático diferente do teste de campo direto"}, {"id": "nota-0025", "tipo": "complementa", "justificativa": "é um dos métodos alternativos de estimativa de FTP listados na nota-0025"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Protocolo resumido do modelo de Potência Crítica (Critical Power, CP), da literatura científica: realizar uma série de esforços máximos (\"all-out\") de curta duração, entre 3 e 30 minutos cada, registrando o trabalho total realizado em cada um (em joules). Plotar o trabalho total (eixo Y) contra a duração do esforço em segundos (eixo X) e ajustar uma reta aos pontos — a inclinação (slope) dessa reta é a Potência Crítica.\n\nQuando o protocolo segue as recomendações da literatura original (duração dos esforços dentro da faixa 3–30 min), o valor de CP obtido é essencialmente equivalente ao FTP. Se os esforços testados forem curtos demais, a CP calculada fica mais alta que o FTP real, superestimando a verdadeira intensidade máxima de estado estável metabólico (medida por lactato sanguíneo, resposta hormonal, ventilação).\n\nAplicação: o paradigma de potência crítica também permite diferenciar se uma melhora de performance veio de ganho de função anaeróbia, aeróbia, ou ambas — útil para planejar o foco do treino seguinte. O modelo completo (com FRC — capacidade de trabalho anaeróbio finita) é aprofundado no Capítulo 8 do livro (modelo Potência-Duração) — esta nota cobre a introdução do conceito feita no Capítulo 3.\n\nAplicação ao feedback: quando o atleta tiver dados de múltiplos esforços máximos de curta duração (3-30min) num período recente, usar o modelo de Potência Crítica como validação cruzada do FTP estimado por outros métodos — grandes divergências entre CP e FTP testado podem indicar teste de FTP mal executado ou esforços de CP fora da faixa de duração recomendada."},{"id": "nota-0019", "titulo": "Definição de FTP (Functional Threshold Power)", "dominio": "metricas-de-potencia", "camada": ["diario", "semanal", "mensal"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["potência-média", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 53, "trecho": "FTP is the highest power that a rider can maintain in a quasi–steady state without fatiguing. When power exceeds FTP, fatigue will occur much sooner (generally after approximately one hour in well-trained cyclists), whereas power just below FTP can be maintained considerably longer."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 52, "trecho": "the exercise intensity at which lactate begins to accumulate in the blood, called lactate threshold... is a powerful predictor of performance."}], "relacionadas": [], "confianca": 0.9, "status": "auto-aprovado", "body": "FTP (Functional Threshold Power) é a maior potência que um ciclista consegue manter em quase-estado-estável (quasi-steady state) sem fadigar, o que na prática corresponde a cerca de 1 hora de esforço máximo sustentável em ciclistas bem treinados. Acima do FTP, a fadiga ocorre muito mais rápido; um pouco abaixo do FTP, o esforço pode ser sustentado por bem mais tempo.\n\nFTP é a expressão em watts do limiar de lactate (lactate threshold, LT) — a intensidade em que o lactato sanguíneo começa a se acumular — que é considerado o determinante fisiológico isolado mais importante do desempenho de resistência, porque reflete a fração do VO2máx que o atleta consegue efetivamente sustentar (integra VO2máx, % de VO2máx sustentável e eficiência de pedalada). É por isso que os autores definem todas as zonas de treino como percentual do FTP, e não como percentual do VO2máx ou da FC máxima.\n\nFTP funciona como a referência central (0% a >150%+) a partir da qual todas as zonas de potência do livro (Tabela 3.1) e diversas outras métricas (IF, TSS) são calculadas.\n\nAplicação ao feedback: usar o FTP cadastrado/estimado do atleta como referência central para classificar a intensidade de qualquer atividade (zonas, IF, TSS) — sem um FTP atualizado, a interpretação de potência de qualquer sessão perde precisão."},{"id": "nota-0091", "titulo": "TSB ideal no dia da prova varia com a duração do evento: eventos curtos pedem TSB mais positivo, longos toleram TSB mais neutro/negativo", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 232, "trecho": "personal bests for power in all time periods have occurred at a wide range of TSBs, from –30 to +30... The majority of personal bests occurred with TSBs between –5 and +15."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 233, "trecho": "personal bests for time periods of less than 5 minutes occurred when the TSB was even more on the positive side of the scale... in short, heavily anaerobic events (track, BMX, short hill climbs), it is best to be very well rested."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 233, "trecho": "In the personal bests from time periods of 5 minutes or more, there is a swing back to the center... a nice bell curve distribution for TSBs from –10 to +25... an athlete competing in a longer event... should not taper or rest too much beforehand, as this could mean missing that peak window."}], "relacionadas": [{"id": "nota-0085", "tipo": "pre-requisito", "justificativa": "usa o TSB definido na nota-0085"}], "confianca": 0.65, "status": "revisar", "body": "Com base numa pesquisa informal com ~200 atletas (perguntando qual era o TSB no dia em que bateram recordes pessoais de potência em diferentes durações), os autores encontraram:\n\n- **Considerando todas as durações**: recordes pessoais ocorreram numa faixa ampla de TSB (-30 a +30), mas a maioria caiu entre **-5 e +15**.\n- **Esforços curtos (<5 min)**: recordes ocorreram com TSB ainda mais deslocado para o lado positivo — faz sentido fisiologicamente, já que esforços curtos dependem mais de potência neuromuscular/capacidade anaeróbia, que são maximizadas quando o atleta está bem descansado. Conclusão prática: em provas curtas e muito anaeróbias (pista, BMX, subidas curtas), é melhor estar muito bem descansado (TSB bem positivo).\n- **Esforços de 5 minutos ou mais**: distribuição em formato de sino, com recordes ocorrendo numa faixa de TSB de -10 a +25 — mostrando que esses atletas tinham tanta chance de bater recorde com TSB de -10 quanto com +25. Conclusão prática: em provas mais longas/aeróbias (estrada, mountain bike, provas por etapas), não é recomendável tapear/descansar demais antes, sob risco de perder a \"janela\" de pico de forma.\n\n**Regra geral: quanto mais anaeróbio o evento, mais importante é estar fresco (TSB alto); quanto mais aeróbio o evento, mais importante é estar em forma (CTL alto), tolerando TSB mais neutro ou até levemente negativo.**\n\nRessalva do próprio livro: os valores exatos de TSB dependem das constantes de tempo usadas para CTL e ATL (os valores acima assumem os padrões de 42 e 7 dias) — não aplicar esses números de forma rígida sem considerar as constantes de tempo realmente usadas para aquele atleta. Confiança marcada como \"revisar\" por se tratar de uma pesquisa informal (não um estudo controlado formalmente publicado) com amostra não totalmente descrita.\n\nAplicação ao feedback: ao aproximar-se de uma prova, cruzar a duração/tipo do evento-alvo com o TSB atual do atleta — para provas curtas e anaeróbias, recomendar tapering para TSB bem positivo; para provas longas e aeróbias, alertar contra descanso excessivo que jogue fora a janela de pico de forma."},{"id": "nota-0085", "titulo": "TSB (Training Stress Balance) = CTL − ATL: \"forma = fitness + frescor\"", "dominio": "metricas-de-potencia", "camada": ["diario", "semanal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 220, "trecho": "Training Stress Balance (a term coined by cycling coach Dave Harris) is the difference between chronic and acute training loads: TSB = CTL – ATL."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 223, "trecho": "Form = Fitness + Freshness. A rider can be fit at the end of the Tour de France, but he will be very tired, and not on form... Only the correct balance of fitness and freshness will create form."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 227, "trecho": "If your TSB is a positive number, this indicates more freshness... When your TSB is a negative number, this indicates more fatigue."}], "relacionadas": [{"id": "nota-0083", "tipo": "pre-requisito", "justificativa": "TSB usa o CTL definido na nota-0083"}, {"id": "nota-0084", "tipo": "pre-requisito", "justificativa": "TSB usa o ATL definido na nota-0084"}], "confianca": 0.9, "status": "auto-aprovado", "body": "**Fórmula: TSB = CTL − ATL.** TSB (Training Stress Balance) mede o quanto o atleta vem treinando recentemente/agudamente (ATL) em comparação com o quanto vem treinando cronicamente (CTL) — funciona como indicador de \"frescor\" (freshness): TSB positivo indica mais frescor (o atleta está descansado relativo ao seu próprio histórico recente); TSB negativo indica mais fadiga acumulada.\n\n**Conceito central: Forma = Fitness (CTL) + Frescor (TSB).** Um atleta pode estar muito em forma física (CTL alto) mas exausto (TSB muito negativo) e não conseguir expressar essa fitness numa prova; ou pode estar muito descansado (TSB muito positivo) mas destreinado (CTL baixo) e também não performar bem. A \"forma\" real depende do equilíbrio certo entre os dois — não existe um TSB \"ideal\" universal, ele depende do CTL simultâneo e do tipo de evento (ver nota-0090 sobre TSB ideal por tipo de prova).\n\nRessalva importante: TSB **não deve ser interpretado como preditor absoluto de performance** (diferente do modelo de Banister original) — é melhor entendido como um indicador relativo de o quão adaptado o atleta está à sua carga de treino recente, não como um número que prevê exatamente o resultado.\n\nAplicação ao feedback: reportar o TSB junto com o CTL ao interpretar a forma atual do atleta — nunca usar TSB isoladamente para prever performance; cruzar com o tipo de evento-alvo (ver nota-0091) e com a tendência recente de CTL antes de recomendar mais carga ou mais descanso."},{"id": "nota-0084", "titulo": "ATL (Acute Training Load): média móvel exponencial do TSS diário, constante padrão de 7 dias", "dominio": "metricas-de-potencia", "camada": ["diario", "semanal"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 220, "trecho": "Acute Training Load (ATL)... is calculated as an exponentially weighted moving average of daily TSS values, with the default time constant set to seven days. (In effect, what this means is that your ATL is primarily a function of the training that you have done in the past two weeks.)"}], "relacionadas": [{"id": "nota-0062", "tipo": "pre-requisito", "justificativa": "ATL é calculado a partir do TSS diário definido na nota-0062"}, {"id": "nota-0083", "tipo": "complementa", "justificativa": "junto com CTL (nota-0083), forma a base do TSB (Training Stress Balance)"}], "confianca": 0.9, "status": "auto-aprovado", "body": "ATL (Acute Training Load) é uma média móvel exponencialmente ponderada (EWMA) dos valores diários de TSS, com constante de tempo padrão de **7 dias** — reflete principalmente o treino feito nas últimas ~2 semanas, funcionando como proxy de fadiga recente/aguda. É a versão simplificada, sem fator de ganho (kf), do termo \"efeito negativo/fadiga\" do modelo de impulso-resposta de Banister.\n\nA constante de tempo do ATL pode/deve ser ajustada conforme a idade do atleta e a duração do evento-alvo (ver notas específicas sobre esses ajustes) — o valor padrão de 7 dias não é universal.\n\nAplicação ao feedback: usar o ATL (com a constante de tempo apropriada à idade/evento do atleta) como indicador de fadiga recente ao gerar feedback diário/semanal — um ATL subindo rapidamente em relação ao CTL é sinal de acúmulo de fadiga aguda a monitorar."},{"id": "nota-0083", "titulo": "CTL (Chronic Training Load): média móvel exponencial do TSS diário, constante padrão de 42 dias", "dominio": "metricas-de-potencia", "camada": ["semanal", "mensal"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 220, "trecho": "Chronic Training Load (CTL)... is calculated as an exponentially weighted moving average of daily TSS (or TRIMP) values, with the default time constant set to 42 days. (In effect, what this means is that your CTL is primarily a function of the training that you have done in the past three months.)"}], "relacionadas": [{"id": "nota-0062", "tipo": "pre-requisito", "justificativa": "CTL é calculado a partir do TSS diário definido na nota-0062"}, {"id": "nota-0084", "tipo": "complementa", "justificativa": "junto com ATL (nota-0084), forma a base do TSB (Training Stress Balance)"}], "confianca": 0.9, "status": "auto-aprovado", "body": "CTL (Chronic Training Load) é uma média móvel exponencialmente ponderada (EWMA) dos valores diários de TSS, com constante de tempo padrão de **42 dias** — na prática, o CTL reflete principalmente o treino feito nos últimos ~3 meses, sendo um proxy de \"fitness\" acumulada (quanto o atleta vem treinando cronicamente). É a versão simplificada, sem fator de ganho (ka), do termo \"adaptação positiva\" do modelo de impulso-resposta de Banister.\n\nNota: o Performance Manager (CTL/ATL/TSB) é uma simplificação matemática deliberada do modelo de impulso-resposta original de Banister — mais fácil de calcular e aplicar fora de laboratório, mas com a ressalva de que CTL/ATL/TSB são indicadores *relativos* de mudança de fitness/fadiga, não preditores absolutos de performance (isso é explicado em mais detalhe nas notas sobre o modelo de Banister).\n\nAplicação ao feedback: usar o CTL como indicador de tendência de fitness de médio/longo prazo ao gerar feedback semanal/mensal — quedas ou platôs prolongados de CTL (ver nota-0089) e a taxa de subida (ramp rate, nota-0090) são mais informativos que o valor absoluto isolado em um único dia."},{"id": "nota-0110", "titulo": "Quadrantes III/IV e VI 1,04–1,07 como alvo para conservar glicogênio no bike leg do triathlon", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal", "potência-média", "NP", "VI"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 326, "trecho": "The better part of most triathlons should be completed in Quadrants III (low force, slow cadence) and IV (low force, fast cadence), which means low force on the pedals and adjusting your gearing to pedal either slower or faster."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 329, "trecho": "the athlete spent over 41 percent of his race in Quadrant II, which represents high force and low cadence. From an energy conservation standpoint, this is the worst quadrant: Quadrant II requires a particularly large amount of muscle glycogen."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 332, "trecho": "a triathlete with a Variability Index of 1.04 to 1.07 on the bike leg has done an excellent job of pedaling smoothly for the entire ride and has correctly limited his or her surges"}], "relacionadas": [{"id": "nota-0067", "tipo": "pre-requisito", "justificativa": "aplica o conceito de Quadrant Analysis (nota-0067) especificamente ao objetivo de conservar glicogênio muscular no bike leg do triathlon"}, {"id": "nota-0060", "tipo": "pre-requisito", "justificativa": "usa o Variability Index (nota-0060) como métrica-alvo quantitativa de suavidade de pedalada"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Para triatletas, o objetivo de conservar glicogênio muscular para a corrida se traduz em metas quantitativas específicas de pedalada:\n\n- **Quadrant Analysis:** a maior parte da prova (bike leg) deveria ocorrer nos **Quadrantes III (baixa força, cadência lenta) e IV (baixa força, cadência rápida)** — ambos de baixa força. O Quadrante II (alta força, cadência lenta) é o pior para conservação de energia, pois recruta mais fibras de contração rápida (Tipo II), que consomem glicogênio mais rapidamente. Exemplo ruim do livro: 41% do tempo em Quadrante II. Exemplo bom: mais de 70% em Quadrante III, ou 51% Q3 + 36% Q4.\n- **Variability Index (VI) alvo:** **1,04 a 1,07** no bike leg é considerado pedalada excelente/suave para triathlon (NP muito próxima da potência média, poucos picos/surtos).\n\nAplicação ao feedback: ao analisar uma atividade de bike leg de triathlon (ou treino específico de triathlon), calcular a distribuição por quadrante e o VI da sessão; VI acima de ~1,07 ou tempo elevado em Quadrante II são sinais de possível desperdício de glicogênio que pode prejudicar a corrida seguinte — vale sinalizar isso especialmente em treinos \"brick\" (bike+corrida) ou análises pós-prova."},{"id": "nota-0150", "titulo": "Torque = Força × Braço de alavanca; Potência = Torque × Velocidade Angular — por que a mesma potência pode vir de combinações diferentes de força/cadência", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 22, "trecho": "Torque = Força × Braço de alavanca ... Potência = Torque × Velocidade Angular ... Subidas íngremes geralmente exigem elevado torque e baixa cadência. Contrarrelógios e terrenos planos normalmente apresentam torque moderado e elevada velocidade angular. Ambas as situações podem resultar na mesma potência."}], "relacionadas": [], "confianca": 0.65, "status": "auto-aprovado", "body": "Definição biomecânica: torque é o momento de força aplicado ao pedivela (Força × Braço de alavanca); potência é o produto entre torque e velocidade angular (cadência). Consequência prática: a mesma potência em watts pode ser produzida por combinações muito diferentes de torque/cadência — subidas íngremes tendem a exigir torque elevado com cadência baixa, enquanto terrenos planos/contrarrelógio tendem a usar torque moderado com cadência elevada.\n\nAplicação ao feedback: nota de base conceitual — explica por que a potência isolada não descreve completamente o estímulo mecânico de uma sessão; duas sessões com a mesma potência média podem ter demandas musculares (torque) muito diferentes dependendo da cadência. Relevante como pano de fundo para qualquer regra que cruze potência com cadência (ver nota-0151), mas não gera, por si só, um gatilho de interpretação de dado do Strava."},{"id": "nota-0151", "titulo": "Faixas de cadência típicas por contexto: 80-95 rpm em intensidade moderada, >110 rpm em sprint, <75 rpm em subida íngreme", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["cadência", "potência-série-temporal"], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 24, "trecho": "Em intensidades moderadas, muitos ciclistas naturalmente selecionam cadências entre 80 e 95 rpm. Em esforços máximos, especialmente no sprint, valores superiores a 110 rpm são comuns. Já em subidas íngremes, cadências inferiores a 75 rpm podem representar a estratégia mais eficiente."}], "relacionadas": [{"id": "nota-0150", "tipo": "pre-requisito", "justificativa": "usa a relação torque/velocidade angular/potência para explicar por que essas faixas de cadência variam por contexto"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Faixas de cadência observadas empiricamente por contexto de esforço (não são prescrições rígidas, mas tendências naturais de seleção de cadência): intensidade moderada → 80-95 rpm; esforço máximo/sprint → >110 rpm; subida íngreme → <75 rpm. O texto enfatiza que não existe uma \"cadência ideal\" universal — o equilíbrio é dinâmico entre custo cardiovascular (cadências altas) e custo muscular/tensão mecânica (cadências baixas), dependendo de potência requerida, duração do esforço, características individuais e fadiga acumulada.\n\nAplicação ao feedback: pode ser usada como referência frouxa ao interpretar a cadência média de um trecho/sessão em relação ao tipo de terreno/intensidade (ex.: cadência muito baixa sustentada em terreno plano pode indicar escolha de marcha subótima ou fadiga muscular; cadência muito alta em subida pode indicar tentativa de poupar as pernas às custas do sistema cardiovascular). Confiança moderada-baixa porque são faixas descritivas amplas, não um limiar validado — usar como heurística de contexto, não como regra de alerta automática."},{"id": "nota-0152", "titulo": "Mito da 'pedalada redonda': ciclistas treinados concentram força na fase descendente; tentar forçar aplicação de força durante toda a rotação aumenta custo energético sem ganho de potência", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 23, "trecho": "estudos utilizando pedais instrumentados e análise eletromiográfica mostraram que ciclistas experientes concentram a produção de força principalmente na fase descendente da pedalada... Quando atletas tentam aumentar deliberadamente a força durante a recuperação, frequentemente ocorre aumento da coativação muscular e do consumo energético, sem melhora proporcional da potência."}], "relacionadas": [], "confianca": 0.6, "status": "auto-aprovado", "body": "Desmistifica a ideia tradicional de que o ciclista deveria aplicar força uniforme durante os 360° da pedalada (\"empurrar, puxar, levantar, empurrar\"). Apenas a força tangencial (perpendicular ao pedivela) produz torque útil; a força radial (direcionada ao eixo) não contribui para o movimento. Evidência eletromiográfica mostra que ciclistas experientes concentram a produção de força na fase descendente (aproximadamente 12h-6h do ciclo) e reduzem ativamente a ativação na fase de recuperação — apenas o suficiente para diminuir a inércia da própria perna. Tentar forçar deliberadamente mais aplicação de força durante a fase de recuperação (a técnica de \"puxar o pedal\") tende a aumentar a coativação muscular e o custo energético sem ganho proporcional de potência.\n\nAplicação ao feedback: relevante como nota de cautela caso o produto algum dia interprete dados de \"pedal smoothness\" ou torque efetivo (via medidores compatíveis) — não deveria recomendar automaticamente que o atleta busque um perfil de força mais uniforme/\"redondo\", pois isso não é respaldado como benéfico pela evidência citada."},{"id": "nota-0158", "titulo": "FC deve ser interpretada como resposta fisiológica em contexto, não como número isolado — temperatura, hidratação, altitude, fadiga, estresse e cafeína a deslocam independentemente da intensidade real do esforço", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["FC (média/máx)"], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 50, "trecho": "Embora exista relação entre frequência cardíaca e intensidade do exercício, essa relação não é perfeita. Temperatura, hidratação, altitude, fadiga, estresse psicológico e ingestão de cafeína representam apenas alguns fatores capazes de modificar essa resposta. Por essa razão, a frequência cardíaca deve sempre ser interpretada dentro de um contexto fisiológico mais amplo."}], "relacionadas": [], "confianca": 0.6, "status": "auto-aprovado", "body": "A relação entre FC e intensidade real do esforço (potência) não é fixa: fatores como temperatura ambiente elevada, desidratação, altitude, fadiga acumulada, estresse psicológico e cafeína podem elevar a FC para uma dada potência sem que isso reflita mudança na carga mecânica real. O Manual recomenda que a FC seja sempre interpretada \"dentro de um contexto fisiológico mais amplo\", e não como valor absoluto isolado.\n\nAplicação ao feedback: ao gerar feedback baseado em FC (ex.: \"FC estava mais alta que o normal para essa potência\"), o produto deveria evitar concluir automaticamente que houve piora de condicionamento — o ideal é considerar fatores de contexto disponíveis (temperatura da sessão, se o Strava fornecer; duração/densidade da carga recente; hora do dia) antes de sinalizar decoupling ou fadiga cardiovascular apenas por elevação isolada de FC. Reforça a cautela já presente na nota-0001 sobre decoupling Pw:Hr — desvios de FC podem ter causas ambientais/comportamentais, não só fisiológicas."},{"id": "nota-0176", "titulo": "FTP não é um limiar fisiológico: é estimativa funcional de desempenho (maior potência sustentável ~1h), geralmente próxima do MLSS mas não o mede diretamente (não mede lactato, ventilação ou metabolismo)", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["FTP"], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 85, "trecho": "FTP não representa um limiar fisiológico. FTP corresponde a uma estimativa funcional da maior potência sustentável durante aproximadamente uma hora. Na maioria dos atletas treinados, encontra-se relativamente próximo ao MLSS. Entretanto: não mede lactato; não mede ventilação; não mede metabolismo. Mede desempenho."}], "relacionadas": [{"id": "nota-0174", "tipo": "pre-requisito", "justificativa": "a comparação FTP≈MLSS depende da definição de MLSS estabelecida na nota-0174"}, {"id": "nota-0019", "tipo": "complementa", "justificativa": "complementa a definição operacional de FTP do Livro 1 (nota-0019) com a ressalva de que é uma medida de desempenho, não uma medida fisiológica direta"}], "confianca": 0.65, "status": "auto-aprovado", "body": "Distinção conceitual importante: FTP é uma estimativa funcional/prática da maior potência sustentável por ~1 hora — na maioria dos atletas treinados, fica próxima do MLSS, mas não é a mesma coisa. FTP não mede lactato, ventilação ou metabolismo diretamente; mede desempenho (watts produzidos). É uma excelente ferramenta prática, mas não substitui a compreensão fisiológica subjacente (LT1/LT2/MLSS).\n\nAplicação ao feedback: o produto deve evitar apresentar a FTP ao usuário como se fosse uma medida fisiológica precisa e objetiva (ex.: \"seu limiar de lactato é X watts\") — é uma estimativa de desempenho prático, sujeita a variação por protocolo de teste, motivação, terreno e condições do dia (consistente com a cautela já presente nas notas de protocolo de teste de FTP do Livro 1). Ao comunicar mudanças de FTP ao longo do tempo, tratar como mudança de capacidade de desempenho sustentável, não como medição direta de um processo metabólico."},{"id": "nota-0177", "titulo": "Potência Crítica: maior potência teoricamente sustentável sem perda de homeostase — conceito matemático (relação potência-tempo), frequentemente próximo mas não idêntico ao MLSS", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 86, "trecho": "A Potência Crítica (Critical Power)... repre
