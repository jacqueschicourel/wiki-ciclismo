-3 anos | Longo prazo | 4–7 TSS/dia | 3–5 TSS/dia |\n| <1 ano | Longo prazo | 3–5 TSS/dia | 3–4 TSS/dia |\n| 5+ anos | Curto prazo (<14 dias, ex. training camp) | 14–20 TSS/dia | 10–14 TSS/dia |\n| 3-5 anos | Curto prazo | 10–16 TSS/dia | 6–12 TSS/dia |\n| 1-3 anos | Curto prazo | 8–14 TSS/dia | 6–12 TSS/dia |\n| <1 ano | Curto prazo | 6–10 TSS/dia | 6–8 TSS/dia |\n\nPadrão geral: quanto mais próximo do teto de CTL (>100) e quanto menos experiente o atleta, mais conservadora deve ser a taxa de aumento. Rampas curtas e agressivas (ex.: semana de training camp) devem ser seguidas de uma semana de descarga.\n\nAplicação ao feedback: calcular a taxa de variação do CTL ao longo das últimas semanas e comparar com essas faixas de referência (ajustadas por idade de treino e CTL atual) para sinalizar risco de overreaching antes que ele se manifeste como queda de performance ou doença."},{"id": "nota-0092", "titulo": "Overreaching não funcional: ATL > CTL por tempo prolongado sem TSB retornar à neutralidade", "dominio": "recuperacao-e-fadiga", "camada": ["semanal", "mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 229, "trecho": "Failure to periodically come up for air by allowing TSB to rise toward, if not all the way to, neutrality may lead to problems. If ATL is greater than CTL for too long, you will reach a state of non-functional over-reaching, where you can train but no longer improve and in fact become more and more fatigued. Too much time in a non-functional over-reaching state could lead to overtraining syndrome, at which point you would need to take months or even a year off the bike to recover."}], "relacionadas": [{"id": "nota-0085", "tipo": "pre-requisito", "justificativa": "usa o TSB (CTL-ATL) definido na nota-0085 como sinal de alerta"}, {"id": "nota-0090", "tipo": "causal", "justificativa": "ramp rate de CTL excessivo (nota-0090) é uma via comum para cair nesse estado de overreaching"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Deixar de permitir que o TSB suba periodicamente até perto da neutralidade (ou seja, manter ATL cronicamente maior que CTL / TSB muito negativo por tempo prolongado) pode levar a um estado de **overreaching não funcional**: o atleta continua treinando, mas para de melhorar e fica progressivamente mais fatigado. Se esse estado persistir por tempo demais, pode evoluir para **síndrome de overtraining**, exigindo meses ou até um ano longe da bicicleta para recuperação completa.\n\nAplicação ao feedback: monitorar períodos prolongados de TSB fortemente negativo sem sinais de retorno à neutralidade é um indicador de alerta precoce para overreaching não funcional — vale sinalizar isso antes que se manifeste como estagnação de performance, doença ou lesão. Esse é o mecanismo de fundo por trás da recomendação de respeitar as taxas seguras de ramp rate de CTL (nota-0090)."},{"id": "nota-0148", "titulo": "Overreached (agudo, recupera em poucos dias) vs. Overtrained/OTS (crônico, recuperação >30 dias) — critério de distinção pela duração da recuperação", "dominio": "recuperacao-e-fadiga", "camada": ["semanal", "mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": [], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 472, "trecho": "Overreached An acute state of fatigue and hence diminished performance resulting from a brief period of excessive training relative to what you normally perform. Although many times riders describe themselves as being 'overtrained,' in reality they have usually simply overreached and their performance will recover after just a few days of rest or reduced training."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 472, "trecho": "Overtrained A chronic state of overreaching from which recovery takes a long period of time, usually over 30 days. Also called Overtraining Syndrome (OTS)."}], "relacionadas": [{"id": "nota-0092", "tipo": "complementa", "justificativa": "fornece o critério temporal exato para diferenciar overreaching não funcional (nota-0092) de overtraining syndrome propriamente dito"}], "confianca": 0.65, "status": "auto-aprovado", "body": "Distinção precisa entre dois estados de fadiga excessiva, frequentemente confundidos na linguagem coloquial dos atletas:\n\n- **Overreached (agudo):** fadiga e queda de desempenho resultantes de um período **breve** de treino excessivo em relação ao normal do atleta. A performance se recupera após **apenas alguns dias** de descanso/treino reduzido. Segundo os autores, a maioria dos atletas que se autodenominam \"overtrained\" na verdade só sofreram overreaching agudo.\n- **Overtrained / Overtraining Syndrome (OTS) (crônico):** estado crônico de overreaching do qual a recuperação leva **um período longo, tipicamente superior a 30 dias**.\n\nAplicação ao feedback: útil como critério objetivo para classificar a severidade de um estado de fadiga detectado (ex.: via TSB fortemente negativo prolongado, nota-0092) — se o desempenho/forma do atleta se recupera em poucos dias após reduzir a carga, é overreaching agudo (não motivo de alarme excessivo); se a queda de desempenho persiste por semanas mesmo com descanso, há indício de overtraining syndrome real, que exige uma resposta de feedback muito mais séria (recomendação de pausa prolongada e possivelmente acompanhamento médico)."},{"id": "nota-0086", "titulo": "Ajuste da constante de tempo do ATL por idade (Tabela 9.1)", "dominio": "recuperacao-e-fadiga", "camada": ["semanal"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 226, "trecho": "TABLE 9.1 Adjusting ATL to Account for Age — Age <19: 2-4 days; 20-29: 4-7 days; 30-49: 6-8 days; 50-59: 7-10 days; 60-65: 9-12 days; 66-70+: 11-14 days."}], "relacionadas": [{"id": "nota-0084", "tipo": "pre-requisito", "justificativa": "ajusta a constante de tempo padrão do ATL definida na nota-0084"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Tabela 9.1 do livro — como ajustar a constante de tempo do ATL (padrão de 7 dias) conforme a idade do atleta, já que a velocidade de recuperação diminui com a idade:\n\n| Idade | Constante de tempo do ATL |\n|---|---|\n| <19 anos | 2–4 dias |\n| 20–29 anos | 4–7 dias |\n| 30–49 anos | 6–8 dias |\n| 50–59 anos | 7–10 dias |\n| 60–65 anos | 9–12 dias |\n| 66–70+ anos | 11–14 dias |\n\nQuanto mais velho o atleta, maior a constante de tempo recomendada (ATL \"enxerga\" um período mais longo do passado), refletindo recuperação mais lenta. Além da idade, a constante de tempo ideal também depende da duração do evento-alvo (ver nota-0087) — os dois fatores podem ser combinados.\n\nAplicação ao feedback: ao calcular ATL/TSB para atletas mais velhos, ajustar a constante de tempo conforme a faixa etária desta tabela em vez de usar sempre os 7 dias padrão — isso evita interpretar erroneamente uma recuperação mais lenta (esperada pela idade) como fadiga anômala."},{"id": "nota-0063", "titulo": "Escala de impacto do TSS na fadiga/recuperação (Tabela 7.3)", "dominio": "recuperacao-e-fadiga", "camada": ["diario", "semanal"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 161, "trecho": "TABLE 7.3 Impact of Training Stress on Fatigue — TSS <150: Low, Recovery is generally complete by the following day. 150-300: Moderate, Some residual fatigue may be present the next day, but recovery is generally complete by the second day. 300-450: High, Some residual fatigue may be present even after 2 days. >450: Very high, Residual fatigue lasting for several days is likely."}], "relacionadas": [{"id": "nota-0062", "tipo": "pre-requisito", "justificativa": "usa o TSS definido na nota-0062 como entrada da escala"}], "confianca": 0.9, "status": "auto-aprovado", "body": "Tabela 7.3 do livro — escala aproximada de impacto do TSS de uma única sessão sobre a fadiga e o tempo de recuperação esperado:\n\n| TSS da sessão | Intensidade do estresse | Status de recuperação esperado |\n|---|---|---|\n| <150 | Baixa | Recuperação geralmente completa até o dia seguinte |\n| 150–300 | Moderada | Pode haver fadiga residual no dia seguinte, mas recuperação geralmente completa até o segundo dia |\n| 300–450 | Alta | Pode haver fadiga residual mesmo depois de 2 dias |\n| >450 | Muito alta | Fadiga residual durando vários dias é provável |\n\nAplicação ao feedback: esta tabela é uma referência objetiva para estimar quantos dias de recuperação uma sessão específica provavelmente vai exigir, com base apenas no TSS calculado daquela atividade — útil tanto para o feedback do dia seguinte (explicar por que o atleta ainda está cansado) quanto para o planejamento da semana seguinte."},{"id": "nota-0160", "titulo": "Metaborreflexo dos músculos respiratórios: em alta intensidade, músculos respiratórios competem por fluxo sanguíneo com as pernas (custo ventilatório de 10-15% do VO2 total)", "dominio": "recuperacao-e-fadiga", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 60, "trecho": "em intensidades elevadas, os músculos respiratórios podem consumir entre 10 e 15% do consumo total de oxigênio... Quando ocorre fadiga respiratória, mecanismos neurais aumentam a atividade simpática, reduzindo parcialmente o fluxo sanguíneo para os membros inferiores. Esse fenômeno é conhecido como metaborreflexo dos músculos respiratórios."}], "relacionadas": [], "confianca": 0.5, "status": "auto-aprovado", "body": "Em intensidades elevadas, os músculos respiratórios consomem 10-15% do VO2 total, competindo por fluxo sanguíneo com os músculos locomotores. Quando os músculos respiratórios fadigam, um mecanismo neural (metaborreflexo) aumenta a atividade simpática e reduz parcialmente o fluxo sanguíneo para as pernas — um mecanismo adicional (além da fadiga muscular periférica e central) que pode limitar a performance em atletas de elite, cujos demais sistemas já estão próximos do teto adaptativo. O Manual cita evidência de que treinamento muscular inspiratório (dispositivos de resistência inspiratória) produz ganhos pequenos, porém consistentes, de resistência respiratória e percepção de esforço — mais evidentes em atletas com fraqueza respiratória, elevada carga ventilatória ou provas de endurance prolongadas/altitude; em atletas de elite já bem adaptados, o benefício tende a ser marginal.\n\nAplicação ao feedback: mecanismo de contexto, não gera regra de interpretação de dado do Strava (o app não mede ventilação nem fadiga respiratória). Relevante apenas como explicação de fundo para casos em que um atleta relata \"falta de ar\" desproporcional sem indício de limitação cardiovascular nos dados de potência/FC — não deve ser usado para gerar alertas automáticos."},{"id": "nota-0180", "titulo": "A economia de pedalada piora ao longo da prova conforme a fadiga aumenta (maior coativação, recrutamento alterado, maior custo energético) — base fisiológica do conceito de durabilidade", "dominio": "recuperacao-e-fadiga", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 96, "trecho": "À medida que a fadiga aumenta: altera-se o recrutamento muscular; aumenta a coativação; modificam-se padrões biomecânicos; cresce o custo energético. Esse fenômeno contribui para explicar a redução progressiva do desempenho em provas muito longas. Nos últimos anos, esse tema passou a ser estudado sob o conceito de durabilidade."}], "relacionadas": [{"id": "nota-0081", "tipo": "complementa", "justificativa": "fornece o mecanismo fisiológico (degradação da economia de pedalada) por trás da queda de Stamina/resistência à fadiga sub-FTP já operacionalizada na nota-0081 do Livro 1"}, {"id": "nota-0179", "tipo": "pre-requisito", "justificativa": "depende da definição de economia estabelecida na nota-0179"}], "confianca": 0.55, "status": "auto-aprovado", "body": "A economia de pedalada não é constante ao longo de uma sessão/prova: conforme a fadiga acumula, o recrutamento muscular se altera, a coativação (ativação simultânea de músculos antagonistas) aumenta, os padrões biomecânicos se modificam e o custo energético para sustentar a mesma potência cresce. O Manual identifica esse fenômeno como parte do que hoje se estuda sob o termo \"durabilidade\" — já operacionalizado no cânone via o conceito de Stamina/TTE do Livro 1 (nota-0081, nota-0080).\n\nAplicação ao feedback: reforça a base mecanística por trás de detectores de queda de eficiência/durabilidade já previstos no cânone (Livro 1) — uma sessão longa em que a relação potência/FC piora nas últimas horas, ou em que o atleta não sustenta a potência-alvo no final, reflete esse mecanismo de degradação da economia por fadiga acumulada, não necessariamente uma limitação cardiovascular isolada."},{"id": "nota-0181", "titulo": "Durabilidade: capacidade de preservar características fisiológicas e desempenho mecânico ao longo de exercício prolongado, apesar da fadiga acumulada — distinta de potência máxima/FTP", "dominio": "recuperacao-e-fadiga", "camada": ["diario", "semanal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 99, "trecho": "durabilidade pode ser definida como: A capacidade de manter as características fisiológicas e o desempenho mecânico ao longo do tempo, apesar da fadiga acumulada."}, {"arquivo": "Manual treinamento.pdf", "pagina": 101, "trecho": "Um dos principais indicadores de baixa durabilidade é a incapacidade de sustentar a potência produzida no início da competição... Isso demonstra que potência máxima e durabilidade representam capacidades distintas."}], "relacionadas": [{"id": "nota-0081", "tipo": "complementa", "justificativa": "o conceito de durabilidade descrito aqui é a base teórica do que o Livro 1 já operacionaliza como Stamina/resistência à fadiga sub-FTP (nota-0081) e TTE (nota-0080)"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Durabilidade é definida como a capacidade de manter características fisiológicas (VO2, limiares, economia) e desempenho mecânico (potência) ao longo de exercício prolongado, apesar da fadiga acumulada. É uma capacidade distinta de VO2máx/FTP/limiares medidos em repouso: dois atletas com valores de laboratório praticamente idênticos (VO2máx, FTP, LT2, economia) podem ter desempenhos muito diferentes após 4-5h de prova — um mantém a resposta a ataques, o outro perde potência progressivamente, aumenta a FC relativa e reduz a eficiência de pedalada. A maioria dos testes fisiológicos tradicionais é feita com o atleta descansado, mas a maioria das decisões decisivas de prova ocorre após horas de fadiga acumulada — daí a importância crescente desse conceito na fisiologia do endurance moderna.\n\nAplicação ao feedback: este é exatamente o conceito que o Livro 1 já opera via Stamina (queda percentual de potência sustentável em duração longa vs. curta, nota-0081) e TTE (nota-0080) — o Manual fornece a fundamentação fisiológica completa por trás dessas métricas já implementáveis a partir de dados do Strava (queda de potência/aumento de FC relativa ao longo de uma sessão longa)."},{"id": "nota-0193", "titulo": "Monotonia (repetição de cargas semelhantes na semana) e Strain (carga total × monotonia): conceitos citados sem fórmula de cálculo — lacuna do cânone", "dominio": "recuperacao-e-fadiga", "camada": ["semanal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 146, "trecho": "Monotonia: refere-se à repetição de cargas semelhantes ao longo da semana. Treinamentos excessivamente repetitivos aumentam o risco de fadiga e doenças. Strain: representa a combinação entre carga total e monotonia. Altos valores de strain estão associados a maior probabilidade de queda de desempenho e lesões."}], "relacionadas": [], "confianca": 0.4, "status": "revisar", "body": "O Manual introduz os conceitos de Monotonia (repetição de cargas semelhantes de treino ao longo da semana — treino excessivamente uniforme aumenta risco de fadiga/doenças) e Strain (combinação entre carga total e monotonia — valores altos associados a maior risco de queda de desempenho e lesões), citados como indicadores complementares ao TSS/TRIMP para avaliar a distribuição (não apenas a magnitude) da carga.\n\n**Lacuna do cânone:** o Manual descreve os conceitos qualitativamente mas **não fornece a fórmula de cálculo** (a formulação clássica na literatura esportiva, de Carl Foster, é Monotonia = média diária de carga ÷ desvio-padrão diário de carga, e Strain = carga semanal total × Monotonia — mas essa fórmula não foi apresentada no texto-fonte, portanto não pode ser citada como parte do cânone sem uma fonte que a defina explicitamente). Confiança rebaixada e status marcado como `revisar` por depender de fórmula não fornecida pela fonte.\n\nAplicação ao feedback: nenhuma regra operacional pode ser implementada a partir desta nota isoladamente — registrar como candidato a \"Detector\" em `mapas/capacidades.md` (bucket de lacunas do cânone), a ser resolvido apenas se uma fonte futura (Fonte 3 ou 4) apresentar a fórmula explícita, ou mediante decisão humana de adotar a fórmula clássica de Foster por fora do cânone das 4 obras."},{"id": "nota-0195", "titulo": "Fadiga periférica (músculo: glicogênio, cálcio, fosfato inorgânico) vs. fadiga central (SNC: comando motor, neurotransmissores, percepção de esforço) — em provas muito longas a fadiga central ganha importância crescente", "dominio": "recuperacao-e-fadiga", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 150, "trecho": "A fadiga periférica ocorre nos músculos e estruturas envolvidas diretamente na contração... A fadiga central envolve alterações no sistema nervoso central. Ela manifesta-se por redução do comando motor enviado aos músculos... Em provas extremamente longas, a fadiga central assume importância crescente."}], "relacionadas": [{"id": "nota-0180", "tipo": "complementa", "justificativa": "a fadiga periférica é um dos mecanismos por trás da degradação de economia de pedalada descrita na nota-0180"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Distinção clássica de dois mecanismos de fadiga: (1) Fadiga periférica — ocorre no próprio músculo (redução de glicogênio, alterações de cálcio intracelular, acúmulo de fosfato inorgânico, alterações iônicas, redução da capacidade contrátil); (2) Fadiga central — ocorre no sistema nervoso central (alterações de neurotransmissores, aumento da percepção de esforço, mecanismos protetores cerebrais, fadiga mental), manifestando-se como redução do comando motor enviado aos músculos. Em provas extremamente longas (ultraciclismo, provas de muitas horas), a fadiga central assume importância crescente relativa à periférica.\n\nAplicação ao feedback: nota de contexto mecanístico — não gera regra de interpretação direta de dado do Strava (não há como diferenciar fadiga central de periférica a partir de potência/FC isoladamente), mas explica por que a queda de potência em provas muito longas pode não refletir esgotamento puramente muscular/metabólico, sendo relevante para moderar a linguagem de feedback em sessões ultra-longas."},{"id": "nota-0196", "titulo": "Supercompensação: fadiga → recuperação → desempenho temporariamente acima do nível inicial → novo estímulo nesse momento gera evolução — mas cada capacidade (glicogênio, força, capacidade aeróbia, SNC, tecido conjuntivo) tem tempo de recuperação próprio, não existe curva única", "dominio": "recuperacao-e-fadiga", "camada": ["semanal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 152, "trecho": "Após um estímulo adequado: ocorre fadiga; inicia-se a recuperação; o organismo ultrapassa temporariamente o nível inicial de desempenho; caso novo estímulo seja aplicado nesse momento, ocorre evolução progressiva. Entretanto, a supercompensação não deve ser interpretada como uma curva simples e universal. Diferentes capacidades apresentam tempos distintos de recuperação: glicogênio muscular; força máxima; capacidade aeróbia; sistema nervoso; tecido conjuntivo."}], "relacionadas": [{"id": "nota-0148", "tipo": "complementa", "justificativa": "fornece o modelo teórico geral (supercompensação) por trás da distinção prática já registrada na nota-0148 entre overreached agudo e overtraining crônico"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Modelo clássico de supercompensação: um estímulo de treino adequado gera fadiga (queda temporária de capacidade), seguida de recuperação, que pode elevar o desempenho temporariamente acima do nível pré-treino (supercompensação) — se um novo estímulo for aplicado nessa janela, ocorre evolução progressiva; se aplicado cedo demais (sem recuperação) ou tarde demais (após a supercompensação decair), o ganho é subótimo. Ressalva importante do Manual: não existe uma curva única de supercompensação — glicogênio muscular, força máxima, capacidade aeróbia, sistema nervoso e tecido conjuntivo recuperam-se em velocidades diferentes, exigindo que o planejamento considere múltiplas linhas do tempo simultâneas, não uma única \"janela ótima\".\n\nAplicação ao feedback: fundamenta teoricamente a lógica de TSB (Training Stress Balance) já operacionalizada no Livro 1 como proxy prático de \"forma\"/supercompensação — reforça a cautela de que um TSB positivo (indicando recuperação/forma) não significa que todas as capacidades do atleta estão igualmente recuperadas; a supercompensação de capacidade aeróbia pode não coincidir com a de força/neuromuscular."},{"id": "nota-0182", "titulo": "Deriva cardíaca (cardiovascular drift): FC aumenta progressivamente para a mesma potência ao longo de exercício prolongado, com redução do volume sistólico — mecanismo por trás do fenômeno de decoupling, mas o Manual não fornece fórmula de cálculo", "dominio": "recuperacao-e-fadiga", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 100, "trecho": "Sistema cardiovascular: deriva cardíaca; redução do volume sistólico; aumento da frequência cardíaca para mesma potência."}, {"arquivo": "Manual treinamento.pdf", "pagina": 99, "trecho": "O Atleta B perde progressivamente potência, aumenta a frequência cardíaca relativa, reduz sua eficiência de pedalada e deixa de acompanhar o grupo principal."}, {"arquivo": "Manual treinamento.pdf", "pagina": 160, "trecho": "Durante exercícios prolongados é comum observar aumento progressivo da frequência cardíaca, mesmo mantendo potência constante. Esse fenômeno recebe o nome de deriva cardíaca. Entre seus principais fatores estão: aumento da temperatura corporal; redução do volume plasmático; desidratação; fadiga cardiovascular. Quando interpretada corretamente, a deriva cardíaca pode fornecer informações importantes sobre: resistência aeróbia; estado de hidratação; adaptação ao treinamento."}], "relacionadas": [], "confianca": 0.55, "status": "auto-aprovado", "body": "O Manual descreve explicitamente a \"deriva cardíaca\" (cardiovascular drift) como parte das alterações do sistema cardiovascular durante exercício prolongado: a FC aumenta progressivamente para sustentar a mesma potência, acompanhada de redução do volume sistólico. Esse é precisamente o fenômeno fisiológico por trás do que o Livro 1 chama de \"decoupling\" (Pw:Hr) — a razão potência/FC que se degrada ao longo de uma sessão longa (nota-0001 do Livro 1, que usa o sinal mas não define a fórmula de cálculo).\n\nO Capítulo 20 (Monitoramento do Treinamento, p. 160) detalha ainda os principais fatores causadores da deriva cardíaca: aumento da temperatura corporal, redução do volume plasmático, desidratação e fadiga cardiovascular — e afirma que, \"interpretada corretamente\", a deriva cardíaca pode informar sobre resistência aeróbia, estado de hidratação e adaptação ao treinamento.\n\n**Busca ativa pela fórmula do decoupling — CONCLUÍDA para esta fonte, sem sucesso:** os dois capítulos mais prováveis (13 — Durabilidade, e 20 — Monitoramento do Treinamento, que trata explicitamente de \"Frequência cardíaca e deriva cardíaca\") descrevem o mecanismo fisiológico e os fatores causadores da deriva cardíaca de forma qualitativa, mas **em nenhum momento o Manual apresenta uma fórmula de cálculo do decoupling/Pw:Hr** (ex.: comparação percentual entre a razão potência/FC da primeira e da segunda metade de uma sessão, método usado pelo TrainingPeaks/WKO). A lacuna registrada em `mapas/capacidades.md` (bucket 3) permanece em aberto após o processamento completo desta fonte — a busca deverá continuar nas Fontes 3 (VO2 Max Essentials) e 4 (McArdle).\n\nAplicação ao feedback: fundamenta, no nível mecanístico, por que o decoupling Pw:Hr é um sinal válido de fadiga cardiovascular acumulada/durabilidade insuficiente, e amplia os fatores de confusão a considerar (temperatura, hidratação) — mas o cânone ainda carece de uma fórmula operacional citável para implementá-lo."},{"id": "nota-0197", "titulo": "VFC (Variabilidade da Frequência Cardíaca): estimativa indireta do sistema nervoso autônomo; valores baixos podem indicar fadiga/estresse/recuperação incompleta — alta variabilidade individual exige interpretar tendência ao longo do tempo, não valor isolado", "dominio": "recuperacao-e-fadiga", "camada": ["diario", "semanal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 161, "trecho": "A VFC representa uma estimativa indireta da atividade do sistema nervoso autônomo. Valores reduzidos podem indicar: fadiga; estresse; recuperação incompleta. Entretanto, sua interpretação exige cuidado. A VFC apresenta grande variabilidade individual. Por isso, tendências ao longo do tempo são mais úteis do que valores isolados."}], "relacionadas": [], "confianca": 0.5, "status": "auto-aprovado", "body": "VFC (Variabilidade da Frequência Cardíaca / HRV) estima indiretamente a atividade do sistema nervoso autônomo. Valores reduzidos em relação à linha de base do próprio atleta podem sinalizar fadiga, estresse ou recuperação incompleta — mas a VFC tem grande variabilidade individual e intra-individual (dia a dia), então valores absolutos isolados são pouco informativos; o que importa é a tendência ao longo do tempo (média móvel/desvio da linha de base pessoal).\n\nAplicação ao feedback: **Política de ativação aplicada** — VFC não é um sinal nativo do Strava (é medido por wearables/apps dedicados como HRV4Training, Whoop, Garmin, etc.); permanece `aplicacao: contexto` por depender de dado externo não incluído no glossário de sinais do produto. Só se tornaria operacionalizável (`aplicacao: direta`) se o produto passasse a receber esse dado via integração explícita — nesse caso, a nota já registra a cautela essencial (comparar contra linha de base individual, não valor absoluto)."},{"id": "nota-0198", "titulo": "Fadiga acumulada deve ser inferida cruzando múltiplos sinais simultaneamente (potência reduzida + FC elevada + RPE alta + sono ruim + VFC reduzida), nunca a partir de uma única variável isolada", "dominio": "recuperacao-e-fadiga", "camada": ["diario", "semanal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-média", "FC (média/máx)", "esforço-relativo (Relative Effort)"], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 162, "trecho": "Um dos maiores erros do treinamento moderno consiste em analisar cada variável isoladamente... Um atleta apresenta: potência reduzida; frequência cardíaca elevada; percepção subjetiva alta; sono ruim; VFC reduzida. Interpretadas em conjunto, essas informações sugerem fadiga acumulada. Entretanto, se apenas a potência fosse analisada, outras interpretações poderiam ser feitas."}], "relacionadas": [{"id": "nota-0185", "tipo": "pre-requisito", "justificativa": "aplica, em forma de regra prática, a distinção entre carga externa (potência) e carga interna (FC/RPE) já estabelecida na nota-0185"}, {"id": "nota-0194", "tipo": "complementa", "justificativa": "reforça, na direção oposta, a cautela da nota-0194 de que TSS/potência isolados não medem fadiga real"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Princípio central de interpretação: fadiga acumulada não deve ser inferida a partir de uma única variável (ex.: só a queda de potência, ou só o aumento de FC), pois cada sinal isolado tem múltiplas explicações possíveis. O exemplo do Manual: potência reduzida + FC elevada para a mesma potência + RPE alto + sono ruim + VFC reduzida, combinados, sugerem fadiga acumulada com muito mais confiança do que qualquer um desses sinais isoladamente.\n\nAplicação ao feedback: dos sinais citados, o produto tem acesso direto via Strava a potência, FC e esforço-relativo (proxy de RPE); qualidade de sono e VFC dependem de integração externa (fora do escopo atual). Regra prática: ao construir um detector de \"fadiga acumulada\" ou \"risco de overreaching\", o produto deveria exigir concordância de pelo menos 2 sinais disponíveis (ex.: queda de potência sustentável junto com decoupling Pw:Hr elevado, ou TSB muito negativo junto com esforço-relativo desproporcionalmente alto) em vez de disparar alerta com base em um único sinal isolado — reduz falsos positivos causados por fatores de confusão já registrados (nota-0158, nota-0191)."},{"id": "nota-0232", "titulo": "EPOC (consumo excessivo de oxigênio pós-exercício): componente rápido resolve em 2-4min após esforço leve; componente lento pode levar até 24h após esforço supermáximo intermitente", "dominio": "recuperacao-e-fadiga", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 169, "trecho": "The excess oxygen consumption has classically been termed oxygen debt or recovery oxygen consumption, with the newer preferred term the excess postexercise oxygen consumption or EPOC... EPOC computes as the total oxygen consumed in recovery minus the total oxygen theoretically consumed at rest during the recovery period."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 170, "trecho": "With mild aerobic activity of relatively short duration... about half of the total recovery oxygen consumption occurs within 30 s, and complete recovery within 2 to 4 min... Depending on the intensity and duration of the previous physical activity, the slow component can take up to 24 hr to return to pre-exercise oxygen consumption. Even with shorter, intermittent bouts of 'supermaximal' effort (e.g., three 2-min bouts at 108% VO2max interspersed with 3-min rest intervals), recovery oxygen consumption remains elevated for 1 hr or longer."}], "relacionadas": [{"id": "nota-0229", "tipo": "complementa", "justificativa": "espelha, na recuperação, o mesmo fenômeno de cinética não-instantânea de VO2 descrito no início do exercício (déficit de oxigênio, nota-0229)"}, {"id": "nota-0148", "tipo": "complementa", "justificativa": "fornece um mecanismo fisiológico (EPOC de componente lento, até 24h) que ajuda a explicar por que esforços intensos/supermáximos produzem fadiga residual muito além do fim da sessão, relevante ao contraste overreached vs. overtrained já na nota-0148"}], "confianca": 0.7, "status": "auto-aprovado", "body": "Após o exercício, o consumo de oxigênio não retorna instantaneamente ao nível de repouso — esse excesso de consumo de oxigênio na recuperação é o **EPOC (excess postexercise oxygen consumption)**, termo atual para o que classicamente se chamava \"dívida de oxigênio\". EPOC = oxigênio total consumido na recuperação − oxigênio que seria consumido em repouso no mesmo período.\n\nEPOC tem dois componentes com dinâmicas muito diferentes:\n\n1. **Componente rápido**: após atividade aeróbia leve e de curta duração, cerca de metade do EPOC total é \"pago\" nos primeiros 30 segundos, com recuperação completa em **2-4 minutos** — decaimento exponencial de componente único.\n2. **Componente lento**: após atividade extenuante (grande acúmulo de lactato, elevação de temperatura corporal e de hormônios termogênicos), existe uma segunda fase de recuperação mais lenta que, dependendo da intensidade/duração do esforço anterior, **pode levar até 24 horas** para retornar ao consumo de oxigênio pré-exercício. Mesmo blocos intermitentes curtos de esforço \"supermáximo\" (ex.: três blocos de 2min a 108% do VO2max com 3min de descanso entre eles) mantêm o consumo de oxigênio de recuperação elevado por **1 hora ou mais**.\n\nAtletas treinados apresentam uma taxa de recuperação do consumo de oxigênio mais rápida (tanto em intensidade absoluta quanto relativa) do que não treinados — provavelmente as mesmas adaptações que aceleram o \"steady-rate\" no início do exercício (nota-0229) também aceleram a recuperação.\n\nEste é um mecanismo fisiológico que depende de medição laboratorial de VO2 (não disponível no Strava), por isso permanece como nota de contexto — mas fundamenta por que esforços muito intensos (ex.: séries de VO2max, provas curtas e extenuantes) geram um \"custo metabólico residual\" que pode se estender por horas além do fim da atividade registrada, distinto do simples TSS/carga mecânica do treino."},{"id": "nota-0233", "titulo": "Recuperação ativa em intensidade baixa (~30-40% VO2max) remove lactato sanguíneo mais rápido que repouso passivo; recuperação em alta intensidade (>65% VO2max) não traz vantagem e pode prolongar a remoção", "dominio": "recuperacao-e-fadiga", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 173, "trecho": "Figure 7.11 illustrates blood lactate recovery patterns for trained men who performed 6 min of supermaximal exercise on a bicycle ergometer. Active recovery involved 40 min of continuous cycling at either 35 or 65% VO2max... The results indicated that moderate aerobic activity (35% VO2max) performed in recovery better facilitates lactate removal compared with a passive recovery procedure... Performing recovery physical activity above the lactate threshold (65% VO2max) offers no advantage and may even prolong recovery by initiating lactate formation and accumulation. The inset graph illustrates that optimal recovery intensity probably ranges between 30 and 40% VO2max."}], "relacionadas": [{"id": "nota-0166", "tipo": "complementa", "justificativa": "aplica o conceito de remoção de lactato (lactate shuttle, nota-0166/0167) a uma recomendação prática de intensidade de recuperação ativa pós-esforço supermáximo"}], "confianca": 0.6, "status": "revisar", "body": "Estudo em cicloergômetro com homens treinados, após 6 minutos de exercício supermáximo: comparando recuperação ativa (40 min de pedalada contínua a 35% ou a 65% do VO2max) com recuperação passiva, os resultados mostraram que:\n\n- **Recuperação ativa em intensidade moderada-baixa (~35% VO2max) remove lactato sanguíneo mais rápido que a recuperação passiva.**\n- **Recuperação ativa acima do limiar de lactato (~65% VO2max) não traz vantagem alguma e pode até prolongar a recuperação**, porque reinicia a formação e o acúmulo de lactato.\n- A intensidade ótima de recuperação ativa provavelmente fica na faixa de **30-40% do VO2max**.\n\nO mecanismo provável: o aumento do fluxo sanguíneo muscular durante a recuperação ativa de baixa intensidade favorece a perfusão de órgãos \"consumidores líquidos\" de lactato (fígado, coração, músculos inspiratórios) e a oxidação de lactato via ciclo do ácido cítrico no próprio tecido muscular — sem gerar lactato adicional, o que aconteceria em intensidades acima do limiar.\n\nConfiança rebaixada (0,6) e status `revisar`: o achado vem de um único estudo laboratorial (Figura 7.11, cicloergômetro, amostra pequena de homens treinados), medindo lactato sanguíneo (não disponível no Strava).\n\nAplicação ao feedback: apesar de não ser executável automaticamente pelo Strava (sem lactato sanguíneo), esta é uma faixa de referência útil para orientar a intensidade do \"cool-down\"/volta à calma após esforços muito intensos (ex.: pós-prova, pós-série de VO2max) — sugerir uma pedalada leve, não parar totalmente nem continuar em intensidade moderada-alta, é consistente com esta evidência (30-40% do VO2max é aproximadamente Zona 1 baixa/recuperação ativa na maioria dos modelos de zona por potência)."},{"id": "nota-0242", "titulo": "'Janela aberta' de 3-72h após esforço muito longo/intenso eleva risco de infecção respiratória (URTI) nas 1-2 semanas seguintes — curva em J volume/intensidade x risco", "dominio": "recuperacao-e-fadiga", "camada": ["diario", "semanal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["TSS", "tempo-decorrido", "esforço-relativo (Relative Effort)"], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 449, "trecho": "Figure 20.27 describes the general J-shaped curve relating exercise volume and/or intensity and risk to URTI... a marathon run or intense training session provides an 'open window' (3 to 72 hr) that decreases antiviral and antibacterial resistance and increases risk of URTI that manifests itself within 1 to 2 wk... Approximately 13% of the participants in a Los Angeles marathon reported an episode of infectious URTI during the week following the race. For runners of comparable ability who did not compete for reasons other than illness, the infection rate approximated just 2%."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 449, "trecho": "light to moderate physical activity offers more protection against URTI and possibly diverse cancers than a sedentary lifestyle... Moderate physical activity does not exacerbate the severity and duration of illness when an infection occurs."}], "relacionadas": [{"id": "nota-0092", "tipo": "complementa", "justificativa": "nota-0092 trata overreaching não-funcional via TSB negativo sustentado; esta nota cobre um mecanismo diferente e mais agudo (imunossupressão transitória pós-esforço único muito longo/intenso), relevante mesmo sem TSB cronicamente negativo"}], "confianca": 0.65, "status": "revisar", "body": "Modelo da \"curva em J\": a relação entre volume/intensidade de exercício e risco de infecção do trato respiratório superior (URTI, sigla em inglês) não é linear. Atividade física leve a moderada **reduz** o risco de URTI e outras doenças comparado a um estilo de vida sedentário (a \"perna esquerda\" da curva em J, abaixo da linha de base). Porém, uma sessão de treino muito intensa ou muito longa (ex.: maratona, prova ou treino excepcionalmente exigente) abre uma **\"janela aberta\"** de 3 a 72 horas de redução da resistência antiviral/antibacteriana, elevando o risco de URTI que se manifesta dentro de 1 a 2 semanas seguintes.\n\nDado quantificado de um estudo com participantes de uma maratona em Los Angeles: **13%** relataram episódio de infecção respiratória na semana seguinte à prova, contra apenas **2%** entre corredores de nível comparável que não competiram (por motivos não relacionados a doença). Ou seja, um evento único de esforço extremo elevou o risco de infecção em ~6,5x na semana seguinte.\n\nImportante: atividade moderada não piora a gravidade/duração de uma infecção já instalada — o efeito negativo é específico de esforços muito longos/intensos (tipicamente provas de endurance ou treinos excepcionalmente exigentes), não do treino regular.\n\nAplicação ao feedback: quando o Strava registrar uma sessão com TSS muito acima do habitual do atleta (ex.: prova longa, evento fora do padrão, TSS \"excepcional\" — pico isolado muito acima da faixa normal de treino), ou duração/esforço relativo muito superiores ao normal, o feedback pode incluir um aviso de que as próximas 3-72h representam uma janela de maior vulnerabilidade a resfriados/infecções respiratórias, e que sinais de mal-estar nas 1-2 semanas seguintes podem estar relacionados ao esforço, reforçando a importância de sono, nutrição e higiene nesse período — não apenas de repouso muscular. Esta regra dispara de eventos isolados de carga excepcional, não do acúmulo crônico de TSB negativo (que já é coberto por nota-0092)."},{"id": "nota-0243", "titulo": "Terminologia de três degraus: Overload (planejado) → Overreaching (não planejado, recupera em dias/semanas) → Overtraining Syndrome (crônico); duas formas clínicas — simpática (rara) e parassimpática (comum)", "dominio": "recuperacao-e-fadiga", "camada": ["semanal", "mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 491, "trecho": "Overload: A planned, systematic, and progressive increase in training to improve performance. Overreaching: Unplanned, excessive overload with inadequate rest. Poor performance is observed in training and competition. Successful recovery should result from short-term (i.e., a few days up to 1 or 2 wk) interventions. Overtraining syndrome: Untreated overreaching that produces long-term decreased performance and impaired ability to train."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 491, "trecho": "Two clinical forms of overtraining have been described: 1. The less common sympathetic form (basedowian for thyroid hyperfunction patterns), characterized by increased sympathetic activity during rest... 2. The more common parasympathetic form (addisonoid for adrenal insufficiency patterns), characterized by predominance of vagal activity during rest and physical activity. More properly termed overreaching in the early stages (within as few as 10 days)..."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 490, "trecho": "Ten to 20% of athletes experience overtraining or 'staleness.'"}], "relacionadas": [{"id": "nota-0148", "tipo": "complementa", "justificativa": "nota-0148 distingue overreached/overtrained apenas pelo critério de duração de recuperação (Training and Racing with a Power Meter); esta nota adiciona um terceiro degrau (Overload, planejado) e a distinção por forma clínica (simpática vs. parassimpática), refinando a mesma linha do tempo"}, {"id": "nota-0092", "tipo": "complementa", "justificativa": "fornece o contexto clínico/sintomático por trás do overreaching não funcional descrito na nota-0092"}], "confianca": 0.65, "status": "revisar", "body": "McArdle formaliza três degraus de severidade em vez da dicotomia simples \"overreached vs. overtrained\": (1) **Overload** — aumento planejado, sistemático e progressivo do treino para melhorar desempenho (o estímulo desejável); (2) **Overreaching** — sobrecarga excessiva e não planejada com recuperação inadequada, com queda de desempenho em treino e competição; recuperação bem-sucedida ocorre com intervenções de curto prazo (poucos dias até 1-2 semanas); (3) **Overtraining Syndrome (OTS)** — overreaching não tratado, produzindo queda de desempenho de longo prazo e capacidade de treino prejudicada, podendo exigir semanas a meses de recuperação e, em alguns casos, atenção médica.\n\nO texto também descreve **duas formas clínicas** de overtraining, geralmente pouco distinguidas na linguagem popular: (1) **Forma simpática** (menos comum, chamada \"basedowiana\" em referência ao hipertireoidismo) — caracterizada por atividade simpática aumentada em repouso, hiperexcitabilidade, inquietação e queda de desempenho; associada a estresse psicológico/emocional excessivo. (2) **Forma parassimpática** (mais comum, chamada \"addisoniana\" em referência à insuficiência adrenal) — predomínio de atividade vagal em repouso e durante exercício, fadiga crônica em treinos e períodos de recuperação, sono e apetite alterados, infecções frequentes, alterações de humor (raiva, depressão, ansiedade) e mal-estar geral. É nesta forma que o \"overreaching\" descrito acima se manifesta nos estágios iniciais (a partir de apenas 10 dias de sobrecarga).\n\nPrevalência estimada: 10 a 20% dos atletas experimentam overtraining ou \"estagnação\" (staleness) em algum momento.\n\nAplicação ao feedback: nota de contexto mecanístico/clínico — não gera regra de interpretação direta de um sinal isolado do Strava (a distinção simpática/parassimpática depende de sinais fisiológicos que o Strava não captura, como FC de repouso, cortisol, sono). Útil para calibrar a linguagem do feedback ao descrever um estado de fadiga prolongada detectado por outros sinais (ex.: TSB muito negativo por semanas, nota-0092): comunicar que existe um espectro de severidade (Overload desejável → Overreaching recuperável em dias/semanas → Overtraining Syndrome, que exige recuperação muito mais longa), evitando alarmismo prematuro mas também não banalizando quedas de desempenho persistentes."},{"id": "nota-0244", "titulo": "Modelo de 'Desequilíbrio Crônico' de Lehmann et al. (1998) para a gênese da síndrome de overtraining: cinco vias de sobrecarga (neuromuscular, simpática, metabólica, psicológica, adrenal) convergindo para desempenho prejudicado", "dominio": "recuperacao-e-fadiga", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 491, "trecho": "Figure 21.24 illustrates possible interactive factors that initiate parasympathetic-type overtraining syndrome. Interactions among chronic neuromuscular, neuroendocrine, psychologic, immunologic, and metabolic overload during long-term, high-volume training (with insufficient recuperation) eventually alter physiologic function and the stress response to produce the overtrained state."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 492, "trecho": "Figure 21.24 Schematic overview of the genesis of overtraining syndrome in endurance sports requiring prolonged high-volume training. (Adapted with permission from Lehmann M, et al. Autonomic imbalance hypothesis and overtraining syndrome. Med Sci Sports Exerc 1998;30:1140.)"}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 491, "trecho": "Significant effects of a chronic imbalance of training load, competition, and nontraining stress factors in overtraining include the following: 1. Functional impairments in the hypothalamo-pituitary-gonadal and adrenal axes and sympathetic neuroendocrine system reflected by depressed urinary excretion of norepinephrine and a desensitization of the β2-adrenergic system. 2. Exercise-induced increases in adrenocorticotropic hormone and growth hormone and decreases in cortisol and insulin levels."}], "relacionadas": [{"id": "nota-0243", "tipo": "complementa", "justificativa": "nota-0243 descreve a terminologia e as duas formas clínicas de overtraining; esta nota detalha o modelo mecanístico (Lehmann 1998) que explica como a sobrecarga crônica gera a síndrome"}, {"id": "nota-0195", "tipo": "complementa", "justificativa": "o modelo de Lehmann situa a fadiga central e periférica (nota-0195) como duas das vias de saída do mesmo processo de desequilíbrio crônico (via neuromuscular → fadiga periférica; via psicológica/neuroendócrina → fadiga central)"}, {"id": "nota-0092", "tipo": "complementa", "justificativa": "fornece o mecanismo hipotético por trás do overreaching não funcional descrito na nota-0092"}], "confianca": 0.6, "status": "revisar", "body": "McArdle reproduz o modelo de Lehmann et al. (1998, \"Autonomic imbalance hypothesis and overtraining syndrome\", Med Sci Sports Exerc 30:1140) para explicar a gênese da síndrome de overtraining em esportes de endurance com treino prolongado de alto volume. O modelo parte de um **\"Desequilíbrio Crônico\" (Chronic Imbalance)** entre três entradas — Carga de Treino (Training Load), Competição, e Fatores de Estresse Não Relacionados ao Treino (ex.: condições médicas preexistentes, carboidrato/hidratação inadequados, calor/umidade/altitude, pressões psicossociais como treino monótono, competições frequentes e conflitos pessoais) — somado a **Recuperação Inadequada**.\n\nEsse desequilíbrio crônico se propaga por **cinco vias de sobrecarga** que operam em paralelo e se interconectam:\n\n1. **Sobrecarga neuromuscular** → redução da função neuromuscular e da densidade de β-adrenoceptores → contribui para fadiga periférica.\n2. **Sobrecarga do sistema simpático** → redução da atividade simpática intrínseca.\n3. **Sobrecarga metabólica** → depleção de glicogênio e desequilíbrio de aminoácidos.\n4. **Sobrecarga psicológica** → desequilíbrio de neurotransmissores cerebrais e alteração do estado de humor.\n5. **Sobrecarga adrenal** → função hipotalâmico-hipofisária alterada → resposta de cortisol diminuída.\n\nEssas cinco vias convergem em: função imune alterada, fadiga periférica, alteração do humor, fadiga central, função reprodutiva alterada — culminando em **desempenho de exercício prejudicado**.\n\nDo ponto de vista hormonal, o desequilíbrio crônico se reflete em: (1) prejuízos funcionais nos eixos hipotálamo-hipófise-gonadal e adrenal e no sistema neuroendócrino simpático, refletidos por excreção urinária reduzida de norepinefrina e dessensibilização do sistema β2-adrenérgico; (2) aumentos induzidos por exercício de ACTH e hormônio do crescimento, com reduções de cortisol e insulina.\n\n**Nota sobre o cânone:** este modelo é qualitativo/mecanístico — não fornece uma fórmula de cálculo (ex.: não é equivalente à fórmula de Monotonia/Strain de Foster, que continua sem fonte confirmada no cânone; ver nota-0193). Ele complementa, mas não resolve, a lacuna de uma métrica quantitativa de risco de overtraining a partir de dados de treino.\n\nAplicação ao feedback: nota de contexto mecanístico puro — não gera regra de interpretação direta de um sinal isolado do Strava (nenhuma das cinco vias é mensurável diretamente pelos dados disponíveis: ACTH, cortisol, densidade de β-adrenoceptores, neurotransmissores). Relevante para explicar, em linguagem educativa, por que overtraining é multifatorial (treino + competição + estresse de vida, não apenas volume/intensidade de treino) quando o produto precisar contextualizar um alerta de fadiga prolongada."},{"id": "nota-0287", "titulo": "45 min de ciclismo vigoroso (73% VO2máx) elevam o gasto calórico de recuperação por até 14h — +190 kcal além das 520 kcal do próprio treino", "dominio": "recuperacao-e-fadiga", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 823, "trecho": "A bout of vigorous physical activity may increase recovery oxygen consumption for up to 14 hr. Ten young adult men bicycled for 45 min at a vigorous pace equivalent to 73% VO2max. Energy expenditure was then measured for 24 hr while the men recovered in a metabolic chamber."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 823, "trecho": "In the 14-hr period following cycling, the men burned 190 more calories than on a day when they remained sedentary. This 37% recovery calorie-burning bonus occurred in addition to the 520 calories burned during cycling."}], "relacionadas": [{"id": "nota-0232", "tipo": "complementa", "justificativa": "nota-0232 descreve o EPOC (componentes rápido e lento) de forma geral; esta nota traz um dado quantitativo específico de uma sessão de ciclismo vigoroso (73% VO2máx, 45min) medido em câmara metabólica por 14h"}], "confianca": 0.6, "status": "revisar", "body": "Em um estudo com 10 homens jovens que pedalaram por **45 minutos a 73% do VO2máx** (intensidade vigorosa, tipicamente zona de limiar/tempo), o gasto calórico foi medido em câmara metabólica por 24h de recuperação. Resultado: nas **14 horas seguintes** ao treino, os participantes queimaram **190 kcal a mais** do que num dia sedentário equivalente — um \"bônus\" de recuperação de **37%** somado às 520 kcal já gastas durante a própria sessão de ciclismo.\n\nEsse dado quantifica, para uma sessão específica de ciclismo, o fenômeno geral de EPOC (excesso de consumo de oxigênio pós-exercício, já descrito na nota-0232): sessões vigorosas (não apenas HIIT curto) produzem um efeito metabólico residual mensurável e prolongado (até 14h), que soma um gasto calórico adicional relevante ao gasto direto do treino.\n\nNota de confiança: resultado de um único estudo pequeno (n=10), condição controlada em câmara metabólica — a magnitude exata (37%, 190 kcal) não deve ser tratada como universal, mas o padrão qualitativo (esforço vigoroso → gasto elevado por várias horas pós-treino) é consistente com a literatura de EPOC mais ampla.\n\nAplicação ao feedback: ao estimar o gasto energético diário total de um ciclista, sessões vigorosas (ex.: treino de limiar, intervalados) não devem ser contabilizadas apenas pelas calorias durante a atividade — o efeito residual de recuperação pode adicionar dezenas a ~200 kcal nas horas seguintes, relevante para cálculos de balanço energético em dias de treino intenso."},{"id": "nota-0096", "titulo": "Semana de recuperação: teto prático de ~62% da FTP e menos de 2h/dia", "dominio": "recuperacao-e-fadiga", "camada": ["semanal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-média", "tempo-movimento"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 268, "trecho": "Jill will ride her bike this week, but when she does, she will ride easy. And when she rides easy, she must ride really easy, keeping her watts under 62 percent of her FTP—no speeding over 14 mph on a flat road... During Week 4, Jill will limit her riding to less than 2 hours per day, with her rides during the week lasting only an hour and 15 minutes. A rest week means that you also rest completely on some days."}], "relacionadas": [{"id": "nota-0022", "tipo": "complementa", "justificativa": "refina o teto de intensidade da semana de recuperação além do limite genérico da Zona 1 (Active Recovery, <55% FTP) definido no Capítulo 2, aplicado aqui como regra prática para a semana inteira"}], "confianca": 0.7, "status": "auto-aprovado", "body": "Exemplo prático de uma semana de recuperação (rest week) dentro de um plano de treino: manter a potência **abaixo de ~62% da FTP** em todas as pedaladas da semana (\"really easy\"), limitar a duração diária a **menos de 2 horas** (com a maioria dos treinos durando ~1h15), e incluir **dias de descanso completo**.\n\nNota: 62% é ligeiramente acima do teto da Zona 1/Active Recovery (~55% FTP, nota já registrada no Capítulo 2), sugerindo que numa semana de recuperação o autor tolera um pouco de deslocamento para a Zona 2 baixa, desde que a intensidade geral permaneça bem reduzida.\n\nAplicação ao feedback: útil como heurística para verificar se uma \"semana de recuperação\" declarada pelo atleta realmente correspondeu a uma redução real de carga — se a potência média/máxima da semana ultrapassar esse teto com frequência, ou a duração diária exceder 2h, a semana provavelmente não cumpriu a função de recuperação pretendida."},{"id": "nota-0003", "titulo": "Ganho de ~30 W por otimização de posição e aerodinâmica", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 28, "trecho": "it has been found that with improvements in positioning and equipment a rider should be able to pedal at approximately 30 watts less to maintain a given speed."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 29, "trecho": "you may be able to gain 30 watts of power. This represents a greater gain than most cyclists see in an entire year of training."}], "relacionadas": [], "confianca": 0.7, "status": "auto-aprovado", "body": "Segundo testes em túnel de vento citados pelos autores, otimizar posição no equipamento e aerodinâmica pode permitir manter a mesma velocidade com cerca de 30 W a menos de potência — equivalente, em termos de velocidade, a um ganho de aproximadamente 30 W de potência. Os autores destacam que esse ganho costuma ser maior do que o progresso fisiológico que a maioria dos ciclistas obtém em um ano inteiro de treinamento.\n\nNota de aplicação: este é um dado de contexto sobre a importância relativa de posição/aerodinâmica frente ao treino fisiológico — não é, por si só, uma métrica derivada dos sinais de potência de uma sessão do Strava, por isso não tem `sinais` associados. Útil para calibrar expectativas do atleta sobre de onde vêm os ganhos de velocidade (equipamento/posição vs. fisiologia)."},{"id": "nota-0005", "titulo": "Os quatro benefícios do treino com medidor de potência (autoavaliação, colaboração, foco, performance de pico)", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 21, "trecho": "Self-Assessment... Collaboration... Focused Training... Peak Performance: With accurate information, improved collaboration, and smarter training, you will be positioned to do your best in cycling."}], "relacionadas": [], "confianca": 0.8, "status": "auto-aprovado", "body": "Os autores organizam os benefícios do treino com medidor de potência em quatro áreas que se sobrepõem e se reforçam mutuamente: (1) Autoavaliação — identificar pontos fortes e fracos a partir dos dados objetivos da pedalada; (2) Colaboração — compartilhar dados com técnico/equipe para trabalho mais eficiente; (3) Foco no treino — usar os dados para definir metas e métodos de treino mais apropriados; (4) Performance de pico — a combinação das três áreas anteriores posiciona o atleta para render o melhor possível nas provas.\n\nEsse framework de quatro pilares funciona como fio condutor do restante do livro e serve de contexto geral para justificar por que a interpretação orientada por dados (e não apenas por sensação) é o eixo central da metodologia dos autores."},{"id": "nota-0036", "titulo": "Limitações do Power Profile: sem correção por idade; declínio anual estimado de VO2máx e força/potência", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 78, "trecho": "The Power Profile standards are based on the performance capacities of young adults and thus do not account for the effects of aging... starting around age 30, an athlete's VO2max will decline year over year. For men, the annual rate of decline equates to roughly 0.5 ml/kg/min.; for women, VO2max declines at a slightly slower annual rate, about 0.35 ml/kg/min."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 79, "trecho": "Muscular strength and power, in contrast, can generally be maintained, with training, until around age 50, but at that point they begin to decline somewhat more rapidly."}], "relacionadas": [{"id": "nota-0031", "tipo": "complementa", "justificativa": "detalha uma limitação importante da Tabela 4.1 (Power Profile) da nota-0031"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Os padrões do Power Profile (Tabela 4.1, nota-0031) foram construídos com base na capacidade de desempenho de adultos jovens, sem correção por idade — os autores consideraram criar um chart específico para masters, mas rejeitaram a ideia pela dificuldade de coletar dados suficientes e aplicar correções fisiológicas corretamente; a tabela deve ser aplicada igual, independente da idade do ciclista.\n\nDados de referência sobre envelhecimento citados pelos autores: a partir de ~30 anos, o VO2máx declina, em média, ~0,5 mL/kg/min por ano em homens e ~0,35 mL/kg/min por ano em mulheres. Já força e potência muscular tendem a se manter (com treino) até por volta dos 50 anos, quando passam a declinar mais rapidamente. Os autores julgam que essas mudanças diferenciais por idade não são suficientes para alterar significativamente o formato do perfil de um atleta, mas reconhecem que, para máxima precisão, fatores de correção por idade poderiam ser aplicados de forma diferente em cada coluna (duração) da tabela.\n\nAplicação ao feedback: ao comparar o Power Profile de atletas mais velhos com a Tabela 4.1, ter em mente que ela não tem correção etária — um resultado \"mais fraco\" nas colunas de maior duração (mais dependentes de VO2máx) pode refletir em parte o envelhecimento normal, não necessariamente falta de treino."},{"id": "nota-0117", "titulo": "Excesso de ritmo no bike leg é apontado como a principal causa de DNF em triathlon; diferença entre pacing bom e ruim pode ser de apenas ~15W de NP", "dominio": "contexto-atleta", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["NP", "IF"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 327, "trecho": "Most triathletes do not understand how easy it is to ride too fast on the bike leg; it's the number one cause of DNFs in triathlons. The difference between a well-paced bike leg and a poorly paced one can be as little as 15 watts (normalized) for an average in the event."}], "relacionadas": [{"id": "nota-0111", "tipo": "complementa", "justificativa": "reforça a importância prática de seguir a NP-alvo calculada pela fórmula do orçamento de TSS (nota-0111), já que pequenos excessos têm grande impacto"}], "confianca": 0.55, "status": "revisar", "body": "Afirmação dos autores (não referenciada a estudo formal/estatística de DNFs): pedalar rápido demais no bike leg é a **principal causa de DNF (não terminar a prova)** em triathlon. A diferença entre um bike leg bem pacing e um mal pacing pode ser de apenas **~15 watts de Potência Normalizada média** ao longo de toda a prova — uma margem pequena com grande impacto no resultado final (capacidade de completar/desempenhar bem a corrida).\n\n**Motivo da revisão:** afirmação qualitativa/anedótica dos autores (\"number one cause\"), sem citação de dados/estudo publicado que a sustente. O valor de 15W também não é acompanhado de contexto suficiente (independe de FTP absoluta do atleta? é uma cifra fixa ou percentual?) para ser tratado como regra numérica confiável.\n\nAplicação ao feedback: útil como justificativa qualitativa para dar peso extra a alertas de pacing agressivo no bike leg de provas de triathlon (IF/NP acima do orçamento calculado, nota-0111), mas não usar o valor \"15W\" como limiar quantitativo de alerta sem validação adicional."},{"id": "nota-0138", "titulo": "Em provas de 24h, o gap criado nas primeiras 4-6h tende a se manter pelo resto da prova; em provas ultra de 6-8h, ataques decisivos ocorrem mais perto do final", "dominio": "contexto-atleta", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["NP", "TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 392, "trecho": "Power files of 24-hour racers have shown that putting out more wattage in the first four hours of a race and creating a gap on the competition can be a huge advantage later in the event. In an ultra race (a race longer than six hours), most athletes fatigue at the same rate over the next 18 hours, so a gap of 45 minutes from Rider 1 to Rider 2 at the six-hour mark is most likely going to hold for the next 18 hours."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 396, "trecho": "the higher-than-average pacing that occurs in the first four hours can be the difference between winning and losing (especially so in a long 24-hour race), but races in the six- to eight-hour range are more competitive and similar to long road races, where the winning attacks come near the end of the event."}], "relacionadas": [{"id": "nota-0137", "tipo": "complementa", "justificativa": "aplicação prática, em prova de 24h, do mesmo princípio de gap de distância descrito no Efeito Allen (nota-0137)"}], "confianca": 0.55, "status": "revisar", "body": "Observação (baseada em análise de arquivos de potência de corredores de ultraresistência em MTB): em provas de **24 horas**, a maioria dos atletas fadiga a uma taxa similar ao longo das ~18 horas seguintes às primeiras 6 horas — então um gap estabelecido nas primeiras 4-6 horas (ex.: 45 minutos de vantagem na marca de 6h) **tende a se manter** pelo resto da prova, desde que não haja problemas de hidratação, nutrição ou mecânica. Isso reforça a lógica do Efeito Allen (nota-0137): vale a pena pedalar mais forte que o sustentável no início de uma prova de 24h para estabelecer esse gap.\n\n**Contraste importante:** em provas ultra mais curtas (6-8 horas), a dinâmica é diferente — a prova é mais competitiva e se assemelha a corridas de estrada longas, onde os **ataques decisivos ocorrem perto do final** da prova, não no começo.\n\n**Motivo da revisão:** conclusão qualitativa baseada em observação de poucos casos (arquivos de atletas de elite específicos), não um estudo estatístico controlado — tratar como heurística por faixa de duração, não regra numérica rígida.\n\nAplicação ao feedback: ao analisar provas de ultraresistência, diferenciar a estratégia esperada conforme a duração total: provas de ~24h favorecem pacing agressivo nas primeiras horas; provas de 6-8h favorecem conservação de energia para um ataque final."},{"id": "nota-0035", "titulo": "Fenótipos de ciclista pelo formato do Power Profile (all-rounder, sprinter, contrarrelogista/escalador, perseguidor)", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-máx", "relação-P/peso"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 75, "trecho": "The cyclist who is an all-rounder will have a generally horizontal plot across all the categories... The all-rounder does not necessarily excel at any one thing but is likely competitive in his or her category across a broad range of events."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 76, "trecho": "A good sprinter will typically have a distinctly downward sloping plot, especially between the 1-minute and 5-minute categories."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 76, "trecho": "A distinctly upward-sloping plot... is typical for the time trialist... most time trialists are weak in neuromuscular power and anaerobic capacity, but they have relatively high aerobic power and an especially high lactate threshold."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 78, "trecho": "A sharply inverted V pattern implies both a relatively high anaerobic capacity and high aerobic ability, which makes a rider particularly well suited for events such as the pursuit."}], "relacionadas": [{"id": "nota-0031", "tipo": "pre-requisito", "justificativa": "usa a classificação por categoria da Tabela 4.1 (nota-0031) nas 4 durações para desenhar o formato do perfil"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Ao classificar as 4 durações-índice (5s, 1min, 5min, FTP) na Tabela 4.1 e observar o formato resultante (plano, descendente, ascendente, \"V invertido\"), emergem padrões típicos de fenótipo:\n\n- **All-rounder**: perfil praticamente horizontal — as 4 durações caem no mesmo nível de categoria. Não se destaca em nada específico, mas é competitivo numa ampla gama de provas. É o perfil mais comum em ciclistas iniciantes/não especializados (forças específicas ainda não desenvolvidas pelo treino).\n- **Sprinter**: perfil claramente descendente, sobretudo entre 1 min e 5 min (5s e 1min bem mais fortes, relativamente, que 5min e FTP).\n- **Contrarrelogista / escalador / rider de estado estável**: perfil claramente ascendente, sobretudo entre 1 min e 5 min (e também entre 5 min e FTP) — fraco em potência neuromuscular e capacidade anaeróbia, mas com potência aeróbia e limiar de lactato relativamente altos.\n- **Perseguidor (pursuiter)**: formato de \"V invertido\" nítido — indica capacidade anaeróbia E capacidade aeróbia altas ao mesmo tempo. É uma combinação relativamente incomum (dado que se espera relação inversa entre potência neuromuscular e limiar de lactato, e relação positiva entre VO2máx e limiar de lactato); um perfil \"quase all-rounder\" que ainda não desenvolveu o limiar de lactato ao máximo também pode gerar esse mesmo formato — vale checar se os valores realmente refletem o melhor esforço do atleta antes de concluir que é um \"V invertido\" real.\n\nAplicação ao feedback: o formato do perfil orienta tanto a interpretação de pontos fortes/fracos quanto sugestões de prova/especialização — mas o texto ressalta que essas comparações são sempre relativas ao desempenho de elite mundial em cada duração, então ciclistas de estrada tendem a parecer \"fracos\" em sprint de 5s comparados a sprinters de pista puros, e vice-versa."},{"id": "nota-0082", "titulo": "Mapa Fenotípico (Phenotypic Map): razões Pmax/FTP e FRC/Pmax substituem o Power Profile 1D por um mapa 2D", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["potência-máx", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 209, "trecho": "The key aspects of the Phenotypic Map are the ratios of Pmax/FTP and FRC/Pmax... If the Pmax/FTP ratio is low, this would be comparable to the upward-sloping classic Power Profile of the time trialist. On the other hand, a high Pmax/FTP would indicate the classic downward-sloping Power Profile of the sprinter."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 211, "trecho": "since the time trialists will all have a relatively low Pmax, looking at the FRC/Pmax will identify the successful pursuiters."}], "relacionadas": [{"id": "nota-0035", "tipo": "alternativa-a", "justificativa": "versão mais refinada (2D, contínua) dos fenótipos qualitativos (all-rounder, sprinter, contrarrelogista, perseguidor) descritos na nota-0035 a partir do Power Profile clássico"}, {"id": "nota-0077", "tipo": "pre-requisito", "justificativa": "usa o Pmax definido na nota-0077"}, {"id": "nota-0078", "tipo": "pre-requisito", "justificativa": "usa a FRC definida na nota-0078"}], "confianca": 0.7, "status": "revisar", "body": "O Mapa Fenotípico é uma evolução do Power Profile: em vez de um perfil unidimensional (4 pontos discretos comparados a categorias fixas), usa duas razões contínuas como eixos — **Pmax/FTP** (eixo X) e **FRC/Pmax** (eixo Y) — permitindo posicionar o atleta num espaço bidimensional em vez de um rótulo único.\n\n- Pmax/FTP baixo → perfil clássico ascendente de contrarrelogista/escalador (nota-0035): FTP alto relativo à potência neuromuscular, predominância de fibras lentas.\n- Pmax/FTP alto → perfil clássico descendente de sprinter.\n- Dentro do grupo de Pmax/FTP baixo (todos \"contrarrelogistas\" no sentido clássico), a razão **FRC/Pmax** diferencia contrarrelogistas puros (FRC/Pmax também baixo) de perseguidores/pursuiters (FRC/Pmax mais alto) — já que ambos os subgrupos têm Pmax baixo relativo ao FTP, usar Pmax como parte da segunda razão permite comparar sua capacidade anaeróbia (FRC) de forma normalizada dentro desse subgrupo.\n\nVantagem sobre o Power Profile clássico: por ser um mapa contínuo (não categorias fixas), é possível visualizar o \"trânsito\" de um atleta entre fenótipos ao longo do tempo conforme ele treina ou destreina (ex.: de all-rounder para perseguidor, depois para contrarrelogista, e de volta a all-rounder).\n\nNota de confiança: o mapeamento exato depende de software (WKO4) para calcular Pmax e FRC individualizados via ajuste de curva — a base não tem acesso a exemplos numéricos completos do mapa (apenas a lógica conceitual descrita no texto), por isso confiança um pouco mais baixa e marcada para revisão quanto à aplicabilidade prática sem a ferramenta de software específica."},{"id": "nota-0097", "titulo": "Priorizar o limitante relevante para o objetivo do atleta, não necessariamente a fraqueza numérica absoluta do Power Profile", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-máx", "relação-P/peso"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 272, "trecho": "we notice Neuromuscular/Level 7 power falls below 'novice' until he reaches 1 minute... His focus is completely on triathlon, so even though this might be a weakness, it doesn't make sense to try and improve it or even spend time training at Level 7. His training time is better spent elsewhere, like FTP."}], "relacionadas": [{"id": "nota-0082", "tipo": "pre-requisito", "justificativa": "usa o Mapa Fenotípico/Power Profile (nota-0082, Cap.8) para identificar pontos fracos, mas filtra quais deles merecem ser treinados conforme a modalidade-alvo"}], "confianca": 0.85, "status": "auto-aprovado", "body": "Estudo de caso: o Power Profile de Joe TriGuy (triatleta) mostra Potência Neuromuscular (Nível 7) muito fraca (abaixo de \"novice\" até 1 minuto). Apesar de tecnicamente ser uma fraqueza no perfil, os autores concluem que **não faz sentido dedicar tempo de treino a esse sistema**, porque potência neuromuscular/sprint não é relevante para o desempenho de um triatleta numa prova de estrada com poucas disputas de sprint — o tempo de treino é mais bem investido em FTP e capacidade anaeróbia (relevantes para as subidas curtas do percurso-alvo).\n\nPrincípio geral extraído: a identificação de \"pontos fracos\" via Power Profile/Curva de Duração de Potência (nota-0082 e correlatas) deve sempre ser filtrada pela relevância desse sistema energético para o objetivo específico do atleta (tipo de prova, perfil do percurso, modalidade). Uma fraqueza numérica absoluta não é automaticamente uma prioridade de treino.\n\nAplicação ao feedback: ao gerar recomendações de treino a partir do Power Profile/PDC de um atleta, o sistema não deve simplesmente apontar \"seu ponto mais fraco é X\" sem cruzar isso com o objetivo declarado do atleta (tipo de prova-alvo, perfil de percurso). Um sinal de \"fraqueza\" em um sistema energético irrelevante ao objetivo deve ter prioridade de recomendação baixa, mesmo com confiança estatística alta."},{"id": "nota-0164", "titulo": "VO2máx alto não garante melhor desempenho: atleta com VO2máx menor mas maior economia/FTP pode superar atleta com VO2máx maior — desempenho depende da interação entre VO2máx, limiares, economia, capacidade anaeróbia, durabilidade e estratégia", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 69, "trecho": "Atleta A: VO₂máx = 82 mL·kg⁻¹·min⁻¹, FTP = 300 W, excelente potência máxima, baixa economia. Atleta B: VO₂máx = 74 mL·kg⁻¹·min⁻¹, FTP = 340 W, excelente economia, maior resistência à fadiga. Quem possui maior probabilidade de vencer uma prova de estrada? Provavelmente o Atleta B."}], "relacionadas": [{"id": "nota-0163", "tipo": "complementa", "justificativa": "reforça a advertência da nota-0163 de que a tabela de referência de VO2máx não deve ser usada para prever desempenho competitivo isoladamente"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Exemplo didático do Manual: Atleta A tem VO2máx de 82 mL·kg⁻¹·min⁻¹ mas FTP de apenas 300W (baixa economia); Atleta B tem VO2máx menor (74) mas FTP maior (340W) e maior resistência à fadiga — o Manual conclui que o Atleta B provavelmente venceria uma prova de estrada. O desempenho depende da interação entre VO2máx, limiares fisiológicos, economia de movimento, capacidade anaeróbia, durabilidade, estratégia e fatores psicológicos — nenhum fator isolado prevê o resultado.\n\nAplicação ao feedback: reforça um princípio já presente implicitamente no cânone (Livro 1 prioriza FTP/potência-por-peso como métricas práticas derivadas do Strava, em vez de VO2máx laboratorial) — o produto deve evitar qualquer comparação ou ranking de atletas baseado unicamente em capacidade aeróbia máxima; a FTP e a curva de potência-duração (já cobertas pelo Livro 1) são proxies mais completas e diretamente derivadas de dados do Strava."},{"id": "nota-0200", "titulo": "Arquétipos de perfil fisiológico por especialidade: Escalador (potência/peso), Contrarrelogista (potência absoluta/aerodinâmica), Velocista (potência neuromuscular/anaeróbia), Clássicas (durabilidade+recuperação repetida), MTB (VO2máx+técnica+recuperação), Ultraciclista (economia+eficiência de gordura)", "dominio": "contexto-atleta", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 183, "trecho": "Os escaladores... normalmente possuem: elevada relação potência/peso; baixo percentual de gordura; excelente capacidade aeróbia; elevada economia metabólica; grande tolerância ao exercício prolongado."}, {"arquivo": "Manual treinamento.pdf", "pagina": 184, "trecho": "O contrarrelogista... elevada potência absoluta; excelente capacidade de sustentar esforço contínuo; elevada eficiência aerodinâmica... O velocista depende principalmente de: potência neuromuscular; capacidade anaeróbia; elevada força máxima; rápida ativação muscular."}, {"arquivo": "Manual treinamento.pdf", "pagina": 185, "trecho": "O especialista em clássicas... elevada resistência aeróbia; excelente durabilidade; boa potência anaeróbia; capacidade de recuperação após esforços repetidos... É um dos perfis fisiológicos mais completos do ciclismo."}, {"arquivo": "Manual treinamento.pdf", "pagina": 185, "trecho": "O MTB caracteriza-se por mudanças constantes de intensidade... elevado VO₂máx; excelente capacidade anaeróbia; rápida recuperação entre esforços; técnica refinada... O ultraciclista... excepcional resistência aeróbia; elevada durabilidade; eficiência metabólica; excelente utilização de gordura; estabilidade psicológica."}], "relacionadas": [{"id": "nota-0082", "tipo": "complementa", "justificativa": "descrição narrativa/qualitativa de arquétipos por especialidade, complementar ao Mapa Fenotípico quantitativo baseado em Pmax/FTP/FRC já registrado na nota-0082 do Livro 1"}], "confianca": 0.5, "status": "auto-aprovado", "body": "O Manual descreve 6 arquétipos de perfil fisiológico associados a especialidades do ciclismo: Escalador (alta relação potência/peso, baixo %gordura, boa economia — potência relativa é o que importa, pequenos ganhos de peso prejudicam desempenho); Contrarrelogista (potência absoluta mais importante que relativa, estabilidade fisiológica, aerodinâmica/posição decisivas); Velocista (potência neuromuscular, capacidade anaeróbia, força máxima, ativação muscular rápida); Especialista em clássicas (combina resistência aeróbia + durabilidade + potência anaeróbia + recuperação entre esforços repetidos — considerado um dos perfis mais completos); Mountain biker (VO2máx elevado, capacidade anaeróbia, recuperação rápida entre picos, técnica com peso maior que na estrada); Ultraciclista (resistência aeróbia excepcional, durabilidade, eficiência de utilização de gordura, estabilidade psicológica). Não existe perfil \"ideal\" universal — cada modalidade/estratégia de vitória exige uma combinação diferente, e o treinador não deve comparar indiscriminadamente atletas com perfis distintos.\n\nAplicação ao feedback: complementa o Mapa Fenotípico quantitativo do Livro 1 (nota-0082, baseado em Pmax/FTP/FRC derivados da curva de potência) com uma camada de linguagem narrativa — o produto pode usar esses arquétipos para comunicar ao usuário, de forma mais acessível, o que seu perfil d
