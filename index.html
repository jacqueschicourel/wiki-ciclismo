<script id="revisoes-data" type="application/json">[{"tipo": "baixa-confianca", "titulo": "Cadência abaixo de 70 rpm em potência de limiar associada a perda de contato com o grupo (estudo de caso)", "notas": ["nota-0007"], "body": "Correlação observada em um único atleta (estudo de caso anedótico no livro), não um achado fisiológico sistemático validado nas 4 obras. Antes de usar como regra-interpretação ativa no feedback, decidir: (a) manter como hipótese de baixa prioridade, (b) rebaixar para aplicação:contexto, ou (c) descartar o campo sinais (removendo-a do roteamento automático por RAG) até haver reforço de outra fonte do cânone.", "confianca": 0.55}, {"tipo": "baixa-confianca", "titulo": "Analisar repetibilidade de uma série: comparar o 2º/3º intervalo com o último para medir a queda de potência", "notas": ["nota-0054"], "body": "O Capítulo 5 (nota-0040) prescreve parar uma série de intervalos quando a potência cair 5% abaixo do 3º intervalo. O Capítulo 6, ao analisar uma série já concluída, usa um critério de queda de 10% no mesmo tipo de comparação. Não está claro se são critérios deliberadamente diferentes (parada em tempo real vs. análise retrospectiva mais tolerante) ou uma inconsistência numérica dentro do próprio livro. Ver também o conflito 'intervalo repetível 5% vs. 10%'.", "confianca": 0.7}, {"tipo": "baixa-confianca", "titulo": "Xert MPA (Maximal Power Available): modelo de fadiga em tempo real com 3 parâmetros (PP, HIE, TP)", "notas": ["nota-0056"], "body": "É a descrição de um modelo proprietário de terceiros (software Xert), apresentado no livro apenas de forma resumida/exemplificativa (não é um framework desenvolvido pelos próprios autores, como FTP/Power Profile/PDC/FRC). A base não tem acesso à documentação técnica completa do Xert — decidir se essa nota deve ser usada ativamente no feedback (já que depende de um software externo específico que o produto pode não ter) ou apenas mantida como contexto histórico/conceitual.", "confianca": 0.7}, {"tipo": "baixa-confianca", "titulo": "Mapa Fenotípico (Phenotypic Map): razões Pmax/FTP e FRC/Pmax substituem o Power Profile 1D por um mapa 2D", "notas": ["nota-0082"], "body": "O cálculo de Pmax e FRC individualizados depende de ajuste de curva via software (WKO4); a base não tem exemplos numéricos completos do mapa, apenas a lógica conceitual. Decidir se essa nota deve alimentar feedback ativo (caso o produto tenha acesso a Pmax/FRC modelados) ou ficar só como contexto conceitual.", "confianca": 0.7}, {"tipo": "baixa-confianca", "titulo": "TSB ideal no dia da prova varia com a duração do evento", "notas": ["nota-0091"], "body": "Baseada numa pesquisa informal dos autores com ~200 atletas (não um estudo controlado formalmente publicado/revisado por pares, tamanho e metodologia da amostra não totalmente descritos no livro). As faixas numéricas de TSB (-5 a +15 geral; mais positivo para <5min; -10 a +25 para 5min+) devem ser tratadas como heurísticas aproximadas, não valores validados cientificamente.", "confianca": 0.65}, {"tipo": "baixa-confianca", "titulo": "WAC Score (Williams, Allen, Coggan): pontuação de desempenho ajustada por idade vs. melhores do mundo", "notas": ["nota-0102"], "body": "Ferramenta proprietária do Peaks Coaching Group citada apenas conceitualmente no livro, sem a tabela de referência mundial nem a fórmula de ajuste por idade. Não reproduzível/verificável a partir do texto disponível; não está claro se a ferramenta segue disponível. Também marcada como alternativa-a nota-0075 (Power Profile) — variação de modelo de referência.", "confianca": 0.55}, {"tipo": "baixa-confianca", "titulo": "Para provas de ultraresistência (ex.: Ironman), o TSB no dia da prova é mais preditivo de desempenho do que picos de potência de curta duração", "notas": ["nota-0116"], "body": "Conclusão baseada num único estudo de caso (uma atleta, dados observacionais de 6 temporadas), não um estudo controlado/amostra maior. Tratar como heurística qualitativa dos autores, não regra numérica validada.", "confianca": 0.65}, {"tipo": "baixa-confianca", "titulo": "Excesso de ritmo no bike leg é apontado como a principal causa de DNF em triathlon; diferença entre pacing bom e ruim pode ser de apenas ~15W de NP", "notas": ["nota-0117"], "body": "Afirmação qualitativa/anedótica dos autores, sem estudo/estatística citada. O valor '15W' não tem contexto de normalização (independe de FTP absoluta?) suficiente para virar limiar numérico confiável.", "confianca": 0.55}, {"tipo": "baixa-confianca", "titulo": "Estimando a contribuição aeróbia vs. anaeróbia e o MAOD a partir da área sob a curva de potência", "notas": ["nota-0126"], "body": "Requer VO2max e eficiência mecânica medidos em laboratório, dados não disponíveis a partir de um medidor de potência isolado ou do Strava. Não implementável diretamente no produto sem uma fonte substituta de VO2max. Mantido no cânone como conceito de contexto.", "confianca": 0.5}, {"tipo": "baixa-confianca", "titulo": "Métodos de teste de campo para CdA (área frontal efetiva) usando medidor de potência", "notas": ["nota-0127"], "body": "Protocolo de teste dedicado (posição/equipamento), não uma regra de interpretação de atividades já registradas — não aplicável diretamente à análise retrospectiva de dados do Strava sem uma funcionalidade de teste de CdA dedicada.", "confianca": 0.55}, {"tipo": "baixa-confianca", "titulo": "Em provas de 24h, o gap criado nas primeiras 4-6h tende a se manter pelo resto da prova", "notas": ["nota-0138"], "body": "Conclusão qualitativa baseada em observação de poucos atletas de elite (estudos de caso), não um estudo estatístico controlado com amostra representativa. Tratar como heurística por faixa de duração de prova, não regra numérica validada.", "confianca": 0.55}, {"tipo": "baixa-confianca", "titulo": "Cuidado: 'Pmax' exibido em unidades Garmin/ANT+ é na verdade Ppeak, diferente do Pmax do modelo PDC do livro", "notas": ["nota-0147"], "body": "A aplicação prática desta distinção depende de como o Strava/Garmin API efetivamente rotula e calcula esse campo — não verificado nesta etapa de extração do cânone (é uma observação do livro sobre convenções de nomenclatura de hardware, não testada contra a API real). Importante revisar durante a implementação técnica do produto.", "confianca": 0.7}, {"tipo": "baixa-confianca", "titulo": "Monotonia e Strain (Foster): conceitos citados sem fórmula de cálculo no cânone", "notas": ["nota-0193"], "body": "Monotonia e Strain são citados pelo Manual apenas conceitualmente, sem fórmula de cálculo. A fórmula clássica de Carl Foster (Monotonia = média/desvio-padrão da carga diária; Strain = carga semanal × Monotonia) é conhecida na literatura esportiva, mas não aparece no texto-fonte — não pode ser atribuída ao cânone sem uma citação explícita. Decisão pendente: (1) manter a nota como conceito não-operacional até que outra fonte do cânone apresente a fórmula explicitamente; ou (2) decisão humana de importar a fórmula clássica de Foster como conhecimento geral fora das 4 obras.", "confianca": 0.4}, {"tipo": "baixa-confianca", "titulo": "VO2max estimado por wearable é pouco confiável (opinião do autor)", "notas": ["nota-0206"], "body": "Afirmação é opinião pessoal do autor sobre algoritmos proprietários de terceiros (Garmin/WHOOP), sem dado quantitativo de validação apresentado no próprio livro. Decisão pendente: manter como nota de contexto de baixa confiança (útil como cautela geral) ou aguardar confirmação por fonte com dados de validação antes de citar como cânone mais robusto.", "confianca": 0.4}, {"tipo": "baixa-confianca", "titulo": "Tabela de contribuição percentual de cada sistema energético por duração de evento, de 100m a prova de 24h", "notas": ["nota-0228"], "body": "Tabela vem de uma única fonte primária (Newsholme et al. 1992, citada por McArdle), derivada especificamente de eventos de corrida (assume corredor de 70kg) e extrapolada aqui por analogia a durações equivalentes de ciclismo. Os percentuais exatos não foram validados especificamente para ciclismo.", "confianca": 0.6}, {"tipo": "baixa-confianca", "titulo": "Ciclistas que treinam mais tempo em/acima do limiar de lactato aumentam a eficiência bruta de pedalada ao longo de uma temporada (~1%, Hopker 2009)", "notas": ["nota-0231"], "body": "Achado de um único estudo, sem indicação no texto-fonte de que seja uma revisão sistemática ou meta-análise. A magnitude do efeito é pequena (~1%), na faixa de erro de medição típico de testes de eficiência bruta em laboratório, o que aumenta a chance de o achado não se replicar de forma consistente.", "confianca": 0.6}, {"tipo": "baixa-confianca", "titulo": "Recuperação ativa (~30-40% VO2max) remove lactato mais rápido que repouso passivo", "notas": ["nota-0233"], "body": "Achado de um único estudo laboratorial (amostra pequena de homens treinados). Não é uma meta-análise nem revisão sistemática; a faixa '30-40% VO2max' é uma estimativa aproximada extraída visualmente de um gráfico inset, não um valor numérico exato reportado no texto.", "confianca": 0.6}, {"tipo": "baixa-confianca", "titulo": "VO2max medido em cicloergômetro é 6,4-11,2% menor que em esteira", "notas": ["nota-0234"], "body": "Valor específico vem de um único estudo com amostra pequena (N=15 estudantes universitários, 1973), embora seja citado no próprio livro-texto como comparação clássica/consolidada na área.", "confianca": 0.65}, {"tipo": "baixa-confianca", "titulo": "Deficiência de ferro sem anemia já prejudica desempenho; anemia esportiva é majoritariamente diluicional", "notas": ["nota-0236"], "body": "O achado central sobre suplementação de ferro e melhora de contrarrelógio vem de um único estudo controlado com amostra pequena de mulheres. Além disso, a unidade de ferritina citada no texto-fonte provavelmente é um erro de digitação/OCR para µg/L — mantida a citação literal do PDF, mas sinalizada para conferência humana antes de uso operacional desses limiares.", "confianca": 0.65}, {"tipo": "baixa-confianca", "titulo": "Deriva cardíaca quantificada: -13% de volume sistólico e +11% de FC entre 15-55min, mesmo em ambiente termoneutro", "notas": ["nota-0239"], "body": "Dado central vem de um único estudo de laboratório com N=7 (homens ativos), medição invasiva de volume sistólico (não disponível via Strava), protocolo controlado. É o dado mais quantificado do cânone sobre deriva cardíaca/decoupling, mas não constitui fórmula genérica de cálculo do Pw:Hr nem limiar operacional. Sinalizada para revisão humana sobre se deve permanecer no cânone como está ou ser rebaixada ainda mais, dado o tamanho amostral pequeno.", "confianca": 0.6}, {"tipo": "baixa-confianca", "titulo": "Limiar de catecolaminas: norepinefrina sobe a partir de ~50% do VO2máx, epinefrina só a partir de ~75%", "notas": ["nota-0241"], "body": "Dado de um único estudo de laboratório com N=10 homens, medição de catecolaminas plasmáticas (não disponível via Strava). Mantida como aplicação:contexto, sem sinais — útil apenas como explicação didática. Sinalizada para revisão humana quanto à relevância de manter no cânone dado o caráter puramente explicativo/não-operacional.", "confianca": 0.6}, {"tipo": "baixa-confianca", "titulo": "'Janela aberta' de 3-72h após esforço muito longo/intenso eleva risco de infecção respiratória", "notas": ["nota-0242"], "body": "O modelo da curva em J (MacKinnon) é amplamente citado na literatura de imunologia do exercício, mas o dado quantificado central (13% vs. 2% de infecção pós-maratona) vem de um único estudo epidemiológico observacional, sem controle experimental rigoroso e sujeito a viés de relato. Marcada como aplicação:direta porque o gatilho é um sinal real do Strava e a recomendação é segura mesmo se a magnitude exata do efeito for imprecisa — mas o dado numérico específico não deve ser exposto ao usuário como garantia estatística.", "confianca": 0.65}, {"tipo": "baixa-confianca", "titulo": "Terminologia: Overload → Overreaching → Overtraining Syndrome; duas formas clínicas (simpática/parassimpática)", "notas": ["nota-0243"], "body": "Conteúdo puramente descritivo/clínico, sem dado quantitativo mensurável a partir de sinais do Strava — a distinção entre forma simpática e parassimpática depende de medições fisiológicas que o produto não coleta. A prevalência citada (10-20%) vem de afirmação geral do livro-texto sem citação de estudo epidemiológico específico rastreável no trecho lido. Sinalizada para revisão humana quanto à utilidade prática desta taxonomia frente à já existente na nota-0148.", "confianca": 0.65}, {"tipo": "baixa-confianca", "titulo": "Modelo de 'Desequilíbrio Crônico' de Lehmann (1998) para a síndrome de overtraining: cinco vias de sobrecarga", "notas": ["nota-0244"], "body": "O modelo é reproduzido de uma única fonte secundária (figura adaptada, sem acesso ao artigo original) e é inteiramente qualitativo/hipotético — nenhuma das cinco vias de sobrecarga é diretamente mensurável a partir de dados do Strava, e o modelo não fornece uma métrica quantitativa. Sinalizada para revisão humana quanto à relevância de manter um modelo mecanístico tão detalhado no cânone dado o baixo potencial de tradução em regra.", "confianca": 0.6}, {"tipo": "baixa-confianca", "titulo": "Razão trabalho:recuperação recomendada varia por sistema energético alvo (1:3 fosfagênio, 1:2 glicolítico, 1:1-1,5 aeróbio)", "notas": ["nota-0246"], "body": "Os números originais da fonte são calibrados para corrida/natação em distâncias específicas (jardas), não para ciclismo baseado em potência — qualquer aplicação exige tradução/adaptação que não foi validada no texto-fonte. Não há evidência experimental direta de que as mesmas razões produzam resultados equivalentes em treino de ciclismo.", "confianca": 0.65}, {"tipo": "baixa-confianca", "titulo": "Protocolo de polimento (taper): redução de volume de 40-60% por 1-3 semanas produz ganho de desempenho de 0,5 a 6,0%", "notas": ["nota-0247"], "body": "Marcada como aplicação:direta porque o gatilho (redução de TSS/volume semanal antes de um evento-alvo) é um sinal real e rastreável do Strava, mas o intervalo de ganho de desempenho citado é amplo e agregado de múltiplos estudos/esportes não especificados no trecho lido, sem garantia de que se aplique proporcionalmente ao ciclismo. Sinalizada para revisão humana quanto à formulação exata da regra de disparo antes de virar alerta automático ao usuário.", "confianca": 0.65}, {"tipo": "baixa-confianca", "titulo": "Tabela ACSM de prescrição de treino de força por objetivo e nível de treino", "notas": ["nota-0248"], "body": "Protocolo de treino de força genérico (ACSM position stand), não específico para ciclistas; fora do escopo direto de dados coletáveis pelo Strava (o produto não registra séries/RM/carga). Mantida como aplicação:contexto por completude de referência técnica, mas sinalizada para revisão humana quanto à real utilidade no produto, já que exigiria expansão de escopo para se tornar acionável.", "confianca": 0.65}, {"tipo": "baixa-confianca", "titulo": "Treino concorrente: sessão de endurance intensa inibe o desempenho de força na sessão subsequente", "notas": ["nota-0249"], "body": "Confiança mais baixa do lote porque o próprio texto-fonte apresenta a questão como debate não resolvido ('further research must determine') e cita, na mesma seção, um achado em direção oposta. A recomendação de 20-30 min é apresentada como sugestão prática condicional, não como resultado experimental direto. Fora do escopo de detecção automática do Strava.", "confianca": 0.5}, {"tipo": "baixa-confianca", "titulo": "Aquecimento prévio melhora desempenho de ciclismo intenso em 2-3% e contrarrelógio curto em 3-4min", "notas": ["nota-0250"], "body": "Dados agregados de estudos de laboratório isolados e específicos (referenciados apenas por número de citação, sem detalhamento de protocolo exato de aquecimento no trecho lido), o que limita a capacidade de replicar/operacionalizar a recomendação com precisão. O Strava não detecta aquecimento automaticamente, então a nota permanece inteiramente aplicação:contexto.", "confianca": 0.6}, {"tipo": "baixa-confianca", "titulo": "Massa óssea exige carga mecânica/gravitacional — mecanismo relevante para esportes de baixo impacto como o ciclismo", "notas": ["nota-0277"], "body": "O mecanismo central é bem sourced no McArdle, a partir de dados de voo espacial/microgravidade — mas o texto-fonte NÃO discute ciclismo nem densidade mineral óssea em atletas terrestres. A conexão com 'ciclismo é esporte de baixo impacto associado a menor DMO' é uma extrapolação analógica do mecanismo geral, não uma afirmação direta da fonte sobre ciclistas. Sinalizada para revisão humana sobre se a inferência está adequadamente qualificada como aplicação/analogia.", "confianca": 0.6}, {"tipo": "baixa-confianca", "titulo": "Prova de 3 semanas (Giro d'Italia) eleva marcadores de reabsorção óssea em ciclistas profissionais", "notas": ["nota-0284"], "body": "Dado vem de um único estudo com amostra muito pequena (n=9 ciclistas profissionais), sem grupo controle detalhado na fonte, e sem discriminação clara de causa (baixo impacto mecânico vs. déficit energético agudo da prova vs. ambos). Sinalizada para revisão humana sobre manter como está ou rebaixar a confiança/aplicação.", "confianca": 0.6}, {"tipo": "baixa-confianca", "titulo": "45 min de ciclismo vigoroso elevam o gasto calórico de recuperação por até 14h (+190 kcal)", "notas": ["nota-0287"], "body": "Dado quantitativo vem de um único estudo pequeno (n=10 homens jovens) em câmara metabólica controlada — condições de laboratório que podem não generalizar para treino de campo com variação de dieta, sono e composição corporal. O padrão qualitativo (EPOC prolongado) é bem estabelecido na literatura mais ampla, mas a magnitude específica citada aqui é de confiança mais baixa.", "confianca": 0.6}, {"tipo": "baixa-confianca", "titulo": "9-12 meses de treino de endurance em idosos produzem ganhos de VO2máx comparáveis a jovens, por mecanismos diferentes por sexo", "notas": ["nota-0289"], "body": "Dado vem de um único estudo (Spina et al. 1993) com amostra pequena (n=31). A magnitude exata dos percentuais de ganho e a atribuição mecanística por sexo não devem ser generalizadas sem replicação — mas o padrão qualitativo (idosos mantêm boa treinabilidade de VO2máx) é consistente com a literatura mais ampla já presente no cânone (nota-0216). Sinalizada para revisão humana sobre robustez da atribuição mecanística por sexo.", "confianca": 0.65}, {"tipo": "conflito", "titulo": "Teto percentual do Sweet Spot: 94% vs. 95% do FTP (mesma fonte)", "notas": ["nota-0028", "nota-0041"], "body": "Fonte: Training and Racing with a Power Meter. Página 66 (Tabela 3.5, iLevels): Sweet Spot = 88-95% do FTP. Página 96 (texto corrido): Sweet Spot/Sub-Threshold = 88-94% do FTP.\n\nDivergência pequena (1 ponto percentual), provavelmente arredondamento entre uma tabela e o texto corrido do mesmo livro — não é uma contradição entre fontes diferentes, mas ainda assim é um valor numérico inconsistente dentro do cânone. Registrando aqui em vez de escolher um valor unilateralmente.\n\nSugestão (não aplicada automaticamente): ao usar o teto do Sweet Spot no feedback, considerar a faixa 88-95% como a mais segura/abrangente, já que ambas as passagens concordam no piso (88%) e divergem apenas no teto por 1 p.p."}, {"tipo": "conflito", "titulo": "Critério de queda de potência para 'intervalo repetível': 5% vs. 10%", "notas": ["nota-0040", "nota-0054"], "body": "Fonte: Training and Racing with a Power Meter. Capítulo 5, p.89 (nota-0040): critério prescritivo para PARAR uma série de intervalos em tempo real — potência do 3º intervalo × 0,95 (queda de 5%). Capítulo 6, p.139 (nota-0054): critério usado para ANALISAR retrospectivamente a repetibilidade de uma série já concluída — queda de 10% a partir do 2º/3º intervalo.\n\nPode ser uma diferença proposital (critério mais rígido para decidir parar durante o treino; critério mais frouxo para simplesmente descrever depois quão bem a série foi executada) ou uma inconsistência numérica não intencional. O texto não esclarece explicitamente.\n\nSugestão (não aplicada automaticamente): ao gerar feedback sobre uma série de intervalos, é mais seguro usar o critério de 5% (nota-0040) como referência prescritiva de 'quando parar', e tratar o de 10% apenas como contexto de um exemplo específico do livro — mas isso deveria ser confirmado por um humano antes de decidir."}, {"tipo": "conflito", "titulo": "'Não comece forte demais' (CRI de estrada) vs. Efeito Allen (MTB ultraresistência)", "notas": ["nota-0118", "nota-0137"], "body": "Não é uma contradição factual entre as fontes (é a mesma fonte, mesmo livro, capítulos diferentes) — é uma diferença de regra de pacing por modalidade, explicitamente reconhecida pelos próprios autores ('the time trialing rule... does not apply' ao MTB). A causa raiz é estrutural: contrarrelógio de estrada é decidido por tempo num percurso fixo sem interação direta com rivais durante o esforço; MTB de ultraresistência é frequentemente decidido por posição/distância relativa aos rivais, tornando a dinâmica de 'gap de distância' relevante.\n\nResolução: não requer arbitragem — as duas regras são válidas em seus respectivos contextos. Importante que o produto de feedback aplique a regra correta com base no tipo de atividade/modalidade identificado, não uma heurística única de pacing para todas as atividades."}, {"tipo": "conflito", "titulo": "'Pmax' do modelo PDC vs. 'Pmax' exibido em unidades Garmin/ANT+", "notas": ["nota-0077", "nota-0147"], "body": "nota-0077: Pmax do modelo Power Duration Curve — potência máxima numa revolução completa de pedal, ambas as pernas. nota-0147 (glossário do livro): o campo 'Pmax' do Garmin/ANT+ é na verdade Ppeak, pico de um único ciclo de pedalada.\n\nNão é uma divergência entre fontes — é um alerta explícito dos próprios autores de que a indústria (Garmin/ANT+) usa o termo 'Pmax' de forma incorreta/diferente do significado técnico definido no modelo PDC do livro. Mesmo nome, duas grandezas diferentes.\n\nResolução: ao integrar dados de dispositivos reais (Strava/Garmin), o produto deve tratar qualquer campo bruto rotulado 'Pmax' vindo do dispositivo como candidato a ser, na realidade, Ppeak — e verificar a definição exata antes de usá-lo em conjunto com o Pmax modelado da PDC (nota-0075). Não unificar os dois automaticamente."}, {"tipo": "conflito", "titulo": "Redução de mortalidade por 1 MET de VO2máx: 11% (Laukkanen 2022) vs. 15% (Mandsager 2018) — inconsistência interna na mesma fonte", "notas": ["nota-0205"], "body": "A Fonte 3 (VO2 Max Essentials) cita dois estudos epidemiológicos diferentes para a mesma afirmação ('aumentar o VO2máx em 1 MET/3,5 mL/kg/min reduz o risco de mortalidade por todas as causas'), com números diferentes: Capítulo 1 (p.7) cita Laukkanen et al. 2022 (Mayo Clinic Proceedings) — 11%. Capítulo 5 (p.32) cita Mandsager et al. 2018 (JAMA Netw Open) — 15%.\n\nNão é necessariamente um erro — são dois estudos epidemiológicos distintos, com populações e metodologias diferentes, medindo o mesmo fenômeno geral. O livro não reconcilia os dois números nem indica qual prevalece. Ambos os pontos dependem de política de ativação rebaixada (estudo único cada) — já refletido na nota-0205 (aplicação:contexto).\n\nAção pendente: nenhuma correção automática — registrado para transparência. Se o produto algum dia comunicar esse tipo de estatística ao usuário, usar uma faixa (ex.: 'aproximadamente 10-15%') em vez de um número único, citando que a magnitude exata varia por estudo."}, {"tipo": "modelo-concorrente", "titulo": "Zonas de treino: 7 níveis de Coggan (%FTP) vs. 4 domínios fisiológicos (LT1/LT2) vs. 3 zonas de Seiler", "notas": ["nota-0022", "nota-0178", "nota-0184"], "body": "Modelo A — 7 níveis clássicos de Coggan (nota-0022, Livro 1, p.61-62): classificação prática baseada em %FTP e %FTHR, diretamente calculável a partir de dados do Strava.\n\nModelo B — 4 domínios fisiológicos (nota-0178, Manual treinamento, p.86-87): classificação baseada em limiares de lactato (LT1, LT2): Moderado, Pesado, Severo, Extremo. Não é diretamente calculável a partir de dados do Strava (exige teste de lactato/ergoespirometria), mas oferece uma narrativa fisiológica mais simples para comunicação com o usuário.\n\nModelo C — 3 zonas de Seiler (nota-0184, Manual treinamento, p.110): Zona 1 (<LT1), Zona 2 (LT1-LT2), Zona 3 (>LT2) — usado na maior parte da literatura de treinamento polarizado. Essencialmente os domínios Moderado/Pesado/Severo do Modelo B, sem o domínio Extremo separado.\n\nNatureza da divergência: não são contraditórios entre si — descrevem o mesmo contínuo fisiológico com granularidades e critérios de corte diferentes. Não existe mapeamento 1:1 exato publicado em nenhuma das fontes. O próprio Manual confirma explicitamente que o Modelo A (Coggan) 'é um dos mais utilizados no ciclismo'.\n\nRecomendação preliminar (não vinculante — aguarda decisão humana): manter o Modelo A (Coggan/%FTP) como sistema operacional do produto, por ser diretamente derivável de sinais do Strava. O Modelo B/C pode ser usado como camada de linguagem explicativa/educativa para o usuário, sem substituir o cálculo operacional por zona."}, {"tipo": "modelo-concorrente", "titulo": "WAC Score (Williams, Allen, Coggan) vs. Power Profile", "notas": ["nota-0032", "nota-0082", "nota-0102"], "body": "Ambos são ferramentas para caracterizar o perfil de potência do atleta ao longo de diferentes durações, mas usam referências diferentes — o Power Profile (nota-0032, e o Mapa Fenotípico nota-0082) usa categorias fixas (ex.: categoria 5 a Pro) baseadas em W/kg por duração; o WAC Score (nota-0102) usa uma referência relativa e contínua (% do recorde mundial) ajustada por idade.\n\nNão são contraditórios entre si (podem coexistir), mas representam abordagens de benchmarking distintas do mesmo tipo de dado (curva de potência por duração).\n\nStatus: WAC Score não é implementável no produto sem a tabela de referência original (confiança 0.55). Power Profile permanece a ferramenta primária recomendada até validação adicional do WAC Score."}]</script>

<script>
const NOTES = JSON.parse(document.getElementById('notas-data').textContent);
const DOMS = JSON.parse(document.getElementById('doms-data').textContent);
const DOM_ORDER = JSON.parse(document.getElementById('dom-order-data').textContent);
const REVISOES = JSON.parse(document.getElementById('revisoes-data').textContent);
const REV_LABELS = {'baixa-confianca':'Baixa confiança','conflito':'Conflito','modelo-concorrente':'Modelo concorrente'};

NOTES.forEach(n => { n.rel = n.relacionadas || []; n.tipo = n.tipo_nota; n.dom = n.dominio; n.conf = n.confianca; });

const EDGES = [];
NOTES.forEach(n => (n.rel||[]).forEach(r => EDGES.push({from:n.id, to:r.id, tipo:r.tipo, just:r.justificativa})));
const byId = Object.fromEntries(NOTES.map(n=>[n.id,n]));
function incoming(id){ return EDGES.filter(e=>e.to===id).map(e=>({from:e.from,tipo:e.tipo,just:e.just})); }

const TIPO = {
  "regra-interpretacao":"Regra de interpretação",
  "conceito":"Conceito","protocolo":"Protocolo","referencia":"Referência"
};

function domColor(d){ return DOMS[d]?DOMS[d].c:'#999'; }
function shortDom(d){ return DOMS[d]?DOMS[d].nm:d; }
function escapeHtml(s){ if(s===null||s===undefined) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inlineMd(s){ s=escapeHtml(s); s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>'); s=s.replace(/`([^`]+)`/g,'<code>$1</code>'); return s; }
function renderTable(lines){
  const rows = lines.filter(l=>!/^\|[\s\-:|]+\|$/.test(l));
  if(!rows.length) return '';
  let html='<table>';
  rows.forEach((row,idx)=>{
    const cells = row.split('|').slice(1,-1).map(c=>c.trim());
    const tag = idx===0?'th':'td';
    html += '<tr>'+cells.map(c=>`<${tag}>${inlineMd(c)}</${tag}>`).join('')+'</tr>';
  });
  return html+'</table>';
}
function mdToHtml(md){
  if(!md) return '';
  const lines = md.split('\n'); let html='', i=0, para=[], items=[];
  function flushP(){ if(para.length){ html+='<p>'+inlineMd(para.join(' '))+'</p>'; para=[]; } }
  function flushL(){ if(items.length){ html+='<ul>'+items.map(li=>'<li>'+inlineMd(li)+'</li>').join('')+'</ul>'; items=[]; } }
  while(i<lines.length){
    const line=lines[i], t=line.trim();
    if(t===''){ flushP(); flushL(); i++; continue; }
    if(t.startsWith('|')){ flushP(); flushL(); const tl=[]; while(i<lines.length && lines[i].trim().startsWith('|')){ tl.push(lines[i].trim()); i++; } html+=renderTable(tl); continue; }
    if(t.startsWith('- ')||t.startsWith('* ')){ flushP(); items.push(t.slice(2)); i++; continue; }
    if(/^\d+\.\s/.test(t)){ flushP(); items.push(t.replace(/^\d+\.\s/,'')); i++; continue; }
    para.push(t); i++;
  }
  flushP(); flushL(); return html;
}
function splitBody(body){
  const marker = 'Aplicação ao feedback:';
  const idx = (body||'').indexOf(marker);
  if(idx===-1) return {main:body, apply:null};
  let main = body.slice(0, idx).trim();
  let apply = body.slice(idx+marker.length).trim();
  return {main, apply};
}

/* ---------------- LAYOUT DE FORCA (calculado uma vez, no carregamento) ---------------- */
let POS = {};
function computeLayout(){
  const nodes = NOTES;
  const n = nodes.length;
  const idx = {}; nodes.forEach((nd,i)=>idx[nd.id]=i);
  const domList = DOM_ORDER.filter(d => nodes.some(nd=>nd.dom===d));
  const domAngle = {}; domList.forEach((d,i)=> domAngle[d] = (i/domList.length)*2*Math.PI);
  const W=1800, H=1300, R=520;
  const pos = nodes.map(nd=>{
    const a = domAngle[nd.dom] || 0;
    const cx = W/2 + Math.cos(a)*R, cy = H/2 + Math.sin(a)*R;
    return {x: cx + (Math.random()-0.5)*180, y: cy + (Math.random()-0.5)*180};
  });
  const vel = nodes.map(()=>({x:0,y:0}));
  const edgeIdx = EDGES.map(e=>({a:idx[e.from], b:idx[e.to]})).filter(e=>e.a!==undefined && e.b!==undefined);
  const iterations = 200, k = 46;
  for(let it=0; it<iterations; it++){
    for(let i=0;i<n;i++){
      let fx=0, fy=0;
      for(let j=0;j<n;j++){
        if(i===j) continue;
        let dx=pos[i].x-pos[j].x, dy=pos[i].y-pos[j].y;
        let d2=dx*dx+dy*dy || 0.01, d=Math.sqrt(d2);
        let force=(k*k)/d2*0.5;
        fx+=(dx/d)*force; fy+=(dy/d)*force;
      }
      vel[i].x=(vel[i].x+fx)*0.82; vel[i].y=(vel[i].y+fy)*0.82;
    }
    edgeIdx.forEach(e=>{
      let dx=pos[e.b].x-pos[e.a].x, dy=pos[e.b].y-pos[e.a].y;
      let d=Math.sqrt(dx*dx+dy*dy)||0.01;
      let force=(d-k)/k*2.0;
      let fx=(dx/d)*force, fy=(dy/d)*force;
      vel[e.a].x+=fx; vel[e.a].y+=fy; vel[e.b].x-=fx; vel[e.b].y-=fy;
    });
    for(let i=0;i<n;i++){
      vel[i].x += (W/2-pos[i].x)*0.0012;
      vel[i].y += (H/2-pos[i].y)*0.0012;
      pos[i].x += vel[i].x*0.035;
      pos[i].y += vel[i].y*0.035;
    }
  }
  nodes.forEach((nd,i)=> POS[nd.id]=pos[i]);
}

/* grau (conexoes) por nota, para tamanho do circulo */
const DEGREE = {};
NOTES.forEach(n=>DEGREE[n.id]=0);
EDGES.forEach(e=>{ DEGREE[e.from]=(DEGREE[e.from]||0)+1; DEGREE[e.to]=(DEGREE[e.to]||0)+1; });

/* ---------------- RENDER ---------------- */
const view = document.getElementById('view');
let state = {v:'home'};
function go(s){ state=s; render(); window.scrollTo(0,0); syncNav(); }
function syncNav(){
  document.getElementById('nav-map').classList.toggle('active', state.v==='home');
  document.getElementById('nav-revisao').classList.toggle('active', state.v==='revisao');
}

function sidebar(){
  const counts={}; NOTES.forEach(n=>counts[n.dom]=(counts[n.dom]||0)+1);
  const box=document.getElementById('doms');
  box.innerHTML = DOM_ORDER.map(d=>{
    const c=counts[d]||0;
    return `<button class="dom" data-d="${d}" data-empty="${c?0:1}" ${c?`onclick="go({v:'dom',dom:'${d}'})"`:''}>
      <span class="dot" style="background:${DOMS[d].c}"></span>
      <span class="nm">${DOMS[d].nm}</span><span class="ct">${c}</span></button>`;
  }).join('');
  document.getElementById('foot').innerHTML =
    `Base de conhecimento atômica — <b>${NOTES.length} notas</b> extraídas do cânone de 4 obras sobre treino de ciclismo, organizadas por domínio, com relações explícitas entre si.`;
}

document.getElementById('search').addEventListener('input', e=>{
  const q=e.target.value.trim().toLowerCase();
  if(!q){ go({v:'home'}); return; }
  state={v:'search',q}; render();
});

function render(){
  if(state.v==='home') return renderHome();
  if(state.v==='revisao') return renderRevisao();
  if(state.v==='note') return renderNote(state.id);
  if(state.v==='dom')  return renderList(NOTES.filter(n=>n.dom===state.dom), shortDom(state.dom), domColor(state.dom), 'domínio');
  if(state.v==='search'){
    const q=state.q;
    const res=NOTES.filter(n=>(n.titulo+' '+n.id+' '+(n.sinais||[]).join(' ')+' '+(n.body||'')).toLowerCase().includes(q));
    return renderList(res, `Busca: "${state.q}"`, 'var(--ink)', 'busca');
  }
}
function chip(txt,bg,cls){ return `<span class="chip ${cls||''}" style="${bg?`background:${bg}`:''}">${txt}</span>`; }

let zoom = {s:1, tx:0, ty:0};
function renderHome(){
  view.innerHTML = `
    <div class="h-eyebrow">Mapa de relações</div>
    <h1>Como o conhecimento se conecta</h1>
    <p class="lede">Cada nó é uma nota — um conceito, uma regra ou uma referência tirada dos livros. As linhas mostram como elas se apoiam umas nas outras. É assim que a IA "caminha" de um conceito a outro para montar o feedback.</p>
    <p class="hint">Clique num nó para abrir a nota, arraste para mover o mapa, use a roda do mouse (ou os botões) para dar zoom.</p>
    <div class="graphcard">
      <div class="graphhead">
        <span class="t">${NOTES.length} notas · ${EDGES.length} vínculos</span>
        <div class="legend">
          <span><span class="lg-line pre"></span> pré-requisito</span>
          <span><span class="lg-line cau"></span> causal</span>
          <span><span class="lg-line com"></span> complementa</span>
          <span><span class="lg-line con"></span> contradiz</span>
          <span><span class="lg-line alt"></span> alternativa</span>
        </div>
      </div>
      <div class="graphwrap">
        ${graphSVG()}
        <div class="graphctl">
          <button class="gbtn" onclick="zoomBy(1.25)">+</button>
          <button class="gbtn" onclick="zoomBy(0.8)">−</button>
          <button class="gbtn" onclick="zoomReset()">⤾</button>
        </div>
      </div>
    </div>`;
  wireGraph();
}
function edgeCls(tipo){
  if(tipo==='causal') return 'cau';
  if(tipo==='complementa') return 'com';
  if(tipo==='contradiz') return 'con';
  if(tipo==='alternativa-a') return 'alt';
  return 'pre';
}
function graphSVG(){
  if(Object.keys(POS).length===0) computeLayout();
  const edges = EDGES.map((e,i)=>{
    const a=POS[e.from], b=POS[e.to]; if(!a||!b) return '';
    return `<line class="edge ${edgeCls(e.tipo)}" data-i="${i}" data-a="${e.from}" data-b="${e.to}"
      x1="${a.x.toFixed(1)}" y1="${a.y.toFixed(1)}" x2="${b.x.toFixed(1)}" y2="${b.y.toFixed(1)}"></line>`;
  }).join('');
  const nodes = NOTES.map(n=>{
    const p = POS[n.id]; if(!p) return '';
    const deg = DEGREE[n.id]||0;
    const r = Math.min(6 + deg*0.9, 16);
    const idnum = n.id.replace('nota-','').replace(/^0+/,'');
    return `<g class="gnode" data-id="${n.id}" tabindex="0" role="button"
        aria-label="${escapeHtml(n.titulo)}"
        onclick="go({v:'note',id:'${n.id}'})"
        onkeydown="if(event.key==='Enter')go({v:'note',id:'${n.id}'})">
      <title>${escapeHtml(n.titulo)}</title>
      <circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${r}" fill="${domColor(n.dom)}"></circle>
      ${r>=9?`<text class="tag" x="${p.x.toFixed(1)}" y="${(p.y+2.8).toFixed(1)}">${idnum}</text>`:''}
    </g>`;
  }).join('');
  return `<svg class="graph" id="graphSvg" viewBox="0 0 1800 1300" preserveAspectRatio="xMidYMid meet">
    <g id="viewport" transform="translate(${zoom.tx},${zoom.ty}) scale(${zoom.s})">
    <g>${edges}</g><g>${nodes}</g></g></svg>`;
}
function zoomBy(f){
  zoom.s = Math.max(0.35, Math.min(4, zoom.s*f));
  applyZoom();
}
function zoomReset(){ zoom={s:1,tx:0,ty:0}; applyZoom(); }
function applyZoom(){
  const vp = document.getElementById('viewport');
  if(vp) vp.setAttribute('transform', `translate(${zoom.tx},${zoom.ty}) scale(${zoom.s})`);
}
function wireGraph(){
  const svg=view.querySelector('svg.graph');
  if(!svg) return;
  const nodes=[...svg.querySelectorAll('.gnode')];
  const edges=[...svg.querySelectorAll('.edge')];
  nodes.forEach(g=>{
    g.addEventListener('mouseenter',()=>hot(g.dataset.id,true));
    g.addEventListener('mouseleave',()=>hot(null,false));
    g.addEventListener('focus',()=>hot(g.dataset.id,true));
    g.addEventListener('blur',()=>hot(null,false));
  });
  function hot(id,on){
    if(!on||!id){ svg.classList.remove('dim'); edges.forEach(e=>e.classList.remove('hot')); nodes.forEach(n=>n.classList.remove('hot','nb')); return; }
    svg.classList.add('dim');
    const nb=new Set([id]);
    edges.forEach(e=>{
      if(e.dataset.a===id||e.dataset.b===id){ e.classList.add('hot'); nb.add(e.dataset.a); nb.add(e.dataset.b); }
      else e.classList.remove('hot');
    });
    nodes.forEach(n=>n.classList.toggle('hot', nb.has(n.dataset.id)));
  }
  /* pan + zoom */
  let dragging=false, sx=0, sy=0, ostx=0, osty=0;
  svg.addEventListener('mousedown', e=>{ dragging=true; svg.classList.add('panning'); sx=e.clientX; sy=e.clientY; ostx=zoom.tx; osty=zoom.ty; });
  window.addEventListener('mouseup', ()=>{ dragging=false; svg.classList.remove('panning'); });
  window.addEventListener('mousemove', e=>{
    if(!dragging) return;
    zoom.tx = ostx + (e.clientX-sx)/zoom.s;
    zoom.ty = osty + (e.clientY-sy)/zoom.s;
    applyZoom();
  });
  svg.addEventListener('wheel', e=>{
    e.preventDefault();
    zoomBy(e.deltaY<0?1.1:0.9);
  }, {passive:false});
}

function renderRevisao(){
  const groups = {'baixa-confianca':[], 'conflito':[], 'modelo-concorrente':[]};
  REVISOES.forEach(r=>{ if(groups[r.tipo]) groups[r.tipo].push(r); });
  const labels = {'baixa-confianca':'Baixa confiança','conflito':'Conflitos','modelo-concorrente':'Modelos concorrentes'};
  const descs = {
    'baixa-confianca':'Notas mantidas no cânone mas com confiança rebaixada — geralmente por vir de estudo único, amostra pequena, ou depender de dado não coletável pelo Strava. Cada uma tem uma decisão humana pendente.',
    'conflito':'Divergências numéricas encontradas entre notas ou dentro da mesma fonte — registradas em vez de resolvidas unilateralmente.',
    'modelo-concorrente':'Frameworks conceituais que descrevem o mesmo fenômeno de formas diferentes, sem consenso único no cânone sobre qual usar.'
  };
  let html = `<div class="h-eyebrow">Revisão pendente</div>
    <h1>O que ainda não está fechado</h1>
    <p class="lede">Nem tudo no cânone é definitivo. Esta seção reúne o que foi extraído com ressalvas: notas de confiança baixa, números que se contradizem entre si, e modelos conceituais concorrentes — tudo aguardando decisão humana antes de virar regra automática de feedback.</p>`;
  ['baixa-confianca','conflito','modelo-concorrente'].forEach(tipo=>{
    const items = groups[tipo];
    if(!items.length) return;
    html += `<div class="revsection"><div class="revhead"><span class="revdot ${tipo}"></span>${labels[tipo]}<span class="revcount">${items.length}</span></div>
      <p class="hint">${descs[tipo]}</p>
      <div class="revlist">` +
      items.map(r=>`<div class="revcard">
        <div class="revtop">
          ${r.confianca!=null?`<span class="chip line">confiança ${r.confianca.toFixed(2).replace('.',',')}</span>`:'<span></span>'}
          <div class="revnotas">${r.notas.map(id=>`<button class="relitem-mini" onclick="go({v:'note',id:'${id}'})">${id.replace('nota-','#')}</button>`).join('')}</div>
        </div>
        <div class="revtitle">${escapeHtml(r.titulo)}</div>
        <div class="revbody">${mdToHtml(r.body)}</div>
      </div>`).join('') +
      `</div></div>`;
  });
  view.innerHTML = html;
}

function renderNote(id){
  const n=byId[id]; if(!n){ go({v:'home'}); return; }
  const inc=incoming(id);
  const revFlags = REVISOES.filter(r=>r.notas.includes(id));
  const relOut = (n.rel||[]).map(r=>relItem(r.id, r.tipo, r.justificativa)).join('') || '<div class="hint">Nenhuma.</div>';
  const relIn  = inc.map(r=>relItem(r.from, r.tipo, r.just)).join('') || '<div class="hint">Nenhuma.</div>';
  const {main, apply} = splitBody(n.body);
  const applyBlock = apply ? `<div class="apply"><span class="k">Aplicação ao feedback</span>${inlineMd(apply)}</div>` : '';
  const fontesHtml = (n.fontes||[]).map(f=>`<div class="src"><span class="bk">${escapeHtml(f.arquivo||'')}</span>${f.pagina?` · <span class="pg">p. ${escapeHtml(f.pagina)}</span>`:''}${f.trecho?`<div class="q">${escapeHtml(f.trecho)}</div>`:''}</div>`).join('') || '<div class="hint">—</div>';
  view.innerHTML = `
    <button class="back" onclick="go({v:'home'})">← mapa de relações</button>
    ${revFlags.length?`<div class="revflag">⚠ Marcada para revisão (${revFlags.map(r=>REV_LABELS[r.tipo]).join(', ')}). <button onclick="go({v:'revisao'})">ver detalhes →</button></div>`:''}
    <div class="badges">
      <span class="tag-id">${n.id}</span>
      ${chip(shortDom(n.dom), domColor(n.dom))}
      ${chip(TIPO[n.tipo]||n.tipo,'','type')}
      ${n.conf!=null?chip('confiança '+n.conf.toFixed(2).replace('.',','),'','line'):''}
      ${n.status?chip(n.status,'','line'):''}
    </div>
    <h2 class="note">${escapeHtml(n.titulo)}</h2>
    <div class="body">${mdToHtml(main)}</div>
    ${applyBlock}
    <div class="cols">
      <div class="panel">
        <h3>Fontes</h3>
        ${fontesHtml}
        <h3 style="margin-top:18px">Sinais do Strava</h3>
        <div class="sinais">${(n.sinais||[]).map(s=>`<span class="sig">${escapeHtml(s)}</span>`).join('')||'<span class="hint">—</span>'}</div>
      </div>
      <div class="panel">
        <h3>Esta nota se apoia em</h3>
        <div class="rel">${relOut}</div>
        <h3 style="margin-top:18px">É usada por</h3>
        <div class="rel">${relIn}</div>
      </div>
    </div>`;
}
function relItem(id,tipo,just){
  const t=byId[id]; const title = t?t.titulo:id;
  return `<button class="relitem" onclick="go({v:'note',id:'${id}'})">
    <div class="rrow"><span class="rt ${tipo}">${tipo}</span>
    <span class="rx"><b>${id.replace('nota-','#')}</b>${escapeHtml(title)}</span></div>
    ${just?`<div class="rj">${escapeHtml(just)}</div>`:''}
    </button>`;
}
function renderList(list,title,color,kind){
  const cards = list.length? list.map(n=>`
    <button class="ncard" onclick="go({v:'note',id:'${n.id}'})">
      <div class="top"><span class="cid">${n.id.replace('nota-','#')}</span>
        <span class="miniline">${TIPO[n.tipo]||n.tipo}</span></div>
      <div class="tt">${escapeHtml(n.titulo)}</div>
      <div class="mt"><span class="mini" style="background:${domColor(n.dom)}">${shortDom(n.dom)}</span></div>
    </button>`).join('') : `<div class="empty">Nada encontrado nesta ${kind}.</div>`;
  view.innerHTML = `
    <button class="back" onclick="go({v:'home'})">← mapa de relações</button>
    <div class="listhead"><span class="dot" style="background:${color}"></span>${title}</div>
    <div class="listsub">${list.length} nota(s).</div>
    <div class="cards">${cards}</div>`;
}

sidebar();
render();
</script>
