<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Base de Conhecimento — Ciclismo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3F3EF; --card:#FFFFFF; --ink:#17191E; --muted:#6A6E77;
    --line:#E4E3DD; --line-strong:#D3D2CA; --signal:#D8452F;
    --d-fisiologia:#6E8F3F; --d-limiares:#3F9E96; --d-metricas:#3E6B8C;
    --d-metodologia:#8A6DB0; --d-tipos:#C46A2B; --d-avaliacao:#55809E;
    --d-nutricao:#B08A2E; --d-recuperacao:#C24D57; --d-contexto:#7A7E86;
    --d-templates:#A6ACB4;
    --r:14px;
    --serif: "Space Grotesk", system-ui, sans-serif;
    --sans: "Inter", system-ui, -apple-system, sans-serif;
    --mono: "Space Mono", ui-monospace, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);
    font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
  .rail{background:var(--card);border-right:1px solid var(--line);
    padding:26px 22px;display:flex;flex-direction:column;gap:22px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .brand{font-family:var(--serif);font-weight:700;font-size:19px;letter-spacing:-.02em;line-height:1.15}
  .brand .k{display:block;font-family:var(--mono);font-size:10.5px;font-weight:400;
    letter-spacing:.16em;text-transform:uppercase;color:var(--signal);margin-bottom:7px}
  .search{width:100%;border:1px solid var(--line-strong);background:var(--paper);
    border-radius:10px;padding:9px 11px;font-family:var(--sans);font-size:13.5px;color:var(--ink)}
  .search:focus{outline:2px solid var(--ink);outline-offset:1px}
  .navlink{display:block;width:100%;text-align:left;border:0;background:none;cursor:pointer;
    font-family:var(--serif);font-weight:600;font-size:14px;color:var(--ink);padding:7px 8px;border-radius:8px}
  .navlink:hover{background:var(--paper)}
  .navlink.active{background:var(--ink);color:#fff}
  .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;
    color:var(--muted);margin:2px 0 4px}
  .doms{display:flex;flex-direction:column;gap:1px}
  .dom{display:flex;align-items:center;gap:9px;border:0;background:none;cursor:pointer;
    text-align:left;padding:6px 8px;border-radius:8px;font-size:13px;color:var(--ink);width:100%}
  .dom:hover{background:var(--paper)}
  .dom .dot{width:10px;height:10px;border-radius:3px;flex:none}
  .dom .nm{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dom .ct{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .dom[data-empty="1"]{opacity:.42}
  .foot{margin-top:auto;font-size:11.5px;color:var(--muted);line-height:1.5;border-top:1px solid var(--line);padding-top:16px}
  .main{padding:0}
  .wrap{padding:34px 40px 70px;max-width:1080px}
  .h-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--signal)}
  h1{font-family:var(--serif);font-weight:700;font-size:34px;letter-spacing:-.025em;line-height:1.08;margin:10px 0 12px}
  .lede{font-size:16px;color:#33363D;max-width:64ch;margin:0 0 6px}
  .hint{font-size:13.5px;color:var(--muted);max-width:64ch}
  .graphcard{margin-top:26px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  .graphhead{display:flex;justify-content:space-between;align-items:center;gap:14px;
    padding:14px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .graphhead .t{font-family:var(--serif);font-weight:600;font-size:15px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);align-items:center}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .lg-line{width:22px;height:0;border-top:2px solid var(--line-strong)}
  .lg-line.pre{border-top-style:solid;border-color:#9A9E29A6}
  .lg-line.cau{border-top:2px solid var(--signal)}
  .lg-line.com{border-top:2px dashed var(--line-strong)}
  .lg-line.con{border-top:2px solid #B23A55}
  .lg-line.alt{border-top:2px dotted #8A6DB0}
  .graphwrap{position:relative;background:
    radial-gradient(circle at 1px 1px, #E7E6E0 1px, transparent 0) 0 0/22px 22px}
  svg.graph{display:block;width:100%;height:640px;cursor:grab}
  svg.graph.panning{cursor:grabbing}
  .edge{stroke:#B9BDB0;stroke-width:1.2;fill:none;transition:stroke-opacity .2s}
  .edge.cau{stroke:var(--signal)}
  .edge.com{stroke-dasharray:5 5}
  .edge.con{stroke:#B23A55;stroke-width:1.6}
  .edge.alt{stroke:#8A6DB0;stroke-dasharray:2 4}
  .gnode{cursor:pointer}
  .gnode circle{transition:transform .15s;transform-origin:center}
  .gnode:hover circle,.gnode:focus circle{stroke:var(--ink);stroke-width:2.4px}
  .gnode text.tag{font-family:var(--mono);font-size:8.5px;fill:#fff;font-weight:700;text-anchor:middle;pointer-events:none}
  .dim .edge{stroke-opacity:.08}
  .dim .gnode{opacity:.2}
  .gnode.hot,.gnode.nb{opacity:1}
  .edge.hot{stroke-opacity:1;stroke-width:2.2}
  .graphctl{position:absolute;right:14px;bottom:14px;display:flex;gap:6px}
  .gbtn{width:28px;height:28px;border-radius:8px;border:1px solid var(--line-strong);background:var(--card);
    cursor:pointer;font-family:var(--mono);font-size:14px;color:var(--ink)}
  .gbtn:hover{background:var(--paper)}
  .back{border:0;background:none;cursor:pointer;font-family:var(--mono);font-size:11.5px;
    letter-spacing:.06em;color:var(--muted);padding:0;margin-bottom:18px;display:inline-flex;gap:7px;align-items:center}
  .back:hover{color:var(--ink)}
  .badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  .tag-id{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;color:#fff;letter-spacing:.01em}
  .chip.line{background:none;border:1px solid var(--line-strong);color:var(--muted);font-weight:500}
  .chip.type{background:#25272E}
  h2.note{font-family:var(--serif);font-weight:700;font-size:25px;letter-spacing:-.02em;line-height:1.18;margin:0 0 18px;max-width:44ch}
  .body{font-size:15.5px;color:#26282E;max-width:66ch}
  .body p{margin:0 0 14px}
  .body ul{margin:0 0 14px;padding-left:22px}
  .body li{margin-bottom:6px}
  .body table{border-collapse:collapse;margin:6px 0 16px;font-size:14px;width:100%;max-width:620px}
  .body th,.body td{border:1px solid var(--line-strong);padding:7px 11px;text-align:left}
  .body th{background:var(--paper);font-weight:600;font-family:var(--serif)}
  .apply{background:#F6F4EC;border-left:3px solid var(--d-tipos);border-radius:0 8px 8px 0;
    padding:12px 16px;margin:18px 0;font-size:14.5px;max-width:66ch}
  .apply .k{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#9a7b2e;display:block;margin-bottom:4px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:26px}
  @media(max-width:820px){.cols{grid-template-columns:1fr}}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .panel h3{font-family:var(--mono);font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;
    color:var(--muted);margin:0 0 12px;font-weight:400}
  .src{font-size:13.5px;margin-bottom:14px}
  .src .bk{font-weight:600;font-family:var(--serif)}
  .src .pg{font-family:var(--mono);color:var(--muted);font-size:12px}
  .src .q{margin-top:8px;padding-left:11px;border-left:2px solid var(--line-strong);
    color:var(--muted);font-style:italic;font-size:13px}
  .rel{display:flex;flex-direction:column;gap:8px}
  .relitem{border:0;background:none;text-align:left;cursor:pointer;padding:8px 10px;border-radius:9px;
    display:flex;flex-direction:column;gap:3px;width:100%}
  .relitem:hover{background:var(--paper)}
  .relitem .rrow{display:flex;gap:10px;align-items:baseline}
  .relitem .rt{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;
    padding:2px 6px;border-radius:5px;background:var(--paper);color:var(--muted);flex:none;border:1px solid var(--line)}
  .relitem .rt.causal{color:var(--signal);border-color:#e7b8b0}
  .relitem .rt.contradiz{color:#B23A55;border-color:#e7b0bd}
  .relitem .rt.alternativa-a{color:#8A6DB0;border-color:#d6c9ea}
  .relitem .rx{font-size:13.5px}
  .relitem .rx b{font-family:var(--mono);font-size:11px;color:var(--muted);font-weight:400;margin-right:6px}
  .relitem .rj{font-size:12px;color:var(--muted);font-style:italic;padding-left:2px}
  .sinais{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .sig{font-family:var(--mono);font-size:10.5px;background:var(--paper);border:1px solid var(--line);
    padding:3px 7px;border-radius:6px;color:#4a4d54}
  .listhead{font-family:var(--serif);font-weight:700;font-size:22px;letter-spacing:-.02em;margin:2px 0 4px;display:flex;align-items:center;gap:11px}
  .listhead .dot{width:13px;height:13px;border-radius:4px}
  .listsub{color:var(--muted);font-size:13.5px;margin-bottom:20px}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
  .ncard{text-align:left;border:1px solid var(--line);background:var(--card);border-radius:12px;
    padding:15px 16px;cursor:pointer;display:flex;flex-direction:column;gap:9px}
  .ncard:hover{border-color:var(--line-strong);box-shadow:0 3px 14px rgba(20,20,20,.05)}
  .ncard .top{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .ncard .cid{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .ncard .tt{font-family:var(--serif);font-weight:600;font-size:14.5px;line-height:1.25}
  .ncard .mt{display:flex;gap:7px;align-items:center;margin-top:auto}
  .ncard .mini{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;color:#fff}
  .ncard .miniline{font-size:10.5px;color:var(--muted);font-family:var(--mono)}
  .empty{color:var(--muted);font-size:14px;padding:30px 0}
  .revsection{margin-top:30px}
  .revhead{display:flex;align-items:center;gap:10px;font-family:var(--serif);font-weight:700;font-size:19px;letter-spacing:-.01em}
  .revdot{width:11px;height:11px;border-radius:50%;flex:none}
  .revdot.baixa-confianca{background:#C9A227}
  .revdot.conflito{background:#B23A55}
  .revdot.modelo-concorrente{background:#8A6DB0}
  .revcount{font-family:var(--mono);font-size:12px;color:var(--muted);font-weight:400;background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:2px 9px}
  .revlist{display:flex;flex-direction:column;gap:12px;margin-top:14px}
  .revcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
  .revtop{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
  .revnotas{display:flex;gap:6px;flex-wrap:wrap}
  .relitem-mini{font-family:var(--mono);font-size:11px;border:1px solid var(--line-strong);background:var(--paper);
    color:var(--ink);border-radius:20px;padding:2px 9px;cursor:pointer}
  .relitem-mini:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
  .revtitle{font-family:var(--serif);font-weight:600;font-size:15.5px;line-height:1.3;margin-bottom:8px}
  .revbody{font-size:14px;color:#33363D}
  .revbody p{margin:0 0 10px}
  .revflag{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#FBF3DD;border:1px solid #E8D9A6;
    border-radius:10px;padding:10px 14px;margin:0 0 16px;font-size:13.5px;color:#6b5511}
  .revflag button{font-family:var(--mono);font-size:11.5px;border:0;background:none;cursor:pointer;color:#6b5511;text-decoration:underline;padding:0}
  @media(max-width:720px){.app{grid-template-columns:1fr}.rail{position:static;height:auto;border-right:0;border-bottom:1px solid var(--line)}.wrap{padding:26px 20px 60px}}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="brand"><span class="k">Base de conhecimento</span>Ciclismo — feedback de treino</div>
    <input class="search" id="search" placeholder="Buscar nota, conceito, métrica…" autocomplete="off">
    <div>
      <button class="navlink active" id="nav-map" onclick="go({v:'home'})">Mapa de relações</button>
      <button class="navlink" id="nav-revisao" onclick="go({v:'revisao'})">Revisão pendente</button>
    </div>
    <div>
      <div class="lbl">Domínios</div>
      <div class="doms" id="doms"></div>
    </div>
    <div class="foot" id="foot"></div>
  </aside>
  <main class="main">
    <div class="wrap" id="view"></div>
  </main>
</div>

<script id="notas-data" type="application/json">[{"id": "nota-0068", "titulo": "Força máxima raramente limita a performance no ciclismo: atleta usa só ~25-55% da força máxima mesmo em esforços duros", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["potência-série-temporal", "cadência"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 176, "trecho": "the maximum force that this individual could produce when pedaling was just over 1,100 newtons (N)... But the highest force the athlete ever generated (had to generate) when racing (e.g., when sprinting) was only about 600 N (i.e., only about 55 percent of maximal force), and during the vast majority of the time the athlete was applying less than 400 N (i.e., only about 35 percent of maximal force)."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 177, "trecho": "even time trialing at FTP required that the athlete repeatedly press on the pedals with only about 25 percent of the maximal force he or she could produce."}], "relacionadas": [{"id": "nota-0067", "tipo": "complementa", "justificativa": "usa a mesma metodologia AEPF/CPV da Quadrant Analysis (nota-0067) para comparar força real usada com força máxima"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Comparando a AEPF (força efetiva média no pedal) real usada durante corridas/treinos com a força máxima que o atleta consegue gerar (medida por uma série de esforços máximos curtos, <10s, seated ou standing), os autores mostram que força pura raramente é o fator limitante no ciclismo: no exemplo do livro, a força máxima do atleta era de ~1.100 N, mas o pico de força usado num sprint de prova real foi de apenas ~600 N (~55% do máximo), e na maior parte do tempo o atleta usava menos de 400 N (~35% do máximo) — mesmo pedalando no FTP durante um contrarrelógio, a força usada era de apenas ~25% da força máxima.\n\nExceção notável: a largada parada (standing start, CPV = 0) em BMX e algumas provas de pista é a única situação em que a força máxima realmente limita a performance.\n\nConsequência prática: treinar força pura (ex.: musculação pesada e lenta) tem efeito limitado sobre a potência máxima de um ciclista treinado — o fator limitante de performance normalmente não é \"quanta força o músculo consegue gerar\", mas sim quanta potência (força × velocidade) o atleta consegue sustentar ao longo do tempo sem fadigar, o que depende muito mais dos sistemas energéticos (aeróbio/anaeróbio) do que de força bruta."}, {"id": "nota-0074", "titulo": "FTP como limiar aproximado de recrutamento significativo de fibras de contração rápida (Tipo II)", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["potência-média", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 167, "trecho": "The Type I fibers are maximally recruited even at a relatively low exercise intensity (i.e., 40 percent of VO2max), whereas the Type IIa and especially Type IIx fibers are recruited, only at much higher exercise intensities."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 167, "trecho": "functional threshold power appears to occur at the power (and thus force) at which significant fast-twitch fiber recruitment first begins."}], "relacionadas": [{"id": "nota-0067", "tipo": "causal", "justificativa": "explica fisiologicamente por que a Quadrant Analysis (nota-0067) usa a força/velocidade no FTP como linha divisória dos quadrantes"}], "confianca": 0.75, "status": "auto-aprovado", "body": "As fibras musculares de contração lenta (Tipo I) são recrutadas ao máximo já em intensidades relativamente baixas (~40% do VO2máx), enquanto as fibras de contração rápida (Tipo IIa e, especialmente, Tipo IIx) só são recrutadas de forma significativa em intensidades bem mais altas. Evidências de eletromiografia e biópsias musculares sugerem que a potência de limiar funcional (FTP) representa, aproximadamente, não só um limiar de sustentabilidade de potência, mas também o ponto (em termos de força/potência, numa cadência autosselecionada) em que o recrutamento significativo de fibras rápidas começa.\n\nÉ essa relação que fundamenta fisiologicamente a divisão da Quadrant Analysis (nota-0067) usando a força (AEPF) e velocidade (CPV) no FTP como linhas de corte — pedalar nos quadrantes de alta força (I e II) está associado a maior recrutamento de fibras rápidas. Ressalva do próprio livro: essa relação não é uma linha reta horizontal perfeita — na realidade é uma curva que cai da esquerda para a direita (o limiar de força para recrutar fibras rápidas é mais alto em baixa velocidade e mais baixo em alta velocidade), e a duração do esforço também influencia o recrutamento, mas isso não é capturado no modelo simplificado de 4 quadrantes."}, {"id": "nota-0126", "titulo": "Estimando a contribuição aeróbia vs. anaeróbia e o MAOD (déficit máximo acumulado de O2) a partir da área sob a curva de potência", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["potência-série-temporal"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 369, "trecho": "The lower, smoother lines... represent the riders' theoretical maximal aerobic power output, as calculated from laboratory-determined VO2max and efficiency, whereas the more jagged lines represent their total power output as directly measured using a power meter... For Rider A, the area under the power-meter line represents 80 percent of the total area (i.e., 80 percent of the work was performed aerobically)... this anaerobic energy production is equivalent to 3.36 liters (L) of O2—in other words, Rider A's maximal accumulated O2 deficit (MAOD) can be estimated at 3.36 L."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 370, "trecho": "for Rider B the area under the maximal aerobic power output line represents only 72 percent of the total area... The remaining 28 percent therefore must have come from anaerobic sources, leading to an estimated MAOD of 5.27 L... Despite the fact that her VO2max is 4 percent lower... Rider B is able to produce 4 percent more power... during a 3 km pursuit because her anaerobic capacity is much larger."}], "relacionadas": [{"id": "nota-0082", "tipo": "complementa", "justificativa": "oferece uma segunda via (baseada em VO2max de laboratório) de caracterizar o fenótipo aeróbio/anaeróbio do atleta, complementar ao Mapa Fenotípico via Power Profile (nota-0082, Cap.8)"}], "confianca": 0.5, "status": "revisar", "body": "Método (comparação de casos de dois atletas de perseguição de pista) para estimar a proporção de energia produzida por via aeróbia vs. anaeróbia num esforço máximo de poucos minutos:\n\n1. Calcular a potência aeróbia máxima teórica do atleta a partir de VO2max e eficiência determinados em laboratório (linha \"suave\" de referência).\n2. Medir a potência real do atleta durante o esforço (linha \"irregular\" do medidor de potência).\n3. A **área sob a linha de potência aeróbia máxima teórica**, como percentual da **área total sob a curva de potência real**, representa a fração do trabalho realizada por via aeróbia; o restante veio de fontes anaeróbias (fosfocreatina/ATP e produção de lactato).\n4. Convertendo a energia anaeróbia (percentual restante) em litros equivalentes de O2, obtém-se o **MAOD (déficit máximo acumulado de oxigênio)** — uma medida da capacidade anaeróbia total do atleta.\n\nExemplo do livro: dois atletas de perseguição com potência média e tempo de prova comparáveis tinham composições muito diferentes — um (masters, ciclista de estrada) com 80% aeróbio / MAOD 3,36 L; outra (pista, elite) com apenas 72% aeróbio / MAOD 5,27 L, apesar de VO2max 4% menor — sua maior capacidade anaeróbia compensava e até superava a diferença de VO2max. Isso levou a planos de treino diferentes: o atleta mais aeróbio focou em Nível 6 (Capacidade Anaeróbia); a atleta mais anaeróbia focou em Níveis 3-5 (Tempo/Limiar/VO2max) para desenvolver a base aeróbia relativamente mais fraca.\n\n**Motivo da revisão:** requer dado de laboratório (VO2max medido, eficiência mecânica) que não é obtido de um medidor de potência isolado nem do Strava — não implementável diretamente com dados típicos de Strava sem uma estimativa substituta de VO2max. Mantido como contexto/cânone, não como funcionalidade direta do produto sem essa entrada adicional.\n\nAplicação ao feedback: não aplicável diretamente sem dado de VO2max de laboratório ou uma estimativa confiável equivalente; registrar como referência conceitual para eventual funcionalidade futura caso o produto incorpore estimativas de VO2max (ex.: de testes de campo)."}, {"id": "nota-0136", "titulo": "A marcha (relação de transmissão) usada numa arrancada não altera a força que os músculos produzem numa dada cadência — só a velocidade de aceleração", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["cadência", "potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 389, "trecho": "it is not uncommon for track cyclists to perform standing-start efforts in a gear that is larger than normally used when racing, under the assumption that this creates a greater overload on the neuromuscular system... this is not the case. Instead, within fairly broad limits, the gear that is used when performing a standing start has no impact on the force applied to the cranks at any particular cadence. This is because during maximal efforts it is primarily the contractile properties of the cyclist's muscles... that determine the force-velocity relationship when pedaling."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 390, "trecho": "varying the gear ratio has no effect on the force that a rider's muscles can produce at a particular speed. It only determines how quickly the rider will 'hop, skip, and jump' down his or her maximal force-velocity line."}], "relacionadas": [], "confianca": 0.6, "status": "auto-aprovado", "body": "Crença comum entre ciclistas de pista: usar uma marcha maior que a de prova numa arrancada (standing start) geraria uma sobrecarga extra no sistema neuromuscular, aumentando força/potência de treino. Pesquisa citada mostra que isso é **falso, dentro de limites razoáveis**: a força que os músculos produzem numa dada cadência é determinada pela relação força-velocidade intrínseca do músculo (propriedades contráteis), não pela marcha escolhida. A marcha apenas determina a rapidez com que o ciclista \"percorre\" essa curva força-velocidade durante a aceleração — não altera o pico de força disponível em cada cadência.\n\nAplicação ao feedback: nota de contexto fisiológico — relevante para não recomendar automaticamente \"marcha maior = treino de força mais eficaz\" em arrancadas; a variável de treino que realmente importa é a cadência/velocidade em si, não a relação de transmissão escolhida. Não diretamente mensurável a partir de dados típicos de Strava (exigiria dados de força/cadência de alta frequência), mas útil como princípio para explicações qualitativas sobre potência máxima em arrancadas."}, {"id": "nota-0145", "titulo": "Desambiguação: Limiar Anaeróbio (ventilatório) ≠ Limiar de Lactato ≠ OBLA ≠ MLSS — termos usados de forma intercambiável mas fisiologicamente distintos", "dominio": "limiares-e-lactato", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 468, "trecho": "Anaerobic threshold (AT) More correctly termed 'ventilatory threshold'; the exercise intensity at which there is a nonlinear increase in ventilation relative to metabolic rate... Although they are not mechanistically related (i.e., not related as cause and effect), 'anaerobic' or ventilatory threshold is often used to estimate lactate threshold."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 470, "trecho": "Lactate Threshold (LT) The exercise intensity at which the release of lactate into the blood first begins to exceed its rate of removal... From the perspective of most athletes and coaches, LT is a relatively low intensity, approximately corresponding to the transition between Levels 2 and 3."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 471, "trecho": "Maximal Lactate Steady State (MLSS) The highest exercise intensity at which blood lactate levels remain essentially constant over time. MLSS is comparable to functional threshold power and is closer to what most coaches and athletes mistakenly call 'LT.'"}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 472, "trecho": "Onset of Blood Lactate (OBLA) The exercise intensity corresponding to a blood lactate concentration of 4 millimoles per liter. An individual's OBLA is generally close to, but may be significantly higher or lower than, his or her MLSS or FTP."}], "relacionadas": [{"id": "nota-0021", "tipo": "complementa", "justificativa": "esclarece que a FTP (nota-0021) é conceitualmente mais próxima do MLSS do que do que costuma ser chamado coloquialmente de 'limiar de lactato' (LT)"}], "confianca": 0.7, "status": "auto-aprovado", "body": "O Glossário do livro esclarece uma confusão terminológica comum entre 4 conceitos frequentemente usados como sinônimos, mas fisiologicamente distintos:\n\n- **Limiar Anaeróbio (AT):** mais corretamente chamado \"limiar ventilatório\" — intensidade em que a ventilação aumenta de forma não-linear em relação à taxa metabólica (consumo de O2). **Não tem relação mecanística direta** (causa-efeito) com o limiar de lactato, apesar de ser frequentemente usado para estimá-lo.\n- **Limiar de Lactato (LT):** intensidade em que a liberação de lactato no sangue começa a exceder sua taxa de remoção. Na prática, corresponde a uma intensidade relativamente **baixa** — próxima da transição entre os Níveis 2 e 3 (não perto da FTP).\n- **OBLA (Onset of Blood Lactate):** intensidade correspondente a uma concentração fixa de **4 mmol/L** de lactato no sangue. Pode estar significativamente acima ou abaixo do MLSS/FTP do indivíduo.\n- **MLSS (Maximal Lactate Steady State):** a maior intensidade em que o lactato sanguíneo permanece estável ao longo do tempo. **Comparável à FTP** — e é o que a maioria dos treinadores/atletas **erroneamente chama de \"LT\"** no uso coloquial.\n\nAplicação ao feedback: ao usar terminologia de \"limiar\" em textos de feedback para o usuário, ter cuidado para não confundir \"limiar de lactato\" (intensidade relativamente baixa, Nível 2-3) com o conceito que a FTP realmente representa (mais próximo do MLSS). Se o produto usar dados externos que mencionem \"AT\" ou \"LT\" de outras fontes (ex.: testes de laboratório informados pelo usuário), não assumir automaticamente equivalência com a FTP sem essa distinção."}, {"id": "nota-0153", "titulo": "Princípio do Tamanho de Henneman: recrutamento progressivo de unidades motoras (fibras tipo I primeiro, tipo II conforme intensidade aumenta)", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 29, "trecho": "Durante esforços leves predominam unidades motoras pequenas, compostas principalmente por fibras do tipo I. À medida que a intensidade aumenta, unidades maiores, contendo fibras do tipo II, passam a ser recrutadas. Esse princípio, conhecido como Princípio do Tamanho de Henneman, representa um dos conceitos fundamentais da fisiologia neuromuscular."}], "relacionadas": [], "confianca": 0.65, "status": "auto-aprovado", "body": "A produção de força depende de dois mecanismos neurais: recrutamento de unidades motoras (quantas são ativadas) e frequência de disparo dos impulsos nervosos. O Princípio do Tamanho de Henneman descreve a ordem desse recrutamento: em esforços leves, predominam unidades motoras pequenas (fibras tipo I, oxidativas, resistentes à fadiga); conforme a intensidade aumenta, unidades motoras maiores (fibras tipo II, glicolíticas, mais potentes e menos resistentes) são progressivamente recrutadas.\n\nAplicação ao feedback: explica, no nível mecanístico, por que esforços de alta intensidade recrutam fibras mais fatigáveis e por que treinos de baixa intensidade não estimulam adequadamente a capacidade anaeróbia/neuromuscular — dá base fisiológica à necessidade de intervalos de alta intensidade para desenvolver potência máxima/anaeróbia, complementando (sem repetir) as notas de metodologia de treino do Livro 1 sobre tipos de treino por zona."}, {"id": "nota-0154", "titulo": "Os três sistemas de ressíntese de ATP: fosfagênio (~10s), glicolítico (30s-poucos min), oxidativo (longa duração) — atuam simultaneamente, nunca isolados", "dominio": "fisiologia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 37, "trecho": "Sistema Fosfagênio (ATP-PCr) ... Predomina durante esforços máximos com duração aproximada de até dez segundos ... Sistema Glicolítico ... Predomina em esforços intensos com duração entre aproximadamente 30 segundos e alguns minutos ... Sistema Oxidativo ... apresenta menor velocidade de produção de ATP, porém enorme capacidade de sustentação."}], "relacionadas": [{"id": "nota-0153", "tipo": "complementa", "justificativa": "junto com o princípio de Henneman, explica a base fisiológica de por que diferentes intensidades/durações de esforço recrutam vias energéticas e fibras musculares distintas"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Classificação didática dos três sistemas de regeneração de ATP, que na prática atuam sempre simultaneamente (a distinção é de contribuição relativa, não de exclusividade): (1) Fosfagênio (ATP-PCr) — produção extremamente rápida, predomina em esforços máximos de até ~10s (sprints, arrancadas, ataques explosivos), baixa capacidade total; (2) Glicolítico — usa glicose/glicogênio, produção rápida porém mais lenta que o fosfagênio, predomina entre ~30s e poucos minutos (subidas curtas, perseguições, XCO, critérios); (3) Oxidativo — usa carboidratos, gorduras e proteínas, produção mais lenta mas capacidade praticamente ilimitada, domina em provas de estrada, granfondos, ultraciclismo. Mesmo um sprint de 6s tem participação oxidativa, e mesmo uma prova de 6h tem picos anaeróbios em ataques.\n\nAplicação ao feedback: fundamenta, no nível mecanístico, a lógica por trás da segmentação de zonas/tipos de treino já usada no produto (ex.: por que intervalos curtos e explosivos visam o sistema fosfagênio e intervalos de VO2max visam o sistema glicolítico/oxidativo combinado) — não gera regra de interpretação direta de um dado isolado do Strava, mas serve de justificativa de fundo caso o feedback explique \"por que\" um tipo de treino foi recomendado."}, {"id": "nota-0157", "titulo": "Débito cardíaco = FC × Volume sistólico; valores de referência (repouso vs. atleta treinado vs. esforço máximo)", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 51, "trecho": "Débito Cardíaco = Frequência Cardíaca × Volume Sistólico ... Em ciclistas de elite, valores próximos de 40 litros por minuto podem ser observados durante testes máximos."}, {"arquivo": "Manual treinamento.pdf", "pagina": 50, "trecho": "Em repouso, adultos não treinados costumam apresentar valores entre 60 e 80 bpm. Em ciclistas altamente treinados, valores inferiores a 40 bpm são relativamente comuns."}, {"arquivo": "Manual treinamento.pdf", "pagina": 51, "trecho": "Em indivíduos sedentários, o volume sistólico costuma variar entre 60 e 90 mL por batimento. Em atletas altamente treinados, valores superiores a 150 mL são frequentemente observados."}], "relacionadas": [], "confianca": 0.55, "status": "auto-aprovado", "body": "Débito cardíaco (litros de sangue bombeados por minuto) = Frequência Cardíaca × Volume Sistólico. Valores de referência citados pelo Manual: FC de repouso — 60-80 bpm em não treinados, <40 bpm comum em ciclistas altamente treinados; Volume sistólico — 60-90 mL/batimento em sedentários, >150 mL/batimento em atletas treinados; Débito cardíaco em repouso ~5 L/min, podendo ultrapassar 35 L/min em esforço máximo de atletas treinados (até ~40 L/min em elite). A FC de repouso mais baixa em atletas não reflete um coração \"mais lento\", mas mais eficiente (maior volume ejetado por batimento).\n\nAplicação ao feedback: valores de referência de contexto fisiológico — úteis apenas se o produto algum dia incorporar FC de repouso como sinal de tendência de forma física (FC de repouso em queda ao longo de meses pode indicar melhora de condicionamento cardiovascular; FC de repouso elevada pode ser sinal de fadiga não recuperada, conforme literatura de HRV/monitoramento — mas nenhuma nota do cânone até aqui define regra operacional específica para isso a partir de dados do Strava)."}, {"id": "nota-0159", "titulo": "Ventilação (VE) = Volume Corrente × Frequência Respiratória; de ~8 L/min em repouso a >180-220 L/min em esforço máximo", "dominio": "fisiologia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 59, "trecho": "Ventilação (VE) = Volume Corrente × Frequência Respiratória... Durante exercícios leves, o aumento da ventilação ocorre principalmente pelo aumento do volume corrente. Em intensidades elevadas... novos aumentos da ventilação dependem principalmente da elevação da frequência respiratória."}, {"arquivo": "Manual treinamento.pdf", "pagina": 56, "trecho": "um atleta pode aumentar sua ventilação pulmonar de aproximadamente 8 litros por minuto em repouso para mais de 180 litros por minuto. Em ciclistas profissionais, valores superiores a 220 litros por minuto já foram descritos na literatura."}], "relacionadas": [], "confianca": 0.55, "status": "auto-aprovado", "body": "Ventilação minuto (VE) = Volume Corrente (VT) × Frequência Respiratória (FR). Em repouso, ~8 L/min; em esforço máximo, tipicamente >180 L/min, podendo superar 220 L/min em ciclistas profissionais. Em intensidades baixas/moderadas, o aumento da ventilação ocorre principalmente por aumento do volume corrente; perto do máximo, o volume corrente satura e novos aumentos dependem da frequência respiratória (respiração mais curta e ofegante).\n\nAplicação ao feedback: nota de referência fisiológica de fundo — o Strava não fornece dados de ventilação, então não gera regra de interpretação direta; útil apenas como contexto explicativo caso o produto precise justificar por que a \"respiração ofegante\"/RPE sobe desproporcionalmente perto de esforços máximos."}, {"id": "nota-0161", "titulo": "VO2 absoluto (L/min) vs. VO2 relativo (mL·kg⁻¹·min⁻¹) — o relativo facilita comparação entre atletas de massas diferentes", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 65, "trecho": "VO₂ representa o volume de oxigênio consumido pelo organismo em determinado intervalo de tempo. Pode ser expresso de duas formas: Valor absoluto — Litros por minuto (L·min⁻¹)... Valor relativo — Mililitros por quilograma por minuto (mL·kg⁻¹·min⁻¹)... O valor relativo facilita comparações entre indivíduos com diferentes massas corporais."}], "relacionadas": [], "confianca": 0.5, "status": "auto-aprovado", "body": "VO2 (consumo de oxigênio) pode ser expresso em valor absoluto (L/min, ex.: 5,2 L/min) ou valor relativo à massa corporal (mL·kg⁻¹·min⁻¹, ex.: 72 mL·kg⁻¹·min⁻¹). O valor relativo é mais usado para comparar atletas de massas diferentes (relevante em subidas), enquanto o valor absoluto pode ser mais informativo para potência absoluta em contrarrelógio/pista.\n\nAplicação ao feedback: definição de referência — o Strava não fornece VO2max diretamente (alguns wearables estimam e podem sincronizar, mas isso está fora do escopo confirmado do cânone atual); nota de contexto para caso o produto venha a receber esse dado de fontes externas integradas ao perfil do atleta."}, {"id": "nota-0162", "titulo": "Equação de Fick: VO2 = Débito Cardíaco × Diferença Arteriovenosa de O2 — componente central (transporte) vs. periférico (extração muscular)", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 66, "trecho": "VO₂ = Débito Cardíaco × Diferença Arteriovenosa de Oxigênio... Componente central: capacidade de transportar oxigênio (débito cardíaco, volume sistólico, hemoglobina)... Componente periférico: capacidade do músculo de extrair e utilizar o oxigênio disponível (capilarização, densidade mitocondrial, atividade enzimática, mioglobina)."}], "relacionadas": [{"id": "nota-0157", "tipo": "pre-requisito", "justificativa": "usa o débito cardíaco (FC × Volume Sistólico) como o principal componente central da equação de Fick"}], "confianca": 0.6, "status": "auto-aprovado", "body": "A Equação de Fick decompõe o VO2máx em dois componentes multiplicativos: (1) componente central — capacidade de transportar oxigênio até o músculo, determinada por débito cardíaco, volume sistólico e concentração de hemoglobina; (2) componente periférico — capacidade do próprio músculo de extrair e utilizar o oxigênio disponível, determinada por capilarização, densidade mitocondrial, atividade enzimática oxidativa e conteúdo de mioglobina. Essa divisão explica por que diferentes métodos de treinamento produzem adaptações distintas: treinos intervalados de alta intensidade tendem a estimular mais o componente central (débito cardíaco), enquanto volume aeróbio consistente favorece adaptações periféricas (mitocôndrias, capilares, enzimas).\n\nAplicação ao feedback: fundamenta, em nível mecanístico, por que a prescrição de treino para \"aumentar VO2max\" geralmente combina intervalados de alta intensidade (estímulo central) com volume de base (estímulo periférico) — não gera regra de interpretação direta de dado do Strava, mas serve de justificativa de fundo para recomendações de tipo de treino."}, {"id": "nota-0165", "titulo": "VO2máx aumenta via adaptações centrais (débito cardíaco) e periféricas (mitocôndrias/capilarização); ganhos diminuem com o nível do atleta (>20% em iniciantes vs. 2-3% em elite)", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 71, "trecho": "Em atletas iniciantes, aumentos superiores a 20% são relativamente comuns. Em atletas de elite, ganhos de apenas 2 ou 3% podem representar enorme evolução competitiva. Por isso, em níveis elevados, o foco do treinamento frequentemente desloca-se do aumento do VO₂máx para a melhoria da economia, dos limiares e da durabilidade."}], "relacionadas": [{"id": "nota-0162", "tipo": "pre-requisito", "justificativa": "as adaptações centrais/periféricas descritas aqui correspondem diretamente aos dois componentes da Equação de Fick (nota-0162)"}], "confianca": 0.55, "status": "auto-aprovado", "body": "O VO2máx é elevado por treinamento através de adaptações centrais (aumento de volume sistólico, débito cardíaco, volume plasmático — estimuladas principalmente por intervalados de alta intensidade) e periféricas (densidade mitocondrial, atividade enzimática oxidativa, capilarização — estimuladas por volume aeróbio consistente ao longo de anos). O potencial de ganho não é indefinido: iniciantes podem ganhar >20% de VO2máx; atletas de elite tipicamente apenas 2-3%. Consequência prática: em atletas avançados, o foco de treinamento tende a se deslocar do aumento do VO2máx (teto próximo do limite genético/adaptativo) para melhoria de economia de movimento, limiares fisiológicos e durabilidade.\n\nAplicação ao feedback: reforça a lógica de que o nível/histórico de treinamento do atleta (contexto-atleta) deveria influenciar a priorização de foco no feedback — para atletas iniciantes/intermediários, estímulos de VO2max (intervalados de alta intensidade) tendem a produzir ganhos mais expressivos; para atletas muito treinados, o produto deveria dar mais peso a sinais relacionados a economia/eficiência e resistência à fadiga em vez de insistir unicamente em mais intervalados de VO2max."}, {"id": "nota-0166", "titulo": "Lactato ≠ ácido lático; é produzido continuamente (mesmo em repouso e sob abundância de O2) — aumento da concentração reflete maior taxa glicolítica, não falta de oxigênio", "dominio": "limiares-e-lactato", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 74, "trecho": "Em pH fisiológico... praticamente não existe ácido lático circulando no organismo. O que encontramos é lactato."}, {"arquivo": "Manual treinamento.pdf", "pagina": 75, "trecho": "Mesmo em repouso, o organismo produz lactato continuamente. Durante exercícios leves, moderados e intensos, a produção permanece ativa. O que muda é o equilíbrio entre produção e remoção... O aumento do lactato não significa ausência de oxigênio. Significa aumento da taxa glicolítica."}], "relacionadas": [], "confianca": 0.6, "status": "auto-aprovado", "body": "Correção terminológica: em pH fisiológico circula lactato (o ânion), não \"ácido lático\" — termo usado historicamente de forma imprecisa. A produção de lactato ocorre continuamente na glicólise (conversão de piruvato em lactato pela enzima LDH, que regenera NAD⁺ e permite que a glicólise continue produzindo ATP rapidamente) — inclusive em repouso e sob abundância de oxigênio. O que determina a concentração sanguínea observada é o equilíbrio entre produção e remoção/utilização, não a presença ou ausência de oxigênio. Portanto, \"lactato alto\" não indica hipóxia — indica aumento da taxa glicolítica, típico de intensidades mais altas.\n\nAplicação ao feedback: nota de correção conceitual de fundo, relevante caso o feedback do produto alguma vez mencione \"lactato\" ou \"queima muscular\" em linguagem para o usuário — deve evitar a narrativa ultrapassada de \"falta de oxigênio causa acúmulo de lactato\" e não usar \"ácido lático\" como sinônimo tecnicamente correto de lactato."}, {"id": "nota-0167", "titulo": "Lactate Shuttle (George Brooks, anos 1980): lactato é transportado entre fibras/órgãos e reutilizado como combustível — não é resíduo metabólico", "dominio": "limiares-e-lactato", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 76, "trecho": "o fisiologista George Brooks propôs uma teoria... Lactate Shuttle. Segundo esse modelo, o lactato funciona como um sistema de transporte de energia entre diferentes tecidos... pode ser transportado para fibras musculares oxidativas, músculo cardíaco, fígado, cérebro, rins. Nesses tecidos, o lactato pode ser convertido novamente em piruvato e utilizado para produzir ATP. Isso significa que o lactato é um combustível. Não um resíduo."}], "relacionadas": [{"id": "nota-0166", "tipo": "complementa", "justificativa": "reforça a reformulação do lactato de 'produto residual' para 'combustível dinâmico', complementando a correção terminológica/conceitual da nota-0166"}], "confianca": 0.6, "status": "auto-aprovado", "body": "O modelo do Lactate Shuttle (Brooks, década de 1980) propõe que o lactato produzido em um tecido não fica \"acumulado\" localmente como resíduo — ele é transportado (via transportadores MCT1/MCT4) para fibras musculares oxidativas, coração, fígado, cérebro e rins, onde é reconvertido em piruvato e usado para gerar ATP. Atletas altamente treinados apresentam maior expressão desses transportadores, maior capacidade de oxidação e maior eficiência mitocondrial — permitindo reutilizar mais lactato como combustível durante o próprio exercício, o que reduz sua acumulação sanguínea para uma dada potência.\n\nAplicação ao feedback: nota de fundamentação conceitual — explica, no nível mecanístico, por que atletas mais treinados sustentam potências mais altas com concentrações de lactato mais baixas (base fisiológica para a evolução da FTP/limiares ao longo do treinamento, já tratada operacionalmente pelas notas de FTP do Livro 1). Não gera regra de interpretação direta de dado Strava."}, {"id": "nota-0168", "titulo": "Mito refutado: 'o lactato causa fadiga muscular' — é apenas um marcador correlacionado à intensidade, não a causa; pode até ter efeito protetor", "dominio": "limiares-e-lactato", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 77, "trecho": "'O lactato causa fadiga.' Evidência científica: Não. O lactato está associado ao aumento da intensidade do exercício, mas não é considerado o principal causador da fadiga muscular... diversos estudos sugerem que o próprio lactato pode exercer efeitos protetores sobre a função muscular. A fadiga resulta da interação de inúmeros mecanismos: alterações iônicas, redução da disponibilidade energética, acúmulo de fosfato inorgânico, alterações neurais, fatores centrais, fatores periféricos."}], "relacionadas": [{"id": "nota-0167", "tipo": "complementa", "justificativa": "reforça a reinterpretação moderna do lactato (Lactate Shuttle, nota-0167) desconstruindo especificamente o mito de que ele causaria fadiga"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Desmistifica a crença tradicional de que o acúmulo de lactato causaria diretamente a queda de força/fadiga muscular. Lactato e fadiga aumentam juntos porque ambos são consequência do aumento da intensidade — correlação, não causalidade. A fadiga real resulta de múltiplos mecanismos (alterações iônicas, disponibilidade energética, acúmulo de fosfato inorgânico, fatores neurais centrais e periféricos), e evidências sugerem que o lactato pode até exercer efeito protetor sobre a função muscular.\n\nAplicação ao feedback: relevante como cautela terminológica — o produto não deveria usar frases como \"acúmulo de lactato causou a queda de desempenho\" ao explicar fadiga para o usuário; a fadiga em dados de potência/pacing (ex.: queda de potência ao final de uma sessão longa, ver notas de durabilidade do Livro 1) deve ser descrita em termos de fadiga multifatorial, não atribuída a uma única molécula."}, {"id": "nota-0169", "titulo": "Treinamento não reduz a produção de lactato — melhora sua utilização/remoção; objetivo do treino é 'utilizar melhor', não 'produzir menos'", "dominio": "limiares-e-lactato", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 78, "trecho": "É importante observar que atletas de elite continuam produzindo grandes quantidades de lactato. A diferença está na capacidade de utilizá-lo. Por isso, o objetivo do treinamento não consiste em 'produzir menos lactato', mas em melhorar sua utilização."}], "relacionadas": [{"id": "nota-0167", "tipo": "complementa", "justificativa": "detalha a consequência prática do modelo Lactate Shuttle: o treino não reduz a produção, aumenta a capacidade de reutilização (nota-0167)"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Correção de outro equívoco comum: atletas de elite não produzem menos lactato que atletas amadores — eles continuam produzindo grandes quantidades. A diferença está na capacidade de utilizá-lo/removê-lo (via maior transporte MCT1/MCT4, maior capacidade oxidativa e eficiência mitocondrial, ver nota-0167), o que resulta em menor concentração sanguínea observada para uma dada potência, e no deslocamento dos limiares fisiológicos (LT1/LT2/MLSS, ver Capítulo 11) para intensidades mais altas.\n\nAplicação ao feedback: reforça que o objetivo de longo prazo do treinamento (refletido em uma FTP crescente ao longo de meses, ver notas de PMC/FTP do Livro 1) é a capacidade de sustentar potências mais altas com \"menos estresse metabólico relativo\", não uma redução abstrata de \"lactato\" — útil como cautela de linguagem em textos de feedback educativo."}, {"id": "nota-0170", "titulo": "Limiares fisiológicos são regiões de transição graduais, não 'interruptores' binários — o organismo não muda de estado ao ultrapassar um watt específico", "dominio": "limiares-e-lactato", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 82, "trecho": "É importante compreender que eles não representam interruptores biológicos. O organismo não muda completamente seu funcionamento ao ultrapassar determinado watt ou determinada frequência cardíaca. Na realidade, os limiares representam regiões de transição entre diferentes estados fisiológicos."}], "relacionadas": [{"id": "nota-0047", "tipo": "complementa", "justificativa": "reforça, com base fisiológica explícita, a mesma ideia já registrada na nota-0047 do Livro 1 (níveis de treino são um contínuo sem fronteira rígida)"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Advertência conceitual central do capítulo: limiares fisiológicos (LT1, LT2, VT1, VT2, MLSS, etc.) não são pontos de corte binários onde o metabolismo muda abruptamente de \"modo aeróbio\" para \"modo anaeróbio\". São regiões de transição graduais entre estados fisiológicos, identificadas por métodos laboratoriais em pontos convenientes de uma curva contínua.\n\nAplicação ao feedback: reforça diretamente uma orientação já presente no Livro 1 (nota-0047) — o produto não deve tratar as fronteiras de zona (ex.: limite entre Nível 3 e Nível 4 na tabela de Coggan, nota-0022) como transições fisiológicas abruptas ao gerar feedback; esforços próximos ao limite de uma zona devem ser interpretados com a mesma cautela dada a esforços claramente dentro dela."}, {"id": "nota-0171", "titulo": "LT1 (primeiro limiar de lactato): primeiro aumento consistente do lactato acima do repouso — domínio moderado, predomínio oxidativo, sustentável por horas", "dominio": "limiares-e-lactato", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 82, "trecho": "O LT1 corresponde ao primeiro aumento consistente da concentração de lactato acima dos valores de repouso... Características típicas do LT1: predominância do metabolismo oxidativo; elevada contribuição da oxidação de gorduras; baixa perturbação da homeostase; ventilação ainda proporcional ao consumo de oxigênio; possibilidade de sustentação por várias horas."}], "relacionadas": [{"id": "nota-0145", "tipo": "complementa", "justificativa": "detalha, com o modelo moderno de dois limiares (LT1/LT2), a distinção que a nota-0145 do Livro 1 já fazia entre 'limiar de lactato' (intensidade baixa) e MLSS/FTP (intensidade mais alta)"}], "confianca": 0.6, "status": "auto-aprovado", "body": "LT1 é o ponto em que a concentração sanguínea de lactato começa a subir de forma consistente acima dos valores de repouso (a produção começa a superar discretamente a remoção, mas ainda em equilíbrio metabólico amplo). Características: predomínio do metabolismo oxidativo, alta contribuição de oxidação de gordura, baixa perturbação da homeostase, ventilação ainda proporcional ao VO2, sustentável por várias horas. Para ciclistas de endurance, grande parte do treinamento aeróbio de base é realizado abaixo ou próximo dessa intensidade — corresponde aproximadamente ao \"limiar de lactato\" citado de forma mais simplificada na nota-0145 do Livro 1 (Nível 2-3 de Coggan).\n\nAplicação ao feedback: nota de contexto fisiológico — o LT1 não é medido diretamente pelo Strava (exige teste de lactato/ergoespirometria), mas corresponde aproximadamente à fronteira entre os Níveis 2 e 3 da tabela de Coggan (nota-0022), já operacionalizável via %FTP nas notas existentes do Livro 1."}, {"id": "nota-0172", "titulo": "LT2 (segundo limiar de lactato): ponto em que o lactato passa a crescer rapidamente — domínio pesado/severo, fadiga inevitável em poucos minutos", "dominio": "limiares-e-lactato", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 83, "trecho": "chega um momento em que a concentração de lactato passa a crescer de forma muito mais rápida. Esse ponto é conhecido como LT2. Nessa região: a glicólise acelera significativamente; aumenta a participação dos carboidratos; a ventilação cresce de maneira desproporcional; o equilíbrio ácido-base torna-se progressivamente mais instável. Acima dessa intensidade, o tempo de sustentação reduz-se consideravelmente."}], "relacionadas": [{"id": "nota-0171", "tipo": "complementa", "justificativa": "LT1 e LT2 formam o par de limiares que delimita os domínios de intensidade fisiológica (ver nota-0178)"}], "confianca": 0.6, "status": "auto-aprovado", "body": "LT2 é o ponto em que a concentração de lactato passa a crescer de forma acentuadamente mais rápida (aceleração da glicólise, maior participação de carboidratos, ventilação desproporcional, instabilidade crescente do equilíbrio ácido-base). Acima do LT2 não há mais estado estável — o atleta ainda consegue sustentar o esforço por alguns minutos, mas a fadiga é inevitável. Corresponde aproximadamente ao MLSS/FTP (ver nota-0174 e nota-0176) e à fronteira do domínio \"severo\" (ver nota-0178).\n\nAplicação ao feedback: assim como o LT1, não é medido diretamente pelo Strava — mas seu correlato prático operacionalizável já existe no cânone via FTP e Nível 4 de Coggan (nota-0022). Serve de base fisiológica para por que esforços sustentados pouco acima da FTP têm duração inevitavelmente curta (minutos, não dezenas de minutos)."}, {"id": "nota-0173", "titulo": "LT1/LT2 não são valores fixos (mito refutado: '2 mmol/L e 4 mmol/L universais'); OBLA 4mmol/L é referência prática, não ponto fisiológico universal", "dominio": "limiares-e-lactato", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 84, "trecho": "'4 mmol/L representa o limiar anaeróbio para todos os atletas.' Evidência científica: Não. O valor de 4 mmol/L surgiu como uma referência prática (OBLA – Onset of Blood Lactate Accumulation), mas não representa um ponto fisiológico universal... As concentrações absolutas variam amplamente entre indivíduos... métodos modernos priorizam a análise individual das curvas de lactato."}], "relacionadas": [{"id": "nota-0145", "tipo": "complementa", "justificativa": "reforça e detalha, com evidência explícita 'mito ou verdade', a mesma advertência de desambiguação de OBLA já registrada na nota-0145 do Livro 1"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Refuta a simplificação didática comum de que LT1 = 2 mmol/L e LT2 = 4 mmol/L (OBLA — Onset of Blood Lactate Accumulation) seriam valores fisiológicos universais. Na realidade, as concentrações absolutas de lactato nos limiares variam amplamente entre indivíduos — dois atletas podem ter o mesmo comportamento fisiológico com concentrações completamente diferentes. Métodos modernos de avaliação priorizam a análise individual da curva de lactato (tendências), não números absolutos fixos.\n\nAplicação ao feedback: reforça a desambiguação já presente na nota-0145 do Livro 1 sobre OBLA — caso o produto algum dia receba dados de teste de lactato do usuário (input externo), não deve assumir que 4 mmol/L é o limiar anaeróbio desse atleta específico; é apenas uma referência de conveniência histórica, não uma medida fisiológica individualizada."}, {"id": "nota-0174", "titulo": "MLSS (Maximum Lactate Steady State): maior intensidade com lactato estável — bom indicador de intensidade máxima sustentável, mas exige múltiplos testes em dias diferentes", "dominio": "limiares-e-lactato", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 84, "trecho": "O Maximum Lactate Steady State (MLSS) representa a maior intensidade na qual a concentração de lactato permanece relativamente estável durante exercício contínuo... é frequentemente considerado um dos melhores indicadores laboratoriais da máxima intensidade sustentável. Entretanto, sua determinação exige diversos testes realizados em dias diferentes. Por essa razão, seu uso na prática cotidiana é limitado."}], "relacionadas": [{"id": "nota-0145", "tipo": "complementa", "justificativa": "confirma e detalha a equivalência aproximada MLSS ≈ FTP já registrada na nota-0145 do Livro 1"}, {"id": "nota-0176", "tipo": "pre-requisito", "justificativa": "a nota-0176 (FTP ≈ MLSS mas não é a mesma coisa) depende da definição precisa de MLSS estabelecida aqui"}], "confianca": 0.55, "status": "auto-aprovado", "body": "MLSS é a maior intensidade em que a concentração de lactato permanece relativamente estável ao longo de um exercício contínuo (acima dela, o lactato aumenta progressivamente sem estabilizar). É considerado um dos melhores indicadores laboratoriais de intensidade máxima sustentável, mas sua determinação exige múltiplos testes de carga constante em dias diferentes — por isso seu uso prático cotidiano é limitado, mesmo em contexto de laboratório.\n\nAplicação ao feedback: Política de ativação aplicada — por depender de protocolo laboratorial multi-dia não derivável do Strava, permanece aplicacao: contexto (referência conceitual). Sua relevância prática para o produto é indireta: FTP (nota-0019 do Livro 1) é usado como proxy prático do MLSS, conforme detalhado na nota-0176."}, {"id": "nota-0175", "titulo": "Limiares ventilatórios VT1 e VT2 (ergoespirometria) apresentam excelente correlação com LT1 e LT2", "dominio": "limiares-e-lactato", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 85, "trecho": "VT1 Corresponde aproximadamente ao primeiro limiar metabólico. Caracteriza-se pelo aumento da ventilação sem aumento proporcional da produção de dióxido de carbono. VT2 Representa intensidades próximas ao segundo limiar metabólico... hiperventilação significativa em resposta ao aumento da acidose metabólica. Esses limiares apresentam excelente correlação com LT1 e LT2."}], "relacionadas": [{"id": "nota-0171", "tipo": "complementa", "justificativa": "VT1 é o correlato ventilatório do LT1 (nota-0171)"}, {"id": "nota-0172", "tipo": "complementa", "justificativa": "VT2 é o correlato ventilatório do LT2 (nota-0172)"}], "confianca": 0.5, "status": "auto-aprovado", "body": "Além dos limiares de lactato sanguíneo, testes ergoespirométricos (análise de gases) identificam dois limiares ventilatórios com forte correlação aos limiares metabólicos: VT1 (aumento da ventilação sem aumento proporcional da produção de CO2 — correlato do LT1) e VT2 (hiperventilação significativa em resposta à acidose metabólica crescente — correlato do LT2).\n\nAplicação ao feedback: nota de referência conceitual — método laboratorial (ergoespirometria) não disponível via Strava; relevante apenas como pano de fundo caso o usuário informe resultados de teste ergoespirométrico externo."}, {"id": "nota-0179", "titulo": "Economia (custo de O2 para uma potência) ≠ Eficiência mecânica (Trabalho ÷ Energia metabólica) — eficiência mecânica no ciclismo é ~20-25%", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 91, "trecho": "Economia: refere-se ao custo energético para manter determinada intensidade de exercício... Eficiência Mecânica: representa a proporção da energia metabólica convertida em trabalho mecânico útil. Eficiência = Trabalho Mecânico ÷ Energia Metabólica. No ciclismo, a eficiência mecânica costuma variar entre aproximadamente 20 e 25%."}], "relacionadas": [], "confianca": 0.55, "status": "auto-aprovado", "body": "Dois conceitos frequentemente confundidos: Economia (custo energético/VO2 para sustentar uma potência específica — dois atletas na mesma potência podem ter VO2 diferentes, o de menor VO2 tem melhor economia) e Eficiência Mecânica (fração da energia metabólica total convertida em trabalho mecânico útil = Trabalho ÷ Energia Metabólica). No ciclismo, a eficiência mecânica bruta gira em torno de 20-25% — a maior parte da energia produzida é dissipada como calor. A literatura também distingue eficiência bruta, líquida, delta e de trabalho, cada uma com método de cálculo e uso distintos.\n\nAplicação ao feedback: nota de referência conceitual — nenhuma dessas métricas é diretamente calculável a partir de dados do Strava (exigem VO2 medido), mas fundamentam por que dois atletas com a mesma FTP podem ter capacidades de sustentação muito diferentes em provas longas (ligado à durabilidade, ver notas do Livro 1 sobre TTE/Stamina)."}, {"id": "nota-0205", "titulo": "VO2máx como preditor de mortalidade/doença cardiovascular — associação mais forte que fatores de risco tradicionais (colesterol, IMC, glicemia); citação de estudo único (Laukkanen 2022)", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 7, "trecho": "There is an incredible amount of evidence indicating that your VO2 max can predict your risk for cardiovascular disease and even death... it's been shown that increasing your VO2 max by just 3.5 ml/kg/min (referred to as a 1 metabolic equivalent of task or MET) reduces the risk for all-cause mortality by 11%. [Laukkanen JA, Isiozor NM, Kunutsor SK. Objectively assessed cardiorespiratory fitness and all-cause mortality risk. Mayo Clinic Proceedings. 2022;97(6):1054-1073.] ... individuals who ranked in the top one-third of aerobic fitness had a 45% reduced risk for all-cause mortality compared to individuals in the lower one-third."}], "relacionadas": [{"id": "nota-0163", "tipo": "complementa", "justificativa": "acrescenta a motivação de saúde/longevidade por trás da tabela de referência de VO2máx já registrada na nota-0163 (Fonte 2)"}], "confianca": 0.55, "status": "auto-aprovado", "body": "**Política de ativação aplicada:** a afirmação central (aumentar VO2máx em 3,5 mL/kg/min reduz mortalidade por todas as causas em 11%; top 1/3 de aptidão aeróbia tem 45% menos risco que o 1/3 inferior) é atribuída a um único estudo epidemiológico citado (Laukkanen et al. 2022, Mayo Clinic Proceedings) — downgrade para `aplicacao: contexto` por depender de estudo isolado, sem replicação cruzada dentro do próprio livro. VO2máx é descrito como medida de função integrada do corpo todo (sistema nervoso autônomo, coração/vasos, pulmões, músculos, mitocôndrias), com associação a mortalidade mais forte que fatores de risco cardiovascular tradicionais (colesterol, IMC, glicemia) segundo a fonte.\n\nAplicação ao feedback: fora do escopo de interpretação de dados de treino do Strava — é conteúdo de motivação/saúde de longo prazo (longevidade), não uma regra de interpretação de sessão. Poderia servir como texto educativo de fundo caso o produto queira comunicar \"por que treinar aptidão aeróbia importa\", mas não deve ser citado como se fosse consenso robusto (é um único estudo) nem usado para gerar previsões individuais de risco de mortalidade."}, {"id": "nota-0210", "titulo": "Fatores centrais (pulmão, débito cardíaco máx., capacidade de transporte de O2 do sangue) vs. periféricos (gradiente de difusão, enzimas mitocondriais, densidade capilar) — consenso: débito cardíaco máximo é o principal limitante do VO2máx em exercício de corpo inteiro", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 21, "trecho": "The primary factors that limit VO2 max can be classified as either central factors, which include the pulmonary diffusing capacity, maximal cardiac output, and oxygen-carrying capacity of the blood, or peripheral factors including skeletal muscle characteristics."}, {"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 24, "trecho": "the dominant factor limiting VO2 max in whole-body exercise appears to be maximal cardiac output, while for exercise with small muscle groups, the role of cardiac output is considerably less important. The current belief is that maximal cardiac output is the principal limiting factor for VO2 max."}], "relacionadas": [{"id": "nota-0162", "tipo": "complementa", "justificativa": "detalha os componentes central/periférico da Equação de Fick já registrada na nota-0162 (Fonte 2), com o consenso científico sobre qual domina"}], "confianca": 0.65, "status": "auto-aprovado", "body": "Detalha os dois grupos de fatores limitantes do VO2máx, já introduzidos pela Equação de Fick (nota-0162): (1) Fatores centrais — capacidade de difusão pulmonar (raramente limitante em pessoas saudáveis não-treinadas; pode limitar atletas de elite com débito cardíaco muito alto, que sofrem dessaturação arterial por o sangue passar rápido demais pelo pulmão — respirar ar hiperóxico não aumenta VO2máx em pessoas normais, mas aumenta ligeiramente em atletas altamente treinados), débito cardíaco máximo (FC×volume sistólico — o principal diferencial individual é o volume sistólico máximo), e capacidade de transporte de O2 do sangue (hemoglobina — pode ser limitante em anemia, intoxicação por monóxido de carbono, altitude); (2) Fatores periféricos — gradiente de difusão periférica (resistência à difusão entre hemácia e membrana muscular), enzimas mitocondriais, e densidade capilar (aumenta com o treino, prolongando o tempo de trânsito do sangue no capilar e permitindo maior extração de O2). Consenso científico: o débito cardíaco máximo é o fator limitante dominante do VO2máx em exercício de corpo inteiro (ex.: ciclismo, corrida); em exercícios com grupos musculares pequenos, esse papel é bem menos importante.\n\nAplicação ao feedback: nota de fundamentação fisiológica — não gera regra de interpretação direta de dado do Strava, mas reforça por que adaptações cardiovasculares (débito cardíaco) tendem a ser o alvo mais eficiente de treino de VO2máx, mais do que adaptações puramente musculares/periféricas."}, {"id": "nota-0211", "titulo": "Dobrar as mitocôndrias não dobra o VO2máx (aumento real de apenas 20-40%) — o principal efeito de mais mitocôndrias é melhorar a performance de endurance (mais oxidação de gordura, menos lactato), não elevar o teto de VO2máx", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 23, "trecho": "mitochondria don't appear to be the main limiter for VO2 max, as doubling the number of mitochondria should theoretically double the number of sites for oxygen uptake in muscle (and double VO2 max)."}, {"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 24, "trecho": "studies show that there is only a modest increase in V̇O2 max (20%–40%) even when mitochondria increase more than two-fold. This is consistent with the view that V̇O2 max is limited by oxygen delivery and not muscle mitochondria. The main effect of increasing mitochondrial enzymes is to improve endurance performance rather than to increase V̇O2 max... 1) muscles will oxidize fat at a higher rate (thus sparing muscle glycogen and blood glucose) and 2) decreased lactate production during exercise."}], "relacionadas": [{"id": "nota-0210", "tipo": "pre-requisito", "justificativa": "detalha, dentro dos fatores periféricos já descritos na nota-0210, por que as mitocôndrias não são o principal limitante do VO2máx"}, {"id": "nota-0156", "tipo": "complementa", "justificativa": "explica o mecanismo mitocondrial por trás da flexibilidade metabólica já registrada na nota-0156 (Fonte 2)"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Achado contraintuitivo e bem estabelecido (não é estudo único — é consenso da fisiologia do exercício): embora mais mitocôndrias devessem, em teoria, permitir extrair mais oxigênio (e portanto aumentar o VO2máx proporcionalmente), estudos mostram que dobrar (ou mais) a quantidade de mitocôndrias produz apenas um aumento modesto de 20-40% no VO2máx — consistente com a visão de que o VO2máx é limitado pela entrega de oxigênio (débito cardíaco, nota-0210), não pela capacidade mitocondrial de utilizá-lo. O principal efeito prático de mais mitocôndrias/enzimas oxidativas não é elevar o teto de VO2máx, e sim melhorar a performance de endurance por dois mecanismos: (1) maior oxidação de gordura (poupando glicogênio muscular e glicemia); (2) menor produção de lactato para a mesma intensidade. Isso explica por que a performance de endurance melhora com o treino mesmo sem grande mudança no VO2máx.\n\nAplicação ao feedback: reforça uma distinção já implícita no cânone (Manual, nota-0165: em atletas avançados o foco desloca de VO2máx para economia/limiares) — treino de base aeróbia (que aumenta densidade mitocondrial) deve ser comunicado ao usuário como melhoria de \"eficiência/resistência à fadiga\" mais do que como aumento esperado de VO2máx ou FTP de curto prazo; útil para calibrar expectativas de feedback sobre o que diferentes tipos de treino realmente melhoram."}, {"id": "nota-0213", "titulo": "Metabolismo anaeróbio contribui ~10-20% do ATP total em eventos de 10-30min (ex.: 5-10km corrida); é pequeno em maratona — densidade capilar ajuda a tolerar mais essa produção de lactato", "dominio": "fisiologia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 28, "trecho": "the relative contribution of anaerobic metabolism is small during marathon running but becomes significant in events lasting 10–30 minutes, such as 5 km and 10 km running. Anaerobic metabolism may contribute approximately 10%–20% of total ATP turnover during these shorter endurance events."}, {"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 28, "trecho": "High skeletal muscle capillary density is also important, as it helps remove or recycle fatiguing metabolites, such as hydrogen ions, within the muscles... enhance the tolerance of anaerobic metabolism and lactate production, allowing for improved endurance performance and a higher performance VO2."}], "relacionadas": [{"id": "nota-0126", "tipo": "complementa", "justificativa": "fornece uma faixa percentual de referência (10-20%) para a contribuição anaeróbia em esforços de 10-30min, complementando a estimativa de contribuição aeróbia/anaeróbia via MAOD já registrada na nota-0126 do Livro 1"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Em eventos de endurance com duração de 10-30 minutos (ex.: 5-10km de corrida; por extensão, esforços cicláveis de duração equivalente como um CRI curto ou uma subida de 10-20min), o metabolismo anaeróbio contribui aproximadamente 10-20% do turnover total de ATP — contribuição pequena em provas mais longas (maratona) e mais significativa nessa janela intermediária. Maior densidade capilar muscular ajuda a remover/reciclar metabólitos fatigantes (íons H+), aumentando a tolerância à produção de lactato e permitindo sustentar um \"Performance VO2\" mais alto (nota-0212).\n\nAplicação ao feedback: fornece uma faixa de referência que pode contextualizar esforços de 10-30min identificados no Strava (ex.: um segmento/CRI dessa duração) — parte relevante da carga fisiológica vem de vias anaeróbias mesmo sendo majoritariamente um esforço \"aeróbio\", reforçando por que esforços dessa duração são particularmente exigentes e difíceis de recuperar rapidamente."}, {"id": "nota-0214", "titulo": "Economia de movimento varia 20-30% entre ciclistas (30-40% entre corredores) para a mesma velocidade/potência; fibras tipo I são mecanicamente mais eficientes que tipo II, mas a correlação fibra-economia não é forte", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 29, "trecho": "Exercise economy can vary significantly among individuals, with the oxygen cost of running or cycling at a given speed or power output differing by around 30%–40% and 20%–30%, respectively."}, {"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 29, "trecho": "The efficiency is influenced by the velocity of muscle fiber shortening, with type I (slow twitch) muscle fibers displaying greater mechanical efficiency than type II (fast twitch) fibers. Elite endurance cyclists often possess a higher percentage of type I muscle fibers, which contribute to their improved efficiency. However, intense interval training can increase mitochondrial activity in both type I and type II muscle fibers, indicating that efficiency is not solely dependent on muscle fiber type."}], "relacionadas": [{"id": "nota-0179", "tipo": "complementa", "justificativa": "acrescenta a magnitude da variação individual (20-30% no ciclismo) e o papel da composição de fibras à definição de economia já registrada na nota-0179 (Fonte 2)"}], "confianca": 0.55, "status": "auto-aprovado", "body": "O custo de oxigênio para produzir a mesma potência varia cerca de 20-30% entre ciclistas (30-40% entre corredores para a mesma velocidade) — uma diferença individual considerável, mesmo controlando pela intensidade. Fibras musculares tipo I (contração lenta) são mecanicamente mais eficientes que fibras tipo II (contração rápida); ciclistas de endurance de elite tendem a ter maior proporção de fibras tipo I, contribuindo para melhor economia. Entretanto, a correlação entre composição de fibras e economia não é forte — treino intervalado intenso aumenta a atividade mitocondrial tanto em fibras tipo I quanto tipo II, indicando que a eficiência não depende só do tipo de fibra.\n\nAplicação ao feedback: fundamenta por que dois ciclistas com a mesma FTP podem ter capacidades de sustentação muito diferentes (diferença de até ~20-30% no custo metabólico da mesma potência) — reforça a cautela de não comparar diretamente atletas apenas por FTP/potência absoluta sem considerar essa variação individual de economia (complementa a nota-0179 e a lógica de perfil fenotípico já no cânone)."},{"id": "nota-0215", "titulo": "Eficiência mecânica no ciclismo É treinável ao longo de anos (~8% de melhora observada) — contradiz a crença antiga de que era praticamente fixa", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 29, "trecho": "It was previously believed that cycling efficiency and running economy did not improve significantly with training. However, recent evidence suggests that running economy can improve over years of training even in elite athletes, with reported improvements ranging from 8% to 14%. Similarly, cycling efficiency has been observed to increase by approximately 8% over several years of training."}], "relacionadas": [{"id": "nota-0179", "tipo": "complementa", "justificativa": "acrescenta evidência de que a eficiência mecânica descrita na nota-0179 é treinável ao longo de anos, contrariando a crença anterior de que seria essencialmente fixa"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Contraria a crença científica anterior de que a eficiência de pedalada/economia de corrida seriam praticamente fixas e pouco responsivas ao treino. Evidência mais recente mostra que a eficiência mecânica no ciclismo pode melhorar aproximadamente 8% ao longo de vários anos de treinamento consistente (mesmo em atletas de elite já treinados), enquanto a economia de corrida melhora entre 8-14% ao longo de anos. Os mecanismos exatos não são totalmente compreendidos, mas podem envolver mudanças na composição de isoformas das fibras musculares e outras adaptações de longo prazo do treino de endurance.\n\nAplicação ao feedback: reforça, com evidência adicional, que ganhos de eficiência/economia são um processo de anos (não semanas) — relevante para calibrar expectativas de progresso no feedback de longo prazo: se a FTP/potência não sobe rapidamente mas o atleta treina consistentemente há anos, parte do ganho de desempenho pode estar vindo de melhoria de eficiência (não capturada diretamente por FTP), consistente com a lógica de \"economia se degrada com fadiga, mas melhora com treino consistente\" já registrada na nota-0179/nota-0180."},{"id": "nota-0228", "titulo": "Tabela de contribuição percentual de cada sistema energético (fosfocreatina, glicogênio anaeróbio/aeróbio, glicose sanguínea, triacilglicerol) por duração de evento, de 100m a prova de 24h", "dominio": "fisiologia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 169, "trecho": "Table 7.1 Estimate of the Percent Contribution of Different Fuels to ATP Generation in Various Running Events (Assumes 70-kg Male) — 800 m: Phosphocreatine 6, Glycogen Anaerobic 50, Glycogen Aerobic 44. Marathon: Aerobic 75, Blood Glucose (Liver Glycogen) 5, Triacylglycerol (Fatty Acids) 20. Ultramarathon (80 km): Aerobic 35, Blood Glucose 5, Triacylglycerol 60. 24-h race: Aerobic 10, Blood Glucose 2, Triacylglycerol 88."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 169, "trecho": "From Newsholme EA, et al. Physical and mental fatigue: metabolic mechanisms and importance of plasma amino acids. Br
