nce.\n\nConsequência complementar para interpretação de dados de treino em altitude (Tabela 24.3): a **mesma intensidade relativa** (% do VO2max) ao nível do mar corresponde a uma intensidade absoluta muito menor em altitude — por exemplo, um esforço que representa 78% do VO2max ao nível do mar equivale a apenas 39% de intensidade a 4000m para gerar a mesma % relativa de VO2max. Isso significa que **potência/NP mais baixos em atividades feitas em altitude não indicam necessariamente perda de fitness** — podem refletir simplesmente que o mesmo esforço relativo (RPE, %FCmax) produz menos potência absoluta.\n\nAplicação ao feedback: para provas/segmentos de endurance longos (>20min, o caso típico de subidas longas ou contrarrelógios), mesmo ganhos modestos de elevação (600-700m acima da altitude habitual do atleta) já são suficientes para justificar uma queda de potência/NP esperada — o sistema não deveria exigir grandes altitudes (tipo 2000m+) para começar a descontar o efeito de altitude na interpretação de desempenho, ao contrário do que se poderia supor intuitivamente."},{"id": "nota-0278", "titulo": "Equação de Siri (densidade corporal → %gordura) e por que ela erra em atletas com grande massa muscular", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 746, "trecho": "The final derivation, referred to as the Siri equation, computes percentage body fat as: Percentage body fat = (495 ÷ body density) - 450"}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 747, "trecho": "A lower FFM density in weight trainers than in controls, 1.089 versus 1.099 g·cm−3, explained this discrepancy... For them, incorrect assumptions underlying the Siri equation overestimated percentage body fat."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 747, "trecho": "Based on revised densities of the FFM (1.089 g·cm−3) and fat mass (0.9007 g·cm−3), a modified equation more accurately appraises resistance-trained white males: Percentage body fat = (521 ÷ body density) - 478"}], "relacionadas": [], "confianca": 0.8, "status": "auto-aprovado", "body": "A **equação de Siri** é o método padrão para converter densidade corporal (obtida por pesagem hidrostática, BOD POD ou DXA-derivada) em percentual de gordura: **%Gordura = (495 ÷ densidade corporal) − 450**. Ela assume um modelo de dois compartimentos com densidade constante de 0,90 g/cm³ para o tecido adiposo e 1,10 g/cm³ para a massa livre de gordura (FFM) em qualquer indivíduo.\n\nEssa suposição de densidade constante da FFM **falha em pessoas com grande desenvolvimento muscular via treino de força**. Um estudo comparando levantadores de peso com controles não treinados mostrou que a densidade da FFM dos levantadores era menor (1,089 g/cm³) que a dos controles (1,099 g/cm³), porque o aumento de massa muscular foi desproporcional ao aumento de massa óssea — e o tecido muscular tem densidade menor que o valor assumido de 1,10. Resultado prático: **a equação de Siri padrão superestima o percentual de gordura em atletas muito musculosos**. Para corrigir isso, existe uma equação modificada para homens brancos treinados em força: **%Gordura = (521 ÷ densidade corporal) − 478**.\n\nRelevância para ciclismo: ciclistas que também fazem musculação de força consistente (comum em treino de potência/sprint) podem ter sua %gordura superestimada por qualquer método baseado na equação de Siri padrão (pesagem hidrostática, BOD POD convertido por Siri). Isso não invalida o acompanhamento longitudinal (a tendência ao longo do tempo ainda é útil), mas o valor absoluto de %gordura deve ser interpretado com cautela nesse perfil de atleta."},{"id": "nota-0279", "titulo": "Bioimpedância (BIA) é sensível ao estado de hidratação: medir logo após treino intenso superestima massa magra e subestima %gordura", "dominio": "avaliacao-e-testes", "camada": ["semanal", "mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 754, "trecho": "For example, sweat-loss dehydration from prior physical activity or reduced glycogen reserves (and associated loss of glycogen-bound water) from an intense training session reduces body resistance (impedance) to electrical current flow. This overestimates FFM and underestimates percentage body fat."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 754, "trecho": "Hydration level affects the accuracy of BIA to incorrectly determine an individual's body fat content... voluntary fluid restriction decreases the impedance measure. This lowers the percentage body fat estimate; hyperhydration produces the opposite effect (higher body fat estimate)."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 754, "trecho": "BIA tends to overpredict body fat in lean and athletic subjects and underpredict body fat in obese subjects.116,159 BIA often predicts body fat less accurately than do girths and skinfolds."}], "relacionadas": [{"id": "nota-0278", "tipo": "complementa", "justificativa": "outro método de composição corporal (BIA) com limitação distinta da equação de Siri, ambos relevantes para interpretar %gordura de ciclistas"}], "confianca": 0.8, "status": "auto-aprovado", "body": "A **bioimpedância elétrica (BIA)** estima composição corporal medindo a resistência do corpo à passagem de uma corrente elétrica de baixa intensidade — tecidos hidratados (massa magra) conduzem melhor que tecido adiposo. Isso torna a técnica **muito sensível ao estado momentâneo de hidratação**, o que é especialmente relevante para ciclistas, que rotineiramente perdem líquido por suor em treinos longos ou intensos.\n\nMecanismo documentado: **desidratação por suor** (típica após um treino intenso) e **depleção de glicogênio** (que carrega água ligada) **reduzem a impedância** medida — o que faz o aparelho **superestimar a massa magra (FFM) e subestimar o percentual de gordura**. O efeito inverso ocorre com hiper-hidratação (superestima %gordura). Mesmo a temperatura da pele/ambiente influencia a leitura (pele mais quente e úmida produz menor impedância, logo menor %gordura estimado).\n\nAlém disso, mesmo em condições padronizadas, a BIA tende a **superestimar %gordura em pessoas magras/atléticas e subestimar em pessoas obesas**, sendo geralmente menos precisa que dobras cutâneas ou perímetros corporais.\n\nAplicação prática: se um ciclista usa balança de bioimpedância doméstica para acompanhar %gordura, os valores só são comparáveis entre si se medidos em condições de hidratação semelhantes (ex.: sempre em jejum, pela manhã, antes de qualquer treino do dia) — medir logo após um treino longo/suado, ou em dias com hidratação muito diferente, produz \"mudanças\" de composição corporal que são artefato de hidratação, não mudança real de gordura/músculo."},{"id": "nota-0280", "titulo": "Acurácia comparada dos métodos de composição corporal: dobras cutâneas (±2,5-4%), BOD POD (-1,6 a -2,9% vs. DXA/densitometria) e DXA (<2% de erro vs. densitometria)", "dominio": "avaliacao-e-testes", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 752, "trecho": "This means that on average for about 70 of every 100 people measured, the equations will predict body fat within the 2.5 to 4.0% body fat compared to the person's body fat had it been assessed by a valid criterion such as hydrostatic weighing, DXA, or BOD POD."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 751, "trecho": "Predict body fat in athletes from an equation validated against a four-component model... % Body fat = 8.997 + 0.24658 (3 SKF) − 6.343 (gender) − 1.998 (race), where 3 SKF = sum of skinfolds in mm at abdomen, thigh, and triceps; gender = 0 for female, 1 for male; race = 0 for white, 1 for black."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 748, "trecho": "Underprediction of body fat also occurred in a heterogeneous sample of black men... The method underpredicted percentage body fat compared with densitometry (–1.9% fat units) and DXA (–1.6% fat units). Similar underpredictions compared with DXA-derived body fat (–2.9% fat units) occurred in 54 boys and girls 10 to 18 years of age."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 761, "trecho": "Using a more robust model of body composition assessment, the error is less than 2% body fat units between DXA and densitometry in the heterogeneous age group of adults shown in the figure."}], "relacionadas": [{"id": "nota-0278", "tipo": "complementa", "justificativa": "densitometria (base da equação de Siri) é um dos métodos-critério contra os quais os demais métodos são comparados nesta nota"}, {"id": "nota-0279", "tipo": "complementa", "justificativa": "BIA é outro método de composição corporal com erro sistemático próprio, tratado separadamente"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Nenhum método de campo de composição corporal é exato; cada um tem um erro sistemático característico em relação aos métodos-critério laboratoriais (pesagem hidrostática/densitometria e DXA). Isso explica por que é comum um mesmo atleta obter %gordura visivelmente diferente em academias/clínicas distintas.\n\n**Dobras cutâneas (skinfolds):** equações generalizadas predizem %gordura dentro de **±2,5 a 4,0 pontos percentuais** do valor real em cerca de 70% das pessoas medidas (comparado a um método-critério como pesagem hidrostática, DXA ou BOD POD). Para atletas especificamente, existe uma equação validada contra um modelo de quatro compartimentos: **%Gordura = 8,997 + 0,24658×(soma de 3 dobras: abdômen+coxa+tríceps, em mm) − 6,343×(sexo: 0=fem,1=masc) − 1,998×(raça: 0=branco,1=negro)** (Evans et al., 2005).\n\n**BOD POD (pletismografia por deslocamento de ar):** em amostras heterogêneas, subestimou %gordura em relação à densitometria em **−1,9 pontos percentuais** e em relação ao DXA em **−1,6 a −2,9 pontos percentuais**, dependendo da população. Em atletas magros pode ocorrer superestimação; a direção e magnitude do erro variam por estudo/população.\n\n**DXA (absorciometria de raios-X de dupla energia):** é o método de referência mais robusto disponível fora de cadáver, com erro **inferior a 2 pontos percentuais** de gordura em relação à densitometria numa amostra heterogênea de adultos — mas a força da predição diminui em pessoas mais velhas e mais gordas.\n\nAplicação prática: ao interpretar %gordura relatada por um atleta, é mais confiável acompanhar a **tendência ao longo do tempo usando sempre o mesmo método e protocolo** do que comparar valores absolutos entre métodos diferentes (ex.: dobras cutâneas de uma clínica vs. balança de bioimpedância de casa vs. DXA de um exame médico) — a diferença entre eles pode facilmente ser maior que a mudança real de composição corporal que se está tentando detectar."},{"id": "nota-0123", "titulo": "Estimar necessidade calórica de uma prova a partir dos kJ registrados pelo medidor de potência", "dominio": "nutricao-e-energia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-média", "tempo-decorrido"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 358, "trecho": "When you download racing data, you can see how many kilojoules of energy and TSS points you scored before you became tired, and subsequently you can determine how many calories you need to consume during your next race. For example, if you did a 2.5-hour race and consumed 500 kcals during the race, but then downloaded your race file and found out that you expended 2,000 kJ, or roughly 2,200 kcals, you might plan to eat more during your next race or load up on carbs in the days leading up to the race."}], "relacionadas": [{"id": "nota-0062", "tipo": "complementa", "justificativa": "usa o mesmo dado de trabalho mecânico (kJ) que também alimenta o cálculo de TSS (nota-0062), agora aplicado ao planejamento nutricional"}], "confianca": 0.65, "status": "auto-aprovado", "body": "Método prático para estimar a necessidade calórica real de uma prova/treino longo usando o trabalho em kJ registrado pelo medidor de potência:\n\n1. Marcar (durante ou após o download) o ponto em que o atleta começou a sentir fadiga/exaustão significativa.\n2. Verificar quantos kJ de trabalho foram registrados até aquele ponto (ou ao longo de toda a prova).\n3. Converter kJ em kcal aproximadamente numa razão próxima de 1:1,1 (exemplo do livro: 2.000 kJ ≈ 2.200 kcal).\n4. Comparar essa necessidade calórica estimada contra o que o atleta efetivamente consumiu durante a prova (ex.: 500 kcal consumidas vs. ~2.200 kcal gastas) para identificar déficit de reposição energética.\n\nAplicação ao feedback: para atividades longas (>2h) com dados de potência, calcular o gasto energético estimado a partir do total de kJ da atividade e comparar contra relatos ou estimativas de ingestão do atleta (se disponíveis) — um grande déficit entre kJ gastos e calorias repostas é um sinal relevante para recomendações de nutrição/hidratação em provas futuras, especialmente se o atleta relatar \"bonk\"/pane de energia no fim de provas longas."},{"id": "nota-0002", "titulo": "Conversão de trabalho (kJ) do medidor de potência em gasto calórico estimado", "dominio": "nutricao-e-energia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["trabalho-kJ"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 32, "trecho": "By definition, there are 4.184 kJ per Calorie, so at first glance it would seem that to determine your energy expenditure using power-meter data, you would simply divide your total work in kJ by 4.184."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 33, "trecho": "you would need to first divide your total work in kilojoules by 4.184, but then multiply this result by either 4 (if efficiency is at 25 percent) or 5 (if efficiency is at 20 percent)... you can also take the value for the total work performed in kJ as an estimate of your energy expenditure in kilocalories."}], "relacionadas": [], "confianca": 0.9, "status": "auto-aprovado", "body": "Medidores de potência registram o trabalho mecânico realizado em joules/kilojoules (kJ), que é diferente de gasto calórico (kcal), porque medem apenas o trabalho externo produzido nos pedais, não a energia metabólica total gasta (grande parte da energia vira calor dissipado, não trabalho mecânico).\n\nFórmula: gasto energético (kcal) ≈ (trabalho em kJ ÷ 4,184) × fator, onde o fator é 4 se a eficiência de conversão do ciclista for ~25% ou 5 se for ~20%. Para ciclistas treinados, a eficiência típica fica na faixa de 20–25%. Na prática, esses fatores se cancelam de forma que **o valor do trabalho em kJ registrado pelo medidor de potência pode ser usado diretamente como uma estimativa razoável do gasto calórico em kcal** (relação aproximadamente 1:1), sem necessidade de calcular a eficiência individual (que só é determinável com precisão em laboratório).\n\nAplicação: essa estimativa pode orientar o planejamento de reposição calórica pós-treino/prova e, quando o kJ acumulado é conhecido por trecho/segmento da atividade, permite planejar a ingestão de carboidratos ao longo do próprio percurso.\n\nAplicação ao feedback: ao gerar feedback pós-treino/prova, reportar o gasto calórico estimado (kJ ≈ kcal) junto com a potência/TSS da sessão, especialmente em atividades longas, para apoiar recomendações de reposição nutricional."},{"id": "nota-0155", "titulo": "Crossover metabólico: gordura predomina em baixa intensidade, participação de carboidrato cresce progressivamente com o aumento da intensidade", "dominio": "nutricao-e-energia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 44, "trecho": "Durante exercícios leves predominam os lipídios. À medida que a intensidade aumenta, cresce progressivamente a participação dos carboidratos. Essa mudança não ocorre de forma abrupta... Esse fenômeno é conhecido como crossover metabólico."}], "relacionadas": [], "confianca": 0.6, "status": "auto-aprovado", "body": "O \"crossover metabólico\" descreve a transição contínua (não abrupta) na contribuição relativa dos substratos energéticos conforme a intensidade do exercício aumenta: predomínio de lipídios em intensidades baixas, com participação crescente de carboidratos em intensidades mais altas. A localização exata do ponto de cruzamento é influenciada por intensidade, duração, nível de treinamento, alimentação, disponibilidade de glicogênio, temperatura e altitude. O treinamento de endurance desloca esse ponto para intensidades mais altas (maior capacidade de oxidar gordura em potências mais elevadas), fenômeno relacionado à \"flexibilidade metabólica\" (ver nota-0156).\n\nAplicação ao feedback: fundamenta, em nível conceitual, por que sessões longas em baixa intensidade (Zona 2) são o principal estímulo para melhorar a capacidade oxidativa de gordura e por que a dependência de carboidrato aumenta abruptamente em esforços de alta intensidade (relevante para orientações de fueling/nutrição durante sessões longas vs. intervalados, mas não gera um gatilho direto de interpretação de dado do Strava)."},{"id": "nota-0156", "titulo": "Flexibilidade metabólica: capacidade treinável de alternar rapidamente entre gordura e carboidrato conforme a demanda do exercício", "dominio": "nutricao-e-energia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 45, "trecho": "A flexibilidade metabólica representa a capacidade do organismo de alternar rapidamente entre diferentes fontes de energia conforme as necessidades do exercício... Nos últimos anos, a flexibilidade metabólica tornou-se um dos conceitos centrais na fisiologia do endurance."}], "relacionadas": [{"id": "nota-0155", "tipo": "complementa", "justificativa": "a flexibilidade metabólica é a capacidade treinável que determina onde/quão suavemente ocorre o crossover metabólico descrito na nota-0155"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Um ciclista metabolicamente flexível consegue: oxidar predominantemente gordura em esforços leves, aumentar rapidamente a utilização de carboidrato quando a intensidade exige, e retornar eficientemente ao metabolismo oxidativo após esforços intensos (recuperação entre picos). Essa capacidade reduz desperdício energético e melhora a sustentabilidade do desempenho em provas longas. É desenvolvida principalmente por treinamento de endurance consistente (aumento de densidade mitocondrial, enzimas oxidativas, capacidade de armazenar/poupar glicogênio).\n\nAplicação ao feedback: reforça, conceitualmente, a importância de volume consistente em intensidade baixa (Zona 2) na construção de base aeróbia — não gera uma regra de interpretação de dado isolado, mas serve de justificativa para recomendações de distribuição de intensidade ao longo do tempo (complementar às notas de periodização e distribuição de intensidade do Livro 1)."},{"id": "nota-0201", "titulo": "Tabela de ingestão de carboidrato durante o exercício por duração: até 60min geralmente desnecessário (exceto bochecho em provas intensas), 1-2h → 30-60g/h, 2-3h → 60-90g/h, >3h → 90-120g/h (se treinado)", "dominio": "nutricao-e-energia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["tempo-decorrido", "tempo-movimento"], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 237, "trecho": "Até 60 minutos: normalmente não necessária*. 1–2 horas: 30–60 g/h. 2–3 horas: 60–90 g/h. Acima de 3 horas: 90–120 g/h (quando treinado). * Em provas muito intensas próximas de 60 minutos, pequenas quantidades ou bochechos com carboidrato podem melhorar o desempenho."}], "relacionadas": [], "confianca": 0.6, "status": "auto-aprovado", "body": "Tabela de referência (recomendações atuais da nutrição esportiva) para ingestão de carboidrato durante o exercício, por faixa de duração: até 60 minutos — normalmente desnecessária (exceto bochecho de carboidrato em provas muito intensas próximas de 60min, que pode melhorar desempenho via efeito central/sensorial, sem necessidade de ingestão real); 1-2 horas — 30-60 g/h; 2-3 horas — 60-90 g/h; acima de 3 horas — 90-120 g/h (somente em atletas com intestino treinado para tolerar essa quantidade, ver nota-0202 sobre carboidratos múltiplos). Recomendações devem ser individualizadas — nem todos toleram grandes quantidades.\n\nAplicação ao feedback: o produto pode usar a duração da sessão (tempo-movimento/tempo-decorrido, já disponível via Strava) para sugerir uma faixa de ingestão de carboidrato apropriada em sessões longas planejadas ou passadas (ex.: \"essa sessão de 3h20 provavelmente exigia 90-120g/h de carboidrato para sustentar a potência-alvo\") — não é possível verificar a ingestão real a partir do Strava, apenas sugerir a faixa recomendada com base na duração."},{"id": "nota-0202", "titulo": "Carboidratos múltiplos (glicose via SGLT1 + frutose via GLUT5) aumentam a absorção intestinal total e permitem ingestão horária maior com menos desconforto GI; o intestino é treinável", "dominio": "nutricao-e-energia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 237, "trecho": "A glicose utiliza principalmente o transportador SGLT1. A frutose utiliza predominantemente o GLUT5. Ao combinar diferentes tipos de carboidratos, torna-se possível aumentar a absorção intestinal e reduzir o risco de desconforto gastrointestinal. Essa estratégia permitiu elevar significativamente a ingestão horária de carboidratos em atletas altamente treinados."}, {"arquivo": "Manual treinamento.pdf", "pagina": 238, "trecho": "o trato gastrointestinal também pode ser treinado. A prática repetida de ingestão de carboidratos durante os treinos promove adaptações como: maior velocidade de esvaziamento gástrico; aumento da capacidade de absorção; redução do desconforto gastrointestinal; melhor tolerância a grandes quantidades de carboidratos."}], "relacionadas": [{"id": "nota-0201", "tipo": "pre-requisito", "justificativa": "explica o mecanismo que permite atingir as faixas mais altas (90-120g/h) da tabela de ingestão da nota-0201, e por que exige treino prévio do intestino"}], "confianca": 0.55, "status": "auto-aprovado", "body": "A glicose usa o transportador intestinal SGLT1 e a frutose usa predominantemente o GLUT5 — combinar os dois tipos de carboidrato (em vez de usar só glicose) aumenta a absorção intestinal total e reduz desconforto gastrointestinal, permitindo ingestões horárias mais altas (até 90-120g/h, ver nota-0201). Além disso, o intestino é treinável: ingestão repetida de carboidrato durante os treinos melhora esvaziamento gástrico, capacidade de absorção e tolerância — a estratégia nutricional de prova nunca deve ser testada pela primeira vez em competição.\n\nAplicação ao feedback: nota de contexto nutricional — não gera regra de interpretação de dado do Strava, mas justifica por que a faixa superior da tabela de ingestão (nota-0201) só é viável para atletas que praticaram esse volume de carboidrato em treinos longos previamente."},{"id": "nota-0203", "titulo": "Mito refutado: 'janela anabólica' de 30 minutos — na realidade dura várias horas, e o consumo total diário de energia/proteína importa mais que o momento exato da primeira refeição pós-treino", "dominio": "nutricao-e-energia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 245, "trecho": "Durante muitos anos acreditou-se que existia uma 'janela anabólica' extremamente curta, limitada aos primeiros 30 minutos após o exercício. Hoje a evidência científica mostra uma visão mais equilibrada... essa janela dura várias horas; sua importância depende do estado nutricional prévio; o consumo total diário de energia e proteínas exerce influência ainda maior."}], "relacionadas": [], "confianca": 0.55, "status": "auto-aprovado", "body": "Desmistifica a crença popular de uma \"janela anabólica\" restrita aos 30 minutos pós-treino, na qual seria essencial ingerir proteína/carboidrato imediatamente. A evidência atual mostra que essa janela de maior sensibilidade metabólica dura na verdade várias horas, e que o consumo total diário de energia e proteína tem impacto maior no resultado final do que a rapidez da primeira refeição pós-treino — a prioridade deve ser um planejamento nutricional consistente ao longo do dia, não a corrida por um shake imediato. Exceção: quando o intervalo até a próxima sessão é curto (<24h), iniciar a reposição de carboidrato logo após o treino é recomendado, pela maior capacidade de armazenamento de glicogênio nas primeiras horas.\n\nAplicação ao feedback: fora do escopo de dados do Strava (nutrição não é rastreada) — nota de contexto útil apenas se o produto algum dia oferecer orientação nutricional educativa ao usuário; deve evitar reforçar o mito popular da \"janela de 30 minutos\"."},{"id": "nota-0204", "titulo": "Suplementos com evidência científica robusta para ciclismo: cafeína (endurance e alta intensidade), creatina (sprint/acelerações repetidas), bicarbonato de sódio (esforços de 1-10min), nitrato/beterraba (moderadamente treinados), beta-alanina (esforços de 1-4min)", "dominio": "nutricao-e-energia", "camada": ["semanal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 246, "trecho": "Cafeína: possui uma das maiores quantidades de evidências favoráveis... Creatina: pode beneficiar sprint, acelerações repetidas, treinamento de força, manutenção da massa muscular. Seu impacto sobre provas longas é menor."}, {"arquivo": "Manual treinamento.pdf", "pagina": 247, "trecho": "Bicarbonato de sódio: atua aumentando a capacidade tamponante do organismo. Pode beneficiar exercícios intensos entre aproximadamente 1 e 10 minutos... Nitrato (suco de beterraba): pode melhorar a eficiência muscular... maiores benefícios tendem a ocorrer em atletas moderadamente treinados... Beta-alanina: aumenta os estoques musculares de carnosina. Pode melhorar a capacidade de sustentar exercícios de alta intensidade com duração entre aproximadamente 1 e 4 minutos."}], "relacionadas": [], "confianca": 0.55, "status": "auto-aprovado", "body": "Resumo de suplementos com boa evidência científica para ciclismo, por faixa de aplicação: Cafeína — reduz percepção de esforço, melhora atenção e capacidade de sustentar intensidade, benefícios tanto em endurance quanto em alta intensidade (resposta individual variável por genética/hábito); Creatina — beneficia sprint, acelerações repetidas e treino de força, impacto menor em provas longas (risco de ganho de massa corporal em alguns atletas); Bicarbonato de sódio — aumenta capacidade tamponante, beneficia esforços intensos de ~1-10 minutos, risco de desconforto GI (testar em treino antes de competição); Nitrato/suco de beterraba — melhora eficiência muscular, mais eficaz em atletas moderadamente treinados que em elite; Beta-alanina — aumenta carnosina muscular, beneficia esforços de alta intensidade de ~1-4 minutos. O Manual adverte que a maioria dos demais suplementos do mercado (boosters hormonais, queimadores de gordura, antioxidantes em altas doses, \"pré-treinos\") tem evidência limitada ou inconsistente.\n\nAplicação ao feedback: fora do escopo de dados do Strava (suplementação não é rastreada) — nota de referência para caso o produto ofereça conteúdo educativo sobre nutrição esportiva; útil para mapear qual suplemento é mais relevante ao tipo de esforço identificado numa sessão (ex.: sessões de sprint/pista → bicarbonato/beta-alanina; provas longas → cafeína/carboidrato)."},{"id": "nota-0223", "titulo": "Necessidade de proteína para atletas de endurance: RDA geral é 0,83 g/kg/dia, mas quem treina intensamente deve consumir 1,2-1,8 g/kg/dia", "dominio": "nutricao-e-energia", "camada": ["semanal", "mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 39, "trecho": "the protein RDA equals 0.83 g per kilogram of body mass. To determine the protein requirement for men and women ages 18 to 65, multiply body mass in kg by 0.83."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 38, "trecho": "Based on the available evidence, athletes who train intensely should consume between 1.2 and 1.8 g of protein per kg of body mass daily... Protein intake greater than the 1.8 g value offers no further advantage to athletes with regard to whole-body protein use."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 38, "trecho": "a reasonable daily protein intake for vegetarian athletes ranges between 1.3 and 1.8 g per kilogram of body weight."}], "relacionadas": [{"id": "nota-0224", "tipo": "complementa", "justificativa": "explica um dos mecanismos (ciclo alanina-glicose) que aumenta a demanda de proteína como combustível durante exercício prolongado, justificando a faixa mais alta de 1,2-1,8 g/kg"}], "confianca": 0.75, "status": "auto-aprovado", "body": "A RDA (Recommended Dietary Allowance) padrão de proteína é **0,83 g por kg de massa corporal/dia** (ex.: homem de 90 kg → 75 g/dia) — um valor liberal, pensado para cobrir 97% da população saudável e sedentária, com margem de segurança de ~25%. Esse valor NÃO é adequado como referência para atletas em treinamento intenso.\n\nCom base em evidências de balanço de nitrogênio e turnover proteico, atletas que treinam intensamente (endurance ou resistência) devem consumir entre **1,2 e 1,8 g de proteína por kg de massa corporal/dia**. Consumir acima de 1,8 g/kg não traz vantagem adicional mensurável no uso proteico corporal total. Para atletas vegetarianos, a recomendação (ACSM/American Dietetic Association) é ligeiramente mais alta, 1,3-1,8 g/kg/dia, para compensar a menor digestibilidade e o perfil de aminoácidos incompleto de fontes vegetais isoladas.\n\nContexto: a maior demanda vem de duas fontes — (1) o treino de endurance aumenta o catabolismo proteico via oxidação de aminoácidos de cadeia ramificada (BCAA, especialmente leucina) e via o ciclo alanina-glicose (nota-0224), especialmente quando os estoques de glicogênio estão baixos; (2) atletas com alto gasto calórico já costumam ingerir 2-3x a RDA apenas por comerem mais no total, mesmo sem planejamento deliberado — ou seja, a maioria dos atletas de endurance bem alimentados já atinge essa faixa organicamente.\n\nIsso não significa que \"mais proteína = mais massa muscular\": consumir 100 g extras de proteína/dia (400 kcal) não se traduz em 500 g/dia de ganho de massa muscular — o excesso é catabolizado para energia ou reciclado como gordura, com sobrecarga renal/hepática na eliminação de ureia.\n\nAplicação ao feedback: fora do escopo de sinais do Strava (ingestão alimentar não é rastreada) — nota de referência útil para conteúdo educativo ou para contextualizar picos de fadiga/recuperação lenta em blocos de alto volume (trabalho-kJ elevado), onde a ingestão proteica insuficiente é um fator de risco conhecido para recuperação inadequada, mesmo que não verificável diretamente pelos dados de atividade."},{"id": "nota-0224", "titulo": "Ciclo alanina-glicose: até 45% da liberação hepática de glicose em exercício prolongado vem de aminoácidos, não de glicogênio", "dominio": "nutricao-e-energia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 38, "trecho": "Active skeletal muscle synthesizes alanine during transamination from the glucose intermediate pyruvate with nitrogen derived in part from the amino acid leucine... The newly formed alanine leaves the muscle and enters the liver for deamination. Alanine's remaining carbon skeleton converts to glucose via gluconeogenesis and enters the blood for delivery to active muscle."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 38, "trecho": "After 4 hr of continuous light exercise, the liver's output of alanine-derived glucose accounts for about 45% of the liver's total glucose release. The alanine–glucose cycle generates from 10 to 15% of the total exercise energy requirement."}], "relacionadas": [{"id": "nota-0223", "tipo": "complementa", "justificativa": "explica um mecanismo pelo qual o exercício prolongado aumenta a demanda proteica, fundamentando a recomendação de 1,2-1,8 g/kg/dia para atletas de endurance"}], "confianca": 0.7, "status": "auto-aprovado", "body": "O **ciclo alanina-glicose** é uma via pela qual proteína/aminoácidos musculares contribuem indiretamente como combustível durante exercício prolongado, mesmo sem serem oxidados diretamente no músculo: o músculo ativo sintetiza alanina a partir do piruvato (via transaminação, usando nitrogênio derivado em parte da leucina); a alanina sai do músculo, chega ao fígado, é desaminada, e seu esqueleto de carbono é convertido de volta em glicose via gliconeogênese — glicose essa que retorna à corrente sanguínea para ser usada pelo músculo ativo e pelo sistema nervoso central.\n\nMagnitude: após 4 horas de exercício leve contínuo, a glicose derivada de alanina responde por **cerca de 45% da liberação hepática total de glicose**. No total, o ciclo alanina-glicose gera entre **10 e 15% do requerimento energético total do exercício** em esforços prolongados. O treinamento regular de endurance aumenta a capacidade do fígado de realizar essa gliconeogênese, o que ajuda a manter a homeostase da glicose sanguínea durante exercício prolongado.\n\nIsso reforça por que a depleção de glicogênio aumenta o catabolismo proteico durante o exercício: quando as reservas de glicogênio muscular e hepático caem, o corpo depende proporcionalmente mais dessa via de \"reciclagem\" de aminoácidos para manter a glicemia, sacrificando proteína estrutural/funcional no processo — um dos motivos pelos quais atletas de endurance treinando intensamente têm demanda proteica acima da RDA padrão (ver nota-0223).\n\nEste é um mecanismo bioquímico de base sem tradução direta a um sinal do Strava (não há como medir alanina circulante ou gliconeogênese hepática a partir de dados de potência/FC), por isso permanece como nota de contexto explicativo."},{"id": "nota-0225", "titulo": "Gasto energético diário em ciclismo de endurance: ~6500 kcal/dia médio no Tour de France (3000 em dia de descanso, 9000 em etapa de montanha); déficit energético em provas ultra associa-se a tempo de prova mais lento", "dominio": "nutricao-e-energia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["trabalho-kJ", "tempo-movimento"], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 89, "trecho": "figure 3.7 outlines the variation in daily energy expenditure for a male competitor during the Tour de France professional cycling race. In this grueling sporting event, energy expenditure averaged 6500 kcal daily for nearly 3 weeks. Large variation occurred depending on activity level for a particular day; the daily energy expenditure decreased to about 3000 kcal on a 'rest' day and increased to 9000 kcal when cycling over a mountain pass."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 89, "trecho": "Deficits have been reported among ultraendurance cyclists in a 16-hr, 384-km cycle race. For these athletes, mean energy intake averaged 18.7 MJ (4469 kcal) compared with an estimated energy requirement for the race of 25.5 MJ (6095 kcal). Of functional significance was the negative relationship between energy intake and time to complete the race, which suggests that reducing the energy deficit may be advantageous to race performance."}], "relacionadas": [{"id": "nota-0002", "tipo": "complementa", "justificativa": "usa a conversão kJ→kcal (nota-0002) como base para estimar gasto energético a partir do trabalho mecânico (trabalho-kJ) registrado pelo Strava"}], "confianca": 0.7, "status": "auto-aprovado", "body": "Referências quantitativas de gasto energético diário em ciclismo de resistência, úteis para contextualizar o trabalho-kJ/duração registrados pelo Strava frente a faixas fisiológicas plausíveis:\n\n- **Tour de France (3 semanas, etapas profissionais):** gasto energético médio de **~6500 kcal/dia**, com grande variação por tipo de dia — cerca de **3000 kcal em dia de descanso** e até **9000 kcal em etapa de montanha**. Ciclistas profissionais conseguem, com estratégia de nutrição líquida combinada a refeições normais, chegar perto do balanço energético mesmo nessas cargas extremas.\n- **Ultraendurance (prova de 384 km / 16h):** ingestão média de energia de 18,7 MJ (4469 kcal) ficou **abaixo** da necessidade energética estimada da prova, 25,5 MJ (6095 kcal) — um déficit de ~27%. Esse déficit energético teve relação negativa com o tempo de prova (quanto maior o déficit, mais lento o atleta), sugerindo que reduzir o déficit energético durante a prova favorece o desempenho.\n\nEsses números servem como faixa de referência (não como alvo prescritivo individual — variam com massa corporal, eficiência mecânica e condições ambientais) para saber se o gasto energético estimado de uma sessão/etapa longa está dentro do esperado fisiologicamente.\n\nAplicação ao feedback: o produto pode converter o trabalho mecânico (trabalho-kJ) de uma sessão longa em uma estimativa aproximada de gasto calórico (usando a conversão kJ→kcal considerando eficiência mecânica, nota-0002) e comparar contra essas faixas de referência — por exemplo, sinalizar quando uma sessão/etapa de duração muito longa (vários dias consecutivos de alto volume, como uma viagem de cicloturismo ou uma prova de ultra-endurance) provavelmente exige um gasto calórico da ordem de milhares de kcal/dia, reforçando a importância de reposição energética adequada para não comprometer o desempenho nos dias seguintes."},{"id": "nota-0226", "titulo": "Ressíntese de glicogênio muscular ocorre a ~5-7%/hora mesmo com ingestão ótima de carboidrato; restauração completa após depleção leva no mínimo 20 horas", "dominio": "nutricao-e-energia", "camada": ["diario", "semanal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 97, "trecho": "Optimal carbohydrate intake replenishes glycogen stores at about 5 to 7% per hour. Even under the best of circumstances, it takes at least 20 hr to reestablish glycogen stores following glycogen-depleting exercise."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 97, "trecho": "the individual consumes about 50 to 75 g (2 to 3 oz) of high- to moderate-glycemic carbohydrates every 2 hr until achieving 500 to 700 g (7 to 10 g per kilogram of body mass) or until eating a large, high-carbohydrate meal."}], "relacionadas": [{"id": "nota-0201", "tipo": "complementa", "justificativa": "nota-0201 cobre a ingestão de carboidrato DURANTE o exercício; esta nota cobre a cinética de ressíntese de glicogênio APÓS o exercício, um dado numérico ainda não presente no cânone"}, {"id": "nota-0203", "tipo": "complementa", "justificativa": "reforça, com um número concreto de taxa horária, por que a reposição de glicogênio é um processo de muitas horas (consistente com o mito da janela anabólica de 30min já refutado na nota-0203)"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Mesmo em condições ótimas de ingestão de carboidrato pós-exercício, a ressíntese de glicogênio muscular ocorre a uma taxa de apenas **~5-7% por hora**. Isso significa que, após um exercício que depletou significativamente o glicogênio, são necessárias **no mínimo 20 horas** para restaurar completamente as reservas — mesmo com estratégia nutricional ideal.\n\nEstratégia prática citada: consumir 50-75 g de carboidrato de alto a moderado índice glicêmico a cada 2 horas até atingir 500-700 g totais (ou 7-10 g/kg de massa corporal), ou até fazer uma refeição grande rica em carboidrato. Alternativa se a ingestão imediata pós-exercício for impraticável: refeições de 2,5 g de carboidrato de alto índice glicêmico por kg de massa corporal em 2, 4, 6, 8 e 22h pós-exercício, produzindo ressíntese equivalente. Blends de carboidrato incluindo frutose e/ou galactose (além de glicose/maltodextrina) parecem melhorar especificamente a ressíntese de glicogênio hepático. A ressíntese ocorre mais rápido se o atleta permanecer inativo durante a recuperação.\n\nIsso tem uma implicação prática importante: dias consecutivos de treino intenso (\"hard days\") tendem a depletar progressivamente as reservas de glicogênio hepático e muscular ao longo de vários dias, podendo levar a um estado de \"training staleness\" (estagnação por depleção crônica), mesmo com boa nutrição — porque a janela de 20h+ para restauração completa frequentemente não cabe entre sessões de treino consecutivas de alto volume.\n\nAplicação ao feedback: nenhum sinal do Strava mede glicogênio diretamente, mas esta cinética de reposição (20h+ para restauração completa, 5-7%/hora) é um contexto relevante para interpretar por que sessões de alta carga (trabalho-kJ elevado) em dias consecutivos sem folga adequada tendem a produzir queda de desempenho — a causa pode ser depleção de glicogênio ainda não totalmente revertida, e não necessariamente fadiga neuromuscular ou cardiovascular."},{"id": "nota-0227", "titulo": "Protocolo de monitoramento de hidratação: cada 0,45kg (1 libra) de peso perdido = ~450mL de desidratação; repor líquido a pelo menos 80% da taxa de sudorese durante exercício prolongado", "dominio": "nutricao-e-energia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "protocolo", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 101, "trecho": "1. Monitor dehydration rate from changes in body weight; require urination before postexercise body weight measurement for precise determination of the body's total fluid loss. Each pound of weight loss corresponds to 450 mL (15 oz) of dehydration."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 101, "trecho": "2. Drink fluids at the same rate as their estimated depletion (or at least drink at a rate close to 80% of sweating rate) during prolonged exercise that increases cardiovascular stress, metabolic heat load, and dehydration. 3. Achieve carbohydrate (30 to 60 g·hr−1) and fluid requirements by drinking a 4 to 8% carbohydrate beverage each hour (625 to 1250 mL; average 250 mL every 15 min)."}], "relacionadas": [{"id": "nota-0201", "tipo": "complementa", "justificativa": "nota-0201 cobre a quantidade de carboidrato por hora; esta nota cobre o protocolo paralelo de reposição de fluido, incluindo a mesma faixa de 30-60g/h de carboidrato mas com foco na taxa de hidratação"}], "confianca": 0.7, "status": "auto-aprovado", "body": "Protocolo prático (McArdle, baseado em recomendações de fisiologia do exercício) para estimar e repor perda hídrica durante exercício prolongado:\n\n1. **Estimar a taxa de desidratação pela variação de peso corporal**: pesar antes e depois do exercício (urinando antes da pesagem pós-exercício, para não distorcer o cálculo). Cada 0,45 kg (1 libra) de peso perdido equivale a aproximadamente **450 mL (15 oz) de líquido perdido**. Essa é a forma mais simples de estimar a taxa de sudorese individual (kg perdidos ÷ horas de exercício = taxa de suor em kg/h ≈ L/h).\n2. **Repor líquido durante o exercício a uma taxa próxima de 80% da taxa de sudorese estimada** (repor 100% em tempo real é impraticável devido a limites de esvaziamento gástrico).\n3. **Combinar com carboidrato**: bebida de 4-8% de carboidrato, ~625-1250 mL/hora (média de 250 mL a cada 15 minutos), entregando também 30-60 g de carboidrato/hora.\n\nHipohidratação de até 4% da massa corporal não prejudica a taxa de esvaziamento gástrico, mas perdas maiores tendem a comprometer termorregulação e desempenho cardiovascular. O volume máximo de reposição prático fica perto de 1000 mL/hora — volumes maiores tendem a causar desconforto gastrointestinal.\n\nAplicação ao feedback: o Strava não registra peso corporal pré/pós-treino nem ingestão de líquido, então este protocolo não pode ser executado automaticamente a partir dos dados de atividade — permanece como conteúdo de referência/educativo que o produto pode sugerir ao atleta como prática a adotar manualmente (pesagem antes/depois de sessões longas e quentes), especialmente relevante quando o Strava mostra sessões de duração longa (tempo-movimento >2-3h) combinadas com temperatura elevada."},{"id": "nota-0236", "titulo": "Deficiência de ferro sem anemia (ferritina baixa, Hb normal) já prejudica desempenho de endurance; a maior parte da 'anemia esportiva' é diluicional (expansão de 20% do volume plasmático), não deficiência real", "dominio": "nutricao-e-energia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 65, "trecho": "Measuring serum ferritin concentration provides useful information about iron reserves. Values below 20 mg·L−1 for females and 30 mg·L−1 for males indicate depleted reserves."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 65, "trecho": "Several days of training increase plasma volume by 20%, while total red blood cell volume remains unchanged. Consequently, total hemoglobin, an important factor in endurance performance, remains the same or increases slightly with training, while hemoglobin concentration decreases in the expanding plasma volume. Despite this hemoglobin dilution, aerobic capacity and exercise performance improve with training."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 67, "trecho": "iron-depleted but nonanemic women received either a placebo or 20 mg of elemental iron as ferrous sulfate twice daily for 6 wk... The improvement in 15-km endurance cycling time in the supplemented group was twice that of women who consumed the placebo (3.4 vs. 1.6 min faster)."}], "relacionadas": [], "confianca": 0.65, "status": "revisar", "body": "Dois pontos importantes sobre status de ferro em atletas de endurance, frequentemente confundidos:\n\n**1. \"Anemia esportiva\" costuma ser diluicional, não uma deficiência real.** Dias de treino aumentam o volume plasmático em cerca de **20%**, enquanto o volume total de hemácias permanece praticamente inalterado. Como resultado, a hemoglobina total (o que importa fisiologicamente para capacidade de transporte de O2) permanece igual ou aumenta levemente, mas a *concentração* de hemoglobina cai (mais plasma diluindo a mesma quantidade de hemácias) — parecendo \"anemia\" num hemograma simples, sem representar uma real perda de capacidade de transporte de oxigênio. Apesar dessa diluição aparente, capacidade aeróbia e desempenho melhoram com o treino. Critérios rigorosos de diagnóstico tornam a anemia esportiva \"real\" bem menos prevalente do que se costuma acreditar.\n\n**2. Deficiência de ferro SEM anemia (ferritina baixa, hemoglobina normal) já prejudica o desempenho.** Ferritina sérica abaixo de **20 µg/L em mulheres** e **30 µg/L em homens** indica reservas de ferro depletadas. Mesmo sem hemoglobina baixa, essa \"anemia funcional\" reduz proteínas oxidativas dependentes de ferro na célula muscular. Em um estudo controlado, mulheres fisicamente ativas com ferritina baixa (mas não anêmicas) que receberam suplementação de ferro (20mg de sulfato ferroso, 2x/dia por 6 semanas) melhoraram o tempo de um contrarrelógio de ciclismo de 15km **duas vezes mais** que o grupo placebo (3,4 min mais rápido vs. 1,6 min no placebo) — sem mudança significativa na hemoglobina, sugerindo que o ganho veio da capacidade oxidativa muscular, não do transporte sanguíneo de O2.\n\nGrupos de maior risco para deficiência de ferro: mulheres em idade fértil (perda menstrual de 15-30mg de ferro por ciclo), vegetarianas (absorção de ferro não-heme é 2-5% vs. 10-35% do ferro heme), e atletas com baixa ingestão calórica geral.\n\nConfiança rebaixada (0,65) e status `revisar`: o achado central sobre suplementação e desempenho em ciclismo (item 2) vem de um único estudo controlado com amostra pequena, e a unidade de ferritina no texto-fonte (\"mg·L⁻¹\") provavelmente é um erro de digitação/OCR para µg/L (unidade clínica padrão para ferritina) — mantida a citação literal, mas sinalizada aqui para conferência.\n\nAplicação ao feedback: fora do escopo de sinais do Strava (ferritina e hemoglobina exigem exame de sangue) — nota de referência útil para conteúdo educativo, especialmente relevante para atletas mulheres endurance ou vegetarianas com queda de desempenho inexplicada, para sugerir avaliação de ferritina antes de assumir causas puramente relacionadas a treino/recuperação."},{"id": "nota-0237", "titulo": "Ingestão recomendada de cálcio (1000-1300 mg/dia) e fatores de risco de osteoporose — relevância para ciclistas por ser esporte de baixo impacto (não osteogênico)", "dominio": "nutricao-e-energia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 58, "trecho": "Adolescent girls should consume 1500 mg of calcium daily. Increasing daily calcium intake for middle-aged women, particularly estrogen-deprived women following menopause, from 1200 to 1500 mg improves the body's calcium balance."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 58, "trecho": "One of two women and one of eight men over age 50 can expect an osteoporosis-related fracture in their lifetime... Between 60 and 80% of an individual's susceptibility to osteoporosis links to genetic factors, while 20 to 40% remains lifestyle related."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 59, "trecho": "National Academy of Sciences Recommended Daily Calcium Intake — Adults 19-50 y: 1000 mg; Adult women 51-70 y: 1200 mg; Adults 71 y and older: 1200 mg."}], "relacionadas": [], "confianca": 0.7, "status": "auto-aprovado", "body": "Referência de ingestão diária de cálcio recomendada (National Academy of Sciences): adultos 19-50 anos, **1000 mg/dia**; mulheres 51-70 anos e adultos 71+, **1200 mg/dia**; adolescentes 14-18 anos, **1300 mg/dia**. Fontes: 240mL de leite ou 170g de iogurte ≈ 300mg; 1 xícara de espinafre ≈ 270mg.\n\n**Susceptibilidade à osteoporose**: 60-80% ligada a fatores genéticos, 20-40% relacionada a estilo de vida (dieta, atividade física, tabagismo). Estatística de referência: **1 em cada 2 mulheres e 1 em cada 8 homens acima de 50 anos** terá uma fratura relacionada à osteoporose ao longo da vida. Vitamina D adequada (600 UI/dia para a maioria dos adultos, 800 UI/dia após os 70 anos) é necessária para a absorção de cálcio.\n\n**Relevância específica para ciclistas**: o ciclismo é um esporte de baixo impacto (sem carga axial repetitiva de sustentação de peso, ao contrário de corrida), o que significa que NÃO fornece o estímulo mecânico osteogênico que outros esportes de endurance oferecem. Isso torna ciclistas — especialmente os que praticam o esporte como atividade principal/exclusiva por muitos anos — um grupo de maior atenção para densidade óssea, principalmente se combinado a outros fatores de risco já conhecidos (baixa ingestão de cálcio, baixa disponibilidade energética/RED-S, treino intenso predominantemente em jejum de peso). Isso é coerente com por que \"esportes de baixo impacto\" tendem a aparecer em listas de risco de osteoporose apesar do alto condicionamento cardiovascular do atleta.\n\nAplicação ao feedback: fora do escopo de sinais do Strava (densidade óssea e ingestão de cálcio não são rastreadas) — nota de referência/contexto útil para conteúdo educativo voltado a ciclistas de longa data, especialmente mulheres na pós-menopausa ou atletas com sinais de baixa disponibilidade energética, para reforçar a importância de cálcio/vitamina D e, quando possível, algum trabalho de força/impacto complementar ao ciclismo."},{"id": "nota-0238", "titulo": "Suplementação de vitaminas antioxidantes (C e E) em atletas já bem nutridos não melhora adaptação ao treino nem desempenho — o próprio treino já regula positivamente as defesas antioxidantes naturais", "dominio": "nutricao-e-energia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 50, "trecho": "antioxidant supplementation with vitamins C and E to individuals with no previous deficiencies in these vitamins had no effect on physical adaptations to strenuous endurance training."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 51, "trecho": "More than 55 years of research on healthy persons with nutritionally adequate diets does not provide evidence that consuming vitamin (and mineral) supplements improves exercise performance, the hormonal and metabolic responses to exercise, or ability to train arduously and recover from such training."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 50, "trecho": "the natural antioxidant defenses in well-nourished humans respond adequately to increased physical activity... Improvement occurs as the natural enzymatic defenses (superoxide dismutase and glutathione peroxidase) 'up-regulate' through exercise training adaptations."}], "relacionadas": [{"id": "nota-0204", "tipo": "complementa", "justificativa": "nota-0204 lista os suplementos COM evidência robusta para ciclismo (cafeína, creatina, bicarbonato, nitrato, beta-alanina); esta nota complementa explicando por que antioxidantes em altas doses NÃO entram nessa lista, apesar de serem populares"}], "confianca": 0.7, "status": "auto-aprovado", "body": "O exercício aeróbio aumenta a produção de radicais livres (espécies reativas de oxigênio), mas em pessoas bem nutridas e saudáveis, o **próprio treinamento regula positivamente (\"up-regula\") as defesas antioxidantes naturais do corpo** (enzimas superóxido dismutase e glutationa peroxidase) — ou seja, o sistema de defesa se adapta ao estresse oxidativo crônico do treino, autonomamente, sem necessidade de suplementação externa.\n\nConsistente com isso, estudos controlados mostram que **suplementar vitaminas C e E em indivíduos sem deficiência prévia dessas vitaminas não produz efeito nas adaptações fisiológicas ao treino de endurance intenso** — nem no desempenho, nem nas respostas hormonais/metabólicas ao exercício, nem na capacidade de treinar pesado e se recuperar. O livro-texto resume: mais de 55 anos de pesquisa em pessoas saudáveis com dieta nutricionalmente adequada não fornecem evidência de que suplementos vitamínicos/minerais melhorem desempenho.\n\nContraponto citado (mas de menor peso): alguns estudos isolados mostraram que vitamina E reduziu marcadores de estresse oxidativo em ciclistas de prova após 5 meses de suplementação, e mitigou dano muscular em situações específicas — mas mesmo esses achados não se traduziram consistentemente em melhora de desempenho, e doses altas de vitamina E (1200 UI/dia) trazem risco real (interferência na coagulação/vitamina K, aumento de risco de câncer de próstata em homens saudáveis).\n\nGrupos com risco real de deficiência de micronutrientes (onde suplementação pode fazer sentido): vegetarianos/veganos ou atletas com baixa ingestão energética (dançarinos, ginastas, atletas de categoria de peso), atletas que eliminam grupos alimentares inteiros, e atletas que consomem excesso de alimentos processados com baixa densidade de micronutrientes (inclui alguns endurance athletes que sobrecarregam em açúcares simples).\n\nAplicação ao feedback: fora do escopo de sinais do Strava (suplementação não é rastreada) — nota de referência complementar à nota-0204: reforça que, ao contrário de cafeína/creatina/bicarbonato/nitrato/beta-alanina (que têm evidência de benefício), suplementos antioxidantes em megadose NÃO têm evidência de benefício para atletas bem nutridos e podem até ser contraproducentes em teoria (ao \"amortecer\" o sinal de estresse oxidativo que impulsiona a adaptação ao treino)."},{"id": "nota-0255", "titulo": "Tabela de taxa de sudorese prevista (L/h) por peso corporal, velocidade e clima (fresco vs. quente)", "dominio": "nutricao-e-energia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 628, "trecho": "table 25.4 provides the predicted sweating rates for individuals of different body weights running at various speeds in cold/temperate and warm weather conditions."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 629, "trecho": "Predicted Sweating Rates (L·hr-1) for Running at 8.5 to 15.0 km·hr-1 in Cool/Temperate (TDB = 18°C) and Warm (TDB = 28°C) Weather — Body Weight 70 kg, Cool/temperate 10 km/hr: 0.79 L/hr; Warm 10 km/hr: 0.89 L/hr; Cool/temperate 15 km/hr: 1.25 L/hr; Warm 15 km/hr: 1.36 L/hr."}], "relacionadas": [{"id": "nota-0227", "tipo": "complementa", "justificativa": "nota-0227 descreve o protocolo de estimar a taxa de sudorese por pesagem pré/pós-exercício; esta nota fornece uma tabela de referência preditiva por peso/velocidade/clima como estimativa a priori, sem precisar pesar o atleta"}], "confianca": 0.55, "status": "auto-aprovado", "body": "Tabela de referência (McArdle, Tabela 25.4, dados de Montain et al. 2006) com taxas de sudorese previstas para corrida, por peso corporal, velocidade e clima (18°C = fresco/temperado vs. 28°C = quente), a temperatura de bulbo seco:\n\n| Peso corporal | Clima | 8,5 km/h | 10 km/h | 12,5 km/h | 15 km/h |\n|---|---|---|---|---|---|\n| 50 kg | Fresco/temperado | 0,43 L/h | 0,53 L/h | 0,69 L/h | 0,86 L/h |\n| 50 kg | Quente | 0,52 L/h | 0,62 L/h | 0,79 L/h | 0,96 L/h |\n| 70 kg | Fresco/temperado | 0,65 L/h | 0,79 L/h | 1,02 L/h | 1,25 L/h |\n| 70 kg | Quente | 0,75 L/h | 0,89 L/h | 1,12 L/h | 1,36 L/h |\n| 90 kg | Fresco/temperado | 0,86 L/h | 1,04 L/h | 1,34 L/h | 1,64 L/h |\n| 90 kg | Quente | 0,97 L/h | 1,15 L/h | 1,46 L/h | 1,76 L/h |\n\nPadrão: a taxa de sudorese aumenta com peso corporal, velocidade/intensidade, e temperatura ambiente — de forma aproximadamente linear dentro dessas faixas. Dados originalmente para corrida; a relação qualitativa (peso × intensidade × temperatura → taxa de sudorese) é transferível ao ciclismo, mas os valores absolutos não foram validados para pedalada (diferença de mecânica, ventilação por deslocamento a maior velocidade, e postura).\n\nAplicação ao feedback: como o Strava não mede sudorese diretamente, esta tabela pode servir de estimativa a priori de necessidade de hidratação (L/h) a partir do peso do atleta (perfil), da intensidade da atividade planejada e da `temperatura` prevista/registrada — útil para recomendar volume de garrafa antes de uma saída longa em calor, complementando o método de pesagem pré/pós-treino da nota-0227 (que mede a taxa real, mas só depois do fato)."},{"id": "nota-0259", "titulo": "Protocolo ACSM de quantidades de fluido pré, durante e pós atividade", "dominio": "nutricao-e-energia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "protocolo", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 631, "trecho": "PRE-ACTIVITY 1. Drink approximately 17 to 20 oz 2 to 3 hr before activity. 2. Consume another 7 to 10 oz after warm-up (10 to 15 min before exercise). DURING ACTIVITY 1. Drink approximately 28 to 40 oz every hour of exercise (7 to 10 oz every 10 to 15 min). 2. Rapidly replace lost fluids (sweat and urine) within 2 hr after activity to enhance recovery by drinking 20 to 24 oz for every pound of body weight lost through sweating."}], "relacionadas": [{"id": "nota-0227", "tipo": "complementa", "justificativa": "nota-0227 estabelece a regra geral de repor a 80% da taxa de sudorese; esta nota detalha o protocolo ACSM com volumes e frequência específicos para antes/durante/depois"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Protocolo prático de hidratação (McArdle, baseado em recomendações ACSM), com volumes específicos:\n\n**Antes da atividade:**\n1. Beber ~17 a 20 oz (≈500-590 mL) 2 a 3 horas antes.\n2. Beber mais 7 a 10 oz (≈210-300 mL) após o aquecimento, 10 a 15 min antes do exercício.\n\n**Durante a atividade:**\n1. Beber ~28 a 40 oz por hora de exercício (≈830-1180 mL/h), fracionado em 7 a 10 oz (≈210-300 mL) a cada 10-15 minutos.\n\n**Após a atividade:**\n1. Repor rapidamente o fluido perdido (suor + urina) dentro de 2 horas, bebendo **20 a 24 oz (≈590-710 mL) para cada libra (0,45 kg) de peso corporal perdido por suor** — note que este volume de reposição pós-treino é maior que a simples equivalência 1:1 (450 mL por libra), refletindo que parte do líquido ingerido é excretado antes de restaurar plenamente o volume plasmático.\n\nMeta geral (ACSM): evitar perda de peso por desidratação maior que 2% da massa corporal, e evitar mudanças excessivas no equilíbrio de eletrólitos.\n\nAplicação ao feedback: o Strava não captura ingestão de líquido nem peso corporal, então este protocolo não é executável automaticamente a partir dos dados de atividade — permanece como conteúdo educativo/de referência que o produto pode sugerir ao atleta antes e depois de sessões longas e quentes (`tempo-movimento` alto combinado com `temperatura` elevada), complementando a regra mais simples de reposição a 80% da taxa de sudorese (nota-0227) com quantidades concretas e cronograma de ingestão."},{"id": "nota-0260", "titulo": "Reposição de sódio em treinos longos no calor: 0,5 a 0,7g por litro e perda diária de 13 a 17g de sal", "dominio": "nutricao-e-energia", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "protocolo", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 631, "trecho": "The ACSM recommends that sports drinks contain 0.5 to 0.7 g of sodium per liter of fluid consumed during activity lasting more than 1 hr."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 631, "trecho": "With prolonged effort in the heat, sweat loss can deplete the body of 13 to 17 g of salt (2.3–3.4 g·L−1 of sweat) daily, about 8 g more than typically consumed. It seems prudent in this deficit situation to replace the lost sodium by adding about one-third teaspoon of table salt to 1 L of water."}], "relacionadas": [{"id": "nota-0227", "tipo": "complementa", "justificativa": "nota-0227 cobre volume de fluido e carboidrato; esta nota cobre especificamente a reposição de sódio, terceiro componente da bebida de reposição em exercício prolongado no calor"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Recomendações de reposição de sódio para exercício prolongado (>1h), especialmente em calor (McArdle/ACSM):\n\n- **Bebidas esportivas devem conter 0,5 a 0,7 g de sódio por litro** de fluido consumido, para atividade com duração maior que 1 hora.\n- Em esforço prolongado no calor, a perda de sal pelo suor pode chegar a **13 a 17 g de sal por dia** (2,3-3,4 g de sal por litro de suor) — cerca de 8 g a mais do que a ingestão alimentar típica.\n- Nessa situação de déficit, uma correção prática sugerida é adicionar **cerca de 1/3 de colher de chá de sal de cozinha por litro de água**.\n- Perda de potássio pelo suor é geralmente pequena (5-18 mEq mesmo em atividade competitiva intensa) e representa pouco ou nenhum risco imediato — compensada facilmente com frutas cítricas/bananas.\n\nContexto adicional: bebidas esportivas típicas contêm 10-25 mmol de sódio por litro; a concentração de sódio plasmático normal fica entre 138-142 mmol/L. Adicionar sódio à bebida de reposição (20-60 mmol/L) acelera a restauração do volume plasmático em comparação com água pura, porque sustenta o estímulo de sede e reduz a perda por urina.\n\nAplicação ao feedback: como o Strava não mede ingestão nutricional nem composição do suor, este protocolo não é executável automaticamente — serve como conteúdo educativo a ser sugerido quando o sistema detecta sessões longas (`tempo-movimento` >1h) em `temperatura` elevada, complementando a recomendação de volume de fluido (nota-0227, nota-0259) com a dimensão de eletrólitos, especialmente relevante para atletas com histórico de cãibras por calor (ver nota-0261)."},{"id": "nota-0285", "titulo": "Déficit calórico moderado (300-500kcal) preserva mais massa magra que déficit agressivo", "dominio": "nutricao-e-energia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 809, "trecho": "A prudent dietary approach to weight loss unbalances the energy balance equation by reducing energy intake by 300 to 1000 kcal below daily energy expenditure. Moderately reduced energy intake (300 to 500 kcal daily) produces greater fat loss relative to the energy deficit than more severe energy restriction."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 809, "trecho": "Individuals who create larger daily deficits to lose weight more rapidly tend to regain weight compared to those who lose weight at a slower rate."}], "relacionadas": [{"id": "nota-0225", "tipo": "complementa", "justificativa": "nota-0225 trata de déficit energético agudo em ultraendurance (contexto de prova); esta nota trata de déficit planejado para perda de peso ao longo de semanas/meses"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Para perda de peso planejada (não o déficit agudo de uma prova longa, ver nota-0225), a faixa recomendada de déficit calórico diário é **300 a 1000 kcal abaixo do gasto energético diário**, mas dentro dessa faixa **um déficit moderado (300 a 500 kcal/dia) produz maior perda de gordura por unidade de déficit calórico do que uma restrição mais severa**. Além disso, atletas/indivíduos que criam déficits maiores para perder peso mais rapidamente **tendem a recuperar mais peso depois** do que os que perdem peso a um ritmo mais lento.\n\nImplicação prática: a lógica \"quanto maior o déficit, mais rápido e melhor o resultado\" não se sustenta nem para a composição da perda (mais gordura vs. músculo por kcal de déficit) nem para a sustentabilidade do resultado (recuperação de peso). Um déficit moderado e sustentado ao longo do tempo é mais eficiente e mais duradouro que cortes agressivos e curtos.\n\nAplicação ao feedback: ao orientar um ciclista com objetivo declarado de perda de peso, a recomendação de déficit calórico diário deveria mirar a faixa de 300–500 kcal/dia como padrão, reservando déficits maiores (até ~1000 kcal/dia) apenas para períodos curtos e bem monitorados — evitando recomendar cortes agressivos e prolongados, que tendem a comprometer a qualidade da perda de peso e sua manutenção."},{"id": "nota-0286", "titulo": "A regra dos 3500kcal por libra superestima a perda de peso real", "dominio": "nutricao-e-energia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 810, "trecho": "The 3500-kcal rule posits that 3500 kcal are 'used up' for each one pound of weight loss, a model advocated in this text, on respected government-and health-related web sites, and scientific research publications. Nonetheless, new research suggests that this rule grossly overestimates actual weight loss."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 810, "trecho": "The researchers have made downloadable applications... which simulate a rigorously validated, dynamic model of expected weight change... offer a convenient and potentially more accurate alternative to the 3500-kcal rule than incorporated in most smartphone apps and commercial weight-loss reducing regimens."}], "relacionadas": [{"id": "nota-0285", "tipo": "complementa", "justificativa": "ambas tratam da relação entre déficit calórico e perda de peso real; esta nota qualifica a regra estática usada para estimar quanto peso um dado déficit produzirá"}], "confianca": 0.7, "status": "auto-aprovado", "body": "A regra popular \"3500 kcal de déficit = 1 libra (0,45 kg) de gordura perdida\" — amplamente usada em sites de saúde, apps de smartphone e até em textos didáticos (incluindo edições anteriores do próprio McArdle) — **superestima sistematicamente a perda de peso real**, segundo pesquisa mais recente citada na 8ª edição do livro (Thomas et al., 2013).\n\nO motivo: a relação entre déficit calórico acumulado e perda de peso **não é linear nem estática** — à medida que o peso corporal cai, o gasto energético diário também cai (menor massa para movimentar, menor gasto metabólico basal), então o mesmo déficit nominal de calorias produz cada vez menos perda de peso ao longo do tempo. Um déficit fixo de X kcal/dia não continua produzindo a mesma taxa de perda de peso indefinidamente — a perda desacelera. Modelos dinâmicos e validados (ex.: a ferramenta do NIH Body Weight Planner, mencionada na fonte) capturam esse efeito de forma mais precisa que a divisão simples \"déficit acumulado ÷ 3500\".\n\nAplicação ao feedback: se o produto projeta prazo/quantidade de perda de peso a partir de um déficit calórico diário planejado, usar a regra estática dos 3500 kcal/libra tende a **prometer perda de peso mais rápida do que a que realmente ocorrerá**, especialmente em horizontes de várias semanas/meses — o que pode gerar frustração e abandono da estratégia pelo atleta. Prefira comunicar estimativas conservadoras ou reconhecer que a taxa de perda desacelera com o tempo, em vez de extrapolar linearmente um déficit fixo."},{"id": "nota-0288", "titulo": "Perda de peso via exercício preserva músculo e VO2máx; restrição calórica isolada reduz ambos", "dominio": "nutricao-e-energia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 823, "trecho": "Adding physical activity to a weight-loss program favorably modifies the composition of the weight lost in the direction of greater fat loss, less lean tissue loss, and the maintenance or even enhancement of physical capacity."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 823, "trecho": "Decreases in thigh muscle volume of 6.8% and composite knee flexion strength (27%), and VO2max (27%) occurred only in the caloric restriction group, whereas VO2max increased 15.5% in the group losing weight via exercise. Clearly, muscle mass, muscle strength, and aerobic capacity decreased in response to 12 mo of weight loss by caloric restriction, but not in response to similar exercise-induced weight loss."}], "relacionadas": [{"id": "nota-0285", "tipo": "complementa", "justificativa": "nota-0285 trata da magnitude do déficit calórico; esta nota trata de como o déficit é criado (restrição alimentar vs. aumento de exercício) e seu efeito na composição da perda"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Um estudo comparou dois grupos de adultos de 50-60 anos que perderam a **mesma quantidade de peso (~4,5 kg) ao longo de 12 meses**, um só por restrição calórica (dieta) e outro só por aumento de exercício, medindo volume de músculo da coxa por ressonância magnética, força de flexão de joelho e VO2máx:\n\n- **Grupo restrição calórica isolada:** perda de 6,8% no volume de músculo da coxa, queda de 27% na força de flexão de joelho, e queda de 27% no VO2máx.\n- **Grupo perda de peso via exercício:** nenhuma queda de volume muscular ou força — e o VO2máx **aumentou 15,5%**.\n\nOu seja, para a **mesma perda de peso corporal**, o método usado para criar o déficit energético determina se a perda \"custa\" músculo, força e capacidade aeróbia, ou se preserva (e até melhora) essas capacidades. Isso é consistente com o princípio mais amplo de que adicionar atividade física a um programa de perda de peso favorece maior perda de gordura e menor perda de massa magra, além de manter ou até aumentar a capacidade física.\n\nAplicação ao feedback: para um ciclista com objetivo de perda de peso, a recomendação deveria priorizar criar o déficit calórico através de **aumento do gasto energético (mais volume/intensidade de treino)** em vez de apenas cortar a ingestão calórica de forma agressiva — não só porque preserva massa magra (relevante para potência absoluta), mas porque, ao contrário da restrição isolada, essa abordagem tende a manter ou melhorar o VO2máx durante o próprio processo de perda de peso, evitando o cenário indesejável de \"perder peso mas perder também capacidade de gerar potência\"."},{"id": "nota-0291", "titulo": "Amenorreia atlética: prevalência e hipóteses — não existe percentual de gordura crítico único", "dominio": "nutricao-e-energia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 741, "trecho": "Amenorrhea occurs in 2 to 5% of women of reproductive age in the general population, but it can reach 40% in some athletic groups. As a group, ballet dancers remain lean, with a greater incidence of menstrual dysfunction and eating disorders... One third to one half of female endurance athletes exhibit some menstrual irregularity."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 742, "trecho": "Some researchers assert that 17% body fat represents a lower-end critical level for the onset of menstruation, with 22% fat needed to sustain a normal menstrual cycle... Objective data indicate that many physically active females who are below the supposedly critical 17% body fat level have normal menstrual cycles with high levels of physiologic and exercise capacity. Conversely, some amenorrheic athletes maintain body fat levels considered average for the population."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 742, "trecho": "A prolonged level of physical stress may disrupt the hypothalamic-pituitary-adrenal axis... (exercise stress hypothesis). A concurrent hypothesis maintains that energy (fat) reserves inadequate to sustain pregnancy induce cessation of ovulation (energy availability hypothesis)."}], "relacionadas": [{"id": "nota-0225", "tipo": "complementa", "justificativa": "nota-0225 trata de déficit energético agudo em ultraendurance; esta nota trata da consequência hormonal crônica de déficit energético sustentado em atletas mulheres"}, {"id": "nota-0237", "tipo": "complementa", "justificativa": "nota-0237 trata de osteoporose e cálcio em ciclistas; amenorreia prolongada agrava perda óssea, tema relacionado"}], "confianca": 0.7, "status": "auto-aprovado", "body": "A **amenorreia** (ausência de menstruação) ocorre em apenas 2-5% das mulheres em idade reprodutiva na população geral, mas pode atingir **até 40% em determinados grupos de atletas** — sendo particularmente comum em modalidades de \"baixo peso/estética\" (corrida de longa distância, ginástica, balé, patinação artística, fisiculturismo). Entre atletas de endurance do sexo feminino em geral, **um terço a metade apresenta algum grau de irregularidade menstrual**.\n\nUm ponto importante para não usar de forma simplista: a teoria antiga de que existiria um **percentual de gordura corporal \"crítico\" fixo (17% para início da menstruação, 22% para ciclo regular)** não se sustenta nos dados. Um estudo comparando 30 atletas e 30 não-atletas, todas com menos de 20% de gordura corporal, mostrou que mulheres fisicamente ativas abaixo do suposto limiar crítico de 17% frequentemente têm ciclos menstruais normais, enquanto algumas atletas amenorreicas mantêm %gordura considerado médio para a população. Ou seja, **não existe um corte único de %gordura que determine função menstrual** — a causa é multifatorial (física, nutricional, genética, hormonal, distribuição regional de gordura, psicológica, ambiental).\n\nDuas hipóteses concorrentes (não mutuamente excludentes) explicam a disfunção menstrual induzida por exercício:\n1. **Hipótese do estresse do exercício:** o próprio estresse físico prolongado/intenso, via eixo hipotálamo-hipófise-adrenal, desregula a secreção pulsátil de hormônio luteinizante.\n2. **Hipótese da disponibilidade energética:** reservas energéticas insuficientes para sustentar uma gravidez induzem cessação da ovulação — evidência a favor: dançarinas de balé amenorreicas que param de treinar por lesão frequentemente retomam a menstruação mesmo mantendo peso corporal baixo, sugerindo que é a **disponibilidade energética** (ingestão menos gasto de exercício), não o peso/gordura em si, o fator determinante.\n\nAplicação ao feedback: para atletas mulheres com sinais de irregularidade menstrual, a orientação baseada em \"%gordura muito baixo\" isoladamente é insuficiente e pode ser incorreta — o fator mais provável e acionável é a **disponibilidade energética insuficiente** (ingestão inadequada frente ao gasto total incluindo treino), reforçando a importância de monitorar consumo calórico junto ao volume de treino em vez de mirar um %gordura-alvo fixo. Amenorreia prolongada deve ser avaliada por profissional de saúde, pois afeta negativamente a massa óssea (ver nota-0237)."},{"id": "nota-0090", "titulo": "Taxa segura de aumento de CTL (ramp rate): 3-7 TSS/dia por semana; acima de 7 por mais de 4 semanas arrisca overreaching", "dominio": "recuperacao-e-fadiga", "camada": ["semanal", "mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["TSS"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 229, "trecho": "We have found that most cyclists can increase their CTL at a rate of 3–7 TSS per day per week. When you increase your CTL at a rate greater than 7 TSS per day per week for more than 4 weeks in a row, then the level of intense weekly training could be too much and send you into an overreaching downward spiral."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 229, "trecho": "It's fine to increase TSS at a rate of more than 7 per day for 1 week, and possibly even for 2 weeks, but longer periods can lead you into a chronically overreached state."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 230, "trecho": "TABLE 9.2 CTL Ramp Rate as a Function of Training Load — inclui, por exemplo: Long-term (14-28 dias), 5+ anos de treino, CTL<100: 7-10 TSS/dia; CTL>100: 5-7 TSS/dia. Short-term (<14 dias), 5+ anos, CTL<100: 14-20 TSS/dia; CTL>100: 10-14 TSS/dia."}], "relacionadas": [{"id": "nota-0083", "tipo": "pre-requisito", "justificativa": "usa o CTL definido na nota-0083"}, {"id": "nota-0092", "tipo": "causal", "justificativa": "ultrapassar a taxa segura de ramp rate por tempo prolongado é uma das causas do overreaching não funcional descrito na nota-0092"}], "confianca": 0.8, "status": "auto-aprovado", "body": "**Taxa segura de referência: aumentar o CTL a 3–7 TSS/dia por semana** é sustentável para a maioria dos ciclistas. Ultrapassar 7 TSS/dia por semana por mais de 4 semanas seguidas arrisca entrar numa espiral de overreaching. Picos de ramp rate acima de 7 são toleráveis por 1 semana (possivelmente 2), mas períodos mais longos tendem a levar a um estado de overreaching crônico.\n\nA taxa segura também depende da \"idade de treino\" (anos de treino sério) do atleta e do CTL atual — quanto mais experiente o atleta e quanto mais distante do teto (CTL <100 vs. >100), maior a taxa de aumento tolerável. Tabela 9.2 do livro (seleção representativa, blocos de 14-28 dias vs. <14 dias):\n\n| Idade de treino | Duração do bloco | CTL <100 | CTL >100 |\n|---|---|---|---|\n| 5+ anos | Longo prazo (14-28 dias) | 7–10 TSS/dia | 5–7 TSS/dia |\n| 3-5 anos | Longo prazo | 5–8 TSS/dia | 3–6 TSS/dia |\n| 1
