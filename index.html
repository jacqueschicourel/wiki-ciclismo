 the wattage that is actually getting to the road, after it has traveled from the crank through the drivetrain. This causes the power to be about 5–10 watts lower than if it were measured by a power meter at the crank or pedals."}], "relacionadas": [], "confianca": 0.85, "status": "auto-aprovado", "body": "Medidores de potência baseados no cubo traseiro medem a potência que efetivamente chega à roda, depois de passar pela corrente/transmissão — por isso registram tipicamente 5–10 W a menos do que um medidor equivalente instalado na manivela, coroa ou pedal, onde a perda mecânica de transmissão ainda não ocorreu.\n\nAplicação ao feedback: ao comparar dados de potência entre sessões/períodos, verificar se houve troca do tipo/posição do medidor de potência (cubo vs. manivela/pedal) — essa diferença sistemática de 5–10 W pode ser confundida com mudança real de fitness (ex.: FTP aparentemente mais baixo) se não for levada em conta."},{"id": "nota-0011", "titulo": "Assimetria de força entre pernas (~5%) pode enviesar medidores unilaterais em ~15 W a 300 W de FTP", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 38, "trecho": "typical leg-strength discrepancies amount to roughly 5 percent for most adults. While it doesn't seem like much, when your functional threshold power is 300 watts, a 15-watt discrepancy could be very misleading."}], "relacionadas": [], "confianca": 0.8, "status": "auto-aprovado", "body": "A maioria dos adultos apresenta uma discrepância de força entre as pernas de aproximadamente 5%. Isso é pouco relevante em medidores bilaterais (que somam as duas pernas), mas é crítico em medidores unilaterais (que medem só um lado, ex.: manivela esquerda ou eixo do movimento central) e assumem simetria para dobrar o valor: um viés de 5% equivale a cerca de 15 W de erro quando o FTP é 300 W (proporcionalmente, ~5% do FTP em qualquer faixa).\n\nAplicação ao feedback: ao interpretar potência/FTP de um atleta cujo equipamento é um medidor unilateral, considerar que os valores podem estar sistematicamente desviados (para cima ou para baixo) em torno de 5%, dependendo de qual perna é mais forte — isso é relevante ao comparar com testes feitos em equipamento bilateral ou ao avaliar mudanças de FTP ao longo do tempo se houver troca de equipamento."},{"id": "nota-0012", "titulo": "Taxa de gravação (recording rate) deve ser a máxima possível (idealmente 1 s); \"smart recording\" prejudica dados de potência", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal", "tempo-movimento"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 46, "trecho": "Always record your power-meter data using the highest recording rate. This typically means that data is recorded every second."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 47, "trecho": "Garmin head units default to a rate described as \"smart recording\"... this is not ideal for capturing power-meter data, and if you don't change the setting you will miss out on a tremendous amount of power data."}], "relacionadas": [], "confianca": 0.85, "status": "auto-aprovado", "body": "A taxa de gravação (com que frequência o head unit grava um ponto de dado) deve ser configurada no máximo possível — tipicamente 1 registro por segundo. O modo padrão \"smart recording\" de alguns head units (ex.: Garmin), otimizado para GPS (grava menos pontos em linha reta, mais em curvas), é inadequado para potência porque descarta grande volume de variação real do sinal de potência entre um ponto e outro.\n\nAplicação ao feedback: se uma sessão foi gravada com \"smart recording\" ou taxa reduzida, métricas derivadas que dependem de granularidade fina do sinal (ex.: potência normalizada/NP, pico de 5s, detecção de picos espúrios) podem estar distorcidas ou suavizadas artificialmente — vale sinalizar essa limitação de qualidade de dado antes de interpretar variabilidade ou picos de potência da atividade."},{"id": "nota-0014", "titulo": "Zeragem/calibração do medidor antes de cada saída e após impactos evita erro sistemático de offset em toda a atividade", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 47, "trecho": "Power meters need to be \"zeroed\" just like the weight scale in your bathroom. If your scale reads \"+5 lb.\" before you step on it, well, your weight will be heavier by 5 pounds. The same goes for power meters."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 48, "trecho": "We suggest that you zero your power meter before every ride or after any kind of trauma... There is nothing worse than coming home from a ride where you put out more power than you ever have, to download the data and realize you forgot to zero your power meter and all your data is skewed by +23 watts."}], "relacionadas": [{"id": "nota-0015", "tipo": "complementa", "justificativa": "ambas tratam de erro/artefato de medição de potência; 0014 é erro sistemático (toda a atividade deslocada), 0015 é erro pontual (amostra única)"}], "confianca": 0.85, "status": "auto-aprovado", "body": "Medidores de potência precisam ser \"zerados\" (no jargão de alguns fabricantes como Garmin, chamado de \"calibração\") antes de cada saída e após qualquer impacto/trauma (ex.: retirar a roda para transportar a bike, queda, batida do pedal/manivela no chão). Se o medidor não for zerado, todo o arquivo da atividade fica deslocado por um valor constante (offset) — os autores citam um exemplo real de um deslocamento de +23 W em toda a sessão por esquecimento de zeragem.\n\nAplicação ao feedback: um recorde pessoal de potência (pico, média, NP) que se destoa muito do histórico do atleta — sem explicação de contexto (ex.: teste, prova) — deve levantar suspeita de erro de calibração/zeragem antes de ser interpretado como ganho real de fitness. Esse é um erro sistemático (afeta toda a atividade igualmente), diferente de picos isolados de amostra única (ver nota sobre não confiar em amostra única)."},{"id": "nota-0015", "titulo": "Picos espúrios de potência (amostra única) devem ser identificados e interpolados antes de usar o pico de 5 s", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 48, "trecho": "Power meters can be finicky and you will occasionally get an erroneous sample of data, which usually manifests itself as a massive power spike above and beyond any wattage you have ever been able to create."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 48, "trecho": "if your power data was recorded as 213, 234, 242, 1,876, 254, 260, 267, simply changing 1,876 to 248 (splitting the difference between 242 and 254)... We have long emphasized the value of analyzing your best 5 seconds of power with regard to your neuromuscular ability, and this situation illustrates why—it ensures that you have an accurate sense of your true maximum power."}], "relacionadas": [{"id": "nota-0014", "tipo": "complementa", "justificativa": "ambas tratam de erro/artefato de medição de potência; 0014 é erro sistemático (toda a atividade deslocada), 0015 é erro pontual (amostra única)"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Erros de leitura pontuais (amostra única) são comuns em medidores de potência — por exemplo, perda momentânea do sinal de cadência, ativação múltipla acidental do sensor de reed switch parado (track stand no farol) ou retomada de pedalada após descida em roda livre. Isso se manifesta como um pico isolado de potência muito acima de qualquer valor fisiologicamente plausível para o atleta (ex.: sequência 213, 234, 242, **1876**, 254, 260, 267 W). A correção recomendada é interpolar o valor espúrio pela média dos pontos vizinhos (no exemplo, ~248 W).\n\nAplicação ao feedback: antes de usar o pico de potência de 5 segundos (usado como indicador de capacidade neuromuscular/sprint) ou qualquer \"recorde\" de potência de curtíssima duração, verificar se não se trata de artefato de amostra única — um valor isolado muito acima do padrão do restante do arquivo é sinal de alerta, não necessariamente um esforço real. Diferente do erro de zeragem (nota-0014), que desloca a atividade inteira, este é um erro pontual, de 1 amostra."},{"id": "nota-0016", "titulo": "Cálculo de médias: potência deve incluir zeros (parado/roda livre); cadência deve excluir zeros", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-média", "cadência", "tempo-movimento"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 49, "trecho": "Any time you are not pedaling, your power meter will record zero watts—this is an important metric to understand... when analyzing cadence it's important to not average the time spent not pedaling."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 49, "trecho": "let's say you are riding a 5-minute interval at 90 rpm and 3 minutes into the effort you have to ride down a steep, but short and technical hill, so you coast for a little bit... if you include that zero cadence then your average rpm would be 81 rpm, which would be misleading."}], "relacionadas": [], "confianca": 0.85, "status": "auto-aprovado", "body": "Regra de cálculo de médias que evita distorções na interpretação: a **potência média** de uma atividade/intervalo deve incluir os períodos em zero watts (parado, roda livre) — isso é informação relevante sobre o padrão real de esforço, incluindo os momentos sem pedalada. Já a **cadência média** deve ser calculada excluindo os períodos sem pedalada (cadência zero), porque incluir esses zeros distorce artificialmente a média para baixo e não reflete a cadência real enquanto o atleta efetivamente pedalava (exemplo do livro: um intervalo de 5 min a 90 rpm com 30 s de roda livre no meio dá média de 81 rpm se os zeros forem incluídos, contra 90 rpm real se excluídos).\n\nAplicação ao feedback: ao interpretar potência média (para NP/IF/TSS) e cadência média de uma mesma sessão, tratar os dois sinais com convenções diferentes — potência conta tudo, cadência só conta enquanto o atleta pedala."},{"id": "nota-0013", "titulo": "Taxa de exibição (display) recomendada: média móvel de 3–5 s no treino, até 10 s em contrarrelógio", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-série-temporal"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 47, "trecho": "Most head units will let you configure this as 3-second, 5-second, 10-second, 20-second, etc. rolling averages of the data to be displayed... For 90 percent of your training we recommend using a 3- or 5-second rolling average. A 10-second rolling average might be more beneficial in a time trial."}], "relacionadas": [], "confianca": 0.85, "status": "auto-aprovado", "body": "Taxa de exibição (display rate) é diferente de taxa de gravação: é a média móvel usada apenas para suavizar o número mostrado na tela do head unit durante o pedal, não afeta o dado bruto gravado. Recomendação dos autores: usar média móvel de 3 ou 5 segundos para cerca de 90% do treino (permite pacing sem \"perseguir\" cada oscilação instantânea de potência); em contrarrelógio, uma média móvel de 10 segundos pode ser mais útil para manter um ritmo mais constante.\n\nEsta é uma recomendação de configuração de equipamento/prática, não altera os dados armazenados — a gravação em si deve continuar na taxa mais alta possível (ver nota sobre taxa de gravação).\n\nAplicação ao feedback: por não alterar o dado bruto gravado, a taxa de exibição não interfere na interpretação retrospectiva da atividade — é relevante apenas como orientação de boa prática a repassar ao atleta (ex.: ajustar para média móvel mais curta em treinos intervalados e mais longa em contrarrelógio/provas), não como fator de qualidade de dado a sinalizar em feedback."},{"id": "nota-0027", "titulo": "mFTP: FTP modelado por software (ex. WKO4) e risco de sub/superestimação por janela de 90 dias", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-máx", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 57, "trecho": "The TrainingPeaks WKO4 software application, developed in part by the authors, contains a Power Duration Model that uses your power data to estimate FTP. This estimate is called \"modeled FTP\" (mFTP)."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 57, "trecho": "By default, WKO4's mFTP is built upon the last 90 days of data, so if a rider has not done a hard effort in the past 90 days, the model will most likely underestimate mFTP. Furthermore, if a best effort falls off on day 91, mFTP might take a surprisingly large drop on a single day."}], "relacionadas": [{"id": "nota-0025", "tipo": "complementa", "justificativa": "é um dos métodos alternativos de estimativa de FTP listados na nota-0025"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Alguns softwares de análise de potência (ex.: TrainingPeaks WKO4) calculam um FTP modelado (\"modeled FTP\", mFTP) a partir do modelo Potência-Duração ajustado aos dados de potência do atleta, sem exigir teste formal. É uma estimativa dependente da qualidade, quantidade e atualidade dos dados que a alimentam — pode ser bastante precisa em alguns casos e bem imprecisa em outros, por isso os autores recomendam usá-la apenas como mais um ponto de triangulação, junto com os outros métodos (não como substituto do teste).\n\nArmadilha específica do mFTP no WKO4: por padrão, o modelo usa uma janela móvel dos últimos 90 dias de dados. Consequências práticas para a interpretação: (1) se o atleta não fez nenhum esforço realmente forte nos últimos 90 dias, o mFTP tende a ficar subestimado; (2) se um esforço de referência \"sair\" da janela de 90 dias (ficar velho demais), o mFTP pode cair de forma abrupta e enganosa em um único dia, sem que a fitness real do atleta tenha piorado.\n\nAplicação ao feedback: uma queda repentina de mFTP não deve ser automaticamente lida como perda de forma — verificar primeiro se não é efeito da janela de 90 dias \"perdendo\" um esforço de referência antigo."},{"id": "nota-0028", "titulo": "iLevels: níveis de potência individualizados (9 níveis, incluindo Sweet Spot 4a), baseados no modelo Potência-Duração", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "referencia", "sinais": ["potência-máx", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 65, "trecho": "some riders were capable of \"superhuman\" efforts, holding 150 percent of FTP for 5 minutes!... These riders required a new set of training levels beyond Level 4, to allow them to train in the correct area of their unique physiology."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 66, "trecho": "The addition of Level 4a (88–95 percent of FTP), otherwise known as the Sweet Spot, was important... Ultimately, there are nine iLevels (Table 3.5) and there are eight divisions or cut-off points, all of which are determined by the Power Duration model."}], "relacionadas": [{"id": "nota-0022", "tipo": "alternativa-a", "justificativa": "modelo concorrente/complementar aos 7 níveis clássicos de Coggan — mesma lógica, mas cortes individualizados por atleta em vez de percentuais fixos de FTP"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Os autores desenvolveram os iLevels (níveis individualizados) porque observaram atletas \"outliers\" que não se encaixavam bem nos 7 níveis clássicos de percentual fixo de FTP (nota-0022) — por exemplo, alguns atletas sustentam 150% do FTP por 5 minutos (o que a tabela clássica classificaria como Nível 6 alto), enquanto outros mal sustentam 105% do FTP por 5 minutos.\n\nOs iLevels usam 9 níveis com 8 pontos de corte, determinados não por percentuais fixos, mas por pontos de inflexão/transição na curva de Potência-Duração ajustada individualmente ao atleta (modelo detalhado no Capítulo 8), refletindo mudanças no parâmetro de performance dominante (ex.: Pmax vs. FRC). Exemplo para um atleta com FTP = 290 W (Tabela 3.5 do livro): Nível 1 Recovery <171 W (<56%), Nível 2 Endurance 171–232 W (56–76%), Nível 3 Tempo 232–269 W (76–88%), **Nível 4a Sweet Spot 269–290 W (88–95%)**, Nível 4 FTP 290–321 W (95–105%), Nível 5 FRC/FTP 321–471 W (duração 17:40–1:33), Nível 6 FRC 471–711 W (1:33–0:28), Nível 7a Pmax/FRC 711–961 W (0:28–0:09), Nível 7 Pmax >961 W (<0:09).\n\nNota importante: acima do FTP, os cortes dos iLevels não são um percentual fixo generalizável — dependem do ajuste do modelo Potência-Duração aos dados de cada atleta (\"secret sauce\" dos autores), por isso esta nota é `aplicacao: contexto` (não é uma fórmula replicável diretamente a partir do texto). Abaixo/próximo do FTP (Níveis 1–4a), os iLevels são expressos como percentual do FTP modelado e são comparáveis aos níveis clássicos. O Nível 4a (Sweet Spot, 88–95% do FTP) é a introdução do conceito de \"sweet spot\", desenvolvido mais no Capítulo 5."},{"id": "nota-0029", "titulo": "Mesma zona de potência média tem estresse diferente em prova vs. treino, por causa da variabilidade", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-média", "VI"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 63, "trecho": "average power during mass-start races typically falls within Level 3, but racing at Level 3 is often more stressful than training at Level 3 because racing involves greater variability (and therefore higher peaks) in power."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 63, "trecho": "due to soft-pedaling and coasting, the average power achieved during a hilly ride or group training session is not equivalent to the same average power achieved during a completely flat ride or solo workout."}], "relacionadas": [{"id": "nota-0006", "tipo": "complementa", "justificativa": "mesmo princípio de que o contexto (outdoor/indoor, prova/treino, terreno) afeta a variabilidade de potência independente da média"}], "confianca": 0.8, "status": "auto-aprovado", "body": "A potência média de uma prova de pelotão (mass-start) tipicamente cai no Nível 3 (Tempo), mas o estresse fisiológico de correr no Nível 3 é geralmente maior do que treinar no Nível 3, porque a prova envolve muito mais variabilidade de potência (picos mais altos e mais frequentes) do que um treino estruturado na mesma zona. Da mesma forma, por causa de pedaladas leves e trechos de roda livre, a potência média de um passeio com subidas ou treino em grupo não é fisiologicamente equivalente à mesma potência média obtida em percurso plano ou treino solo.\n\nIsso já é parcialmente considerado na própria definição dos níveis (especialmente Níveis 2 e 3, mais amplos); em níveis mais altos o treino tende a ser mais estruturado, com menos variação de potência.\n\nAplicação ao feedback: ao interpretar a \"zona\" de uma atividade apenas pela potência média, considerar o contexto (prova vs. treino solo vs. treino em grupo, terreno plano vs. ondulado) e, quando disponível, a variabilidade da potência (VI) — uma potência média de Nível 3 em prova pode representar um estímulo/fadiga muito mais próximo de Nível 4–5 do que a mesma média em treino solo estruturado."},{"id": "nota-0030", "titulo": "A potência média de uma sessão inteira pode não representar o tipo real de treino (estrutura importa mais que a média)", "dominio": "metodologia-e-periodizacao", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-média", "tempo-em-zona"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 63, "trecho": "there is an inverse relationship between power output and the duration that this power can be sustained. Obviously, power during shorter training sessions or efforts will fall toward the higher end of a given range, whereas power during longer sessions or efforts will fall toward the lower end of a given range."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 64, "trecho": "a workout consisting of 30 minutes of cycling at Level 1 (a warm-up, for example), 60 minutes of cycling at Level 3, and then another 30 minutes of cycling at Level 1 (a cooldown) would best be described as a Tempo training session, even though the overall average power might fall within Level 2."}], "relacionadas": [{"id": "nota-0022", "tipo": "pre-requisito", "justificativa": "usa a classificação de níveis da nota-0022 para ilustrar o problema de classificar pela média geral"}], "confianca": 0.85, "status": "auto-aprovado", "body": "Duas regras de interpretação relacionadas à potência ao longo do tempo:\n\n1. **Relação inversa entre potência e duração sustentável**: esforços/sessões mais curtos tendem a cair na extremidade superior de uma faixa de nível; sessões/esforços mais longos tendem a cair na extremidade inferior da mesma faixa.\n\n2. **A média geral de uma sessão pode mascarar sua estrutura real**: exemplo do livro — uma sessão de 30 min em Nível 1 (aquecimento) + 60 min em Nível 3 (bloco principal) + 30 min em Nível 1 (volta à calma) tem potência média que cai no Nível 2, mas deveria ser classificada como um treino de **Tempo** (o que o bloco principal de 60 min realmente foi), não como um treino de Endurance/Nível 2.\n\nAplicação ao feedback: nunca classificar o tipo/intenção de uma sessão apenas pela potência média do arquivo inteiro — é necessário olhar a distribuição de tempo-em-zona (ou os blocos/intervalos marcados) para identificar corretamente qual foi o estímulo principal pretendido pelo treino."},{"id": "nota-0033", "titulo": "Fórmula da razão potência/peso (W/kg)", "dominio": "metricas-de-potencia", "camada": ["diario", "mensal"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["potência-máx", "relação-P/peso"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 72, "trecho": "To convert your weight from pounds to kilograms, simply divide your weight by 2.2... take your wattage numbers for each time period and divide them by your weight in kilograms. If you held 423 watts for 5 minutes, for example, you would divide 423 by 75 to get 5.64 watts per kilogram."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 72, "trecho": "A rider who weighs 200 pounds and produces 350 watts up a hill... will be able to ride side by side with a rider who weighs 125 pounds but is producing only 218 watts... the power-to-weight ratio is the same—3.85 watts per kilogram."}], "relacionadas": [], "confianca": 0.9, "status": "auto-aprovado", "body": "Fórmula: **razão potência/peso (W/kg) = potência (watts) ÷ peso corporal (kg)**. Para converter peso de libras para quilos: peso (kg) = peso (lb) ÷ 2,2. Exemplo do livro: 423 W sustentados por 5 min, atleta de 75 kg → 423 ÷ 75 = 5,64 W/kg.\n\nA razão potência/peso é o que determina performance em subidas (onde o peso precisa ser vencido pela gravidade) — dois ciclistas com pesos e potências absolutas muito diferentes podem ter desempenho equivalente em subida se a razão W/kg for igual (exemplo do livro: 200 lb/350 W e 125 lb/218 W dão ambos 3,85 W/kg). É a unidade padrão em que o Power Profile (Tabela 4.1, nota-0031) é expresso.\n\nAplicação ao feedback: usar esta fórmula para converter qualquer potência (pico ou média, de qualquer duração) do Strava em W/kg, permitindo comparações justas entre atletas de pesos diferentes — é a base de cálculo para localizar o atleta no Power Profile (Tabela 4.1) e para reportar picos/médias normalizados por peso corporal."},{"id": "nota-0037", "titulo": "Power Duration Curve (PDC): curva de melhor ajuste sobre a curva de Potência Média Máxima (conceito introdutório)", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 79, "trecho": "The Power Duration Curve is derived from your Mean Maximal Power, which captures your actual best power outputs for each and every time... The Power Duration Curve is a mathematically calculated curve of \"best fit\" along the Mean Maximal Power Curve."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 80, "trecho": "first look at any areas where your effort falls below the PDC. This could mean you haven't done an all-out effort for that specific time period or it could indicate a physiological weakness to be improved."}], "relacionadas": [{"id": "nota-0031", "tipo": "complementa", "justificativa": "generaliza o Power Profile (4 pontos discretos) para uma curva contínua ao longo de todas as durações"}], "confianca": 0.75, "status": "auto-aprovado", "body": "A Power Duration Curve (PDC) generaliza o Power Profile: em vez de comparar apenas 4 durações discretas (5s, 1min, 5min, FTP), usa a relação matemática entre tempo até a exaustão e a taxa de trabalho (tanto em exercício aeróbio quanto anaeróbio) para ajustar uma curva de \"melhor encaixe\" sobre a Curva de Potência Média Máxima do atleta (Mean Maximal Power Curve — os melhores valores reais de potência do atleta para cada duração possível, conceito do Capítulo 6).\n\nLeitura da curva: pontos onde o desempenho real do atleta cai abaixo da PDC ajustada podem indicar (a) que o atleta simplesmente não fez um esforço máximo real naquela duração específica, ou (b) uma fraqueza fisiológica real a trabalhar. A PDC representa o melhor esforço histórico do atleta (possivelmente em pico de forma) — o atleta pode não conseguir replicar esse nível na forma atual, então essas \"lacunas\" devem ser revisitadas quando ele estiver mais em forma. Pontos onde a PDC cruza as linhas de categoria do Power Profile (Tabela 4.1) indicam onde a resistência à fadiga precisa melhorar.\n\nNota: este é o conceito introdutório da PDC; o modelo completo (com Potência Crítica, FRC — capacidade de trabalho anaeróbio finita — e Pmax) é desenvolvido em detalhe no Capítulo 8 do livro (\"Shifting to the Power Duration Model\") — por isso `aplicacao: contexto` aqui."},{"id": "nota-0045", "titulo": "FRC (Functional Reserve Capacity): trabalho total possível acima do FTP; iLevels reais podem divergir muito dos níveis clássicos", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["potência-máx", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 110, "trecho": "Functional Reserve Capacity (FRC) is the total amount of work that you can do above your FTP. In theory a cyclist will utilize all of his or her FRC when riding to failure at a supra-FTP intensity."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 111, "trecho": "Joe Athlete's Level 6 (Anaerobic Capacity) based on the Coggan Classic levels is 121–150 percent of Joe's FTP... riding between 351 and 435 watts... Using the Power Duration Curve... at 28 seconds, he has sustained just under 700 watts, and at 1:33, he averaged 471 watts."}], "relacionadas": [{"id": "nota-0028", "tipo": "complementa", "justificativa": "FRC é a base fisiológica dos iLevels 5, 6 e 7a definidos na Tabela 3.5 (nota-0028)"}], "confianca": 0.75, "status": "auto-aprovado", "body": "FRC (Functional Reserve Capacity) é a quantidade total de trabalho que um ciclista consegue realizar acima do seu FTP antes da exaustão — em teoria, é totalmente consumida quando o atleta pedala até a falha numa intensidade supra-FTP. É o conceito fisiológico por trás dos iLevels 5 (FTP/FRC, esforços \"tweener\"), 6 (FRC pura) e 7a (Pmax/FRC).\n\nExemplo concreto do livro mostrando por que os níveis clássicos (percentuais fixos de FTP) podem subestimar drasticamente a demanda real para atletas com FRC/capacidade anaeróbia elevada: para Joe Athlete (FTP = 290 W), o Nível 6 clássico (Capacidade Anaeróbia, 121–150% do FTP) prescreveria intervalos de 30s–2min entre 351–435 W. Mas ao usar o modelo Potência-Duração (WKO4) ajustado aos dados reais de Joe, seu iLevel 6 real exige 653–675 W para um esforço de 28 segundos e 435–449 W para 1:33 — muito acima da faixa clássica para a duração mais curta.\n\nAplicação ao feedback: quando houver dados suficientes para modelar a curva Potência-Duração individual do atleta (não apenas o FTP), os alvos de intensidade para esforços curtos e intensos (Níveis 6-7 clássicos) podem estar significativamente errados se calculados apenas como percentual fixo do FTP — isso é especialmente relevante para atletas com fenótipo mais anaeróbio/sprinter (ver nota-0035)."},{"id": "nota-0048", "titulo": "Checklist antes de analisar dados: taxa de amostragem máxima, zerar o medidor, visualizar sem suavização ou com 5 s", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-série-temporal"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 121, "trecho": "set your power meter on the smallest sampling interval you can... set your power display to show your three-second-average power... Make sure that you zero the power meter before you begin."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 121, "trecho": "When you view your ride graphs, either look at the data without any smoothing or with just five-second smoothing... In five-second smoothing, the data are smoothed over five-second time periods. This is short enough that you lose little of the meaning contained in the data."}], "relacionadas": [{"id": "nota-0012", "tipo": "complementa", "justificativa": "reforça a recomendação de taxa de amostragem máxima do Capítulo 2, agora do ponto de vista de preparar os dados para análise"}, {"id": "nota-0015", "tipo": "pre-requisito", "justificativa": "antes de analisar, remover os mesmos picos espúrios descritos na nota-0015"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Checklist de preparação dos dados antes de qualquer análise mais profunda: (1) taxa de amostragem do medidor de potência na menor granularidade possível (maior taxa de gravação); (2) display do head unit em média de 3 segundos; (3) medidor zerado antes de começar; (4) medidor de potência calibrado; (5) ao visualizar os gráficos no software de análise, preferir dado bruto sem suavização (smoothing) ou, no máximo, suavização de 5 segundos — suficiente para reduzir ruído sem esconder picos/vales reais; (6) remover quaisquer picos de dado espúrios (ex.: pico de 2.000+ W quando o atleta nunca passou de 1.000 W) antes de interpretar a atividade.\n\nEsta é a etapa de \"arrumação da casa\" recomendada antes de qualquer interpretação de distribuição de potência, FC, cadência ou curva de potência média máxima.\n\nAplicação ao feedback: antes de interpretar qualquer métrica derivada (NP, distribuição de zonas, curva de potência média máxima) de uma atividade do Strava, verificar se a fonte de dados tem qualidade suficiente (taxa de gravação alta, sem picos espúrios não tratados) — dados de baixa qualidade devem ser sinalizados como limitação antes de tirar conclusões sobre a sessão."},{"id": "nota-0050", "titulo": "As zonas de potência (em watts) devem ser recalculadas sempre que o FTP mudar — não usar limites antigos com FTP novo", "dominio": "metricas-de-potencia", "camada": ["semanal", "mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-média", "FTP", "tempo-em-zona"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 124, "trecho": "say that in January your FTP was 200 watts. This would mean that your Tempo level (Level 3, 76–90 percent of FTP) would be between 152 and 180 watts. ... By June, however, you may have raised your FTP to 260 watts. Your corresponding Level 3 watts will now be 197–234."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 124, "trecho": "Because your fitness has increased so dramatically, 152–180 watts is now in your Level 2, or Endurance level. This is great news. But you will have to adjust your settings, and your training, to make further progress."}], "relacionadas": [{"id": "nota-0022", "tipo": "pre-requisito", "justificativa": "usa a tabela de zonas percentuais de FTP da nota-0022, mas alerta que os limites em watts absolutos precisam ser recalculados a cada mudança de FTP"}], "confianca": 0.85, "status": "auto-aprovado", "body": "Como as zonas de treino (Tabela 3.1) são definidas como percentual do FTP, os limites em watts absolutos mudam sempre que o FTP do atleta muda — usar limites de watts desatualizados classifica erradamente a intensidade de uma sessão. Exemplo do livro: em janeiro, com FTP = 200 W, o Nível 3 (Tempo, 76–90%) correspondia a 152–180 W. Em junho, com FTP elevado para 260 W, o Nível 3 passa a ser 197–234 W — e a faixa antiga (152–180 W) que antes era Tempo agora corresponde ao Nível 2 (Endurance) do atleta mais em forma.\n\nAplicação ao feedback: sempre usar o FTP mais recente e válido do atleta (não um valor desatualizado) para calcular os limites de zona em watts antes de classificar tempo-em-zona de qualquer atividade — recalcular a cada atualização de FTP (ver nota-0021 sobre frequência de reteste)."},{"id": "nota-0052", "titulo": "\"Tempo em zona\" de potência pode enganar: potência não tem inércia fisiológica como a FC", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal", "tempo-em-zona", "FC (média/máx)"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 126, "trecho": "if you alternated between pedaling for 15 seconds at 400 watts and pedaling for 15 seconds at 100 watts, and kept this up for an entire hour, you would end up spending 30 minutes pedaling at 400 watts, which is a power that you might be able to maintain for only about 4 minutes if you were pedaling at this level continuously."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 126, "trecho": "This is not an issue when using heart rate, because (1) heart rate lags behind changes in power... very short forays get averaged into the mix... 'time in level' is much more meaningful when applied to heart rate than when applied to power."}], "relacionadas": [{"id": "nota-0001", "tipo": "complementa", "justificativa": "mesmo princípio-base: FC tem inércia/defasagem fisiológica que a potência não tem"}, {"id": "nota-0016", "tipo": "complementa", "justificativa": "outra regra sobre como interpretar corretamente médias/distribuições de potência vs. outros sinais"}], "confianca": 0.85, "status": "auto-aprovado", "body": "Diferente da frequência cardíaca — que tem inércia fisiológica (responde com atraso e \"suaviza\" automaticamente incursões muito curtas em alta intensidade) — a potência responde instantaneamente, sem atraso. Isso torna o gráfico de \"tempo em zona/nível de potência\" potencialmente enganoso: um padrão de 15 s a 400 W alternado com 15 s a 100 W, sustentado por 1 hora inteira, resultaria em \"30 minutos no nível de 400 W\" no gráfico de tempo-em-zona — mas 400 W contínuos talvez só sejam sustentáveis por ~4 minutos reais para esse atleta. Ou seja, o tempo-em-zona de potência não reflete a real exigência fisiológica de sustentar aquele nível continuamente.\n\nConsequência prática citada pelos autores: \"tempo em nível/zona\" é uma métrica bem mais confiável quando aplicada à FC do que quando aplicada à potência, justamente por causa dessa ausência de inércia fisiológica na potência.\n\nAplicação ao feedback: ao reportar \"X minutos em Zona Y\" com base em potência bruta segundo a segundo, ter cautela ao inferir demanda fisiológica real a partir desse número isolado — esforços curtos e intermitentes numa zona alta (ex.: microbursts, fartlek) podem somar bastante \"tempo em zona\" sem representar o mesmo estresse fisiológico de sustentar aquela potência continuamente. Preferir olhar também a duração de cada incursão individual na zona, não só o total acumulado."},{"id": "nota-0053", "titulo": "Curva de Potência Média Máxima (MMP): como interpretar inclinações, platôs e picos", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 127, "trecho": "By plotting your peak power over small slices of time, you can view a telling graph of your mean maximal power. This is quite literally a plot of your best average power for each second of the ride... When you examine maximal power for a relatively large set of data (six months or greater), the shape of the curve will be based on your personal set of abilities."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 127, "trecho": "the slope of your Mean Maximal Power Curve might be very consistent from 20 seconds out to 2.5 minutes but run at a lower angle from 2.5 minutes out to 25 minutes. This might tell you that at 2.5 minutes your body shifts emphasis from the anaerobic capacity system to the VO2max and lactate systems."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 128, "trecho": "If you see a distinct hump in the curve at around 3–6 minutes... this indicates your strength at VO2max power. Or, if you see a plateau in the curve, you may have a weakness."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 128, "trecho": "If you did a workout with 5-minute efforts, and then looked at the watts you produced at 6 minutes, the data may not be indicative of your overall ability. To obtain valid data, you would need to do specific 6-minute efforts."}], "relacionadas": [{"id": "nota-0037", "tipo": "pre-requisito", "justificativa": "a MMP Curve é a base de dados real sobre a qual a Power Duration Curve (nota-0037) é ajustada matematicamente"}], "confianca": 0.8, "status": "auto-aprovado", "body": "A Curva de Potência Média Máxima (MMP, Mean Maximal Power) é o gráfico da melhor potência média real do atleta para cada duração possível (segundo a segundo) — não é um modelo matemático, é o registro literal dos melhores esforços já feitos, extraído de todo o histórico de arquivos de potência.\n\nComo interpretar: mudanças na inclinação da curva revelam transições entre sistemas de energia predominantes (ex.: inclinação consistente de 20 s a 2,5 min pode indicar predomínio do sistema anaeróbio nessa faixa, com mudança de inclinação depois disso sinalizando transição para VO2máx/sistema de lactato). Uma \"elevação\" (hump) destacada na faixa de 3–6 min indica um ponto forte em potência de VO2máx; um platô na curva pode indicar uma fraqueza naquela faixa de duração específica.\n\nRequisitos para uma leitura válida: (1) a curva deve ser construída sobre um período de dados razoavelmente longo (pelo menos 6 meses, idealmente um ano inteiro) para capturar o verdadeiro potencial do atleta em todas as durações; (2) os valores só são válidos se vierem de esforços genuinamente máximos naquela duração específica — não se pode inferir a capacidade máxima de 6 minutos a partir de um esforço de 5 minutos (mesmo que os dois estejam próximos), é preciso ter feito de fato um esforço máximo de 6 minutos para aquele ponto da curva ser confiável.\n\nAplicação ao feedback: a MMP Curve é a base de dados sobre a qual a Power Duration Curve (modelo ajustado, nota-0037) é construída — sem esforços máximos reais suficientes e bem distribuídos ao longo de várias durações, tanto a MMP quanto os modelos derivados dela (FTP modelado, FRC, Pmax) ficam menos confiáveis."},{"id": "nota-0055", "titulo": "\"Match\" (fósforo): esforço ≥20% acima do FTP por ≥1 min; tabela de potência por duração", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["potência-máx", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 144, "trecho": "a match can be defined as an effort in which one goes over threshold power by at least 20 percent and holds it there for at least 1 minute. Of course, burning the proverbial match could involve an effort longer than 1 minute, but as the time period gets longer, the percentage above threshold power would be lower."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 145, "trecho": "TABLE 6.2 Power Required to \"Burn a Match\" — Time | % of FTP | Power — 1 min. | 120+ | 396; 5 min. | 114-120 | 376-396; 10 min. | 108-114 | 356-376; 20 min. | 100-108 | 330-356 — Note: In this example, the athlete's FTP is 330 watts."}], "relacionadas": [], "confianca": 0.8, "status": "auto-aprovado", "body": "\"Queimar um fósforo\" (burn a match) é o termo popular do ciclismo para um esforço duro e decisivo (ataque, resposta a um ataque, subir forte um morro). Os autores propõem uma definição quantitativa: um esforço **pelo menos 20% acima do FTP, sustentado por pelo menos 1 minuto**. Para esforços mais longos que 1 minuto, o percentual acima do FTP necessário para \"contar\" como match cai — ou seja, a definição de match é sensível à duração.\n\nTabela 6.2 do livro (exemplo para atleta com FTP = 330 W):\n\n| Duração | % do FTP | Potência (W) |\n|---|---|---|\n| 1 min | ≥120% | 396 |\n| 5 min | 114–120% | 376–396 |\n| 10 min | 108–114% | 356–376 |\n| 20 min | 100–108% | 330–356 |\n\nOs autores ressaltam que não existe uma definição exata e universal de \"match\" — esses números são um ponto de partida ilustrativo, e o \"tamanho da caixa de fósforos\" (quantidade de matches disponíveis) varia de atleta para atleta. O conceito de \"matchbook\" tem 4 objetivos práticos: (1) definir o que é um match para aquele atleta específico, (2) descobrir o tamanho do seu estoque de matches, (3) tentar aumentar esse estoque com treino, e (4) aprender a queimar os matches no momento certo da prova.\n\nAplicação ao feedback: contar quantos \"matches\" (nesse sentido quantitativo) um atleta queimou numa prova, e em que momentos, ajuda a explicar objetivamente por que ele pode ter sido \"descolado\" mais tarde (esgotamento do estoque) ou por que teve um bom resultado (matches bem distribuídos/guardados para o momento decisivo)."},{"id": "nota-0057", "titulo": "Scatterplots (potência × cadência, balanço esquerda/direita, cadência × velocidade) para identificar padrões", "dominio": "metricas-de-potencia", "camada": ["diario", "mensal"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["potência-série-temporal", "cadência", "velocidade"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 141, "trecho": "When you plot power on the Y-axis of the graph and cadence on the X-axis, it becomes easy to see at which cadence you had the highest power outputs and your upper cadence limit to produce high wattage."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 142, "trecho": "a power balance scatterplot helps to identify which leg a rider favors across the range of his or her wattage output. Some riders will 'save' or 'rest' a leg at lower wattages so that when they need more power for short periods of time, they can use that rested leg."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 143, "trecho": "at a certain cadence, about 100–105 rpm, as you can see from the plot, he shifts to a harder gear in order to continue increasing his speed."}], "relacionadas": [], "confianca": 0.75, "status": "auto-aprovado", "body": "Gráficos de dispersão (scatterplot) cruzam dois canais de dados simultaneamente e revelam padrões que médias isoladas escondem:\n\n- **Potência (eixo Y) × cadência (eixo X)**: revela em qual cadência o atleta produz seus maiores picos de potência, e o limite superior de cadência em que ainda consegue gerar potência alta.\n- **Balanço de potência esquerda/direita × faixa de potência**: revela se o atleta favorece uma perna em intensidades baixas (ex.: \"descansando\" uma perna) e passa a depender mais da outra em intensidades altas (VO2máx/Capacidade Anaeróbia), voltando a um padrão diferente em potência neuromuscular — um exemplo do livro mostra um atleta mais dominante na perna esquerda abaixo do FTP, mudando para a direita em VO2máx/Capacidade Anaeróbia, e retornando à esquerda em potência neuromuscular.\n- **Cadência (eixo Y) × velocidade (eixo X)**, em contexto de ciclocross: revela o ponto (ex.: ~100–105 rpm) em que o atleta troca de marcha para continuar acelerando — pode indicar necessidade de melhorar a velocidade de pedalada ou de força muscular na marcha mais pesada.\n\nPrincípio geral citado pelos autores: fora da aerodinâmica, só existem duas formas de ir mais rápido de bicicleta — pedalar mais forte ou pedalar mais rápido (maior cadência) — e os scatterplots ajudam a identificar qual dessas alavancas (ou combinação) vale mais a pena trabalhar para um atleta específico.\n\nAplicação ao feedback: ao gerar um scatterplot de potência × cadência (ou balanço esquerda/direita) a partir da série temporal de uma atividade, usar o padrão visual resultante para identificar economia/ineficiência de pedalada, favorecimento de perna ou necessidade de ajuste de marcha — informação que a potência média isolada não revela."},{"id": "nota-0059", "titulo": "Normalized Power (NP): algoritmo de cálculo e por que substitui a potência média", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["potência-média", "NP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 154, "trecho": "To calculate Normalized Power: 1. Start at the beginning of the data and calculate a 30-second rolling average for power. 2. Raise the values obtained in Step 1 to the fourth power. 3. Calculate the average of all the values obtained in Step 2. 4. Find the fourth root of the number obtained in Step 3."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 154, "trecho": "it's the wattage you would have averaged if you had pedaled smoothly for the entire effort—the power that your body thought it was doing... It estimates the power that you could have maintained for the same physiological cost if your power output had been perfectly constant."}], "relacionadas": [{"id": "nota-0002", "tipo": "pre-requisito", "justificativa": "generaliza a limitação de potência média/trabalho total já discutida (o mesmo kJ pode representar cargas fisiológicas muito diferentes)"}], "confianca": 0.95, "status": "auto-aprovado", "body": "Algoritmo de cálculo da Potência Normalizada (Normalized Power, NP), aplicável a trechos de 30 segundos ou mais: (1) calcular a média móvel de 30 segundos da potência ao longo de todo o trecho; (2) elevar cada valor da média móvel à 4ª potência; (3) calcular a média de todos esses valores elevados à 4ª potência; (4) extrair a raiz quarta desse resultado.\n\nFundamento fisiológico: (a) respostas fisiológicas a mudanças rápidas de intensidade não são instantâneas, seguem um curso temporal previsível (daí a média móvel de 30s); (b) respostas fisiológicas críticas (utilização de glicogênio, produção de lactato, hormônios de estresse) têm relação curvilínea (não linear) com a intensidade do exercício — daí elevar à 4ª potência antes de tirar a média, o que pondera desproporcionalmente os picos de intensidade.\n\nInterpretação prática: NP é a potência que o atleta teria sustentado, em média, se tivesse pedalado de forma perfeitamente constante (ex.: num ergômetro estacionário) para gerar o mesmo custo fisiológico do esforço real e variável que ele fez. É por isso que NP é sempre igual ou maior que a potência média — quanto mais variável o esforço, maior a diferença entre NP e potência média.\n\nNP costuma ser semelhante entre provas de mesma duração e dificuldade mesmo quando a potência média difere muito (ex.: criterium tem potência média mais baixa que prova de estrada por causa de curvas/soft-pedaling, mas NP das duas costuma ser parecida) — por isso NP de provas de pelotão de ~1h pode ser usado como estimativa inicial de FTP (ver nota-0025, método 3).\n\nAplicação ao feedback: ao resumir ou comparar sessões, preferir NP à potência média bruta sempre que o esforço tiver variabilidade relevante (grupo, terreno, corrida) — NP representa melhor o custo fisiológico real e é a base de cálculo de IF e TSS."},{"id": "nota-0060", "titulo": "Variability Index (VI): fórmula (NP/potência média) e faixas típicas por tipo de prova", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["potência-média", "NP", "VI"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 155, "trecho": "Charles Howe coined the term Variability Index... To find the Variability Index, simply take the Normalized Power number and divide it by the average power number. The more variable your ride... the higher the Variability Index."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 156, "trecho": "TABLE 7.1 Variability Indexes for Common Rides — Steady isopower workout 1.00-1.02; Flat road race 1.00-1.06; Flat time trial 1.00-1.04; Hill-climb time trial 1.00-1.06; Flat criterium 1.06-1.35; Hilly criterium 1.13-1.50; Hilly road race 1.20-1.35; Mountain-bike race 1.13-1.50"}], "relacionadas": [{"id": "nota-0059", "tipo": "pre-requisito", "justificativa": "VI é calculado a partir do NP definido na nota-0059"}], "confianca": 0.9, "status": "auto-aprovado", "body": "**Fórmula: VI (Variability Index) = NP ÷ potência média.** Quanto mais variável o esforço (após a suavização de 30s do cálculo de NP), maior o VI; VI = 1,0 significa potência perfeitamente constante.\n\nTabela 7.1 do livro — faixas típicas de VI por tipo de prova/treino:\n\n| Tipo de pedalada | VI típico |\n|---|---|\n| Treino de potência constante (isopower) | 1,00–1,02 |\n| Prova de estrada plana | 1,00–1,06 |\n| Contrarrelógio plano | 1,00–1,04 |\n| Contrarrelógio de subida | 1,00–1,06 |\n| Criterium plano | 1,06–1,35 |\n| Criterium com subidas | 1,13–1,50 |\n| Prova de estrada com subidas | 1,20–1,35 |\n| Prova de mountain bike | 1,13–1,50 |\n\nExemplo real do livro (Figura 7.1, corrida de pelotão em estrada): potência média 319 W, NP 357 W → VI = 357/319 ≈ 1,12. Exemplo de subida constante (Figura 7.2): potência média 300 W, NP 304 W → VI ≈ 1,02.\n\nAplicação ao feedback: comparar o VI de uma atividade com a faixa esperada para aquele tipo de evento ajuda a identificar se a prova/treino teve o padrão de variabilidade esperado (ex.: um VI muito mais alto que o esperado para um contrarrelógio pode indicar pacing ruim ou terreno/vento atípicos; treinar sempre com VI baixo quando o objetivo é um evento de VI alto — ex.: mountain bike — indica falta de especificidade no treino, ver nota-0060 e Quadrant Analysis)."},{"id": "nota-0061", "titulo": "Intensity Factor (IF): fórmula (NP/FTP) e uso para detectar FTP desatualizado (IF > 1,05 em prova de ~1h)", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-média", "NP", "FTP", "IF"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 158, "trecho": "Intensity Factor is simply the ratio of your Normalized Power to your functional threshold power—that is, the fraction of your functional threshold power that you maintained for that workout (i.e., IF = NP/FTP)."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 158, "trecho": "an IF of more than 1.05 for a race that is approximately 1 hour in duration is often a sign that the rider's threshold power is actually greater than that presently entered into the TrainingPeaks WKO Software program."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 159, "trecho": "he sees that his TSS is 114 and his IF is 1.07, with his normalized watts at 310... Joe adjusts his threshold value to 310, lets the software recalculate his TSS and IF, and sees that the TSS is now 100 and the IF is now 1.0."}], "relacionadas": [{"id": "nota-0059", "tipo": "pre-requisito", "justificativa": "IF é calculado a partir do NP definido na nota-0059"}, {"id": "nota-0050", "tipo": "complementa", "justificativa": "outro sinal de que o FTP cadastrado está desatualizado e precisa ser recalculado"}], "confianca": 0.9, "status": "auto-aprovado", "body": "**Fórmula: IF (Intensity Factor) = NP ÷ FTP** — a fração do FTP do atleta que foi sustentada (em termos de potência normalizada) naquele treino/prova/trecho. Ao contrário do NP bruto, o IF é relativo à capacidade do próprio atleta, permitindo comparar a intensidade relativa de esforços ao longo do tempo (conforme o FTP muda) ou entre atletas diferentes.\n\n**Regra de detecção de FTP desatualizado**: um IF acima de 1,05 numa prova de aproximadamente 1 hora de duração é frequentemente sinal de que o FTP cadastrado está subestimado (o FTP real do atleta já subiu). Exemplo do livro: Joe Athlete tem FTP cadastrado de 290 W; após 8 semanas de treino sem reteste formal, faz uma fuga de ~1h numa corrida e obtém NP = 310 W, IF = 1,07, TSS = 114. Como por definição 1h no FTP deveria dar IF = 1,0 e TSS = 100, Joe ajusta o FTP cadastrado para 310 W (recalculando TSS = 100, IF = 1,0) — mas, como um salto de 20 W (290→310) em 8 semanas é um aumento grande, o livro recomenda ser conservador e ajustar para um valor intermediário (300 W), confirmando com teste formal assim que possível.\n\nAplicação ao feedback: monitorar o IF de esforços de ~1h (provas ou treinos duros) ao longo da temporada é uma forma passiva de identificar que o FTP cadastrado provavelmente subiu (ou caiu) sem precisar aguardar o próximo teste formal — mas ajustes bruscos de FTP baseados nisso devem ser conservadores e, quando possível, confirmados por teste."},{"id": "nota-0062", "titulo": "TSS (Training Stress Score): fórmula completa e definição de referência (1h no FTP = 100 TSS)", "dominio": "metricas-de-potencia", "camada": ["diario", "semanal"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["potência-média", "NP", "IF", "TSS", "FTP", "tempo-decorrido"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 160, "trecho": "The formula for TSS is TSS = [(s × W × IF) ÷ (FTP × 3,600)] × 100 where s is duration in seconds, W is Normalized Power in watts, IF is Intensity Factor, FTP is functional threshold power, and 3,600 is number of seconds in 1 hour."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 160, "trecho": "The Training Stress Score is based on a 1-hour time trial at threshold. An athlete riding for 1 hour at FTP would score 100 TSS points, and the IF from this ride would be 1.0."}], "relacionadas": [{"id": "nota-0059", "tipo": "pre-requisito", "justificativa": "TSS usa o NP (nota-0059) na fórmula"}, {"id": "nota-0061", "tipo": "pre-requisito", "justificativa": "TSS usa o IF (nota-0061) na fórmula"}], "confianca": 0.95, "status": "auto-aprovado", "body": "**Fórmula: TSS = [(s × NP × IF) ÷ (FTP × 3.600)] × 100**, onde s = duração em segundos, NP = Potência Normalizada em watts, IF = Intensity Factor, FTP = Functional Threshold Power em watts, 3.600 = segundos em 1 hora.\n\nPonto de referência que define a escala: **1 hora pedalando exatamente no FTP = 100 pontos de TSS, com IF = 1,0.** TSS combina intensidade (via IF) e duração num único número, funcionando como estimador da carga glicolítica/glicogênio utilizado em cada sessão.\n\nPropriedade importante: como o TSS é calculado a partir do FTP (individualizado), um mesmo TSS representa a mesma carga relativa de estresse fisiológico para atletas de níveis muito diferentes — uma saída de 300 TSS para um iniciante e uma saída de 300 TSS para um profissional de elite (Peter Sagan é o exemplo citado) são fisicamente muito diferentes em distância/potência absoluta, mas colocam grau equivalente de estresse no sistema fisiológico de cada um. O que difere entre atletas é a *tolerância* a determinado volume de TSS acumulado (ex.: um profissional pode sustentar 300–400 TSS/dia com IF 0,85 por 21 dias seguidos e continuar evoluindo; um iniciante pode ficar sobrecarregado só com 2 dias nesse nível).\n\nExemplo de equivalência: um treino de 200 TSS equivale, em carga, a aproximadamente dois contrarrelógios de 40 km (cada um valendo ~100 TSS a IF 1,0); um treino de 100 TSS também pode ser obtido por 2 horas a IF mais baixo (0,71), representando teoricamente o mesmo custo fisiológico de um único CRI de 40 km a IF 1,0.\n\nAplicação ao feedback: TSS é a métrica central para acumular carga de treino ao longo do tempo (base de CTL/ATL/TSB) — ao gerar feedback diário/semanal, reportar o TSS de cada sessão e a soma acumulada, não apenas potência média ou duração isoladas, para refletir corretamente o estresse fisiológico real de cada atividade."},{"id": "nota-0065", "titulo": "Fórmula da AEPF (força efetiva média aplicada ao pedal)", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["potência-série-temporal", "cadência"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 164, "trecho": "AEPF = (P × 60) ÷ (C × 2 × π × CL) where AEPF is average effective pedal force (in newtons, or N); P is power (in watts); C is cadence (in rpm); CL is crank length (in meters)."}], "relacionadas": [{"id": "nota-0066", "tipo": "complementa", "justificativa": "AEPF e CPV (nota-0066) juntos formam os dois eixos da Quadrant Analysis (nota-0067)"}], "confianca": 0.9, "status": "auto-aprovado", "body": "**Fórmula: AEPF = (P × 60) ÷ (C × 2 × π × CL)**, onde AEPF = força efetiva média aplicada ao pedal (em newtons, N); P = potência (watts); C = cadência (rpm); CL = comprimento da manivela (em metros); as constantes 60, 2 e π convertem cadência em velocidade angular (radianos/segundo).\n\nAEPF é a força tangencial média (perpendicular à manivela) exercida pelas duas pernas combinadas ao longo de uma volta completa (360°) do pedal, derivada matematicamente da potência e da cadência — não precisa de um medidor de força dedicado, qualquer medidor de potência com cadência permite calculá-la.\n\nAplicação ao feedback: aplicar esta fórmula ponto a ponto (ou por intervalo) sobre a série de potência e cadência de uma atividade permite construir o eixo de força da Quadrant Analysis (nota-0067) e identificar em que trechos do treino/prova o atleta trabalhou com alta ou baixa força no pedal."},{"id": "nota-0066", "titulo": "Fórmula da CPV (velocidade circunferencial do pedal)", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["cadência"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 165, "trecho": "CPV = (C × CL × 2 × π) ÷ 60 where CPV is circumferential pedal velocity (in meters/second); C is cadence (in rpm); CL is crank length (in meters)."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 165, "trecho": "Because crank length is generally constant, especially for a given individual, one could just as well use cadence instead of circumferential pedal velocity. We have used the latter to be consistent with scientific convention."}], "relacionadas": [{"id": "nota-0065", "tipo": "complementa", "justificativa": "AEPF (nota-0065) e CPV juntos formam os dois eixos da Quadrant Analysis (nota-0067)"}], "confianca": 0.9, "status": "auto-aprovado", "body": "**Fórmula: CPV = (C × CL × 2 × π) ÷ 60**, onde CPV = velocidade circunferencial do pedal (metros/segundo); C = cadência (rpm); CL = comprimento da manivela (metros).\n\nCPV é a velocidade com que o pedal se move ao longo do círculo que descreve durante a pedalada. Tecnicamente, a velocidade de encurtamento muscular (ou velocidade angular da articulação) seria a medida mais correta, mas CPV é um excelente preditor de ambas. Como o comprimento da manivela é geralmente constante para um mesmo atleta, a cadência sozinha poderia ser usada como proxy — os autores preferem CPV por consistência com a convenção científica de curvas força-velocidade do músculo.\n\nAplicação ao feedback: aplicar esta fórmula à cadência registrada no Strava para obter o eixo de velocidade da Quadrant Analysis (nota-0067) — junto com a AEPF (força), permite mapear cada ponto da atividade nos quatro quadrantes força × velocidade."},{"id": "nota-0067", "titulo": "Quadrant Analysis: os quatro quadrantes força × velocidade e o que cada um representa", "dominio": "metricas-de-potencia", "camada": ["diario", "mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal", "cadência"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 168, "trecho": "AEPF and CPV at an individual's threshold power can be used to divide the force-velocity scatterplot from any ride into four quadrants."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 168, "trecho": "Quadrant I (upper right): high force and high velocity... Quadrant II (upper left): high force but low velocity... Quadrant III (lower left): low force and low velocity... Quadrant IV (lower right): low force but high velocity."}], "relacionadas": [{"id": "nota-0065", "tipo": "pre-requisito", "justificativa": "usa a AEPF (nota-0065) como eixo de força"}, {"id": "nota-0066", "tipo": "pre-requisito", "justificativa": "usa a CPV (nota-0066) como eixo de velocidade"}, {"id": "nota-0074", "tipo": "causal", "justificativa": "a divisão dos quadrantes é baseada no limiar de recrutamento de fibras rápidas, que ocorre aproximadamente no FTP (nota-0074)"}], "confianca": 0.85, "status": "auto-aprovado", "body": "A Quadrant Analysis usa a AEPF (força, eixo Y) e a CPV (velocidade, eixo X) calculadas no FTP do atleta (na cadência autosselecionada) como linhas divisórias para separar todo o arquivo de potência de uma atividade em 4 quadrantes:\n\n- **Quadrante I (superior direito): alta força e alta velocidade.** No extremo, é o sprint; também inclui praticamente qualquer esforço supra-limiar estendido em terreno plano (ataque, tentativa de alcançar uma fuga). Provas de pista com largada em massa (ex.: prova por pontos) envolvem bastante pedalada nesse quadrante, por causa do caráter agressivo e do uso de marcha fixa.\n- **Quadrante II (superior esquerdo): alta força, baixa velocidade.** Típico de subidas ou de acelerações a partir de baixa velocidade. Largada parada (CPV inicial zero) é a única situação no ciclismo em que a força pura é realmente limitante. Ciclocross e mountain bike também envolvem bastante pedalada de alta força/baixa velocidade, assim como estrada com subidas muito íngremes ou marcha muito pesada.\n- **Quadrante III (inferior esquerdo): baixa força e baixa velocidade.** Típico de passeios de recuperação/sociais (sem foco de treino). Em prova de pelotão com potência muito variável, também ocorre bastante nesse quadrante durante recuperação entre esforços ou \"soft-pedaling\" no meio do grupo.\n- **Quadrante IV (inferior direito): baixa força, alta velocidade.** Uso de marcha fixa leve ou rolos para melhorar suavidade de pedalada; provas com acelerações frequentes e rápidas (ex.: criterium) também envolvem bastante pedalada nesse quadrante.\n\nPedalar nos Quadrantes I e II (força suficientemente alta) está associado a recrutamento significativo de fibras de contração rápida (Tipo II).\n\nAplicação ao feedback: comparar a distribuição de tempo/esforço nos 4 quadrantes de um treino com a distribuição típica do tipo de prova-alvo do atleta revela se o treino está sendo específico o suficiente (ex.: um triatleta que só treina em provas de pelotão de estrada provavelmente não estará neuromuscularmente pronto para o triatlo; um ciclista que só anda de bike de recuperação no Quadrante III não deve esperar ser bom velocista de criterium)."},{"id": "nota-0070", "titulo": "O \"power balance\" padrão ANT+ é enganoso; GPR/GPA corrigem contabilizando potência absorvida na perna oposta", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["potência-média"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 183, "trecho": "The ANT+ protocol... measures the average power from each individual leg and calculates the percentage that each contributes to the total... there is a problem with this simple calculation: When the left leg pushes down on the pedal, the right-leg upstroke creates some resistance on the opposite side, and this negative power is not correctly accounted for."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 183, "trecho": "if the left leg releases 150 watts, but the right leg absorbs 20 watts, the net power for the left leg would be 130 watts... if the right leg releases 170 watts, and the left leg absorbs 30 watts, the net power for the right leg would be 140 watts... the correct power balance is 48 percent left and 52 percent right."}], "relacionadas": [{"id": "nota-0071", "tipo": "pre-requisito", "justificativa": "define GPR/GPA/KI, as métricas propostas pelos autores para corrigir o problema descrito nesta nota"}], "confianca": 0.8, "status": "auto-aprovado", "body": "O \"power balance\" padrão do protocolo ANT+ (potência média de uma perna vs. a outra) tem um problema: quando uma perna empurra o pedal para baixo (gerando potência positiva), a perna oposta, na subida, cria alguma resistência (potência negativa/absorvida) — e essa potência negativa não é corretamente contabilizada no cálculo simples de balanço ANT+.\n\nExemplo do livro: se a perna esquerda \"libera\" (releases) 150 W e a direita \"absorve\" 20 W na subida, a contribuição líquida real da esquerda é 130 W; se a direita libera 170 W e a esquerda absorve 30 W, a contribuição líquida da direita é 140 W. O total ainda soma 270 W, mas o balanço correto passa a ser 48% esquerda / 52% direita — diferente (e às vezes até invertido) do que o cálculo simplista de \"potência média de cada perna\" indicaria.\n\nPor essa limitação, os autores recomendam não confiar nas métricas padrão ANT+ (Pedaling Smoothness, Torque Effectiveness, Balance) para análise bilateral fina, propondo métricas próprias (GPR, GPA, Kurtotic Index — ver nota-0071) que consideram potência liberada e absorvida separadamente.\n\nAplicação ao feedback: ao interpretar o balanço esquerda/direita reportado pelo Strava (baseado no protocolo ANT+ padrão), ter cautela ao concluir que uma perna é mais forte que a outra apenas pelo percentual simples — a diferença real de contribuição líquida pode ser menor (ou até invertida) do que o balanço bruto sugere, por causa da potência absorvida não contabilizada."},{"id": "nota-0071", "titulo": "GPR, GPA e Kurtotic Index: métricas dos autores para análise bilateral de potência", "dominio": "metricas-de-potencia", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["potência-série-temporal"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 184, "trecho": "Gross Power Released (GPR): The gross (i.e., muscular + inertial + gravitational) power released by one leg (left or right), primarily on the downstroke. Gross Power Absorbed (GPA): The gross... power absorbed by one leg... primarily during the upstroke."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 185, "trecho": "Kurtotic Index (KI): A measure of the \"peakedness\" of the pattern of force, torque, and power application during the power-producing phase."}], "relacionadas": [{"id": "nota-0070", "tipo": "pre-requisito", "justificativa": "estas métricas foram criadas para corrigir a limitação do power balance ANT+ descrita na nota-0070"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Métricas desenvolvidas pelos autores para análise bilateral de potência mais precisa que o \"power balance\" padrão ANT+:\n\n- **GPR (Gross Power Released)**: potência bruta (muscular + inercial + gravitacional) liberada por uma perna (esquerda ou direita), principalmente na fase de descida do pedal (downstroke).\n- **GPA (Gross Power Absorbed)**: potência bruta absorvida por uma perna, principalmente na fase de subida do pedal (upstroke).\n- **Kurtotic Index (KI)**: mede o quão \"pontiagudo\" (peaked) é o padrão de aplicação de força/torque/potência de uma perna durante a fase de geração de potência — quanto maior o KI, mais a perna \"soca\" o pedal (aplica força de forma concentrada/abrupta) em vez de aplicar potência de forma suave ao longo de todo o curso do pedal.\n\nEssas métricas são mais bem compreendidas em formato gráfico e plotadas contra a Curva de Potência Média Máxima (MMP, nota-0053) — permitindo ver, por exemplo, se a perna esquerda libera mais potência que a direita em esforços curtos (<30s) mas o padrão se inverte em esforços mais longos (até 20 min), e se uma perna absorve consistentemente mais potência que a outra ao longo de todas as durações (indicando potencial de melhora reduzindo a potência absorvida).\n\nAplicação ao feedback: usar GPR/GPA (em vez do balanço bruto ANT+) para identificar de forma mais precisa se uma perna do atleta libera consistentemente menos potência ou absorve mais potência que a outra ao longo de diferentes durações de esforço — a comparação contra a MMP Curve (nota-0053) revela se o padrão é estável ou muda conforme a intensidade/duração."},{"id": "nota-0073", "titulo": "Quando agir sobre desequilíbrio bilateral: diferença >10% entre pernas, ou GPA >35 W sentado; cautela com \"puxar\" o pedal", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 192, "trecho": "If one leg is more than 10 percent different in power output than the other. In this case, you need to determine if you have muscular strength discrepancy or a possible movement pattern or bike fit issue."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 192, "trecho": "If both legs have a GPA of greater than 35 watts while seated... we suggest you intentionally drive your knee toward the handlebar on the upstroke and lightly point your toe downward throughout the pedal stroke."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 192, "trecho": "Riders who deliberately pull up on the pedal stroke actually use more energy and are less efficient... Deliberately modifying the pattern of force application throughout your pedal stroke to emphasize pulling up reduces your metabolic efficiency."}], "relacionadas": [{"id": "nota-0071", "tipo": "pre-requisito", "justificativa": "usa as métricas GPR/GPA definidas na nota-0071"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Critérios práticos para decidir se vale a pena intervir sobre um desequilíbrio bilateral identificado via GPR/GPA:\n\n1. **Diferença de mais de 10% na potência liberada entre as pernas** → investigar se é discrepância real de força muscular ou um problema de padrão de movimento/ajuste de bike (bike fit).\n2. **GPA (potência absorvida) maior que 35 W em ambas as pernas, estando sentado** → para ciclista com 3+ anos de treino sério, os autores sugerem deliberadamente direcionar o joelho em direção ao guidão na subida do pedal e apontar levemente a ponta do pé para baixo ao longo de todo o curso do pedal (para reduzir a potência absorvida na subida).\n\n**Cautela importante**: apesar da tentação de \"corrigir\" a técnica de pedalada, 3 linhas de evidência citadas no livro desaconselham tentar deliberadamente \"puxar\" o pedal para cima: (a) ciclistas de elite na verdade puxam menos na subida do que ciclistas não-elite (eles minimizam a potência absorvida em vez de ativamente puxar); (b) puxar deliberadamente na subida do pedal gasta mais energia e é menos eficiente; (c) modificar deliberadamente o padrão de aplicação de força ao longo do pedal para enfatizar o \"puxar\" reduz a eficiência metabólica — o padrão de pedalada de cada pessoa é como uma \"impressão digital\", e mudá-lo pode prejudicar a eficiência.\n\nAplicação ao feedback: um desequilíbrio bilateral identificado nos dados não deve gerar automaticamente uma recomendação de \"puxar mais o pedal\" — a orientação baseada em evidência é reduzir a potência absorvida (empurrar de forma mais eficiente na descida, minimizar resistência na subida), não ativamente aumentar a tração para cima."},{"id": "nota-0076", "titulo": "A relação potência-duração é curvilínea, não linear: interpolar entre dois pontos conhecidos gera erro grande", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 201, "trecho": "If you tried to interpolate the power you could elicit for 8 minutes... the line of interpolation would indicate approximately 500 watts, while the Power Duration model indicates 380 watts. That's a substantial difference."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 200, "trecho": "as the duration goes beyond several minutes and approaches an hour, power roughly plateaus. This plateau in the Power Duration Curve roughly corresponds to the functional threshold."}], "relacionadas": [{"id": "nota-0053", "tipo": "pre-requisito", "justificativa": "o modelo Potência-Duração é ajustado sobre a Curva de Potência Média Máxima real (nota-0053)"}], "confianca": 0.85, "status": "auto-aprovado", "body": "A queda de potência sustentável conforme a duração aumenta segue uma relação não-linear (curvilínea) com o tempo — a queda entre durações curtas (ex.: 10s e 30s) é acentuada, mas conforme a duração se aproxima de ~1 hora, a potência sustentável tende a um platô, que corresponde aproximadamente ao FTP.\n\nPor causa dessa não-linearidade, **interpolar linearmente entre dois pontos conhecidos da curva potência-duração de um atleta produz erros grandes.** Exemplo do livro: interpolando linearmente entre um esforço máximo de 20 segundos e um de 20 minutos, a potência estimada para 8 minutos seria de ~500 W — mas o modelo Potência-Duração (curva ajustada corretamente) indica apenas ~380 W para essa mesma duração. Essa diferença de ~120 W ilustra por que a modelagem adequada (não a interpolação simples) é necessária para prever a potência sustentável numa duração para a qual não há dado real.\n\nAplicação ao feedback: nunca estimar a potência-alvo de um atleta para uma duração específica (ex.: planejar pacing para uma prova de X minutos) por interpolação linear entre dois esforços máximos conhecidos de durações diferentes — usar sempre um modelo de curva ajustada (Potência Crítica/Power Duration Model) ou, na ausência dele, dados reais de esforços máximos na duração mais próxima possível."},{"id": "nota-0077", "titulo": "Pmax: potência máxima numa única volta de pedal (substitui o critério antigo de \"5 segundos\")", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 202, "trecho": "Pmax is the greatest amount of power that can be generated for a very short period of time with a minimum of one full pedal revolution with both legs. It is essentially a measure of the true maximal power an individual can produce on the bicycle."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 202, "trecho": "The Pmax metric is a much truer expression of the maximal neuromuscular power a rider can produce, because the influence of fatigue and overlapping energy system contributions are minimized."}], "relacionadas": [{"id": "nota-0032", "tipo": "alternativa-a", "justificativa": "Pmax substitui/refina o critério antigo de potência neuromuscular de 5 segundos usado no Power Profile (nota-0032)"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Pmax é a maior potência que o atleta consegue gerar numa duração mínima de uma volta completa de pedal com as duas pernas (não mais os \"5 segundos\" usados no Power Profile clássico). É essencialmente a medida mais pura da potência neuromuscular máxima que o ciclista consegue produzir, porque minimiza a influência de fadiga e da sobreposição de outros sistemas de energia que ainda contaminava um pouco a métrica de 5 segundos.\n\nContexto histórico: o critério de 5 segundos existia por limitação técnica de medidores de potência antigos (picos de dado espúrios eram mais comuns e difíceis de filtrar) — com medidores modernos e análise de dados mais avançada, tornou-se viável usar diretamente a potência de uma única volta de pedal, que também é capturada com mais frequência no dia a dia (mais dados = métrica mais robusta) do que esperar por um esforço máximo dedicado de 5s completos.\n\nAplicação ao feedback: ao buscar o pico de potência neuromuscular de uma atividade no Strava (dado por segundo, não por volta de pedal), usar o pico de potência mais curto disponível (idealmente 1s) como aproximação de Pmax — picos isolados de curtíssima duração são o sinal mais confiável de capacidade neuromuscular máxima, mais robusto que a antiga janela de 5s."},{"id": "nota-0078", "titulo": "FRC (Functional Reserve Capacity): capacidade em joules acima do FTP; fórmula e exemplo numérico completo", "dominio": "metricas-de-potencia", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "referencia", "sinais": ["potência-máx", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 203, "trecho": "functional reserve capacity (FRC)... is the amount of continuous work that can be performed above FTP until fatigue occurs... FRC is expressed in terms of joules, and the absolute amount of work the rider can perform above FTP, regardless of the time available to perform it."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 204, "trecho": "let's say an athlete has an FRC equal to 20 kJ (20,000 J)... if the athlete is going to perform a maximal 30-second effort, he or she will be able to sustain 666.7 watts above FTP (20,000 J/30 sec.)... for 120 seconds 166.7 watts above FTP... if the rider's FTP is 300 watts, he or she would be able to sustain 300 + 167 = 467 watts for 120 seconds."}], "relacionadas": [{"id": "nota-0045", "tipo": "pre-requisito", "justificativa": "FRC já havia sido introduzida de forma aplicada no Capítulo 5 (nota-0045); esta nota traz a definição formal e a fórmula de cálculo"}], "confianca": 0.85, "status": "auto-aprovado", "body": "FRC (Functional Reserve Capacity) é a quantidade total de trabalho (em joules) que o atleta consegue realizar continuamente acima do FTP até a exaustão — diferente da maioria das métricas de potência (que são taxas, watts = joules/segundo), FRC é uma medida d
