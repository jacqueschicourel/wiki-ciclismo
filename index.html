ombinar vários sistemas, cada treino Kitchen Sink específico costuma ter ênfase maior num sistema. Servem como bom teste de resistência à fadiga geral (o termo já havia sido referenciado sem definição formal nas notas do Cap.10, ex. treino de Joe TriGuy).\n\nAplicação ao feedback: ao analisar uma atividade muito longa com blocos de intensidade muito variados (tempo significativo em várias zonas diferentes, não concentrado numa única), o sistema pode reconhecer esse padrão como um treino tipo \"Kitchen Sink\" — útil para não classificar erroneamente a sessão como \"mal estruturada\"/\"sem foco\", já que essa variedade é intencional nesse formato específico de treino."},{"id": "nota-0006", "titulo": "Treino indoor produz dados de potência mais estáveis (menor variabilidade) que treino outdoor", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": ["potência-série-temporal", "VI"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 30, "trecho": "On an indoor trainer, without the outside influences of wind, hills, dogs, and so on, you can focus your intervals in exact wattage zones for optimal improvement."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 31, "trecho": "Power-meter data from indoor training sessions are also \"cleaner\" than from on-road efforts, as the massive wattage fluctuations caused by changes in terrain, riding with others, and just the variable nature of pedaling frequency are gone from the power file."}], "relacionadas": [], "confianca": 0.75, "status": "auto-aprovado", "body": "Sem as influências externas de vento, subidas/descidas, trânsito e outros ciclistas, o treino em rolo/smart trainer permite manter a potência dentro de uma faixa (zona) de forma muito mais constante do que ao ar livre, onde a potência instantânea oscila bastante mesmo quando o esforço percebido é estável. Isso torna os dados de potência de sessões indoor mais \"limpos\" — com menor variação momento a momento — o que facilita tanto a execução precisa de intervalos em zonas exatas quanto a análise posterior do arquivo de potência.\n\nAplicação ao feedback: sessões indoor tendem a apresentar um Índice de Variabilidade (VI = NP/potência média) mais baixo do que sessões outdoor equivalentes em intensidade, simplesmente por causa do ambiente controlado — essa diferença de contexto (indoor vs. outdoor) deve ser considerada antes de interpretar um VI mais alto em treino externo como problema de pacing. (O conceito de VI é definido em detalhe em capítulo posterior sobre potência normalizada.)"},{"id": "nota-0039", "titulo": "Potência ao ar livre é estocástica: pacing deve mirar uma faixa, não um valor exato", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal", "cadência"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 84, "trecho": "Instantaneous power output when riding on the road over variable terrain contributes to the highly variable nature of your wattage. One second it's 500 watts, the next second it's 0 watts, and the next it's 220 watts... it is actually just highly variable because of the nature of the terrain, the wind, the riders around and in front of you."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 85, "trecho": "Rather than trying to hit a specific wattage target, you should attempt to stay within a particular range... For example, if your goal is to work the lactate system but not go too hard, you might focus on producing at least 300 watts, but not exceeding 320 watts, while holding a 90-rpm cadence."}], "relacionadas": [{"id": "nota-0006", "tipo": "complementa", "justificativa": "mesmo tema de variabilidade de potência ao ar livre vs. ambiente controlado"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Fora de ambiente controlado (rolo, estrada plana sem vento), a potência instantânea é altamente variável (estocástica) por causa do terreno, vento e outros ciclistas — pode saltar de 500 W para 0 W para 220 W em segundos consecutivos. Por isso, ao interpretar aderência a um intervalo prescrito, não se deve esperar (nem cobrar) que o atleta mantenha um valor exato de potência — o critério correto é permanecer dentro de uma faixa (ex.: 300–320 W a 90 rpm para um intervalo de limiar), evitando cair longe demais por baixo ou ultrapassar muito o teto do esforço prescrito.\n\nAplicação ao feedback: ao avaliar se um intervalo foi bem executado, comparar a potência (média e distribuição) contra a faixa-alvo prescrita, não contra um único número — desvios pontuais dentro de terreno ondulado ou com vento não indicam necessariamente má execução."},{"id": "nota-0040", "titulo": "Regra do \"intervalo repetível\": usar a 3ª repetição como referência e parar quando a potência cair 5% abaixo dela", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-por-lap", "tempo-em-zona"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 87, "trecho": "we have presented a way to determine the optimum number of repeats in Table 5.1. These numbers are based on our review of more than 3,000 power-meter files and our experience of working with more than 1,000 athletes."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 88, "trecho": "In the table, we have based the percentage drop-off on the third interval that you complete because typically, the effort that a rider can put forth in the first two intervals will be much higher than what that rider could actually repeat multiple times... we throw out those first two efforts for the purpose of determining when to stop a workout."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 89, "trecho": "we must take the wattage in the third effort and subtract 5 percent from it (in this case, 340 × 0.05 = 17, and 340 – 17 = 323 watts) to determine when to stop the repeats. When the athlete cannot average at least this wattage (323) for his interval, he is going to stop."}], "relacionadas": [{"id": "nota-0022", "tipo": "pre-requisito", "justificativa": "usa a definição de zonas de FTP para especificar a intensidade-alvo do intervalo (ex.: VO2max 106-120% FTP)"}], "confianca": 0.85, "status": "auto-aprovado", "body": "Regra desenvolvida pelos autores (baseada em revisão de mais de 3.000 arquivos de potência e 1.000+ atletas) para determinar objetivamente quando parar uma série de intervalos repetidos (ex.: 5×5min, 8×2min): a potência do **3º intervalo completo é usada como referência \"repetível\"** — descartam-se os dois primeiros esforços porque, estando o atleta fresco, eles tendem a ser mais fortes do que o atleta consegue de fato repetir ao longo da série (mais glicogênio disponível e capacidade de trabalho anaeróbio ainda intacta). A partir da potência média do 3º intervalo, **subtrai-se 5%** para obter o limiar de parada: quando o atleta não conseguir mais atingir, em média, esse valor num intervalo, a série deve ser encerrada, pois a intensidade já não é suficiente para gerar o estímulo/adaptação pretendidos.\n\nFórmula: **potência de parada = potência do 3º intervalo × 0,95**. Exemplo do livro: FTP = 300 W, meta de VO2máx (106–120% FTP), 3º intervalo médio de 340 W → 340 × 0,05 = 17 → 340 − 17 = 323 W é o piso; quando o atleta não atingir mais 323 W de média no intervalo, para.\n\nNuance: essa regra do descarte dos 2 primeiros esforços vale para intervalos mais curtos (relevante sobretudo até ~3 min); para intervalos mais longos, em que o atleta só completa 2 repetições no total, a regra não se aplica da mesma forma. Também não se aplica igual a atletas muito experientes, que já sabem de saída a potência que conseguem sustentar (não precisam \"gastar\" os 2 primeiros esforços para descobrir isso).\n\nAplicação ao feedback: dado um arquivo de intervalos marcados (laps), comparar a queda percentual de potência de cada repetição em relação ao 3º intervalo — se a queda ultrapassar ~5% antes do fim da série planejada, é sinal de que a série foi bem otimizada (ou até que poderia ter continuado, se a queda ainda não tiver chegado a 5% no fim da série); se o atleta parou antes da queda de 5%, é sinal de que poderia ter feito mais repetições."},{"id": "nota-0041", "titulo": "Sweet Spot (sub-limiar): faixa de ~88–94% do FTP e papel na periodização", "dominio": "tipos-de-treino", "camada": ["semanal", "mensal"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["potência-média", "FTP", "tempo-em-zona"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 96, "trecho": "The lower part of Level 4 is what we call the Sub-Threshold level, or the Sweet Spot. This occurs at about 88–94 percent of your functional threshold power—on the cusp of both the Tempo level and the Lactate Threshold level."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 96, "trecho": "We encourage the athletes we work with to train heavily in this area at the beginning of the racing season, before moving into training right at their FTP (91–105 percent). We then revisit this intensity level around the middle of June in the lead-up to a second peak in the fall... we incorporate this Sweet Spot training at least once or twice every 14 days."}], "relacionadas": [{"id": "nota-0028", "tipo": "complementa", "justificativa": "o Sweet Spot é o iLevel 4a (88-95% do FTP) descrito na Tabela 3.5 de iLevels — pequena divergência de 1 ponto percentual no teto (94 vs 95) entre as duas passagens do mesmo livro, registrada em _revisao/conflitos/"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Sweet Spot (também chamado de Sub-Threshold, parte inferior do Nível 4) é a faixa de intensidade entre o topo do Tempo e o limiar de lactato, definida no texto como aproximadamente **88–94% do FTP** (na tabela de iLevels do Capítulo 3, o mesmo intervalo aparece como 88–95% — ver nota de conflito interno). Não é um nível oficial dos 7 clássicos, mas é tratado como uma das faixas de treino mais úteis do livro.\n\nPapel na periodização recomendado pelos autores: treinar pesado nessa faixa no **início da temporada de corrida**, antes de progredir para treino direto no FTP (91–105%); revisitar a faixa de Sweet Spot por volta de **meados de junho**, na preparação para um segundo pico de forma no outono. Mesmo fora desses períodos-chave, os autores recomendam incorporar Sweet Spot **pelo menos 1–2 vezes a cada 14 dias**.\n\nPor que funciona: treinar nessa faixa não ajuda muito o sprint, a potência de VO2máx ou a capacidade anaeróbia, mas é uma das formas mais eficientes de elevar o FTP com bom retorno por unidade de tempo/fadiga, servindo de base sólida e ampla antes de avançar para trabalho de limiar mais específico. Um erro comum apontado no texto é avançar cedo demais para Nível 4/acima sem construir essa base de Sweet Spot, comprometendo essa \"fundação\".\n\nAplicação ao feedback: ao classificar o tempo-em-zona de uma sessão pela potência média, tratar a faixa de 88–94% do FTP como uma zona funcional distinta (Sweet Spot) e não apenas como Tempo alto ou limiar baixo — especialmente útil para reconhecer blocos de base no início de temporada ou em torno de meados de junho, conforme a periodização recomendada."},{"id": "nota-0042", "titulo": "Janela de duração para estímulo eficaz de VO2máx: mínimo 3 min, máximo ~8 min por esforço", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-média", "tempo-em-zona"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 89, "trecho": "For the VO2max system to adapt to a training stimulus, a minimal effort of 3 minutes is necessary, with the maximum duration being about 8 minutes. After 8 minutes, it's very difficult, if not impossible, for most people to maintain 106–120 percent of FTP."}], "relacionadas": [{"id": "nota-0022", "tipo": "complementa", "justificativa": "detalha a faixa de duração do Nível 5 (VO2máx) da Tabela 3.1"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Para que um esforço realmente estimule adaptação do sistema de VO2máx, ele precisa durar pelo menos 3 minutos (esforços mais curtos não dão tempo suficiente ao sistema para ser adequadamente estressado) e no máximo cerca de 8 minutos (além disso, a maioria dos atletas não consegue mais sustentar 106–120% do FTP, a intensidade que caracteriza o Nível 5/VO2máx).\n\nAplicação ao feedback: ao avaliar se um bloco de intervalos foi eficaz para desenvolvimento de VO2máx, verificar se a duração de cada repetição caiu dentro dessa janela de 3–8 minutos com a intensidade correspondente (106–120%+ do FTP) — esforços fora dessa janela (mesmo na intensidade certa) tendem a treinar predominantemente outro sistema (ex.: capacidade anaeróbia, se muito curtos e intensos; limiar, se a intensidade cair para sustentar mais tempo)."},{"id": "nota-0043", "titulo": "Capacidade Anaeróbia (Nível 6) é intensidade supra-máxima: exige mais de 100% do VO2máx", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "conceito", "sinais": ["potência-média"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 106, "trecho": "Anaerobic Capacity (AC) efforts typically entail intervals of 2 minutes or less... The intensity of these efforts is far beyond what can be maintained aerobically. It is a supra-maximal intensity—that is, it requires more than 100 percent of your VO2max."}], "relacionadas": [{"id": "nota-0022", "tipo": "complementa", "justificativa": "detalha fisiologicamente por que o Nível 6 (Anaerobic Capacity) da Tabela 3.1 exige intensidade supra-máxima"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Esforços de Capacidade Anaeróbia (Nível 6, tipicamente ≤2 minutos) exigem uma intensidade \"supra-máxima\" — ou seja, superior a 100% do VO2máx do atleta, além do que pode ser sustentado por vias aeróbias. É por isso que esses esforços são tão dolorosos e de duração necessariamente curta: a demanda energética excede a capacidade aeróbia máxima, obrigando o corpo a recorrer predominantemente a vias anaeróbias. Diferem do Nível 5 (VO2máx), que fica dentro (ou levemente acima, 106-120%) da faixa aeróbia máxima.\n\nEsses esforços devem ser feitos quando o atleta está relativamente fresco na semana de treino, dada a intensidade elevada exigida.\n\nAplicação ao feedback: ao identificar picos de potência muito curtos (≤2 min) que excedem claramente a faixa do Nível 5/VO2máx (>120% do FTP), classificar esses trechos como estímulo de Capacidade Anaeróbia, não de VO2máx — são sistemas energéticos distintos mesmo estando na mesma região de \"alta intensidade\" do arquivo."},{"id": "nota-0044", "titulo": "Protocolo micro-burst: 15 s a 150% FTP / 15 s a 50% FTP, em blocos de 10 minutos", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-por-lap", "cadência"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 108, "trecho": "It's called the 'micro-burst workout.'... Since the efforts are 15 seconds each, using an indoor trainer makes them highly controllable."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 109, "trecho": "do two sets of micro-bursts lasting 10 minutes each. A micro-burst effort is 15 seconds on and 15 seconds off, repeated continually for the 10 minutes. For the on segment, go to 150 percent of FTP... and draw back to 50 percent of FTP... for the 15-second off segment."}], "relacionadas": [{"id": "nota-0022", "tipo": "complementa", "justificativa": "trabalha tanto o Nível 7 (neuromuscular) quanto o Nível 4 (limiar), sendo classificado pelo livro em ambos os níveis simultaneamente"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Protocolo \"micro-burst\", indicado especialmente para rolo/smart trainer por ser altamente controlável: blocos contínuos de 10 minutos alternando 15 segundos \"on\" a 150% do FTP com 15 segundos \"off\" a 50% do FTP, repetidos continuamente durante todo o bloco. O livro sugere fazer 2 blocos de 10 min, com 20 minutos de pedalada leve entre eles.\n\nPropósito: melhora a capacidade de produzir potência explosiva característica do \"estouro\" inicial de um sprint, da arrancada em pé numa prova de rua (criterium) ou da largada parada numa prova de pista — os autores notam que os arquivos de potência desse treino são muito parecidos com os de um criterium real, ilustrando a especificidade do estímulo. É classificado tanto como treino de Nível 7 (potência neuromuscular) quanto, numa variação, como treino de Nível 4 (limiar) quando os bursts de 10s são inseridos dentro de um bloco de 1h em ritmo de Tempo baixo (76-80% FTP).\n\nAplicação ao feedback: ao identificar num arquivo padrões de alternância curta e regular entre potência muito alta (~150% FTP) e muito baixa (~50% FTP) em ciclos de 15s, reconhecer isso como um treino de micro-burst (estímulo neuromuscular/limiar, não um treino de intervalos tradicionais) antes de classificar a sessão por outra métrica de zona."},{"id": "nota-0054", "titulo": "Analisar repetibilidade de uma série: comparar o 2º/3º intervalo com o último para medir a queda de potência", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-por-lap"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 138, "trecho": "When looking for 'repeatability,' always compare the second and third intervals with the last one to really see the drop-off in power, because the first interval always takes place when the athlete is fresh, and the wattage is therefore not one that can be repeated multiple times."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 139, "trecho": "his fifth interval was 403 watts. A 10 percent decrease would be close to 360 watts. His 11th interval was 347 watts, and he did one more, with his 12th interval being 382 watts."}], "relacionadas": [{"id": "nota-0040", "tipo": "complementa", "justificativa": "mesmo princípio da regra do 'intervalo repetível' (nota-0040), mas usado aqui retrospectivamente para avaliar a série já concluída, com um exemplo numérico que usa 10% de queda em vez de 5%"}], "confianca": 0.7, "status": "revisar", "body": "Para avaliar retrospectivamente a \"repetibilidade\" de uma série de intervalos já concluída (ex.: 12 subidas de ~1 minuto), os autores recomendam comparar a potência do 2º ou 3º intervalo (não o 1º, que é sempre mais forte por o atleta estar fresco) com a potência do último intervalo da série, para visualizar quanto a potência efetivamente caiu ao longo da sessão.\n\nExemplo do livro: um atleta com 5º intervalo em 403 W (usado aqui como referência) — uma queda de 10% ficaria perto de 360 W; o 11º intervalo dele ficou em 347 W (já abaixo desse piso), e ainda assim ele fez um 12º intervalo, alcançando 382 W.\n\n**Atenção — possível inconsistência interna:** esta passagem usa uma queda de referência de **10%** para avaliar a série retrospectivamente, enquanto a regra prescritiva do Capítulo 5 (nota-0040) usa **5%** de queda a partir do 3º intervalo como critério para decidir parar a série durante o treino. Não fica claro no texto se são critérios propositalmente diferentes (um para decidir parar em tempo real, outro mais tolerante para analisar depois) ou uma inconsistência de edição. Marcada para revisão humana por essa divergência numérica dentro da mesma fonte.\n\nAplicação ao feedback: ao revisar uma série de intervalos já concluída, comparar a potência do 2º/3º intervalo com a do último para quantificar a queda real ao longo da sessão — essa queda retrospectiva pode usar um limiar mais tolerante (ex.: ~10%) do que o critério prescritivo de parada em tempo real (5%, nota-0040), já que aqui o objetivo é avaliar a sessão como um todo, não decidir se para no meio dela."},{"id": "nota-0069", "titulo": "Treino de \"força-resistência\" (cadência baixa, marcha pesada) não aumenta força/hipertrofia de forma relevante", "dominio": "tipos-de-treino", "camada": ["semanal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal", "cadência"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 179, "trecho": "A laboratory study performed in New Zealand found that such training does not increase either the size (estimated using anthropometry) or the maximal force production (determined using isokinetic dynamometry) of the leg extensor muscles."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 180, "trecho": "Pedaling at 45 rpm during the strength endurance workouts resulted in an AEPF approximately twice that required to pedal at the same power(s) but at a more normal cadence... the AEPF produced during the two strength endurance sessions still required less than 50 percent of the athlete's strength."}], "relacionadas": [{"id": "nota-0068", "tipo": "pre-requisito", "justificativa": "usa a constatação da nota-0068 de que a força raramente limita o ciclismo"}], "confianca": 0.8, "status": "auto-aprovado", "body": "Intervalos de \"força-resistência\" (strength endurance), populares especialmente entre triatletas — pedalar por períodos longos (5–20 min) em cadência anormalmente baixa (45–75 rpm) e marcha pesada — são frequentemente promovidos com a alegação de que aumentam força/hipertrofia muscular específica para o ciclismo. Um estudo de laboratório na Nova Zelândia citado pelos autores não encontrou aumento nem de tamanho (antropometria) nem de força máxima (dinamometria isocinética) dos extensores de perna com esse tipo de treino.\n\nAnálise via AEPF: mesmo pedalando a 45 rpm (dobrando a AEPF necessária em comparação com cadência normal de 85–90 rpm para a mesma potência), a força efetiva usada nesses intervalos ainda ficava abaixo de 50% da força máxima do atleta — comparável, em termos de carga, a subir escadas com o próprio peso corporal, não a treinamento de força tradicional. O atleta do estudo de caso completou entre 1.125 e 1.800 \"repetições\" de pedalada nesses intervalos, uma carga incompatível com estímulo de hipertrofia/força.\n\nTambém não há evidência clara de que esse tipo de treino recrute mais fibras de contração rápida do que pedalar em cadência normal na mesma zona de potência — a AEPF durante o treino de força-resistência ficava tão distante da força máxima específica daquela velocidade quanto em cadência normal.\n\nAplicação ao feedback: ao avaliar um plano de treino que inclui blocos de \"força-resistência\" com expectativa de ganho de força muscular, é importante calibrar a expectativa — o principal benefício desse tipo de treino tende a não ser o ganho de força/hipertrofia (que a evidência citada não sustenta), mas talvez outros efeitos (ex.: familiarização com esforço em marcha pesada)."},{"id": "nota-0109", "titulo": "Protocolo de 'calibração de potência': associar RPE a wattagem específica para pacing em triathlon", "dominio": "tipos-de-treino", "camada": ["semanal", "mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-média", "esforço-relativo (Relative Effort)"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 322, "trecho": "To begin the process, you will do a series of three to four 10-minute intervals, with 5 minutes rest between intervals, 5 times over 10 days... Once you have done this exercise at each intensity at least twice, lengthen the intervals and do two 20-minute efforts at each intensity level in order to recalibrate for the longer distance... lengthen your efforts to 60 minutes and repeat the process at least two more times through each intensity level."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 322, "trecho": "For the power calibration to work, you must internalize the perceived exertion at each power level correctly—doing more than one session a day can cause you to confuse the physical responses to the different levels instead of learning how to distinguish them."}], "relacionadas": [{"id": "nota-0097", "tipo": "complementa", "justificativa": "aplicação triathlon-específica da lógica de treinar o que é relevante ao objetivo do atleta"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Protocolo estruturado para treinar a associação entre esforço percebido (RPE) e potência real (wattagem), essencial para pacing em triathlon (onde a FC/RPE no dia da prova tende a ser mais baixa que no treino para o mesmo esforço real):\n\n1. **Fase 1 (curta duração):** 3-4 intervalos de 10 minutos, com 5 minutos de recuperação entre eles, repetidos 5 vezes ao longo de 10 dias, em cada nível de intensidade-alvo.\n2. **Fase 2 (duração média):** após repetir a Fase 1 pelo menos duas vezes em cada intensidade, alongar para dois intervalos de 20 minutos por intensidade.\n3. **Fase 3 (duração longa):** alongar os esforços para 60 minutos, repetindo pelo menos mais duas vezes por nível de intensidade.\n\nRegra crítica: fazer no máximo uma sessão de calibração por dia — mais de uma sessão no mesmo dia mistura as respostas físicas dos diferentes níveis e prejudica a internalização do RPE correto para cada wattagem. Idealmente repetir sempre na mesma estrada/percurso para minimizar variáveis externas, e registrar anotações após cada sessão.\n\nAplicação ao feedback: este protocolo é relevante para um produto de feedback que cruza esforço-relativo (Strava) com potência — se o atleta tiver completado uma sequência de sessões com esse padrão, o sistema pode reconhecer isso como um bloco de calibração de pacing e, mais tarde, usar a relação RPE-vs-potência aprendida para validar a estratégia de pacing em provas."},{"id": "nota-0120", "titulo": "Pacing em subidas de contrarrelógio: empurrar acima da FTP quando há descida de recuperação; manter na FTP quando a subida platô (sem descida)", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-por-lap", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 357, "trecho": "In this scenario, you can afford to push a little harder on the uphill section because you will get a chance to recover on the downhill... If it's a 3-minute hill, for example, then you know you can hold 115 percent of your FTP for that amount of time without cracking when you are fresh, so you could knock off, say, 5 to 10 percent of that and try for 105 percent of FTP."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 357, "trecho": "when you have a hill that flattens out at the top, or plateaus, then you have to be very careful to maintain FTP or just above it on the uphill portion. As soon as you crest the hill, you will want to get back on the gas and get back up to speed... any time spent below FTP after the crest of the hill and on the flat will be time you are giving away to your competition."}], "relacionadas": [{"id": "nota-0048", "tipo": "pre-requisito", "justificativa": "usa a referência de potência sustentável por duração (Níveis/Zonas de Coggan, nota-0048) como teto de esforço em subida"}], "confianca": 0.7, "status": "auto-aprovado", "body": "Duas regras de pacing para subidas dentro de um contrarrelógio, conforme o tipo de subida:\n\n1. **Subida com descida correspondente (recuperação disponível):** pode-se empurrar acima da FTP, escalonado pela duração da subida — usar como teto de referência a potência máxima sustentável para aquela duração (ex.: 115% da FTP por 3 minutos, segundo os Níveis de Coggan) e então reduzir 5-10 pontos percentuais desse teto (ex.: mirar ~105% da FTP numa subida de 3 minutos), para deixar margem de segurança.\n2. **Subida que \"platô\" (sem descida imediata para recuperar):** manter a potência na FTP ou apenas ligeiramente acima — não fazer um surto grande, pois não haverá descida para se recuperar. É crítico retomar a velocidade rapidamente assim que cruzar o topo; qualquer tempo abaixo da FTP no platô/reta após o topo é tempo perdido para os concorrentes.\n\nAplicação ao feedback: ao segmentar uma prova/treino por perfil de elevação, aplicar regras diferentes conforme o tipo de subida identificado (com descida vs. platô) ao avaliar se o pacing do atleta na subida foi apropriado — não tratar todo excesso de potência em subida da mesma forma."},{"id": "nota-0121", "titulo": "Regra da FTP para decidir 'sit on' vs. puxar numa fuga: se a rotação exige potência acima da FTP, sentar na roda em vez de puxar", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 350, "trecho": "he realized that he was working at more than 500 watts; when he was in the 'recovery line,' he was still having to put out 400 watts. Doing some quick math and drawing on a keen understanding of his FTP, he realized that he was going to get dropped very quickly. He reasoned... that if he was just sitting in on the break and over his FTP, then his time in the break was limited. So he did what every good rider should do at a point like this: Sit on!"}], "relacionadas": [{"id": "nota-0021", "tipo": "pre-requisito", "justificativa": "usa a FTP (nota-0021) como limiar de decisão tática em tempo real durante uma fuga"}], "confianca": 0.65, "status": "auto-aprovado", "body": "Estudo de caso (criterium): um ciclista numa fuga de 4 percebeu, em tempo real via medidor de potência, que mesmo na \"fila de recuperação\" (draft) da rotação ele precisava sustentar ~400W, acima da sua FTP — sinal de que o ritmo do grupo era insustentável para ele a médio prazo. Decisão tática correta segundo os autores: parar de puxar e \"sentar na roda\" (sit on) em vez de continuar contribuindo com a rotação, evitando ser cuspido do grupo por exaustão prematura.\n\nRegra geral extraída: **se o esforço necessário mesmo na posição de menor exigência da rotação (draft) está acima da FTP do atleta, a fuga/grupo está a um ritmo insustentável para ele** — a decisão tática racional é reduzir contribuição (sit on) em vez de insistir em puxar, preservando energia para uma oportunidade posterior (ex.: sprint final).\n\nAplicação ao feedback: ao analisar um trecho de corrida em grupo/fuga onde a potência do atleta em \"vales\" de rotação (baixa exigência) já está próxima ou acima da FTP, isso é um sinal de ritmo insustentável — útil para explicar retrospectivamente por que um atleta foi \"cuspido\" de um grupo ou precisou mudar de estratégia no meio da prova."},{"id": "nota-0131", "titulo": "Protocolo 30-30-30 para ciclocross (30s a 150% FTP / 30s roda livre / 30s corrida) e volume semanal de FTP recomendado", "dominio": "tipos-de-treino", "camada": ["semanal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-por-lap", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 380, "trecho": "we call this the 30-30-30 workout, because it involves 30 seconds at 150 percent of FTP, 30 seconds of coasting (0 percent of FTP), and 30 seconds of running. By extending the intervals from 15 to 30 seconds, we take the workout from Level 7 to Level 6... The 30-30-30 workout is done continuously for 10 minutes. Rest for 5 minutes between intervals, completing three to five 10-minute intervals, and then cool down."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 381, "trecho": "cyclocross demands a strong FTP, so the traditional Level 4 FTP workouts are important... We recommend doing four efforts at FTP for 10 minutes each, or three for 15 minutes each, or two for 20 minutes each, in order to get in the needed threshold work in one of your workouts each week."}], "relacionadas": [{"id": "nota-0048", "tipo": "pre-requisito", "justificativa": "usa os Níveis de Coggan (nota-0048) como base de intensidade (150% FTP = Nível 6/7)"}, {"id": "nota-0130", "tipo": "complementa", "justificativa": "treino desenhado especificamente para replicar o padrão de esforço característico do ciclocross (nota-0130)"}], "confianca": 0.75, "status": "auto-aprovado", "body": "**Treino 30-30-30 (específico para ciclocross):** ciclo contínuo de 30 segundos a 150% da FTP, seguido de 30 segundos em roda livre (0% da FTP), seguido de 30 segundos correndo (simulando desmontar/carregar a bike), repetido continuamente por **10 minutos**. Descansar 5 minutos entre séries, completando **3 a 5 séries de 10 minutos**, depois desaquecer. Ao estender o esforço de 15s (Nível 7, Neuromuscular) para 30s, o estímulo predominante passa a ser o sistema de Capacidade Anaeróbia (Nível 6), com menor exigência neuromuscular pura.\n\n**Trabalho de FTP semanal recomendado para ciclocross:** uma sessão semanal com um dos seguintes formatos — 4 esforços de 10 minutos na FTP, 3 esforços de 15 minutos, ou 2 esforços de 20 minutos.\n\nAplicação ao feedback: se o sistema identificar um padrão de atividade compatível com este protocolo (ciclos regulares de ~30s de alta intensidade / ~30s de recuperação / repetições ao longo de blocos de ~10min), pode reconhecê-lo como um treino 30-30-30 de ciclocross e usar isso para contextualizar a análise de TSS/IF da sessão (a intensidade média será moderada apesar do estímulo intenso, por causa dos 30s de roda livre a 0%)."},{"id": "nota-0007", "titulo": "Cadência abaixo de 70 rpm em potência de limiar associada a perda de contato com o grupo (estudo de caso)", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["cadência", "potência-média"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 24, "trecho": "whenever this racer's cadence dropped below 70 rpm for more than five minutes while riding at his threshold power output, he was dropped. However, Hunter also found many cases in which the cyclist was able to stay with the same athletes at and above his threshold wattage as long as his cadence was over 95 rpm."}], "relacionadas": [], "confianca": 0.55, "status": "revisar", "body": "Estudo de caso de um único atleta (não uma regra fisiológica geral validada): analisando múltiplas corridas em que o ciclista foi \"descolado\" do pelotão, o treinador identificou um padrão — sempre que a cadência caía abaixo de 70 rpm por mais de 5 minutos enquanto o atleta pedalava na sua potência de limiar, ele perdia contato com o grupo; quando conseguia manter cadência acima de 95 rpm nessa mesma intensidade, conseguia se manter no grupo. A solução aplicada foi trocar a relação de marchas (cassete de 27 dentes em vez de 23) para permitir cadência mais alta em subidas íngremes.\n\nAtenção: esta é uma correlação observada em um atleta específico (N=1), não uma norma fisiológica geral — confiança baixa por ser um caso anedótico apresentado como exemplo, não um achado sistemático. Pode ser útil como hipótese de leitura (cadência muito baixa sustentada em potência de limiar pode sinalizar ineficiência mecânica ou marcha inadequada), mas não deve ser aplicada como regra automática de feedback sem mais evidência do cânone. Marcada para revisão humana por confiança < 0.7.\n\nAplicação ao feedback: dado o caráter anedótico (N=1) desta observação, não gerar automaticamente uma recomendação de troca de marcha a partir de cadência baixa sustentada em potência de limiar — no máximo, sinalizar como hipótese de baixa confiança para revisão humana, nunca como regra automática de feedback."},{"id": "nota-0046", "titulo": "Padrão de potência da \"jogada vencedora\" em prova: ataque inicial, sustentação no limiar, sprint final", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-série-temporal", "potência-média", "FC (média/máx)", "velocidade"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 104, "trecho": "Hunter's examination of power-meter files has proven that the race-winning move always contains an initial attack to create separation from the field—that is, a breakaway—then a continued high effort to establish the separation, followed by a relative settling in at threshold power and a finish with a short burst of speed."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 105, "trecho": "Each effort begins with a 30-second sprint (15 seconds out of the saddle), averaging approximately 200 percent of threshold power, and peaking at around 300 percent... Then ride for 3 minutes at 100–110 percent of FTP... and finish with a 10-second burst, trying to reach 200–250 percent of FTP."}], "relacionadas": [{"id": "nota-0042", "tipo": "complementa", "justificativa": "a fase de sustentação da jogada vencedora ocorre na janela VO2max/limiar detalhada na nota-0042"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Segundo análise dos autores de múltiplos arquivos de potência de corridas, a jogada que resulta em vitória (ou em formar/sustentar uma fuga decisiva) segue um padrão reconhecível em 3 fases: (1) ataque inicial explosivo para criar separação do pelotão (esforço de potência muito alta, curta duração — ordem de grandeza de ~200% do FTP em média por ~30s, com pico por volta de ~300% do FTP); (2) esforço elevado contínuo para estabelecer/consolidar a separação, tipicamente se estabilizando perto da potência de limiar (FTP, 100-110%); (3) arremate final com um pico curto de velocidade/potência no sprint de chegada.\n\nAplicação ao feedback: ao analisar o arquivo de potência de uma prova (especialmente onde o atleta se destacou do pelotão ou correu numa fuga), procurar esse padrão de 3 fases pode ajudar a identificar e nomear corretamente o tipo de esforço decisivo realizado — útil tanto para dar feedback tático quanto para desenhar treinos específicos que simulem esse padrão (o livro chama isso de treino \"simulação de jogada vencedora\")."},{"id": "nota-0118", "titulo": "Protocolo de pacing em contrarrelógio plano: início contido, isopower na FTP, contenção proporcional à duração", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["potência-série-temporal", "potência-média", "FTP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 354, "trecho": "If your goal wattage is 250 watts for the time trial, use the first 15 to 30 seconds to get up to speed, then nail your wattage at 250 to 260 for the rest of the time trial. Hold it there as best you can... Begin to push a little harder in those last 5 minutes to finish strong."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 355, "trecho": "If your time trial is 40 km... you should probably hold back a little for the first 5 minutes of the event. If it's shorter—such as a 10-miler—then you can't afford to hold back as much; you could still hold back for the first 2 minutes of the effort, however. And if you are doing a 4 km pursuit, there is almost no holding back... In general, the shorter the event, the less you hold back."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 356, "trecho": "Ride at your FTP until there's only 3 to 5 minutes to go, and then bring that pace up until you reach the finish line. This 'isopower' strategy is the default strategy for any time trial: Ride at your FTP, making it your goal to be as smooth and consistent as you possibly can be."}], "relacionadas": [{"id": "nota-0021", "tipo": "pre-requisito", "justificativa": "usa a FTP (nota-0021) como potência-alvo constante da estratégia isopower"}], "confianca": 0.75, "status": "auto-aprovado", "body": "Estratégia padrão (\"isopower\") de pacing para um contrarrelógio plano sem vento:\n\n1. **Largada:** usar os primeiros 15-30 segundos para atingir a velocidade, sem disparar a potência (RPE não reflete o esforço real nos primeiros minutos — risco de largar forte demais).\n2. **Corpo da prova:** manter a potência o mais próximo possível da FTP (estratégia isopower), com o mínimo de variação possível.\n3. **Últimos minutos:** aumentar a intensidade para o final, terminando com o máximo esforço possível na linha de chegada.\n\n**Regra de contenção proporcional à duração da prova:** o tempo de contenção inicial (ritmo levemente abaixo da FTP no começo) escala com a duração total do evento — quanto mais curta a prova, menos se deve segurar o ritmo:\n- Contrarrelógio de ~40 km: reter o ritmo nos primeiros ~5 minutos.\n- Prova mais curta (~10 milhas): reter por ~2 minutos.\n- Perseguição de 4 km: praticamente nenhuma contenção — é uma questão de aguentar o máximo possível até o fim.\n\nAplicação ao feedback: ao analisar um arquivo de contrarrelógio, comparar a potência dos primeiros minutos contra a potência média/FTP do restante da prova — um início desproporcionalmente alto (especialmente nos primeiros 15-30s) é um sinal clássico de pacing ruim (\"started too hard\"), mesmo que a prova termine com um resultado aceitável."},{"id": "nota-0112", "titulo": "Diretrizes de execução de pacing: 95% da potência-alvo nos primeiros 30-45min; +5%/+10% em subidas conforme duração", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["potência-por-lap", "potência-média", "NP"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 332, "trecho": "For the first 30–45 minutes of the race, hold 95 percent of the goal wattage; thereafter, ride as close as you can to your goal wattage. If you encounter a hill, adjust the level of intensity above your goal wattage based on the length of the hill. If the hill is longer than a 3-minute climb, then ride at 105 percent of your goal wattage; if it's a 30-second to 2-minute climb, then ride at 110 percent of your goal wattage."}], "relacionadas": [{"id": "nota-0111", "tipo": "complementa", "justificativa": "diretrizes práticas de execução para a potência-alvo calculada pela fórmula do orçamento de TSS (nota-0111)"}], "confianca": 0.7, "status": "auto-aprovado", "body": "Diretrizes práticas (Endurance Nation) para executar o pacing de uma potência-alvo (NP-alvo) numa prova longa:\n\n- **Primeiros 30-45 minutos:** manter apenas **95% da potência-alvo** (começar mais conservador).\n- **Restante da prova em terreno plano:** manter a potência-alvo o mais próximo possível.\n- **Subidas mais longas que 3 minutos:** subir a intensidade para **105% da potência-alvo**.\n- **Subidas de 30 segundos a 2 minutos:** subir a intensidade para **110% da potência-alvo**.\n\nNota de contexto: normalmente um esforço máximo de 3 minutos seria feito a 115-120% da FTP (Nível 5) e um esforço de 30s-2min entre 120-150% da FTP — os valores de 105%/110% da potência-alvo (não da FTP) aqui são deliberadamente mais conservadores que o esforço máximo possível, para minimizar picos de potência e poupar glicogênio.\n\nAplicação ao feedback: ao segmentar uma prova longa por trecho (plano vs. subida, por duração de subida), o sistema pode comparar a potência real executada em cada segmento contra estas diretrizes percentuais relativas à NP-alvo calculada (nota-0111), sinalizando excesso de esforço nos primeiros 30-45min ou subidas com intensidade muito acima do recomendado."},{"id": "nota-0142", "titulo": "Formato de treino 'Pirâmide': escada de duração ascendente e depois descendente através de zonas crescentes de intensidade", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["tempo-em-zona", "potência-por-lap", "potência-média"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 454, "trecho": "PYRAMID WORKOUTS. P-W1 Pyramid Intervals... begin the pyramid: 4 minutes at upper FTP, rest for 2 minutes at Endurance pace; 3 minutes at VO2max, rest for 2 minutes at Endurance pace; 2 minutes at Anaerobic Capacity, rest for 2 minutes at Endurance pace; 1 minute maximum effort, 2 minutes rest at Endurance pace. Then come back down the pyramid... 2 minutes at Anaerobic Capacity; 3 minutes at VO2max; 4 minutes at lower FTP."}], "relacionadas": [{"id": "nota-0048", "tipo": "pre-requisito", "justificativa": "usa os Níveis de Coggan (nota-0048) como degraus da pirâmide de intensidade"}], "confianca": 0.65, "status": "auto-aprovado", "body": "Formato de treino \"Pirâmide\": uma sequência de intervalos em que a **duração diminui à medida que a intensidade (zona) aumenta**, subindo até um pico de intensidade máxima, e depois **o padrão se inverte simetricamente** (duração volta a aumentar conforme a intensidade diminui), com recuperação em Endurance entre cada degrau. Exemplo do livro: 4min em FTP alto → 3min em VO2max → 2min em Capacidade Anaeróbia → 1min esforço máximo → (subida completa) → 2min Capacidade Anaeróbia → 3min VO2max → 4min FTP baixo (descida simétrica). Existem variações menos intensas combinando apenas Tempo/Sweet Spot em vez da pirâmide completa até o esforço máximo.\n\nAplicação ao feedback: ao analisar os dados de intervalo de uma atividade, um padrão de blocos com duração decrescente-depois-crescente e intensidade crescente-depois-decrescente (simétrico ao redor de um pico central) é reconhecível como um treino em formato \"pirâmide\" — útil para classificar automaticamente o tipo de treino executado a partir da estrutura pura dos dados de potência/tempo-em-zona, sem depender de rótulo manual do atleta."},{"id": "nota-0049", "titulo": "Ciclistas vencedores de prova de pelotão tipicamente não pedalam por pelo menos 15% do tempo", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["tempo-movimento", "tempo-decorrido", "potência-máx"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 122, "trecho": "Most winning road racers do not pedal at least 15 percent of the time. If you are pedaling more than 85 percent of the time in a race, you need to think about where you are sitting in the peloton."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 123, "trecho": "the winners usually pedal the least, but when they do pedal, they pedal the hardest."}], "relacionadas": [], "confianca": 0.75, "status": "auto-aprovado", "body": "Analisando arquivos de potência de vencedores de provas de pelotão (mass-start), os autores observam um padrão: a maioria não pedala em pelo menos 15% do tempo total da prova (ou seja, pedala menos de 85% do tempo) — o tempo sem pedalar reflete economia de energia (esconder-se do vento, aproveitar embalos). Quando pedalam, entretanto, produzem os picos de potência mais altos da prova.\n\nAplicação ao feedback: em arquivos de prova, uma porcentagem de tempo pedalando acima de 85% pode ser um sinal de posicionamento subótimo no pelotão (gastando energia à toa em vez de \"descansar\" na roda de outros), e vale investigar/comentar isso no feedback pós-prova. Esse indicador é menos relevante em treino solo/estruturado, onde o objetivo já é outro."},{"id": "nota-0137", "titulo": "Efeito Allen em MTB de ultraresistência: acelerar antes de um trecho rápido cria um gap de distância que os concorrentes não conseguem fechar; a regra de TT 'não comece forte demais' NÃO se aplica", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["velocidade", "distância", "potência-média"], "fontes": [{"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 391, "trecho": "the mountain-bike course is very seldom about drafting... pacing (holding back your effort in the beginning to conserve energy for the end) does not work the same way in these two specialties. The time trialing rule about not starting too hard, in order to conserve energy for the finish, does not apply."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 391, "trecho": "The Allen effect occurs when a competitor accelerates through a slow section of a course, knowing that a much faster section is coming up. As the competitor reaches the faster section and increases his speed, a larger gap can be created between him and the competitors behind him... it can become impossible for the riders still climbing that hill to close the gap."}, {"arquivo": "Training and Racing with a Power Meter.pdf", "pagina": 392, "trecho": "This gap initially begins as a distance gap, and it is true that the distances between riders can fluctuate while the time gap remains the same... in most forms of bicycle racing, it's the distance between riders that determines the winners. In any case, holding back your effort in the beginning of a mountain-bike race is rarely going to help you in the end."}], "relacionadas": [{"id": "nota-0118", "tipo": "contradiz", "justificativa": "contradiz diretamente a regra de pacing de contrarrelógio de estrada (nota-0118, 'não comece forte demais') — em MTB de ultraresistência sem draft, a lógica de pacing se inverte"}], "confianca": 0.7, "status": "auto-aprovado", "body": "Em MTB (especialmente ultraresistência, sem possibilidade real de draft após os primeiros ~15 minutos), a lógica de pacing de contrarrelógio de estrada (nota-0118, \"não comece forte demais\") **não se aplica**. Os autores descrevem o **\"Efeito Allen\"**: quando um competidor acelera *antes* de um trecho rápido do percurso (ex.: ataca numa subida para chegar ao topo primeiro), ele começa a percorrer o trecho rápido seguinte mais cedo, enquanto os concorrentes ainda estão no trecho lento — criando um **gap de distância** entre eles.\n\nPonto-chave: mesmo que o gap de *tempo* permaneça constante, o gap de *distância* pode crescer (já que na parte rápida do percurso a mesma diferença de tempo representa uma distância maior) — e na maioria das modalidades de ciclismo **é a distância entre os corredores que determina o vencedor**, não o tempo. Isso torna o gap praticamente impossível de fechar para quem ficou para trás, mesmo que o líder desacelere bastante no final da prova.\n\nAplicação ao feedback: para atividades classificadas como MTB de ultraresistência (ou provas offroad longas e sem pelotão/draft), não aplicar as heurísticas de pacing conservador desenvolvidas para contrarrelógio de estrada. Regras de pacing recomendadas por este produto devem ser específicas por modalidade — reconhecer que o tipo de atividade (MTB ultraresistência vs. CRI de estrada) inverte a lógica de \"não comece forte demais\"."},{"id": "nota-0187", "titulo": "Treinamento de força para ciclistas: benefícios em economia de pedalada, potência máxima, sprint, resistência à fadiga e prevenção de lesões — foco em capacidade neuromuscular, não hipertrofia máxima", "dominio": "tipos-de-treino", "camada": ["semanal", "mensal"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 119, "trecho": "Estudos demonstram benefícios relacionados a: economia de pedalada; potência máxima; sprint; resistência à fadiga; prevenção de lesões... O objetivo não consiste em desenvolver hipertrofia máxima. O foco está na melhora da capacidade neuromuscular e da produção de força específica."}], "relacionadas": [{"id": "nota-0179", "tipo": "complementa", "justificativa": "o treinamento de força é citado como um dos mecanismos capazes de melhorar a economia de pedalada definida na nota-0179"}], "confianca": 0.5, "status": "auto-aprovado", "body": "Contrariando a visão antiga de que força teria pouca utilidade para ciclistas, o Manual cita benefícios evidenciados para: economia de pedalada, potência máxima, capacidade de sprint, resistência à fadiga e prevenção de lesões. O objetivo do treinamento de força para ciclistas não é hipertrofia máxima, mas melhora da capacidade neuromuscular (recrutamento, coordenação, rigidez músculo-tendínea) e produção de força específica ao gesto da pedalada.\n\nAplicação ao feedback: fora do escopo de dados do Strava (o app não registra treino de força) — nota de contexto para caso o produto amplie o escopo de feedback além de dados de ciclismo puro, ou para explicar por que melhorias de economia/potência máxima podem ocorrer sem mudança visível no volume de treino em bike."},{"id": "nota-0199", "titulo": "Catálogo de sessões por objetivo fisiológico (Manual, Cap.21): Base Aeróbia (3-5h Z2), Limiar (2-4×10-20min ~LT2/FTP), VO2máx (5×5min, 6×4min, 4×8min, 30/30), Anaeróbio (8×1min, 10×30s), Neuromuscular (sprints 6-12s)", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["tempo-em-zona", "potência-por-lap"], "fontes": [{"arquivo": "Manual treinamento.pdf", "pagina": 168, "trecho": "Sessões voltadas para a base aeróbia... Exemplo: 3h30 a 5h em Zona 2... Sessões voltadas para o limiar... Exemplos: 2 × 20 minutos; 3 × 15 minutos; 4 × 10 minutos."}, {"arquivo": "Manual treinamento.pdf", "pagina": 169, "trecho": "Sessões de VO₂máx... Exemplos clássicos: 5 × 5 minutos; 6 × 4 minutos; 4 × 8 minutos; 30/30 segundos... Sessões anaeróbias... Exemplos: 8 × 1 minuto; 10 × 30 segundos; sprints repetidos."}, {"arquivo": "Manual treinamento.pdf", "pagina": 170, "trecho": "Sessões neuromusculares... Exemplos: sprints de 6 a 12 segundos; acelerações; arrancadas. O foco está na qualidade. Nunca no volume."}], "relacionadas": [{"id": "nota-0140", "tipo": "complementa", "justificativa": "catálogo alternativo de estruturas de sessão por objetivo, complementar (não conflitante) ao catálogo de treinos do apêndice do Livro 1 (nota-0140)"}, {"id": "nota-0022", "tipo": "pre-requisito", "justificativa": "as intensidades-alvo de cada tipo de sessão (Zona 2, LT2/FTP, VO2max) mapeiam para os níveis de %FTP da tabela de Coggan (nota-0022)"}], "confianca": 0.6, "status": "auto-aprovado", "body": "Catálogo de exemplos de sessões por objetivo fisiológico predominante, cada uma com estrutura clássica de aquecimento → parte principal → retorno à calma → recuperação pós-treino: (1) Base Aeróbia — 3h30-5h em Zona 2 (Endurance), estabilidade e baixa variabilidade; (2) Limiar — 2×20min, 3×15min ou 4×10min próximos a LT2/FTP; (3) VO2máx — 5×5min, 6×4min, 4×8min, ou 30/30s, objetivo de acumular tempo perto do VO2max (não necessariamente potência máxima); (4) Anaeróbio — 8×1min ou 10×30s, esforços muito intensos com recuperação longa, alto custo fisiológico, uso criterioso; (5) Neuromuscular — sprints de 6-12s com recuperação completa entre repetições, foco em qualidade não volume; (6) Regenerativa — intensidade muito baixa, curta duração, não deve virar treino de endurance.\n\nAplicação ao feedback: catálogo de referência para classificar o \"tipo\" provável de uma sessão a partir do padrão de potência/tempo-em-zona observado no Strava (ex.: repetições de ~5min perto do Nível 5 de Coggan → provável sessão de VO2max; blocos de 15-20min perto da FTP → provável sessão de limiar) — útil para o produto inferir a intenção da sessão e avaliar se a execução correspondeu ao padrão esperado, complementando (sem substituir) o catálogo já existente do Livro 1 (nota-0140)."},{"id": "nota-0220", "titulo": "Treino intervalado de alta intensidade (HIIT) melhora VO2máx mais que treino contínuo moderado (+5,5 vs. +4,9 mL/kg/min vs. controle; HIIT supera moderado em 1,2 mL/kg/min) — meta-análise de ensaios controlados, não estudo único", "dominio": "tipos-de-treino", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["tempo-em-zona", "FC (média/máx)"], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 44, "trecho": "a systematic review and meta-analysis published in 2015 concluded that, while both moderate-intensity and high-intensity training can elicit improvements in VO2 max, high-intensity training is more effective. Specifically, in healthy adults, moderate-intensity training improves VO2 max by 4.9 ml/kg/min, while HIIT improves it by 5.5 ml/kg min... high-intensity outperforms moderate-intensity by 1.2 ml/kg/min. [Milanović Z, Sporiš G, Weston M. Sports Med. 2015;45(10):1469-1481.]"}, {"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 45, "trecho": "These effects seem to be modified by factors such as the length of repetitions performed during HIIT (longer reps are more effective), age of participants (older participants benefit more), the duration of the training intervention (longer is better), the work:rest ratio (greater work:rest is more beneficial), and baseline fitness levels (participants with lower baseline fitness improve more)."}], "relacionadas": [{"id": "nota-0042", "tipo": "complementa", "justificativa": "fornece evidência de meta-análise (não estudo único) reforçando a priorização de intervalados de alta intensidade para estímulo de VO2máx já registrada na nota-0042 do Livro 1"}], "confianca": 0.7, "status": "auto-aprovado", "body": "**Nota sobre Política de ativação:** esta afirmação NÃO é rebaixada — é baseada numa revisão sistemática com meta-análise de ensaios controlados (Milanović et al. 2015, Sports Medicine), não num estudo isolado, portanto mantém `aplicacao: direta` com confiança mais alta que as notas de estudo único desta fonte.\n\nHIIT (treino intervalado de alta intensidade) produz maior ganho de VO2máx que treino contínuo de intensidade moderada: +5,5 mL/kg/min vs. controle (não-treino) para HIIT, contra +4,9 mL/kg/min para treino moderado — uma vantagem de 1,2 mL/kg/min para HIIT. Fatores que amplificam o efeito do HIIT: repetições mais longas, participantes mais velhos (respondem proporcionalmente mais), intervenções de treino mais longas, maior razão trabalho:descanso, e menor nível de aptidão de base (quem parte de pior forma ganha mais).\n\nAplicação ao feedback: reforça, com evidência de maior qualidade (meta-análise) que a recomendação já presente no cânone de priorizar sessões intervaladas de alta intensidade para estimular VO2máx (Livro 1, nota-0042; Manual, catálogo de sessões nota-0199) — o produto pode usar esse achado para justificar por que recomenda intervalados em vez de apenas mais volume em Zona 2 quando o objetivo declarado é aumentar VO2máx/potência aeróbia máxima, especialmente para atletas mais velhos ou com aptidão de base mais baixa (que tendem a responder ainda melhor)."},{"id": "nota-0221", "titulo": "Protocolo 4×4min a 90-95% FCmáx (3min recuperação ativa a 70% FCmáx) aumenta VO2máx em 8,8% em 8 semanas — mais que 15on/15off (+6,4%), e muito mais que corrida contínua a 70% FCmáx (+1,8% NS) ou no limiar de lactato (+2,0% NS), com mesmo gasto energético total (Helgerud et al. 2007)", "dominio": "tipos-de-treino", "camada": ["mensal"], "aplicacao": "direta", "tipo_nota": "protocolo", "sinais": ["tempo-em-zona", "FC (média/máx)", "potência-por-lap"], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 46, "trecho": "Long slow distance running: continuous run at 70% of maximal heart rate for 45 minutes. Lactate threshold running: continuous run at lactate threshold (85% of maximal heart rate) for ~25 minutes. 15 on/15 off interval running: 45 repetitions of 15s work at 90%-95% max HR / 15s active rest at 70% max HR. 4 x 4-minute intervals: four 4-minute intervals at 90%-95% max HR, interspersed with 3 minutes of active rest at 70% max HR. Each protocol performed 3 days/week for 8 weeks... all protocols were matched for oxygen consumption."}, {"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 47, "trecho": "an increase of 6.4% was observed in the 15 on/15 off group and an increase of 8.8% was observed in the 4 x 4 interval group. Contrast this with the nonsignificant 1.8% increase after long slow distance training and a similarly nonsignificant increase of 2.0% in the lactate threshold training group... both of the high-intensity interval protocols also increased maximal stroke volume after training... 'high-aerobic intensity endurance interval training is significantly more effective than performing the same total work at either lactate threshold or at 70% heart rate max in improving VO2 max.' [Helgerud J, et al. Med Sci Sports Exerc. 2007;39(4):665-671.]"}], "relacionadas": [{"id": "nota-0042", "tipo": "complementa", "justificativa": "fornece um protocolo específico e validado (4×4min) com evidência comparativa de eficácia, enriquecendo a janela de duração de estímulo de VO2máx já registrada na nota-0042"}, {"id": "nota-0199", "tipo": "complementa", "justificativa": "corrobora e detalha, com dados comparativos de eficácia, o exemplo '6×4min' já citado no catálogo de sessões da nota-0199 (Fonte 2)"}], "confianca": 0.7, "status": "auto-aprovado", "body": "**Nota sobre Política de ativação:** estudo controlado clássico (Helgerud et al. 2007), amplamente replicado e citado na literatura (o \"protocolo 4×4 norueguês\"), com desenho comparativo controlado (4 grupos, mesmo gasto energético total) — mantido em `aplicacao: direta` com confiança relativamente alta, mas registrado como um único estudo original (não meta-análise) para transparência.\n\nComparação direta de 4 protocolos de treino (3x/semana, 8 semanas, todos igualados por consumo total de oxigênio/gasto energético): corrida contínua a 70% FCmáx por 45min (+1,8% VO2máx, não significativo); corrida contínua no limiar de lactato/85% FCmáx por ~25min (+2,0%, não significativo); 15s trabalho a 90-95% FCmáx / 15s recuperação ativa a 70% FCmáx, 45 repetições (+6,4%); **4 séries de 4 minutos a 90-95% FCmáx, com 3 minutos de recuperação ativa a 70% FCmáx entre elas (+8,8%, o melhor resultado)**. Ambos os protocolos intervalados também aumentaram o volume sistólico máximo (mecanismo central, ver nota-0157/nota-0210), provável razão principal do maior ganho de VO2máx. Conclusão dos autores: treino intervalado de alta intensidade aeróbia é significativamente mais eficaz que o mesmo volume total de trabalho feito no limiar de lactato ou a 70% da FCmáx.\n\nAplicação ao feedback: fornece um protocolo específico, com FC-alvo claramente definida (90-95% FCmáx trabalho / 70% FCmáx recuperação) e evidência comparativa robusta — o produto pode usar este protocolo como referência de \"padrão-ouro\" ao reconhecer ou recomendar sessões de VO2máx do tipo 4×4min no histórico do Strava (via tempo-em-zona/potência-por-lap cruzado com FC), e comunicar ao usuário por que esse formato específico tende a ser mais eficaz que sessões contínuas de limiar ou endurance para o objetivo de elevar VO2máx."},{"id": "nota-0222", "titulo": "O volume total da sessão de HIIT (duração × repetições) é o principal preditor de ganho de VO2máx, mais do que a duração específica do intervalo — intervalos curtos precisam de muitas repetições; intervalos longos precisam de menos; o que importa é o tempo total em % alto de FC/VO2máx (meta-análise Wen et al. 2019, N=1.514)", "dominio": "tipos-de-treino", "camada": ["diario", "semanal"], "aplicacao": "direta", "tipo_nota": "regra-interpretacao", "sinais": ["tempo-em-zona", "potência-por-lap", "FC (média/máx)"], "fontes": [{"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 48, "trecho": "Work intervals were classified as long intervals (more than 2 minutes), moderate intervals (30s to 2min), short intervals (10-30s) and sprint intervals (less than 10s). The volume of HIIT (bout duration x repetitions) was classified as high volume (>15min total), moderate (5-10min), low (<5min)... A total of 1,514 participants... [Wen D, et al. J Sci Med Sport. 2019;22(8):941-947.]"}, {"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 50, "trecho": "longer intervals (more than 2 minutes), higher volume training (more than 15 minutes total per session), and longer training periods (4 to 12 weeks) seem to be more effective... The primary driver of improvements in VO2 max with any of the training protocols seems to be session volume. In other words, you can perform very short sprint intervals of 30 seconds or less, but you need to do a lot of them... The time spent at a high percentage of heart rate/VO2 max is what's important, and many roads lead to Rome."}, {"arquivo": "VO2 Max Essentials_Final.pdf", "pagina": 50, "trecho": "if you wish to perform short or sprint-type intervals, these need to be at all 'all-out' intensity... If choosing to perform longer duration intervals, a submaximal (though still very hard) intensity is sufficient."}], "relacionadas": [{"id": "nota-0221", "tipo": "complementa", "justificativa": "generaliza, com meta-análise de 1.514 participantes, o achado específico de um protocolo (4x4min) da nota-0221 para uma regra mais ampla sobre volume total de HIIT"}, {"id": "nota-0042", "tipo": "complementa", "justificativa": "reforça, com nova evidência, a janela de duração de estímulo de VO2máx já registrada na nota-0042 do Livro 1"}], "confianca": 0.68, "status": "auto-aprovado", "body": "**Nota sobre Política de ativação:** meta-análise de 1.514 participantes (Wen et al. 2019) — evidência de alta qualidade, mantida em `aplicacao: direta`.\n\nClassificação de HIIT por duração de intervalo (longo >2min, moderado 30s-2min, curto 10-30s, sprint <10s) e por volume total da sessão (alto >15min de trabalho acumulado, moderado 5-10min, baixo <5min). Principal achado: **o volume total de trabalho em alta intensidade acumulado na sessão é o maior preditor de ganho de VO2máx** — mais importante que a duração específica de cada intervalo. Intervalos longos (>2min) e volume alto (>15min) tendem a ser mais eficazes que intervenções curtas/baixo volume, mas todos os formatos de HIIT (mesmo sprints <10s com <5min de volume total e <4 semanas de duração) produziram alguma melhora de VO2máx. Regra prática de intensidade: intervalos curtos/sprint precisam ser verdadeiramente \"all-out\" (esforço máximo); intervalos mais longos podem ser submáximos, mas ainda muito difíceis.\n\nAplicação ao feedback: reforça que o produto não deveria tratar apenas \"quantos minutos em Zona 5\" como métrica secundária — o **volume acumulado de tempo em alta intensidade dentro de uma sessão** (soma de todas as repetições, não só a duração de uma repetição isolada) é o sinal mais preditivo de estímulo de VO2máx. Ao avaliar se uma sessão intervalada \"valeu a pena\" para o objetivo de VO2máx, o produto deveria somar o tempo total em zona alta (via tempo-em-zona/potência-por-lap) em vez de avaliar apenas a duração individual dos intervalos prescritos — e verificar se intervalos curtos foram de fato executados em intensidade máxima (não apenas \"forte\")."},{"id": "nota-0246", "titulo": "Razão trabalho:recuperação recomendada varia por sistema energético alvo — 1:3 para fosfagênio (ATP-PCr), 1:2 para glicolítico, 1:1 a 1:1,5 para aeróbio de longa duração", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "protocolo", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 488, "trecho": "The relief interval is either passive (rest–relief) or active (work–relief). A ratio of exercise duration to recovery duration usually formulates the duration of the relief interval. The ratio 1:3 generally applies to training the immediate energy system. For a sprinter who runs 10-s intervals, the relief interval equals about 30 s (3 × 10 s). For training the short-term glycolytic energy system, the relief interval averages twice the exercise interval, or a ratio of 1:2."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 488, "trecho": "The optimal exercise-to relief interval ratio usually is 1:1 or 1:1.5 to train the long-term aerobic energy system. During a 60- to 90-s high-intensity exercise interval, oxygen consumption increases rapidly to a high level but remains inadequate to meet exercise energy requirements. The recommended relief interval causes the succeeding exercise interval to begin before complete recovery."}], "relacionadas": [{"id": "nota-0221", "tipo": "complementa", "justificativa": "nota-0221 (protocolo 4x4min norueguês) é um caso específico de treino de VO2máx; esta nota generaliza a lógica de razão trabalho:recuperação por sistema energético-alvo, incluindo sprint/potência anaeróbia não coberto por 0221"}, {"id": "nota-0186", "tipo": "complementa", "justificativa": "aplica o princípio de especificidade (nota-0186) ao desenho de intervalos: a razão de recuperação deve ser escolhida conforme o sistema energético que se deseja sobrecarregar"}], "confianca": 0.65, "status": "revisar", "body": "McArdle formaliza a prescrição de treino intervalado com base em quatro variáveis (intensidade do intervalo de esforço, duração do intervalo de esforço, duração do intervalo de recuperação, número de repetições) e recomenda razões trabalho:recuperação distintas conforme o sistema energético que se deseja sobrecarregar:\n\n- **Sistema fosfagênio (ATP-PCr, esforços \"alácticos\" de até ~10s, ex.: sprints curtos):** razão de recuperação **1:3**. Exemplo do texto: intervalos de corrida de 10s → recuperação de ~30s (3×10s). Pouco lactato se acumula; a recuperação é rápida, permitindo reiniciar o esforço logo após um breve descanso.\n- **Sistema glicolítico de curto prazo (esforços de ~1min com acúmulo relevante de lactato):** razão de recuperação **1:2** (recuperação em média o dobro da duração do esforço). Essa razão garante restauração suficiente de fosfatos intramusculares e/ou remoção de lactato suficiente para que o próximo esforço prossiga com fadiga mínima.\n- **Sistema aeróbio de longa duração (intervalos de alta intensidade de 60-90s):** razão de recuperação **1:1 a 1:1,5**. Nesse caso, o consumo de oxigênio sobe rapidamente mas permanece insuficiente para suprir a demanda energética; a recuperação recomendada é deliberadamente incompleta (o intervalo seguinte começa antes do retorno ao consumo de oxigênio basal), garantindo que o estresse cardiovascular e metabólico atinja níveis próximos do pico repetidamente. A duração exata do intervalo de recuperação importa menos em intervalos mais longos, pois há tempo suficiente para o corpo ajustar parâmetros metabólicos e circulatórios durante a própria atividade.\n\nContraste importante: quanto mais curto e mais dependente do sistema fosfagênio/glicolítico o intervalo, maior a razão de recuperação necessária (1:2 a 1:3); quanto mais longo e dependente do sistema aeróbio, menor a razão necessária (~1:1), podendo até ser deliberadamente incompleta.\n\nAplicação ao feedback: nota de contexto — os números originais do livro são calibrados para corrida/natação em distâncias (jardas) e não têm tradução direta em potência de ciclismo sem adaptação; o produto não deve aplicar as razões literalmente a partir de um sinal isolado do Strava. Serve como referência ao avaliar se a estrutura de um treino intervalado registrado (via potência-série-temporal e potência-por-lap) é coerente com o sistema energético que o atleta provavelmente pretendia treinar — ex.: um treino de \"sprints\" com razão de recuperação muito menor que 1:2 pode não permitir restauração adequada do sistema glicolítico entre repetições, e um treino de \"VO2máx\" com razão de recuperação muito maior que ~1:1 pode não acumular estresse cardiovascular suficiente."},{"id": "nota-0248", "titulo": "Tabela ACSM de prescrição de treino de força por objetivo (força máxima, hipertrofia, potência, resistência muscular) e nível de treino (novato/intermediário/avançado): séries, repetições, %1RM e descanso", "dominio": "tipos-de-treino", "camada": ["semanal"], "aplicacao": "contexto", "tipo_nota": "protocolo", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 513, "trecho": "Table 22.2 Summary of Resistance Training Recommendations: an Overview of Different Program Variables Needed for Progression with Different Fitness Levels. Strength — Nov.: 60–70% of 1RM, 1–3 sets, 8–12 reps, 2–3 min rest; Int.: 70–80% of 1RM, mult. sets 6–12 reps; Adv.: 1RM—PER, mult. sets 1–12 reps—PER. Power — Nov.: Heavy loads (>80%)—strength; Light (30–60%)—velocity—PER, train for strength; Int./Adv.: 1–3 sets 3–6 reps up to 3–6 sets 1–6 reps—PER. Endurance — Nov.: 50–70% of 1RM, 1–3 sets 10–15 reps; Adv.: 30–80% of 1RM—PER, mult. sets 10–25 reps or more—PER. From ACSM position stand on: Progression models in resistance training for healthy adults. Med Sci Sports Exerc 2002;34:364."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 511, "trecho": "1. Eight- to 12-RM proves effective in novice training, whereas 1- to 12-RM effectively loads for intermediate training. This can then increase to more intense loading using 1- to 6-RM. 2. Rest 3 min between sets of an exercise at moderate movement velocity... 13. Power training should apply the strategy to improve muscular strength plus include lighter loads (30 to 60% of 1-RM) performed at fast contraction velocity."}], "relacionadas": [{"id": "nota-0187", "tipo": "complementa", "justificativa": "nota-0187 estabelece que o foco do treino de força para ciclistas é neuromuscular, não hipertrofia máxima; esta nota fornece os parâmetros numéricos (séries/reps/%1RM) do protocolo ACSM que operacionalizam esse foco (colunas Força e Potência, não Hipertrofia)"}, {"id": "nota-0069", "tipo": "complementa", "justificativa": "nota-0069 mostra que treino de força-resistência (altas repetições) não aumenta força máxima; a coluna 'Endurance' desta tabela (30-70% 1RM, 10-25+ reps) é o protocolo correspondente a esse objetivo, em contraste com as colunas Força/Potência"}], "confianca": 0.65, "status": "revisar", "body": "O posicionamento oficial do American College of Sports Medicine (ACSM, 2002) resumido por McArdle (Tabela 22.2) prescreve variáveis de treino de força distintas conforme o **objetivo** (força máxima, hipertrofia, potência, resistência muscular) e o **nível de treino** (novato/intermediário/avançado). Parâmetros principais por objetivo (valores aproximados, variando por nível):\n\n- **Força máxima:** 60-70% de 1RM (novato) a carga periodizada de 1RM (avançado); 1-3 séries de 8-12 repetições (novato) evoluindo para séries múltiplas de 1-12 repetições (avançado); descanso de 2-3 min entre séries; frequência de 2-3x/semana (novato) a 4-6x/semana (avançado). Regra geral citada: 8-12RM é eficaz para novatos, 1-12RM para intermediários, evoluindo a cargas mais intensas de 1-6RM.\n- **Hipertrofia:** cargas semelhantes à força (60-100% de 1RM conforme nível), mas com ênfase em 6-12 repetições e descanso mais curto (1-2 min, exceto séries muito pesadas).\n- **Potência:** combina duas faixas de carga — cargas pesadas (>80% de 1RM) para desenvolver força de base, e cargas leves (30-60% de 1RM) executadas com velocidade de contração rápida para desenvolver velocidade; séries de 1-6 repetições em níveis avançados, com ênfase em exercícios multiarticulares.\n- **Resistência muscular:** cargas mais leves, 50-70% de 1RM (novato) a 30-80% de 1RM periodizado (avançado); séries de 10-15 repetições (novato) a 10-25+ repetições (avançado); descanso mais curto (<1 min para séries de 10-15 reps em intermediários).\n\nPrincípios gerais de progressão citados: aumentar a carga em 2-10% quando o indivíduo consegue completar 1-2 repetições acima do número-alvo; sequenciar exercícios de grupos musculares grandes antes de pequenos, multiarticulares antes de uniarticulares; treino em dias alternados (2x a cada 2 dias) supera treino diário para o mesmo grupo muscular; velocidade de movimento mais rápida gera maior ganho de força que movimento lento (mas hipertrofia com foco em fibras rápidas ocorre principalmente com treino em velocidade rápida).\n\nAplicação ao feedback: fora do escopo direto de dados do Strava (o app não registra carga/RM/séries de treino de força), mas serve como referência técnica caso o produto amplie o feedback para sessões de força registradas como atividades separadas (ex.: \"Weight Training\" no Strava) — útil para verificar se os parâmetros relatados pelo atleta (quando disponíveis via input manual) correspondem ao objetivo declarado (ex.: um ciclista buscando potência/sprint mas treinando exclusivamente em 10-15 reps a 50-70% 1RM está mais alinhado ao protocolo de resistência muscular do que ao de potência)."},{"id": "nota-0250", "titulo": "Aquecimento prévio melhora desempenho de ciclismo intenso em 2-3% e contrarrelógio curto em 3-4min, via cinética mais rápida de VO2 e menor acúmulo de lactato", "dominio": "tipos-de-treino", "camada": ["diario"], "aplicacao": "contexto", "tipo_nota": "conceito", "sinais": [], "fontes": [{"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 574, "trecho": "Warm-up performed at moderate- and high-intensity improved intense cycling performance by 2 to 3%. A pre-exercise warm-up irrespective of intensity enhanced a 3- to 4-min (3-km) cycling time trial. This effect likely resulted from an acceleration of oxygen uptake kinetics from augmented blood flow at exercise onset. An active warm-up 5 min prior to a 30-s maximal sprint on a bicycle ergometer produced less blood and muscle lactate than equivalent effort without a physical warm-up."}, {"arquivo": "Exercise Physiology McArdle.pdf", "pagina": 574, "trecho": "Five mechanisms explain why warm-up 'should' improve physical performance and exercise capacity because of subsequent increases in blood flow and muscle and core temperature: 1. Faster muscle contraction and relaxation 2. Greater economy of movement from lowered viscous resistance within active muscles 3. Facilitated oxygen delivery and use by muscles because hemoglobin releases oxygen more readily at higher temperatures (Bohr effect) 4. Facilitated nerve transmission and muscle metabolism [...] 5. Increased blood flow through active tissues..."}], "relacionadas": [], "confianca": 0.6, "status": "revisar", "body": "Estudos específicos de ciclismo citados por McArdle quantificam o efeito do aquecimento pré-esforço: aquecimento em intensidade moderada a alta melhorou o desempenho de ciclismo intenso em **2 a 3%**; um aquecimento prévio (independente da intensidade) melhorou um contrarrelógio curto de ciclismo de 3-4 minutos (~3km). O mecanismo provável é a aceleração da cinética de consumo de oxigênio (VO2) no início do esforço, por aumento do fluxo sanguíneo — ou seja, o atleta atinge o \"steady state\" metabólico mais rápido, reduzindo o déficit de oxigênio inicial e a dependência de vias anaeróbias no começo do esforço.\n\nEm esforços de sprint máximo, um aquecimento ativo de 5 minutos antes de um sprint máximo de 30s em cicloergômetro produziu **menor acúmulo de lactato sanguíneo e muscular** do que o mesmo esforço sem aquecimento prévio — mesmo controlando para a temperatura muscular (aquecimento passivo até a mesma temperatura não replicou o efeito), sugerindo que o benefício vem de menor dependência de vias anaeróbias no esforço subsequente, não apenas do aumento de temperatura per se.\n\nCinco mecanismos fisiológicos propostos para o efeito ergogênico do aquecimento (aumento de fluxo sanguíneo e de temperatura muscular/central): (1) contração e relaxamento muscular mais rápidos; (2) maior economia de movimento por menor resistência viscosa intramuscular; (3) entrega e uso de oxigênio facilitados (hemoglobina libera O2 mais prontamente em temperaturas mais altas — efeito Bohr); (4) transmissão nervosa e metabolismo muscular facilitados; (5) maior fluxo sanguíneo por vasodilatação local.\n\nAplicação ao feedback: nota de contexto — o Strava não detecta automaticamente se um aquecimento foi realizado nem sua qualidade/estrutura, então não gera regra de interpretação direta de sinal isolado. Relevante como base técnica para explicar, quando o atleta relata objetivos de prova/te
